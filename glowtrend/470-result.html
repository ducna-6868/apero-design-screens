<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Glowtrend — Result</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0D0F;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .screen {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    border: 2px solid #242428;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 600;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; }
  .status-bar .icons { display: flex; gap: 6px; font-size: 13px; }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    padding: 8px 20px 12px;
    position: relative;
  }
  .nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    background: #1A1A1E;
    border: none;
    color: #FFFFFF;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .nav-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 600;
  }
  .nav-right {
    margin-left: auto;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 0 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* Image preview */
  .image-preview {
    width: 100%;
    height: 400px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 25%, #0f3460 50%, #1a1a40 75%, #2c1654 100%);
  }
  .image-preview::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(255,107,157,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(200,80,192,0.1) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(0,200,255,0.08) 0%, transparent 50%);
  }
  .watermark {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .image-preview .face-shape {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: 140px;
    height: 180px;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(60,50,80,0.6) 0%, rgba(40,35,55,0.6) 100%);
    border: 1px solid rgba(255,255,255,0.04);
  }

  /* Style name */
  .style-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    margin-bottom: 16px;
  }
  .style-name {
    color: #FFFFFF;
    font-size: 18px;
    font-weight: 600;
  }
  .sparkle { font-size: 18px; }

  /* Action buttons */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .action-btn {
    flex: 1;
    height: 56px;
    background: #1A1A1E;
    border: none;
    border-radius: 14px;
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .action-btn:hover { background: #242428; }
  .action-btn .icon { font-size: 18px; }
  .action-btn .label { font-size: 12px; color: #8E8E93; }

  /* CTA */
  .cta-area {
    padding: 0 20px 16px;
  }
  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .cta-btn:hover { opacity: 0.9; }

  /* Toast */
  .toast {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a3a1a;
    border: 1px solid rgba(52,199,89,0.3);
    padding: 12px 20px;
    border-radius: 14px;
    color: #34C759;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    animation: toast-in 0.4s ease-out;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Home indicator */
  .home-indicator {
    width: 134px;
    height: 5px;
    background: #636366;
    border-radius: 3px;
    margin: 8px auto 8px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#8226;</span>
      <span>&#128267;</span>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn">&#8592;</button>
    <span class="nav-title">Your Result</span>
    <button class="nav-btn nav-right" style="font-size:16px;">&#9993;</button>
  </div>

  <div class="content">
    <div class="image-preview">
      <div class="face-shape"></div>
      <div class="watermark">AI Generated</div>
    </div>

    <div class="style-row">
      <span class="sparkle">&#10024;</span>
      <span class="style-name">Cyberpunk Portrait</span>
    </div>

    <div class="action-buttons">
      <button class="action-btn">
        <span class="icon">&#11015;</span>
        <span class="label">Save</span>
      </button>
      <button class="action-btn">
        <span class="icon">&#128279;</span>
        <span class="label">Share</span>
      </button>
      <button class="action-btn">
        <span class="icon">&#128260;</span>
        <span class="label">Retry</span>
      </button>
    </div>
  </div>

  <div class="cta-area">
    <button class="cta-btn">Create Another</button>
  </div>

  <div class="toast">
    <span>&#10003;</span>
    Downloaded successfully.
  </div>

  <div style="padding: 0 20px 0;">
    <div class="home-indicator"></div>
  </div>
</div>
</body>
</html>
