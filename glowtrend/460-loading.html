<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Loading</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0;
  }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .loader-container { margin-bottom: 40px; position: relative; }
  .loader-ring {
    width: 100px; height: 100px; border-radius: 50%;
    border: 4px solid #2a2a2e; position: relative;
  }
  .loader-ring::before {
    content: ''; position: absolute; inset: -4px;
    border-radius: 50%; border: 4px solid transparent;
    border-top-color: #FF6B9D; border-right-color: #C850C0;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-ring::after {
    content: ''; position: absolute; inset: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,107,157,0.1), rgba(200,80,192,0.1));
  }
  .loader-percent {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px; font-weight: 700; z-index: 1;
  }
  .loading-title {
    color: #fff; font-size: 22px; font-weight: 600; text-align: center;
    margin-bottom: 24px;
  }
  .progress-bar-container {
    width: 280px; height: 6px; background: #2a2a2e;
    border-radius: 3px; margin-bottom: 16px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 72%;
    background: linear-gradient(90deg, #FF6B9D, #C850C0, #FFD700);
    border-radius: 3px;
    animation: progressPulse 2s ease infinite;
  }
  @keyframes progressPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .progress-text { color: #636366; font-size: 13px; }
  .tip-text {
    position: absolute; bottom: 60px;
    color: #636366; font-size: 13px; text-align: center;
    padding: 0 40px; line-height: 1.5;
  }
  .tip-label { color: #FF6B9D; font-weight: 600; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="loader-container">
    <div class="loader-ring"></div>
    <div class="loader-percent">72%</div>
  </div>
  <div class="loading-title">Creating your masterpiece...</div>
  <div class="progress-bar-container">
    <div class="progress-bar-fill"></div>
  </div>
  <div class="progress-text">Generating image with AI</div>
  <div class="tip-text">
    <span class="tip-label">Tip:</span> Use high-quality photos for the best AI transformation results.
  </div>
</body>
</html>
