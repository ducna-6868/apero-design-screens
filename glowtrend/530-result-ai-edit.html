<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - AI Edit Result</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .nav-bar { display: flex; align-items: center; padding: 16px 20px 12px; }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1a1a1e;
    border: 1px solid #2a2a2e; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-title { color: #fff; font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 36px; }
  .result-area {
    flex: 1; padding: 4px 20px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .result-image {
    width: 350px; height: 370px; border-radius: 24px; position: relative; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .side-left {
    position: absolute; left: 0; top: 0; width: 50%; height: 100%;
    background: linear-gradient(180deg, #2a2a2e, #1a1a1e);
    display: flex; align-items: center; justify-content: center;
  }
  .side-right {
    position: absolute; right: 0; top: 0; width: 50%; height: 100%;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    display: flex; align-items: center; justify-content: center;
  }
  .slider-divider {
    position: absolute; left: 50%; top: 0; width: 3px; height: 100%;
    background: #fff; transform: translateX(-50%); z-index: 2;
  }
  .slider-knob {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 36px; height: 36px; border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center; z-index: 3;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .label-before {
    position: absolute; top: 12px; left: 10px;
    background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px; z-index: 2;
  }
  .label-after {
    position: absolute; top: 12px; right: 10px;
    background: rgba(255,107,157,0.6); color: #fff; font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px; z-index: 2;
  }
  .toggle-row { display: flex; justify-content: center; padding: 10px 0 6px; }
  .toggle-btn {
    display: flex; background: #1a1a1e; border: 1px solid #2a2a2e;
    border-radius: 12px; overflow: hidden;
  }
  .toggle-opt {
    padding: 8px 20px; font-size: 12px; font-weight: 600; cursor: pointer;
    color: #8e8e93; border: none; background: none;
  }
  .toggle-opt.active {
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #fff; border-radius: 10px;
  }
  .history-row {
    display: flex; justify-content: center; gap: 16px; padding: 6px 0 8px;
  }
  .history-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 12px;
    background: #1a1a1e; border: 1px solid #2a2a2e;
    color: #8e8e93; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .history-btn.active { color: #fff; }
  .actions-row {
    display: flex; justify-content: center; gap: 14px; padding: 4px 20px 8px;
  }
  .action-icon-btn {
    width: 48px; height: 48px; border-radius: 14px;
    background: #1a1a1e; border: 1px solid #2a2a2e;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .input-area {
    padding: 8px 16px 32px; display: flex; gap: 10px; align-items: center;
    border-top: 1px solid #1a1a1e;
  }
  .input-field {
    flex: 1; height: 44px; border-radius: 14px;
    background: #141416; border: 1px solid #2a2a2e;
    color: #fff; font-size: 14px; padding: 0 16px; outline: none;
  }
  .input-field::placeholder { color: #636366; }
  .send-btn {
    width: 44px; height: 44px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4l-5 5 5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="nav-title">AI Edit Result</div>
  </div>
  <div class="result-area">
    <div class="result-image">
      <div class="side-left">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.3"><circle cx="20" cy="16" r="7" stroke="#636366" stroke-width="2"/><path d="M8 36c0-7 5-12 12-12s12 5 12 12" stroke="#636366" stroke-width="2"/></svg>
      </div>
      <div class="side-right">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.5"><circle cx="20" cy="16" r="7" stroke="#fff" stroke-width="2"/><path d="M8 36c0-7 5-12 12-12s12 5 12 12" stroke="#fff" stroke-width="2"/></svg>
      </div>
      <div class="label-before">Before</div>
      <div class="label-after">After</div>
      <div class="slider-divider"></div>
      <div class="slider-knob">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M5 3l-4 5 4 5" stroke="#0a0a0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 3l4 5-4 5" stroke="#0a0a0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="toggle-row">
    <div class="toggle-btn">
      <button class="toggle-opt">Before</button>
      <button class="toggle-opt active">After</button>
    </div>
  </div>
  <div class="history-row">
    <button class="history-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11 3L3 11M3 3v8h8" stroke="#8e8e93" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Undo
    </button>
    <button class="history-btn active">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l5 5-5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Next
    </button>
  </div>
  <div class="actions-row">
    <div class="action-icon-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3v10M6 9l4 4 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 15v2h14v-2" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <div class="action-icon-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M14 6l-4-4-4 4M10 2v10" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 12v4a2 2 0 002 2h10a2 2 0 002-2v-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div>
  <div class="input-area">
    <input type="text" class="input-field" placeholder="Describe next edit...">
    <button class="send-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9l13-6.5-6.5 13V9H2z" fill="#fff"/></svg>
    </button>
  </div>
</body>
</html>
