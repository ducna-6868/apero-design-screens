<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Showcase 5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .skip-btn {
    position: absolute; top: 58px; right: 20px; color: #8e8e93; font-size: 15px; font-weight: 500;
    background: none; border: none; cursor: pointer; z-index: 10; padding: 8px 12px;
  }
  .media-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 55px 20px; }
  .comparison-card {
    width: 280px; height: 280px; border-radius: 32px; position: relative; overflow: hidden;
    box-shadow: 0 16px 48px rgba(255, 107, 157, 0.2);
  }
  .side-before {
    position: absolute; left: 0; top: 0; width: 50%; height: 100%;
    background: linear-gradient(180deg, #2a2a2e 0%, #1a1a1e 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .side-after {
    position: absolute; right: 0; top: 0; width: 50%; height: 100%;
    background: linear-gradient(135deg, #FF6B9D 0%, #C850C0 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .side-label {
    position: absolute; bottom: 16px; font-size: 11px; font-weight: 600;
    color: #fff; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 8px;
  }
  .side-before .side-label { left: 12px; }
  .side-after .side-label { right: 12px; }
  .slider-line {
    position: absolute; left: 50%; top: 0; width: 3px; height: 100%;
    background: #fff; transform: translateX(-50%); z-index: 2;
  }
  .slider-handle {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 36px; height: 36px; border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center; z-index: 3;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .slider-handle svg { width: 18px; height: 18px; }
  .side-before svg, .side-after svg { width: 48px; height: 48px; opacity: 0.5; }
  .content { padding: 0 32px; text-align: center; }
  .dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 24px; }
  .dot { width: 8px; height: 8px; border-radius: 4px; background: rgba(255, 107, 157, 0.25); }
  .dot.active { width: 24px; background: #FF6B9D; }
  .title { color: #fff; font-size: 26px; font-weight: 700; line-height: 1.25; margin-bottom: 12px; }
  .desc { color: #8e8e93; font-size: 15px; line-height: 1.5; margin-bottom: 32px; }
  .bottom-area { padding: 0 24px 48px; }
  .btn-primary {
    width: 100%; height: 54px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 107, 157, 0.3);
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <button class="skip-btn">Skip</button>
  <div class="media-area">
    <div class="comparison-card">
      <div class="side-before">
        <svg viewBox="0 0 48 48" fill="none">
          <rect x="8" y="8" width="32" height="32" rx="4" stroke="#fff" stroke-width="2"/>
          <circle cx="20" cy="20" r="4" stroke="#fff" stroke-width="1.5"/>
          <path d="M8 32l10-8 6 4 8-10 8 6" stroke="#fff" stroke-width="1.5"/>
        </svg>
        <span class="side-label">Before</span>
      </div>
      <div class="side-after">
        <svg viewBox="0 0 48 48" fill="none">
          <rect x="8" y="8" width="32" height="32" rx="4" stroke="#fff" stroke-width="2"/>
          <circle cx="20" cy="20" r="4" stroke="#fff" stroke-width="1.5"/>
          <path d="M8 32l10-8 6 4 8-10 8 6" stroke="#fff" stroke-width="1.5"/>
          <path d="M34 10l2 4 4 1-3 3 .5 4-3.5-2-3.5 2 .5-4-3-3 4-1z" fill="#fff" opacity="0.8"/>
        </svg>
        <span class="side-label">After</span>
      </div>
      <div class="slider-line"></div>
      <div class="slider-handle">
        <svg viewBox="0 0 18 18" fill="none">
          <path d="M6 4l-4 5 4 5" stroke="#0a0a0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 4l4 5-4 5" stroke="#0a0a0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
    <div class="title">See the difference instantly</div>
    <div class="desc">Compare before and after to see remarkable difference in seconds.</div>
  </div>
  <div class="bottom-area">
    <button class="btn-primary">Next</button>
  </div>
</body>
</html>
