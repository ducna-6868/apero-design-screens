<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Showcase 5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }

  .status-bar {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    flex-shrink: 0;
  }

  .status-time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons span { font-size: 13px; color: #fff; }

  .top-nav {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px;
    flex-shrink: 0;
  }

  .skip-btn {
    font-size: 15px;
    color: #8E8E93;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .skip-btn:hover { color: #FFFFFF; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Media area — before/after slider */
  .media-area {
    width: 100%;
    height: 300px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    margin-top: 16px;
  }

  /* Before layer (full width, underneath) */
  .slider-before {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #2A2A2E, #1A1A1E);
  }

  /* Simulated landscape scene — before (dull) */
  .scene-before {
    position: absolute;
    inset: 0;
  }

  .scene-before .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(180deg, #2A2A2E, #3A3A3E);
  }

  .scene-before .mountain {
    position: absolute;
    bottom: 45%;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 80px solid #3A3A3E;
  }

  .scene-before .mountain:nth-child(2) { left: 10%; }
  .scene-before .mountain:nth-child(3) { left: 40%; border-bottom-color: #353538; }
  .scene-before .mountain:nth-child(4) { left: 65%; border-bottom-color: #404044; }

  .scene-before .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(180deg, #333336, #2A2A2E);
  }

  .scene-before .sun {
    position: absolute;
    top: 15%;
    right: 20%;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #555558;
  }

  /* After layer (clipped) */
  .slider-after {
    position: absolute;
    inset: 0;
    clip-path: inset(0 0 0 0);
    animation: sliderReveal 3s ease-in-out infinite alternate;
  }

  @keyframes sliderReveal {
    0% { clip-path: inset(0 60% 0 0); }
    100% { clip-path: inset(0 20% 0 0); }
  }

  .scene-after {
    position: absolute;
    inset: 0;
  }

  .scene-after .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(180deg, #1A0A2E, #2E1548, #4A1A5E);
  }

  .scene-after .mountain {
    position: absolute;
    bottom: 45%;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
  }

  .scene-after .mountain:nth-child(2) {
    left: 10%;
    border-bottom: 80px solid #2A1040;
  }

  .scene-after .mountain:nth-child(3) {
    left: 40%;
    border-bottom: 80px solid #251038;
  }

  .scene-after .mountain:nth-child(4) {
    left: 65%;
    border-bottom: 80px solid #301248;
  }

  .scene-after .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(180deg, #1E0830, #150620);
  }

  .scene-after .sun {
    position: absolute;
    top: 15%;
    right: 20%;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    box-shadow: 0 0 30px rgba(255,107,157,0.5), 0 0 60px rgba(200,80,192,0.3);
  }

  /* Stars in after scene */
  .star {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #fff;
    animation: twinkle 2s ease-in-out infinite;
  }

  .star:nth-child(5) { top: 8%; left: 15%; animation-delay: 0s; }
  .star:nth-child(6) { top: 12%; left: 45%; animation-delay: 0.5s; }
  .star:nth-child(7) { top: 5%; left: 70%; animation-delay: 1s; }
  .star:nth-child(8) { top: 18%; left: 30%; animation-delay: 0.3s; }
  .star:nth-child(9) { top: 10%; left: 85%; animation-delay: 0.8s; }
  .star:nth-child(10) { top: 22%; left: 55%; animation-delay: 1.3s; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Slider line */
  .slider-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, transparent 0%, #fff 10%, #fff 90%, transparent 100%);
    z-index: 5;
    animation: sliderMove 3s ease-in-out infinite alternate;
  }

  @keyframes sliderMove {
    0% { left: 40%; }
    100% { left: 80%; }
  }

  .slider-handle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slider-handle::before,
  .slider-handle::after {
    content: '';
    position: absolute;
    width: 0;
    height: 0;
    border-style: solid;
  }

  .slider-handle::before {
    left: 6px;
    border-width: 5px 6px 5px 0;
    border-color: transparent #C850C0 transparent transparent;
  }

  .slider-handle::after {
    right: 6px;
    border-width: 5px 0 5px 6px;
    border-color: transparent transparent transparent #C850C0;
  }

  /* Labels */
  .slider-label {
    position: absolute;
    bottom: 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 8px;
    z-index: 4;
  }

  .label-before {
    left: 16px;
    color: #8E8E93;
    background: rgba(99,99,102,0.3);
  }

  .label-after {
    right: 16px;
    color: #FF6B9D;
    background: rgba(255,107,157,0.2);
  }

  /* Dots */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #636366;
    transition: all 0.3s;
  }

  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  .text-content {
    margin-top: 32px;
    text-align: center;
    padding: 0 8px;
  }

  .text-content h2 {
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .text-content p {
    font-size: 16px;
    color: #8E8E93;
    line-height: 1.5;
  }

  .cta-area {
    padding: 20px 24px 48px;
    width: 100%;
    flex-shrink: 0;
  }

  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(200,80,192,0.3);
  }

  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(200,80,192,0.45);
  }

  .cta-btn:active { transform: translateY(0); }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>&#8226;</span>
        <span>&#128267;</span>
      </div>
    </div>

    <div class="top-nav">
      <button class="skip-btn">Skip</button>
    </div>

    <div class="content">
      <div class="media-area">
        <!-- Before scene -->
        <div class="slider-before">
          <div class="scene-before">
            <div class="sky"></div>
            <div class="mountain"></div>
            <div class="mountain"></div>
            <div class="mountain"></div>
            <div class="ground"></div>
            <div class="sun"></div>
          </div>
        </div>

        <!-- After scene (clips from left) -->
        <div class="slider-after">
          <div class="scene-after">
            <div class="sky"></div>
            <div class="mountain"></div>
            <div class="mountain"></div>
            <div class="mountain"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="ground"></div>
            <div class="sun"></div>
          </div>
        </div>

        <div class="slider-line">
          <div class="slider-handle"></div>
        </div>

        <span class="slider-label label-before">Before</span>
        <span class="slider-label label-after">After</span>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>

      <div class="text-content">
        <h2>See the difference instantly</h2>
        <p>Before & after comparison in seconds.</p>
      </div>
    </div>

    <div class="cta-area">
      <button class="cta-btn">Next</button>
    </div>
  </div>
</body>
</html>
