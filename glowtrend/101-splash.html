<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }

  /* Radial glow behind logo */
  .glow-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(200,80,192,0.18) 0%, rgba(255,107,157,0.08) 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -60%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -60%) scale(1.08); }
  }

  .logo {
    position: relative;
    z-index: 1;
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo-glow {
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-trend {
    color: #FFFFFF;
  }

  .subtitle {
    position: relative;
    z-index: 1;
    margin-top: 16px;
    font-size: 16px;
    color: #8E8E93;
    font-weight: 400;
    animation: fadeInUp 1.2s ease-out 0.5s both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading dots */
  .loading-dots {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    margin-top: 48px;
    animation: fadeInUp 1s ease-out 1s both;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #636366;
    animation: dotPulse 1.4s ease-in-out infinite;
  }

  .dot:nth-child(1) {
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    animation: dotActive 1.4s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.1); }
  }

  @keyframes dotActive {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.25); }
  }

  .footer {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 13px;
    color: #636366;
    opacity: 0.5;
    font-weight: 400;
    animation: fadeInUp 1s ease-out 1.5s both;
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    z-index: 10;
  }

  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  .status-icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .status-icons span {
    font-size: 13px;
    color: #fff;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>&#8226;</span>
        <span>&#128267;</span>
      </div>
    </div>

    <div class="glow-bg"></div>

    <div class="logo">
      <span class="logo-glow">Glow</span><span class="logo-trend">Trend</span>
    </div>

    <div class="subtitle">Transform your photos with AI</div>

    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="footer">Made by Apero</div>
  </div>
</body>
</html>
