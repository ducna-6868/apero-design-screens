<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Home Paywall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .device {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    position: relative;
    overflow: hidden;
    border-radius: 44px;
    border: 2px solid #2A2A2E;
  }

  /* Gradient bg */
  .gradient-bg {
    position: absolute;
    top: -60px;
    left: -40px;
    right: -40px;
    height: 340px;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,107,157,0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(200,80,192,0.18) 0%, transparent 50%);
    filter: blur(40px);
    animation: gradientShift 6s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes gradientShift {
    0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
    50% { transform: translate(10px, -10px) scale(1.05); opacity: 1; }
    100% { transform: translate(-10px, 5px) scale(1); opacity: 0.9; }
  }

  .screen {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 60px 24px 34px;
  }

  /* Close button */
  .close-btn {
    position: absolute;
    top: 60px;
    left: 20px;
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .close-btn svg {
    width: 14px;
    height: 14px;
    stroke: #8E8E93;
    stroke-width: 2.5;
    fill: none;
  }

  /* Premium preview thumbnails (blurred) */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 20px;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  .preview-thumb {
    aspect-ratio: 3/4;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    filter: blur(4px);
    opacity: 0.6;
  }
  .preview-thumb:nth-child(1) {
    background: linear-gradient(135deg, #FF6B9D, #FF9A76);
  }
  .preview-thumb:nth-child(2) {
    background: linear-gradient(135deg, #C850C0, #7C3AED);
  }
  .preview-thumb:nth-child(3) {
    background: linear-gradient(135deg, #06B6D4, #3B82F6);
  }
  .preview-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 4px,
      transparent 4px,
      transparent 8px
    );
  }
  /* Lock overlay */
  .preview-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .lock-icon {
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    filter: blur(0) !important;
  }

  /* Title area */
  .title-area {
    text-align: center;
    margin-bottom: 24px;
  }
  .title-text {
    font-size: 26px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: -0.3px;
  }
  .title-sub {
    font-size: 14px;
    color: #8E8E93;
    margin-top: 6px;
  }

  /* Benefits list */
  .benefits {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
    padding: 0 8px;
  }
  .benefits li {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 15px;
    color: #FFFFFF;
    font-weight: 500;
  }
  .check-icon {
    width: 24px;
    height: 24px;
    min-width: 24px;
    background: rgba(52,199,89,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #34C759;
    font-weight: 700;
  }

  /* Package options */
  .packages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }
  .package-card {
    background: #1A1A1E;
    border: 2px solid #2A2A2E;
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .package-card.selected {
    border-color: transparent;
    box-shadow: 0 0 0 2px #C850C0, 0 0 20px rgba(200,80,192,0.2);
  }
  .radio {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid #636366;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
  }
  .package-card.selected .radio {
    border-color: #C850C0;
  }
  .radio-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    transform: scale(0);
    transition: transform 0.2s;
  }
  .package-card.selected .radio-dot {
    transform: scale(1);
  }
  .package-info { flex: 1; }
  .package-label {
    font-size: 14px;
    color: #8E8E93;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .package-price {
    font-size: 17px;
    font-weight: 700;
    color: #FFFFFF;
  }
  .save-badge {
    display: inline-flex;
    padding: 4px 10px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.5px;
  }

  /* CTA button */
  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .cta-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: ctaShimmer 3s ease-in-out infinite;
  }
  @keyframes ctaShimmer {
    0% { left: -100%; }
    100% { left: 200%; }
  }

  /* Footer */
  .footer-links {
    text-align: center;
    font-size: 12px;
    color: #636366;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .footer-links a {
    color: #8E8E93;
    text-decoration: none;
  }
  .footer-links span { color: #636366; }

  .spacer { flex: 1; }
</style>
</head>
<body>
<div class="device">
  <div class="gradient-bg"></div>
  <div class="screen">

    <button class="close-btn">
      <svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
    </button>

    <!-- Blurred premium preview thumbnails -->
    <div class="preview-grid">
      <div class="preview-thumb">
        <div class="preview-overlay"><div class="lock-icon">&#128274;</div></div>
      </div>
      <div class="preview-thumb">
        <div class="preview-overlay"><div class="lock-icon">&#128274;</div></div>
      </div>
      <div class="preview-thumb">
        <div class="preview-overlay"><div class="lock-icon">&#128274;</div></div>
      </div>
    </div>

    <div class="title-area">
      <div class="title-text">Unlock Premium</div>
      <div class="title-sub">Get full access to all premium features</div>
    </div>

    <ul class="benefits">
      <li><span class="check-icon">&#10003;</span>Unlimited AI generations</li>
      <li><span class="check-icon">&#10003;</span>Access all premium styles</li>
      <li><span class="check-icon">&#10003;</span>HD quality exports</li>
      <li><span class="check-icon">&#10003;</span>No watermarks</li>
      <li><span class="check-icon">&#10003;</span>Priority processing</li>
    </ul>

    <div class="spacer"></div>

    <div class="packages">
      <div class="package-card" onclick="select(this)">
        <div class="radio"><div class="radio-dot"></div></div>
        <div class="package-info">
          <div class="package-label">Weekly</div>
          <div class="package-price">$4.99/week</div>
        </div>
      </div>
      <div class="package-card selected" onclick="select(this)">
        <div class="radio"><div class="radio-dot"></div></div>
        <div class="package-info">
          <div class="package-label">Yearly</div>
          <div class="package-price">$29.99/year</div>
        </div>
        <span class="save-badge">SAVE 88%</span>
      </div>
    </div>

    <button class="cta-btn">Continue</button>

    <div class="footer-links">
      <a href="#">Restore</a><span>|</span>
      <a href="#">Terms</a><span>|</span>
      <a href="#">Privacy</a>
    </div>

  </div>
</div>

<script>
function select(card) {
  document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
}
</script>
</body>
</html>
