<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Showcase 2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }

  .status-bar {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    flex-shrink: 0;
  }

  .status-time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons span { font-size: 13px; color: #fff; }

  .top-nav {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px;
    flex-shrink: 0;
  }

  .skip-btn {
    font-size: 15px;
    color: #8E8E93;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .skip-btn:hover { color: #FFFFFF; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Before / After media area */
  .media-area {
    width: 100%;
    height: 300px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background: #1A1A1E;
    margin-top: 16px;
    display: flex;
  }

  .ba-side {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .ba-before {
    background: linear-gradient(180deg, #242428 0%, #1A1A1E 100%);
  }

  .ba-after {
    background: linear-gradient(180deg, #2A1A2E 0%, #1E1528 100%);
  }

  /* Simulated photo placeholders */
  .ba-photo {
    width: 120px;
    height: 160px;
    border-radius: 12px;
    position: relative;
  }

  .ba-before .ba-photo {
    background: linear-gradient(135deg, #3a3a3e, #2a2a2e);
    filter: brightness(0.6) saturate(0.3);
  }

  .ba-after .ba-photo {
    background: linear-gradient(135deg, #FF6B9D33, #C850C033);
    border: 1px solid rgba(200,80,192,0.2);
  }

  .ba-photo-face {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
  }

  .ba-before .ba-photo-face {
    background: #4a4a4e;
  }

  .ba-after .ba-photo-face {
    background: linear-gradient(135deg, rgba(255,107,157,0.5), rgba(200,80,192,0.5));
    box-shadow: 0 0 20px rgba(200,80,192,0.3);
  }

  .ba-photo-body {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 50px;
    border-radius: 8px 8px 0 0;
  }

  .ba-before .ba-photo-body {
    background: #4a4a4e;
  }

  .ba-after .ba-photo-body {
    background: linear-gradient(180deg, rgba(255,107,157,0.4), rgba(200,80,192,0.3));
  }

  .ba-label {
    position: absolute;
    bottom: 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 8px;
  }

  .ba-before .ba-label {
    left: 50%;
    transform: translateX(-50%);
    color: #8E8E93;
    background: rgba(99,99,102,0.2);
  }

  .ba-after .ba-label {
    left: 50%;
    transform: translateX(-50%);
    color: #FF6B9D;
    background: rgba(255,107,157,0.15);
  }

  /* Divider line */
  .ba-divider {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, transparent 0%, #FF6B9D 20%, #C850C0 80%, transparent 100%);
    z-index: 2;
  }

  .ba-divider-handle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(200,80,192,0.4);
  }

  .ba-divider-handle::before,
  .ba-divider-handle::after {
    content: '';
    position: absolute;
    width: 0;
    height: 0;
    border-style: solid;
  }

  .ba-divider-handle::before {
    left: 5px;
    border-width: 5px 6px 5px 0;
    border-color: transparent #fff transparent transparent;
  }

  .ba-divider-handle::after {
    right: 5px;
    border-width: 5px 0 5px 6px;
    border-color: transparent transparent transparent #fff;
  }

  /* Enhancement sparkle animation on the after side */
  .enhance-glow {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 50% 50%, rgba(200,80,192,0.1), transparent 60%);
    animation: enhancePulse 3s ease-in-out infinite;
  }

  @keyframes enhancePulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Dots */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #636366;
    transition: all 0.3s;
  }

  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  .text-content {
    margin-top: 32px;
    text-align: center;
    padding: 0 8px;
  }

  .text-content h2 {
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .text-content p {
    font-size: 16px;
    color: #8E8E93;
    line-height: 1.5;
  }

  .cta-area {
    padding: 20px 24px 48px;
    width: 100%;
    flex-shrink: 0;
  }

  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(200,80,192,0.3);
  }

  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(200,80,192,0.45);
  }

  .cta-btn:active { transform: translateY(0); }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>&#8226;</span>
        <span>&#128267;</span>
      </div>
    </div>

    <div class="top-nav">
      <button class="skip-btn">Skip</button>
    </div>

    <div class="content">
      <div class="media-area">
        <div class="ba-side ba-before">
          <div class="ba-photo">
            <div class="ba-photo-face"></div>
            <div class="ba-photo-body"></div>
          </div>
          <span class="ba-label">Before</span>
        </div>
        <div class="ba-side ba-after">
          <div class="enhance-glow"></div>
          <div class="ba-photo">
            <div class="ba-photo-face"></div>
            <div class="ba-photo-body"></div>
          </div>
          <span class="ba-label">After</span>
        </div>
        <div class="ba-divider">
          <div class="ba-divider-handle"></div>
        </div>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="text-content">
        <h2>Enhance your photos instantly</h2>
        <p>Boost quality, sharpen details with a single tap.</p>
      </div>
    </div>

    <div class="cta-area">
      <button class="cta-btn">Next</button>
    </div>
  </div>
</body>
</html>
