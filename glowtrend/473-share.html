<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Share</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(4px);
  }
  .sheet {
    position: relative; z-index: 10;
    background: #1a1a1e; border-radius: 24px 24px 0 0;
    padding: 12px 24px 40px;
    animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
  }
  @keyframes slideUp {
    0% { transform: translateY(100%); }
    100% { transform: translateY(0); }
  }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: #636366; margin: 0 auto 20px;
  }
  .sheet-title {
    color: #fff; font-size: 18px; font-weight: 600;
    text-align: center; margin-bottom: 24px;
  }
  .social-row {
    display: flex; justify-content: space-around; margin-bottom: 24px;
  }
  .social-item {
    display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
  }
  .social-icon {
    width: 52px; height: 52px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
  }
  .ig { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); color: #fff; }
  .fb { background: #1877f2; color: #fff; }
  .tw { background: #1da1f2; color: #fff; }
  .wa { background: #25d366; color: #fff; }
  .tk { background: #010101; color: #fff; border: 1px solid #2a2a2e; }
  .more { background: #2a2a2e; color: #8e8e93; }
  .social-label { color: #8e8e93; font-size: 11px; }
  .copy-link {
    display: flex; align-items: center; gap: 12px;
    background: #141416; border: 1px solid #2a2a2e;
    border-radius: 14px; padding: 14px 18px; margin-bottom: 16px;
    cursor: pointer;
  }
  .copy-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,107,157,0.12);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .copy-text { color: #fff; font-size: 15px; font-weight: 500; }
  .btn-cancel {
    width: 100%; height: 50px; border-radius: 14px;
    background: #141416; border: 1px solid #2a2a2e;
    color: #8e8e93; font-size: 16px; font-weight: 500; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="overlay"></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Share to</div>
    <div class="social-row">
      <div class="social-item">
        <div class="social-icon ig">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="16" height="16" rx="5" stroke="#fff" stroke-width="1.5"/><circle cx="11" cy="11" r="4" stroke="#fff" stroke-width="1.5"/><circle cx="15.5" cy="6.5" r="1" fill="#fff"/></svg>
        </div>
        <span class="social-label">Instagram</span>
      </div>
      <div class="social-item">
        <div class="social-icon fb">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M13 8h2l-1 3h-1v8h-3v-8H8v-3h2V7a3 3 0 013-3h2v3h-2z" fill="#fff"/></svg>
        </div>
        <span class="social-label">Facebook</span>
      </div>
      <div class="social-item">
        <div class="social-icon tw">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M2 3h4l4.5 6L15 3h3l-6 7.5L19 17h-4l-4.5-6L6 17H3l6-7.5L2 3z" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </div>
        <span class="social-label">Twitter</span>
      </div>
      <div class="social-item">
        <div class="social-icon wa">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2a9 9 0 00-7.8 13.5L2 20l4.6-1.2A9 9 0 1011 2z" stroke="#fff" stroke-width="1.5"/><path d="M8 9c.5-1 1-1.5 1.5-1.5s1 .5 1.2 1l.3.8c.1.3 0 .6-.2.8l-.5.5c.5 1 1.2 1.8 2.2 2.3l.5-.5c.2-.2.5-.3.8-.2l.8.3c.5.2.8.7 1 1.2 0 .5-.5 1-1.5 1.5-1.5.5-3.5-.5-5-2s-2.5-3.5-2-5z" fill="#fff"/></svg>
        </div>
        <span class="social-label">WhatsApp</span>
      </div>
      <div class="social-item">
        <div class="social-icon tk">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2v12a3 3 0 11-2-2.8V8a6 6 0 004.5 2V7a4 4 0 01-2.5-5z" fill="#fff"/></svg>
        </div>
        <span class="social-label">TikTok</span>
      </div>
      <div class="social-item">
        <div class="social-icon more">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="4" cy="10" r="2" fill="#8e8e93"/><circle cx="10" cy="10" r="2" fill="#8e8e93"/><circle cx="16" cy="10" r="2" fill="#8e8e93"/></svg>
        </div>
        <span class="social-label">More</span>
      </div>
    </div>
    <div class="copy-link">
      <div class="copy-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7.5 10.5l3-3a2.83 2.83 0 014 4l-3 3" stroke="#FF6B9D" stroke-width="1.5" stroke-linecap="round"/><path d="M10.5 7.5l-3 3a2.83 2.83 0 01-4-4l3-3" stroke="#FF6B9D" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="copy-text">Copy Link</span>
    </div>
    <button class="btn-cancel">Cancel</button>
  </div>
</body>
</html>
