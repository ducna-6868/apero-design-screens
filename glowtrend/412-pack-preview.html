<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Pack Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow-y: auto; overflow-x: hidden; position: relative;
  }
  body::-webkit-scrollbar { display: none; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .nav-bar { display: flex; align-items: center; padding: 16px 20px 12px; }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1a1a1e;
    border: 1px solid #2a2a2e; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-title { color: #fff; font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 36px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 8px 20px 32px; }
  .grid-card {
    border-radius: 16px; overflow: hidden; position: relative; aspect-ratio: 3/4; cursor: pointer;
  }
  .grid-preview {
    width: 100%; height: 100%;
  }
  .g1 { background: linear-gradient(135deg, #FF6B9D, #C850C0); }
  .g2 { background: linear-gradient(135deg, #667eea, #764ba2); }
  .g3 { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .g4 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .g5 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .g6 { background: linear-gradient(135deg, #fa709a, #fee140); }
  .g7 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  .g8 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
  .grid-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 12px; font-size: 13px; color: #fff; font-weight: 500;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
  }
  .pro-lock {
    position: absolute; top: 10px; right: 10px;
    width: 24px; height: 24px; border-radius: 8px;
    background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4l-5 5 5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="nav-title">Trending Styles</div>
  </div>
  <div class="grid">
    <div class="grid-card"><div class="grid-preview g1"></div><div class="grid-name">Glow Up</div></div>
    <div class="grid-card"><div class="grid-preview g2"></div><div class="grid-name">Cyberpunk</div><div class="pro-lock"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="5" width="8" height="6" rx="1.5" stroke="#FFD700" stroke-width="1.2"/><path d="M4 5V3.5a2 2 0 014 0V5" stroke="#FFD700" stroke-width="1.2"/></svg></div></div>
    <div class="grid-card"><div class="grid-preview g3"></div><div class="grid-name">Dream</div></div>
    <div class="grid-card"><div class="grid-preview g4"></div><div class="grid-name">Ocean Vibes</div><div class="pro-lock"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="5" width="8" height="6" rx="1.5" stroke="#FFD700" stroke-width="1.2"/><path d="M4 5V3.5a2 2 0 014 0V5" stroke="#FFD700" stroke-width="1.2"/></svg></div></div>
    <div class="grid-card"><div class="grid-preview g5"></div><div class="grid-name">Nature Glow</div></div>
    <div class="grid-card"><div class="grid-preview g6"></div><div class="grid-name">Sunset Fire</div></div>
    <div class="grid-card"><div class="grid-preview g7"></div><div class="grid-name">Lavender</div><div class="pro-lock"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="5" width="8" height="6" rx="1.5" stroke="#FFD700" stroke-width="1.2"/><path d="M4 5V3.5a2 2 0 014 0V5" stroke="#FFD700" stroke-width="1.2"/></svg></div></div>
    <div class="grid-card"><div class="grid-preview g8"></div><div class="grid-name">Warm Peach</div></div>
  </div>
</body>
</html>
