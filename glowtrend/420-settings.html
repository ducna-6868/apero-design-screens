<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .nav-bar { display: flex; align-items: center; padding: 16px 20px 12px; }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1a1a1e;
    border: 1px solid #2a2a2e; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-title { color: #fff; font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 36px; }
  .menu-section { padding: 16px 20px; }
  .menu-card {
    background: #141416; border: 1px solid #2a2a2e; border-radius: 16px; overflow: hidden;
  }
  .menu-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; border-bottom: 1px solid #1a1a1e;
    cursor: pointer; transition: background 0.15s;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .icon-blue { background: rgba(10,132,255,0.15); }
  .icon-pink { background: rgba(255,107,157,0.15); }
  .icon-purple { background: rgba(200,80,192,0.15); }
  .icon-green { background: rgba(48,209,88,0.15); }
  .icon-orange { background: rgba(255,159,10,0.15); }
  .icon-gold { background: rgba(255,215,0,0.15); }
  .menu-content { flex: 1; }
  .menu-label { color: #fff; font-size: 15px; font-weight: 500; }
  .menu-value { color: #636366; font-size: 13px; margin-top: 1px; }
  .menu-chevron { color: #636366; font-size: 16px; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4l-5 5 5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="nav-title">Settings</div>
  </div>
  <div class="menu-section">
    <div class="menu-card">
      <div class="menu-item">
        <div class="menu-icon icon-blue">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#0a84ff" stroke-width="1.5"/><path d="M9 5v4l3 2" stroke="#0a84ff" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="menu-content">
          <div class="menu-label">Language</div>
          <div class="menu-value">English</div>
        </div>
        <span class="menu-chevron">&rsaquo;</span>
      </div>
      <div class="menu-item">
        <div class="menu-icon icon-pink">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="#FF6B9D" stroke-width="1.5"/><path d="M2 8h14" stroke="#FF6B9D" stroke-width="1.5"/><rect x="4" y="10.5" width="4" height="2" rx="0.5" stroke="#FF6B9D" stroke-width="1"/></svg>
        </div>
        <div class="menu-content">
          <div class="menu-label">Manage Subscription</div>
        </div>
        <span class="menu-chevron">&rsaquo;</span>
      </div>
      <div class="menu-item">
        <div class="menu-icon icon-purple">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9a6 6 0 1112 0 6 6 0 01-12 0z" stroke="#C850C0" stroke-width="1.5"/><path d="M9 6v3h2" stroke="#C850C0" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="menu-content">
          <div class="menu-label">Privacy Policy</div>
        </div>
        <span class="menu-chevron">&rsaquo;</span>
      </div>
      <div class="menu-item">
        <div class="menu-icon icon-purple">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="12" height="14" rx="2" stroke="#C850C0" stroke-width="1.5"/><path d="M6 6h6M6 9h6M6 12h3" stroke="#C850C0" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
        <div class="menu-content">
          <div class="menu-label">Terms of Service</div>
        </div>
        <span class="menu-chevron">&rsaquo;</span>
      </div>
      <div class="menu-item">
        <div class="menu-icon icon-gold">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2l2 4 4.5.7-3.2 3.2.8 4.5L9 12.2 4.9 14.4l.8-4.5L2.5 6.7 7 6z" stroke="#FFD700" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </div>
        <div class="menu-content">
          <div class="menu-label">Rate Us</div>
        </div>
        <span class="menu-chevron">&rsaquo;</span>
      </div>
      <div class="menu-item">
        <div class="menu-icon icon-green">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 3v5l-4 7h12l-4-7V3" stroke="#30d158" stroke-width="1.5" stroke-linejoin="round"/><path d="M5 3h8" stroke="#30d158" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="menu-content">
          <div class="menu-label">Share App</div>
        </div>
        <span class="menu-chevron">&rsaquo;</span>
      </div>
    </div>
  </div>
</body>
</html>
