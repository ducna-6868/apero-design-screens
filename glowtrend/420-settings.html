<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Glowtrend — Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    position: relative;
    overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 0 0 3px #2A2A2E, 0 20px 60px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
    font-size: 14px;
    font-weight: 600;
  }
  .status-bar .time { font-weight: 700; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 12px; }

  /* Navigation Bar */
  .nav-bar {
    height: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 20px;
  }
  .back-btn {
    position: absolute;
    left: 20px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #1A1A1E;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    color: #FFFFFF;
    text-decoration: none;
  }
  .back-btn:hover { background: #242428; }
  .nav-title {
    font-size: 17px;
    font-weight: 700;
  }

  /* Settings List */
  .settings-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 0;
    scrollbar-width: none;
  }
  .settings-list::-webkit-scrollbar { display: none; }

  .settings-group {
    background: #1A1A1E;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .settings-row {
    display: flex;
    align-items: center;
    height: 56px;
    padding: 0 16px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .settings-row:hover { background: #242428; }
  .settings-row:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 52px;
    right: 16px;
    height: 1px;
    background: #242428;
  }
  .row-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .row-content {
    flex: 1;
    margin-left: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .row-label {
    font-size: 15px;
    font-weight: 500;
    color: #FFFFFF;
  }
  .row-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .row-value {
    font-size: 14px;
    color: #636366;
    font-weight: 500;
  }
  .row-chevron {
    font-size: 16px;
    color: #636366;
    font-weight: 300;
  }

  /* Divider */
  .list-divider {
    height: 24px;
  }

  /* App Info Footer */
  .app-info {
    flex-shrink: 0;
    text-align: center;
    padding: 24px 20px;
  }
  .app-version {
    font-size: 13px;
    color: #636366;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .app-credit {
    font-size: 12px;
    color: #636366;
    font-weight: 400;
  }
  .app-credit .heart {
    color: #FF6B9D;
  }

  /* Bottom safe area */
  .bottom-safe {
    height: 34px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>&#9679;&#9679;&#9679;&#9679;&#9675;</span>
      <span>WiFi</span>
      <span>&#128267;</span>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <a class="back-btn">&#8249;</a>
    <span class="nav-title">Settings</span>
  </div>

  <!-- Settings List -->
  <div class="settings-list">

    <!-- General Group -->
    <div class="settings-group">
      <div class="settings-row">
        <div class="row-icon">&#127760;</div>
        <div class="row-content">
          <span class="row-label">Language</span>
          <div class="row-right">
            <span class="row-value">English</span>
            <span class="row-chevron">&#8250;</span>
          </div>
        </div>
      </div>
      <div class="settings-row">
        <div class="row-icon">&#128179;</div>
        <div class="row-content">
          <span class="row-label">Manage Subscription</span>
          <div class="row-right">
            <span class="row-chevron">&#8250;</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Feedback Group -->
    <div class="settings-group">
      <div class="settings-row">
        <div class="row-icon">&#11088;</div>
        <div class="row-content">
          <span class="row-label">Rate Us</span>
          <div class="row-right">
            <span class="row-chevron">&#8250;</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Legal Group -->
    <div class="settings-group">
      <div class="settings-row">
        <div class="row-icon">&#128196;</div>
        <div class="row-content">
          <span class="row-label">Terms of Service</span>
          <div class="row-right">
            <span class="row-chevron">&#8250;</span>
          </div>
        </div>
      </div>
      <div class="settings-row">
        <div class="row-icon">&#128274;</div>
        <div class="row-content">
          <span class="row-label">Privacy Policy</span>
          <div class="row-right">
            <span class="row-chevron">&#8250;</span>
          </div>
        </div>
      </div>
      <div class="settings-row">
        <div class="row-icon">&#128231;</div>
        <div class="row-content">
          <span class="row-label">Contact Us</span>
          <div class="row-right">
            <span class="row-chevron">&#8250;</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- App Info -->
  <div class="app-info">
    <div class="app-version">Glowtrend v1.0.0</div>
    <div class="app-credit">Made with <span class="heart">&hearts;</span> by Apero</div>
  </div>

  <!-- Bottom Safe Area -->
  <div class="bottom-safe"></div>

</div>
</body>
</html>
