<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Last Chance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
    align-items: center;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; width: 100%; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .close-btn {
    position: absolute; top: 56px; right: 20px; width: 32px; height: 32px;
    border-radius: 50%; background: rgba(255,255,255,0.1); border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10;
  }
  .close-btn svg { width: 14px; height: 14px; }
  .header { text-align: center; padding: 64px 24px 20px; }
  .logo-title {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .pro-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #0a0a0c; font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 6px; margin-left: 8px;
    vertical-align: middle;
  }
  .urgency-section { text-align: center; padding: 20px 24px 16px; }
  .urgency-title {
    color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 8px;
  }
  .urgency-desc { color: #8e8e93; font-size: 14px; margin-bottom: 24px; }
  .timer {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 32px;
  }
  .timer-block {
    background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 12px;
    padding: 12px 16px; min-width: 72px; text-align: center;
  }
  .timer-value {
    font-size: 28px; font-weight: 700; color: #FFD700;
    font-variant-numeric: tabular-nums;
  }
  .timer-label { font-size: 10px; color: #636366; text-transform: uppercase; margin-top: 4px; }
  .timer-sep { color: #FFD700; font-size: 28px; font-weight: 700; line-height: 60px; }
  .offer-card {
    background: #1a1a1e; border: 1.5px solid #2a2a2e; border-radius: 20px;
    padding: 24px; margin: 0 24px; text-align: center;
  }
  .offer-original {
    color: #636366; font-size: 16px; text-decoration: line-through; margin-bottom: 4px;
  }
  .offer-price-row { display: flex; align-items: baseline; justify-content: center; gap: 4px; }
  .offer-price { color: #FFD700; font-size: 36px; font-weight: 700; }
  .offer-unit { color: #8e8e93; font-size: 14px; }
  .offer-save {
    display: inline-block; background: rgba(255,215,0,0.12);
    color: #FFD700; font-size: 12px; font-weight: 600;
    padding: 4px 12px; border-radius: 6px; margin-top: 8px;
  }
  .bottom-area { padding: 24px 24px 0; width: 100%; }
  .btn-primary {
    width: 100%; height: 54px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #0a0a0c; font-size: 17px; font-weight: 700; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 215, 0, 0.3);
  }
  .cancel-text { text-align: center; color: #636366; font-size: 12px; margin-top: 12px; }
  .pass-link { text-align: center; margin-top: 16px; }
  .pass-link a { color: #636366; font-size: 13px; text-decoration: underline; }
  .footer-links {
    display: flex; justify-content: center; gap: 16px;
    padding: 16px 0 24px; margin-top: auto;
  }
  .footer-links a { color: #636366; font-size: 11px; text-decoration: none; }
</style>
</head>
