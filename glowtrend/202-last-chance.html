<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Last Chance Paywall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .device {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    position: relative;
    overflow: hidden;
    border-radius: 44px;
    border: 2px solid #2A2A2E;
  }

  /* Dramatic animated gradient background */
  .gradient-bg {
    position: absolute;
    top: -100px;
    left: -60px;
    right: -60px;
    height: 500px;
    background: radial-gradient(ellipse at 40% 20%, rgba(255,107,157,0.35) 0%, transparent 45%),
                radial-gradient(ellipse at 65% 35%, rgba(200,80,192,0.3) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 10%, rgba(255,214,10,0.12) 0%, transparent 40%);
    filter: blur(50px);
    animation: gradientPulse 4s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes gradientPulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.1); opacity: 1; }
  }

  .screen {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 34px;
  }

  /* Close button — top right */
  .close-btn {
    position: absolute;
    top: 60px;
    right: 20px;
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .close-btn svg {
    width: 14px;
    height: 14px;
    stroke: #8E8E93;
    stroke-width: 2.5;
    fill: none;
  }

  /* Fire + title */
  .fire-emoji {
    font-size: 56px;
    margin-top: 40px;
    margin-bottom: 12px;
    animation: fireFloat 2s ease-in-out infinite alternate;
  }
  @keyframes fireFloat {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-6px) scale(1.06); }
  }

  .title {
    font-size: 32px;
    font-weight: 800;
    color: #FFFFFF;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  /* Limited time badge */
  .limited-badge {
    display: inline-flex;
    align-items: center;
    padding: 6px 16px;
    background: rgba(255,214,10,0.12);
    border: 1px solid rgba(255,214,10,0.3);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: #FFD60A;
    letter-spacing: 0.5px;
    margin-bottom: 32px;
  }

  /* Countdown timer */
  .countdown-wrapper {
    margin-bottom: 36px;
    text-align: center;
  }
  .countdown-label {
    font-size: 13px;
    color: #8E8E93;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .countdown {
    font-size: 64px;
    font-weight: 800;
    color: #FFD60A;
    font-variant-numeric: tabular-nums;
    letter-spacing: 4px;
    animation: countdownPulse 1s ease-in-out infinite;
    text-shadow: 0 0 30px rgba(255,214,10,0.3), 0 0 60px rgba(255,214,10,0.1);
  }
  @keyframes countdownPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.85; transform: scale(0.98); }
  }

  /* Deal card */
  .deal-card {
    width: 100%;
    background: #1A1A1E;
    border: 2px solid transparent;
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 0 0 2px #C850C0, 0 0 30px rgba(200,80,192,0.15);
  }
  .deal-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #FF6B9D, #C850C0, #FF6B9D);
    background-size: 200% 100%;
    animation: borderGlow 3s linear infinite;
  }
  @keyframes borderGlow {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }

  .deal-plan {
    font-size: 14px;
    font-weight: 600;
    color: #8E8E93;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .deal-prices {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .deal-original {
    font-size: 20px;
    color: #636366;
    text-decoration: line-through;
    font-weight: 500;
  }
  .deal-sale {
    font-size: 36px;
    font-weight: 800;
    color: #FFFFFF;
  }
  .deal-daily {
    font-size: 15px;
    color: #8E8E93;
    font-weight: 500;
    margin-top: 4px;
  }
  .deal-daily strong {
    color: #FFD60A;
    font-weight: 700;
  }

  .spacer { flex: 1; }

  /* CTA button */
  .cta-btn {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    position: relative;
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: 0 4px 24px rgba(200,80,192,0.35);
  }
  .cta-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: ctaShimmer 2.5s ease-in-out infinite;
  }
  @keyframes ctaShimmer {
    0% { left: -100%; }
    100% { left: 200%; }
  }

  /* Ghost skip button */
  .skip-btn {
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 12px;
    background: transparent;
    color: #636366;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<div class="device">
  <div class="gradient-bg"></div>
  <div class="screen">

    <button class="close-btn">
      <svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
    </button>

    <div class="fire-emoji">&#128293;</div>
    <h1 class="title">Last Chance!</h1>
    <div class="limited-badge">Limited time offer</div>

    <div class="countdown-wrapper">
      <div class="countdown-label">Offer expires in</div>
      <div class="countdown" id="timer">04:59</div>
    </div>

    <div class="deal-card">
      <div class="deal-plan">Yearly Plan</div>
      <div class="deal-prices">
        <span class="deal-original">$99.99</span>
        <span class="deal-sale">$49.99</span>
      </div>
      <div class="deal-daily">That's only <strong>$0.57/day</strong>!</div>
    </div>

    <div class="spacer"></div>

    <button class="cta-btn">Claim Limited Time Offer</button>
    <button class="skip-btn">I'll pass for now</button>

  </div>
</div>

<script>
(function() {
  let total = 4 * 60 + 59;
  const el = document.getElementById('timer');
  setInterval(function() {
    if (total <= 0) return;
    total--;
    const m = String(Math.floor(total / 60)).padStart(2, '0');
    const s = String(total % 60).padStart(2, '0');
    el.textContent = m + ':' + s;
  }, 1000);
})();
</script>
</body>
</html>
