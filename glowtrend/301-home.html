<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow-y: auto; overflow-x: hidden; position: relative;
  }
  body::-webkit-scrollbar { display: none; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; position: sticky; top: 0; background: #0a0a0c; z-index: 10; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px 12px; position: sticky; top: 32px; background: #0a0a0c; z-index: 10;
  }
  .logo-text {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .top-actions { display: flex; gap: 12px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1a1a1e;
    border: 1px solid #2a2a2e; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .avatar-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    font-size: 14px; color: #fff; font-weight: 600;
  }
  .pro-banner {
    margin: 0 20px 16px; padding: 16px 20px;
    background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(200,80,192,0.15));
    border: 1px solid rgba(255,107,157,0.2); border-radius: 16px;
    display: flex; align-items: center; gap: 14px; cursor: pointer;
  }
  .crown-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pro-info { flex: 1; }
  .pro-title { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .pro-desc { color: #8e8e93; font-size: 12px; }
  .pro-arrow { color: #8e8e93; font-size: 18px; }
  .tabs-scroll {
    display: flex; gap: 8px; padding: 0 20px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs-scroll::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
    white-space: nowrap; cursor: pointer; border: none;
    background: #1a1a1e; color: #8e8e93; flex-shrink: 0;
  }
  .tab.active {
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #fff;
  }
  .section { padding: 0 0 20px; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 20px 12px;
  }
  .section-title { color: #fff; font-size: 17px; font-weight: 600; }
  .section-actions { display: flex; gap: 12px; align-items: center; }
  .see-all { color: #FF6B9D; font-size: 13px; font-weight: 500; text-decoration: none; }
  .get-pack-btn {
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 6px 12px; border-radius: 10px; border: none; cursor: pointer;
  }
  .template-scroll {
    display: flex; gap: 12px; padding: 0 20px;
    overflow-x: auto; scrollbar-width: none;
  }
  .template-scroll::-webkit-scrollbar { display: none; }
  .template-card {
    width: 120px; height: 160px; border-radius: 16px; flex-shrink: 0;
    position: relative; overflow: hidden; cursor: pointer;
  }
  .template-card .preview {
    width: 100%; height: 100%; border-radius: 16px;
  }
  .t1 { background: linear-gradient(135deg, #FF6B9D, #C850C0); }
  .t2 { background: linear-gradient(135deg, #667eea, #764ba2); }
  .t3 { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .t4 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .t5 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .t6 { background: linear-gradient(135deg, #fa709a, #fee140); }
  .template-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 8px 10px; font-size: 11px; color: #fff; font-weight: 500;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    border-radius: 0 0 16px 16px;
  }
  .ai-chat-card {
    margin: 4px 20px 20px; padding: 18px 20px;
    background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 16px;
    display: flex; align-items: center; gap: 14px; cursor: pointer;
  }
  .chat-icon {
    width: 44px; height: 44px; border-radius: 14px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .chat-info { flex: 1; }
  .chat-title { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .chat-desc { color: #8e8e93; font-size: 12px; }
  .chat-arrow { color: #636366; font-size: 18px; }
  .progress-float {
    position: fixed; bottom: 24px; left: 20px; right: 20px;
    background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 14px;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 20;
  }
  .progress-spinner {
    width: 28px; height: 28px; border: 2.5px solid #2a2a2e;
    border-top-color: #FF6B9D; border-radius: 50%;
    animation: spin 1s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-info { flex: 1; }
  .progress-title { color: #fff; font-size: 13px; font-weight: 500; }
  .progress-bar-bg { height: 4px; background: #2a2a2e; border-radius: 2px; margin-top: 6px; }
  .progress-bar-fill { height: 100%; width: 65%; background: linear-gradient(90deg, #FF6B9D, #C850C0); border-radius: 2px; }
</style>
</head>
