<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Showcase 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; z-index: 10;
  }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .skip-btn {
    position: absolute; top: 58px; right: 20px;
    color: #8e8e93; font-size: 15px; font-weight: 500;
    background: none; border: none; cursor: pointer; z-index: 10;
    padding: 8px 12px;
  }
  .media-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px 55px 20px;
  }
  .media-card {
    width: 280px; height: 280px; border-radius: 32px;
    background: linear-gradient(135deg, #FF6B9D 0%, #C850C0 50%, #FFD700 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    box-shadow: 0 16px 48px rgba(255, 107, 157, 0.25);
  }
  .media-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 60%);
  }
  .media-card svg { width: 80px; height: 80px; position: relative; z-index: 1; }
  @keyframes sparkle { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .sparkle-1 { animation: sparkle 2s ease infinite; }
  .sparkle-2 { animation: sparkle 2s ease infinite 0.5s; }
  .sparkle-3 { animation: sparkle 2s ease infinite 1s; }
  .content { padding: 0 32px; text-align: center; }
  .dots {
    display: flex; justify-content: center; gap: 6px;
    margin-bottom: 24px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 4px;
    background: rgba(255, 107, 157, 0.25); transition: all 0.3s;
  }
  .dot.active { width: 24px; background: #FF6B9D; }
  .title {
    color: #fff; font-size: 26px; font-weight: 700;
    line-height: 1.25; margin-bottom: 12px;
  }
  .desc {
    color: #8e8e93; font-size: 15px; line-height: 1.5;
    margin-bottom: 32px;
  }
  .bottom-area { padding: 0 24px 48px; }
  .btn-primary {
    width: 100%; height: 54px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 107, 157, 0.3);
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <button class="skip-btn">Skip</button>
  <div class="media-area">
    <div class="media-card">
      <svg viewBox="0 0 80 80" fill="none">
        <path class="sparkle-1" d="M40 8l3 12 12 3-12 3-3 12-3-12-12-3 12-3z" fill="#fff" opacity="0.9"/>
        <path class="sparkle-2" d="M58 32l2 8 8 2-8 2-2 8-2-8-8-2 8-2z" fill="#fff" opacity="0.7"/>
        <path class="sparkle-3" d="M22 42l2 8 8 2-8 2-2 8-2-8-8-2 8-2z" fill="#fff" opacity="0.7"/>
        <rect x="28" y="44" width="24" height="4" rx="2" fill="#fff" opacity="0.5"/>
        <rect x="20" y="52" width="40" height="4" rx="2" fill="#fff" opacity="0.3"/>
        <path d="M30 64l10-8 10 8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      </svg>
    </div>
  </div>
  <div class="content">
    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="title">Transform your photos with AI magic</div>
    <div class="desc">Smart photo editing, create artworks in just a few seconds.</div>
  </div>
  <div class="bottom-area">
    <button class="btn-primary">Get started</button>
  </div>
</body>
</html>
