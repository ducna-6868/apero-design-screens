<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Showcase 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    flex-shrink: 0;
  }

  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  .status-icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .status-icons span {
    font-size: 13px;
    color: #fff;
  }

  /* Top nav */
  .top-nav {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px;
    flex-shrink: 0;
  }

  .skip-btn {
    font-size: 15px;
    color: #8E8E93;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .skip-btn:hover {
    color: #FFFFFF;
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Media area */
  .media-area {
    width: 100%;
    height: 300px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1A1A1E 0%, #242428 100%);
    margin-top: 16px;
  }

  .media-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 40%, rgba(255,107,157,0.25) 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(200,80,192,0.2) 0%, transparent 50%);
  }

  /* Sparkle overlay */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #fff;
    animation: sparkle 2s ease-in-out infinite;
  }

  .sparkle:nth-child(1) { top: 20%; left: 25%; animation-delay: 0s; }
  .sparkle:nth-child(2) { top: 35%; left: 60%; animation-delay: 0.4s; }
  .sparkle:nth-child(3) { top: 55%; left: 40%; animation-delay: 0.8s; }
  .sparkle:nth-child(4) { top: 25%; left: 75%; animation-delay: 1.2s; }
  .sparkle:nth-child(5) { top: 70%; left: 55%; animation-delay: 0.6s; }
  .sparkle:nth-child(6) { top: 45%; left: 20%; animation-delay: 1.0s; }
  .sparkle:nth-child(7) { top: 65%; left: 80%; animation-delay: 0.3s; }
  .sparkle:nth-child(8) { top: 15%; left: 50%; animation-delay: 1.5s; }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .media-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px;
    opacity: 0.6;
  }

  /* Magic wand shape */
  .wand {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    width: 80px;
    height: 6px;
    background: linear-gradient(90deg, #FF6B9D, #C850C0);
    border-radius: 3px;
    opacity: 0.7;
  }

  .wand::before {
    content: '';
    position: absolute;
    top: -12px;
    right: -8px;
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    animation: starSpin 4s linear infinite;
  }

  @keyframes starSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Dots indicator */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #636366;
    transition: all 0.3s;
  }

  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  /* Text content */
  .text-content {
    margin-top: 32px;
    text-align: center;
    padding: 0 8px;
  }

  .text-content h2 {
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .text-content p {
    font-size: 16px;
    color: #8E8E93;
    line-height: 1.5;
  }

  /* CTA */
  .cta-area {
    padding: 20px 24px 48px;
    width: 100%;
    flex-shrink: 0;
  }

  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(200,80,192,0.3);
  }

  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(200,80,192,0.45);
  }

  .cta-btn:active {
    transform: translateY(0);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>&#8226;</span>
        <span>&#128267;</span>
      </div>
    </div>

    <div class="top-nav">
      <button class="skip-btn">Skip</button>
    </div>

    <div class="content">
      <div class="media-area">
        <div class="media-gradient"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="wand"></div>
      </div>

      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="text-content">
        <h2>Transform your photos with AI magic</h2>
        <p>Smart editing, creating artwork in seconds.</p>
      </div>
    </div>

    <div class="cta-area">
      <button class="cta-btn">Get Started</button>
    </div>
  </div>
</body>
</html>
