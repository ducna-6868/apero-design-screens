<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Showcase 3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }

  .status-bar {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    flex-shrink: 0;
  }

  .status-time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons span { font-size: 13px; color: #fff; }

  .top-nav {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px;
    flex-shrink: 0;
  }

  .skip-btn {
    font-size: 15px;
    color: #8E8E93;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .skip-btn:hover { color: #FFFFFF; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Media area — avatar grid */
  .media-area {
    width: 100%;
    height: 300px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1A1A1E 0%, #242428 100%);
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 24px;
  }

  .avatar-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    animation: avatarFadeIn 0.6s ease-out both;
  }

  .avatar-circle:nth-child(1) { animation-delay: 0.1s; }
  .avatar-circle:nth-child(2) { animation-delay: 0.2s; }
  .avatar-circle:nth-child(3) { animation-delay: 0.3s; }
  .avatar-circle:nth-child(4) { animation-delay: 0.4s; }

  @keyframes avatarFadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Different avatar styles */
  .avatar-1 {
    background: linear-gradient(135deg, #FF6B9D, #FF8A80);
    box-shadow: 0 4px 20px rgba(255,107,157,0.3);
  }

  .avatar-2 {
    background: linear-gradient(135deg, #C850C0, #7C4DFF);
    box-shadow: 0 4px 20px rgba(200,80,192,0.3);
  }

  .avatar-3 {
    background: linear-gradient(135deg, #42A5F5, #26C6DA);
    box-shadow: 0 4px 20px rgba(66,165,245,0.3);
  }

  .avatar-4 {
    background: linear-gradient(135deg, #FFA726, #FF7043);
    box-shadow: 0 4px 20px rgba(255,167,38,0.3);
  }

  /* Avatar face placeholders */
  .avatar-face {
    position: relative;
    width: 60px;
    height: 60px;
  }

  .avatar-head {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
  }

  .avatar-body-shape {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 28px;
    border-radius: 20px 20px 0 0;
    background: rgba(255,255,255,0.25);
  }

  /* Style labels */
  .avatar-label {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /* Subtle ring effect */
  .avatar-circle::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
  }

  /* Dots */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #636366;
    transition: all 0.3s;
  }

  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  .text-content {
    margin-top: 32px;
    text-align: center;
    padding: 0 8px;
  }

  .text-content h2 {
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .text-content p {
    font-size: 16px;
    color: #8E8E93;
    line-height: 1.5;
  }

  .cta-area {
    padding: 20px 24px 48px;
    width: 100%;
    flex-shrink: 0;
  }

  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(200,80,192,0.3);
  }

  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(200,80,192,0.45);
  }

  .cta-btn:active { transform: translateY(0); }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>&#8226;</span>
        <span>&#128267;</span>
      </div>
    </div>

    <div class="top-nav">
      <button class="skip-btn">Skip</button>
    </div>

    <div class="content">
      <div class="media-area">
        <div class="avatar-grid">
          <div class="avatar-circle avatar-1">
            <div class="avatar-face">
              <div class="avatar-head"></div>
              <div class="avatar-body-shape"></div>
            </div>
            <span class="avatar-label">Anime</span>
          </div>
          <div class="avatar-circle avatar-2">
            <div class="avatar-face">
              <div class="avatar-head"></div>
              <div class="avatar-body-shape"></div>
            </div>
            <span class="avatar-label">Fantasy</span>
          </div>
          <div class="avatar-circle avatar-3">
            <div class="avatar-face">
              <div class="avatar-head"></div>
              <div class="avatar-body-shape"></div>
            </div>
            <span class="avatar-label">Cyber</span>
          </div>
          <div class="avatar-circle avatar-4">
            <div class="avatar-face">
              <div class="avatar-head"></div>
              <div class="avatar-body-shape"></div>
            </div>
            <span class="avatar-label">Classic</span>
          </div>
        </div>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="text-content">
        <h2>Create stunning AI avatars</h2>
        <p>Unique avatars in many different styles.</p>
      </div>
    </div>

    <div class="cta-area">
      <button class="cta-btn">Next</button>
    </div>
  </div>
</body>
</html>
