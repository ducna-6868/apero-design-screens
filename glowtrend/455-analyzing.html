<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Analyzing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .photo-preview {
    width: 200px; height: 260px; border-radius: 24px;
    background: linear-gradient(180deg, #1a1a1e, #141416);
    border: 1px solid #2a2a2e; margin: 60px auto 0;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .scan-line {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, #FF6B9D, #C850C0, transparent);
    animation: scanDown 2s ease-in-out infinite;
    box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
  }
  @keyframes scanDown {
    0% { top: 0; }
    50% { top: 100%; }
    100% { top: 0; }
  }
  .photo-placeholder {
    opacity: 0.3;
  }
  .steps-area {
    padding: 48px 40px;
  }
  .step {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 0;
  }
  .step-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .step-done {
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }
  .step-active {
    background: transparent; border: 2px solid #FF6B9D;
    position: relative;
  }
  .step-spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid #2a2a2e; border-top-color: #FF6B9D;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-pending {
    background: #2a2a2e;
  }
  .step-text { color: #fff; font-size: 15px; font-weight: 500; }
  .step-text.dimmed { color: #636366; }
  .analyzing-text {
    text-align: center; color: #8e8e93; font-size: 14px;
    margin-top: auto; margin-bottom: 60px;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="photo-preview">
    <svg class="photo-placeholder" width="64" height="64" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="24" r="10" stroke="#636366" stroke-width="2"/>
      <path d="M14 52c0-10 8-18 18-18s18 8 18 18" stroke="#636366" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="scan-line"></div>
  </div>
  <div class="steps-area">
    <div class="step">
      <div class="step-icon step-done">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="step-text">Detecting face</span>
    </div>
    <div class="step">
      <div class="step-spinner"></div>
      <span class="step-text">Analyzing features</span>
    </div>
    <div class="step">
      <div class="step-icon step-pending">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="1.5" fill="#636366"/><circle cx="7" cy="7" r="1.5" fill="#636366"/><circle cx="11" cy="7" r="1.5" fill="#636366"/></svg>
      </div>
      <span class="step-text dimmed">Enhancing image</span>
    </div>
  </div>
  <div class="analyzing-text">Analyzing your image...</div>
</body>
</html>
