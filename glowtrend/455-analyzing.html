<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Glowtrend — Analyzing Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0D0F;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .screen {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    border: 2px solid #242428;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Glow behind photo */
  .glow-bg {
    position: absolute;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,157,0.15) 0%, rgba(200,80,192,0.08) 50%, transparent 70%);
    top: 140px;
    left: 50%;
    transform: translateX(-50%);
    filter: blur(40px);
    pointer-events: none;
  }

  /* Photo circle */
  .photo-container {
    position: relative;
    width: 150px;
    height: 150px;
    margin-bottom: 48px;
  }

  .spinning-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: #FF6B9D;
    border-right-color: #C850C0;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinning-ring-outer {
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-bottom-color: rgba(255,107,157,0.3);
    border-left-color: rgba(200,80,192,0.2);
    animation: spin-reverse 2s linear infinite;
  }
  @keyframes spin-reverse {
    to { transform: rotate(-360deg); }
  }

  .photo-circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    background: linear-gradient(135deg, #2a1a2e 0%, #1e2a3a 30%, #2a2040 60%, #1a2a2e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .face-oval {
    width: 60px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(180deg, #3a3040 0%, #2a2535 100%);
    border: 1px solid rgba(255,255,255,0.05);
  }

  /* Steps */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0 48px;
    width: 100%;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    position: relative;
  }

  /* Vertical connector line */
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 15px;
    top: 44px;
    width: 2px;
    height: 28px;
    background: #242428;
  }
  .step.completed:not(:last-child)::after {
    background: #34C759;
  }

  .step-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .step.completed .step-icon {
    background: #34C759;
    color: #FFFFFF;
  }
  .step.active .step-icon {
    background: transparent;
    border: 2px solid #FF6B9D;
    position: relative;
  }
  .step.active .step-icon::after {
    content: '';
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #FF6B9D;
    border-top-color: transparent;
    animation: spin 0.8s linear infinite;
    position: absolute;
  }
  .step.pending .step-icon {
    background: #242428;
    color: #636366;
    font-size: 12px;
  }

  .step-label {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: #FFFFFF;
  }
  .step.pending .step-label { color: #636366; }
  .step.active .step-label { color: #FF6B9D; }

  .step-status {
    font-size: 12px;
    font-weight: 500;
    color: #636366;
  }
  .step.completed .step-status { color: #34C759; }
  .step.active .step-status { color: #FF6B9D; }

  /* Pulsing text */
  .status-text {
    margin-top: 40px;
    font-size: 15px;
    color: #8E8E93;
    animation: pulse-opacity 2s ease-in-out infinite;
  }
  @keyframes pulse-opacity {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 600;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; }
  .status-bar .icons { display: flex; gap: 6px; font-size: 13px; }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #636366;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#8226;</span>
      <span>&#128267;</span>
    </div>
  </div>

  <div class="glow-bg"></div>

  <div class="photo-container">
    <div class="spinning-ring-outer"></div>
    <div class="spinning-ring"></div>
    <div class="photo-circle">
      <div class="face-oval"></div>
    </div>
  </div>

  <div class="steps">
    <div class="step completed">
      <div class="step-icon">&#10003;</div>
      <span class="step-label">Detecting face</span>
      <span class="step-status">Done</span>
    </div>
    <div class="step active">
      <div class="step-icon"></div>
      <span class="step-label">Analyzing features</span>
      <span class="step-status">In progress</span>
    </div>
    <div class="step pending">
      <div class="step-icon">3</div>
      <span class="step-label">Enhancing image</span>
      <span class="step-status">Pending</span>
    </div>
  </div>

  <div class="status-text">Analyzing your image...</div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
