<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Glowtrend — Save Success</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0D0F;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .screen {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    border: 2px solid #242428;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 40px;
  }

  /* Card */
  .card {
    width: 280px;
    background: #1A1A1E;
    border-radius: 24px;
    padding: 40px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: scale-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  @keyframes scale-in {
    from {
      opacity: 0;
      transform: scale(0.8);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* Checkmark */
  .check-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #34C759;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }
  .check-circle::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: rgba(52,199,89,0.2);
    z-index: -1;
    animation: check-pulse 2s ease-in-out infinite;
  }
  @keyframes check-pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.15); opacity: 0; }
  }
  .check-icon {
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  /* Text */
  .card-title {
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card-desc {
    color: #8E8E93;
    font-size: 15px;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  /* CTA */
  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
    margin-bottom: 12px;
  }
  .cta-btn:hover { opacity: 0.9; }

  /* Ghost button */
  .ghost-btn {
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 12px;
    background: transparent;
    color: #8E8E93;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s;
  }
  .ghost-btn:hover { color: #FFFFFF; }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 600;
    z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; }
  .status-bar .icons { display: flex; gap: 6px; font-size: 13px; }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(99,99,102,0.5);
    border-radius: 3px;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#8226;</span>
      <span>&#128267;</span>
    </div>
  </div>

  <div class="overlay">
    <div class="card">
      <div class="check-circle">
        <span class="check-icon">&#10003;</span>
      </div>
      <div class="card-title">Saved!</div>
      <div class="card-desc">Your photo has been saved to your gallery.</div>
      <button class="cta-btn">Back to Home</button>
      <button class="ghost-btn">Share</button>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
