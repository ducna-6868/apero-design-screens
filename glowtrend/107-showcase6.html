<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Showcase 6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }

  .status-bar {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    flex-shrink: 0;
  }

  .status-time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons span { font-size: 13px; color: #fff; }

  .top-nav {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px;
    flex-shrink: 0;
  }

  .skip-btn {
    font-size: 15px;
    color: #8E8E93;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .skip-btn:hover { color: #FFFFFF; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Media area — finished artwork showcase */
  .media-area {
    width: 100%;
    height: 300px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1A1A1E 0%, #242428 100%);
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Gallery showcase */
  .gallery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    width: 100%;
    height: 100%;
  }

  .gallery-item {
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    animation: galleryPop 0.5s ease-out both;
  }

  .gallery-item:nth-child(1) {
    grid-row: 1 / 3;
    animation-delay: 0.1s;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  .gallery-item:nth-child(2) {
    animation-delay: 0.2s;
    background: linear-gradient(135deg, #7C4DFF, #536DFE);
  }

  .gallery-item:nth-child(3) {
    animation-delay: 0.3s;
    background: linear-gradient(135deg, #FF8A65, #FFB74D);
  }

  @keyframes galleryPop {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Artwork content placeholders */
  .artwork {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  /* Main artwork — portrait with artistic overlay */
  .gallery-item:nth-child(1) .artwork {
    background:
      radial-gradient(circle at 50% 35%, rgba(255,255,255,0.15) 0%, transparent 40%),
      linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  .artwork-portrait {
    width: 80px;
    height: 100px;
    position: relative;
  }

  .artwork-portrait .head {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    margin: 0 auto;
  }

  .artwork-portrait .shoulders {
    width: 70px;
    height: 40px;
    border-radius: 35px 35px 0 0;
    background: rgba(255,255,255,0.2);
    margin: 6px auto 0;
  }

  .gallery-item:nth-child(1) .artwork-label {
    margin-top: 12px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Abstract art */
  .gallery-item:nth-child(2) .artwork {
    background:
      conic-gradient(from 0deg at 50% 50%, rgba(124,77,255,0.6), rgba(83,109,254,0.6), rgba(124,77,255,0.6));
  }

  .abstract-circles {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 8px;
  }

  .abs-circle {
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }

  .abs-circle:nth-child(1) { width: 30px; height: 30px; }
  .abs-circle:nth-child(2) { width: 20px; height: 20px; background: rgba(255,255,255,0.3); }
  .abs-circle:nth-child(3) { width: 25px; height: 25px; background: rgba(255,255,255,0.15); }

  /* Landscape art */
  .gallery-item:nth-child(3) .artwork {
    background: linear-gradient(180deg, #FF8A65, #FFB74D);
    justify-content: flex-end;
  }

  .landscape-hills {
    width: 100%;
    height: 50%;
    position: relative;
  }

  .hill {
    position: absolute;
    bottom: 0;
    border-radius: 50% 50% 0 0;
    background: rgba(0,0,0,0.15);
  }

  .hill:nth-child(1) { left: -10%; width: 70%; height: 80%; }
  .hill:nth-child(2) { right: -10%; width: 60%; height: 60%; background: rgba(0,0,0,0.1); }

  .landscape-sun {
    position: absolute;
    top: 20%;
    right: 25%;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
  }

  /* Floating sparkle particles */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    animation: float 3s ease-in-out infinite;
  }

  .particle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
  .particle:nth-child(2) { top: 30%; right: 15%; animation-delay: 0.7s; }
  .particle:nth-child(3) { bottom: 25%; left: 30%; animation-delay: 1.4s; }
  .particle:nth-child(4) { top: 50%; right: 30%; animation-delay: 0.3s; }

  @keyframes float {
    0%, 100% { opacity: 0; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-8px); }
  }

  /* Shimmer overlay on the whole media area */
  .media-area::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.03) 45%,
      rgba(255,255,255,0.06) 50%,
      rgba(255,255,255,0.03) 55%,
      transparent 60%
    );
    animation: shimmer 3s ease-in-out infinite;
    pointer-events: none;
    border-radius: 24px;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* Dots */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #636366;
    transition: all 0.3s;
  }

  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  .text-content {
    margin-top: 32px;
    text-align: center;
    padding: 0 8px;
  }

  .text-content h2 {
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .text-content p {
    font-size: 16px;
    color: #8E8E93;
    line-height: 1.5;
  }

  /* Emphasized CTA for final screen */
  .cta-area {
    padding: 20px 24px 48px;
    width: 100%;
    flex-shrink: 0;
  }

  .cta-btn {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 18px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(200,80,192,0.4), 0 0 40px rgba(255,107,157,0.15);
    position: relative;
    overflow: hidden;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.15) 45%,
      rgba(255,255,255,0.2) 50%,
      rgba(255,255,255,0.15) 55%,
      transparent 60%
    );
    animation: btnShimmer 2.5s ease-in-out infinite;
  }

  @keyframes btnShimmer {
    0% { transform: translateX(-150%); }
    100% { transform: translateX(150%); }
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 32px rgba(200,80,192,0.5), 0 0 60px rgba(255,107,157,0.2);
  }

  .cta-btn:active { transform: translateY(0); }

  /* Glow ring around CTA */
  .cta-glow {
    width: 100%;
    height: 56px;
    position: relative;
  }

  .cta-glow::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 18px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    opacity: 0.4;
    filter: blur(8px);
    z-index: -1;
    animation: ctaGlow 2s ease-in-out infinite alternate;
  }

  @keyframes ctaGlow {
    0% { opacity: 0.3; }
    100% { opacity: 0.6; }
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>&#8226;</span>
        <span>&#128267;</span>
      </div>
    </div>

    <div class="top-nav">
      <button class="skip-btn">Skip</button>
    </div>

    <div class="content">
      <div class="media-area">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="gallery">
          <div class="gallery-item">
            <div class="artwork">
              <div class="artwork-portrait">
                <div class="head"></div>
                <div class="shoulders"></div>
              </div>
              <span class="artwork-label">AI Portrait</span>
            </div>
          </div>
          <div class="gallery-item">
            <div class="artwork">
              <div class="abstract-circles">
                <div class="abs-circle"></div>
                <div class="abs-circle"></div>
                <div class="abs-circle"></div>
              </div>
            </div>
          </div>
          <div class="gallery-item">
            <div class="artwork">
              <div class="landscape-sun"></div>
              <div class="landscape-hills">
                <div class="hill"></div>
                <div class="hill"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
      </div>

      <div class="text-content">
        <h2>Start creating with AI today</h2>
        <p>Upload your photo and create stunning images now.</p>
      </div>
    </div>

    <div class="cta-area">
      <div class="cta-glow">
        <button class="cta-btn">Get Started</button>
      </div>
    </div>
  </div>
</body>
</html>
