<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Glowtrend — Select Photo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0D0F;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .screen {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    border: 2px solid #242428;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 600;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; }
  .status-bar .icons { display: flex; gap: 6px; font-size: 13px; }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    padding: 8px 20px 16px;
    position: relative;
  }
  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    background: #1A1A1E;
    border: none;
    color: #FFFFFF;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .nav-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 600;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section-label {
    color: #8E8E93;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    margin-top: 8px;
  }

  /* Empty state */
  .photo-area-empty {
    width: 300px;
    height: 300px;
    margin: 0 auto;
    border-radius: 16px;
    border: 2px dashed #636366;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .photo-area-empty:hover { border-color: #FF6B9D; }
  .silhouette {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #242428;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .silhouette-icon {
    width: 40px;
    height: 48px;
    position: relative;
  }
  .silhouette-head {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #636366;
    margin: 0 auto 4px;
  }
  .silhouette-body {
    width: 40px;
    height: 20px;
    border-radius: 20px 20px 0 0;
    background: #636366;
  }
  .photo-area-empty .label {
    color: #8E8E93;
    font-size: 15px;
    font-weight: 500;
  }
  .photo-area-empty .sublabel {
    color: #636366;
    font-size: 13px;
    margin-top: 4px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: #242428;
    margin: 24px 0;
  }

  .state-label {
    color: #FF6B9D;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-align: center;
  }

  /* Selected state */
  .photo-area-selected {
    width: 300px;
    height: 300px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  .photo-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a1a2e 0%, #1e2a3a 30%, #2a2040 60%, #1a2a2e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .face-oval {
    width: 120px;
    height: 160px;
    border-radius: 50%;
    background: linear-gradient(180deg, #3a3040 0%, #2a2535 100%);
    border: 1px solid rgba(255,255,255,0.05);
  }

  /* Action row */
  .action-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 16px;
  }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: #8E8E93;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 10px;
    transition: background 0.2s;
    font-family: inherit;
  }
  .action-btn:hover { background: #1A1A1E; }
  .action-btn.delete { color: #FF453A; }
  .action-btn .icon { font-size: 16px; }

  /* CTA */
  .cta-area {
    padding: 16px 24px 40px;
  }
  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .cta-btn:hover { opacity: 0.9; }
  .cta-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Home indicator */
  .home-indicator {
    width: 134px;
    height: 5px;
    background: #636366;
    border-radius: 3px;
    margin: 0 auto 8px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#8226;</span>
      <span>&#128267;</span>
    </div>
  </div>

  <div class="nav">
    <button class="back-btn">&#8592;</button>
    <span class="nav-title">Select a photo</span>
  </div>

  <div class="content">
    <div class="section-label">State 1 — Empty</div>

    <div class="photo-area-empty">
      <div class="silhouette">
        <div class="silhouette-icon">
          <div class="silhouette-head"></div>
          <div class="silhouette-body"></div>
        </div>
      </div>
      <span class="label">Tap to select a photo</span>
      <span class="sublabel">JPG, PNG up to 10 MB</span>
    </div>

    <div class="divider"></div>

    <div class="state-label">State 2 — Photo Selected</div>

    <div class="photo-area-selected">
      <div class="photo-placeholder">
        <div class="face-oval"></div>
      </div>
    </div>

    <div class="action-row">
      <button class="action-btn">
        <span class="icon">&#128247;</span>
        Reupload
      </button>
      <button class="action-btn delete">
        <span class="icon">&#128465;</span>
        Delete
      </button>
    </div>
  </div>

  <div class="cta-area">
    <button class="cta-btn">Continue</button>
    <div class="home-indicator"></div>
  </div>
</div>
</body>
</html>
