<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Select Photo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .nav-bar { display: flex; align-items: center; padding: 16px 20px 12px; }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1a1a1e;
    border: 1px solid #2a2a2e; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-title { color: #fff; font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 36px; }
  .preview-area {
    flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .preview-image {
    width: 300px; height: 400px; border-radius: 24px;
    background: linear-gradient(180deg, #1a1a1e 0%, #141416 100%);
    border: 1px solid #2a2a2e;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .preview-image::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,107,157,0.05), rgba(200,80,192,0.05));
  }
  .preview-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .preview-placeholder svg { opacity: 0.4; }
  .preview-placeholder span { color: #636366; font-size: 14px; }
  .action-row {
    display: flex; gap: 12px; padding: 0 24px 16px; justify-content: center;
  }
  .action-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 14px;
    background: #1a1a1e; border: 1px solid #2a2a2e;
    color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .action-btn.delete { color: #ff453a; }
  .bottom-area { padding: 0 24px 48px; }
  .btn-primary {
    width: 100%; height: 54px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 107, 157, 0.3);
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4l-5 5 5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="nav-title">Select Photo</div>
  </div>
  <div class="preview-area">
    <div class="preview-image">
      <div class="preview-placeholder">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="24" r="10" stroke="#636366" stroke-width="2"/>
          <path d="M14 52c0-10 8-18 18-18s18 8 18 18" stroke="#636366" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Photo selected</span>
      </div>
    </div>
  </div>
  <div class="action-row">
    <button class="action-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 10v3a1 1 0 001 1h10a1 1 0 001-1v-3M8 2v8M5 5l3-3 3 3" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Reupload
    </button>
    <button class="action-btn delete">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3a1 1 0 011-1h2a1 1 0 011 1v1M5 4v8a1 1 0 001 1h4a1 1 0 001-1V4" stroke="#ff453a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Delete
    </button>
  </div>
  <div class="bottom-area">
    <button class="btn-primary">Continue</button>
  </div>
</body>
</html>
