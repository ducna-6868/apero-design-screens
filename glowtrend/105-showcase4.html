<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowTrend — Showcase 4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }

  .status-bar {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    flex-shrink: 0;
  }

  .status-time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons span { font-size: 13px; color: #fff; }

  .top-nav {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px;
    flex-shrink: 0;
  }

  .skip-btn {
    font-size: 15px;
    color: #8E8E93;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .skip-btn:hover { color: #FFFFFF; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Media area — style swatches/palette */
  .media-area {
    width: 100%;
    height: 300px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1A1A1E 0%, #242428 100%);
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 16px;
  }

  /* Style swatch rows */
  .swatch-row {
    display: flex;
    gap: 12px;
    width: 100%;
    justify-content: center;
    animation: swatchSlide 0.6s ease-out both;
  }

  .swatch-row:nth-child(1) { animation-delay: 0.1s; }
  .swatch-row:nth-child(2) { animation-delay: 0.2s; }
  .swatch-row:nth-child(3) { animation-delay: 0.3s; }

  @keyframes swatchSlide {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .swatch {
    height: 68px;
    border-radius: 12px;
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .swatch:hover {
    transform: scale(1.04);
  }

  .swatch-label {
    position: absolute;
    bottom: 8px;
    left: 10px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* Active indicator */
  .swatch.active::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid #fff;
    border-radius: 12px;
    pointer-events: none;
  }

  .swatch.active .swatch-check {
    display: flex;
  }

  .swatch-check {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    align-items: center;
    justify-content: center;
  }

  .swatch-check::after {
    content: '';
    width: 10px;
    height: 6px;
    border-left: 2px solid #0D0D0F;
    border-bottom: 2px solid #0D0D0F;
    transform: rotate(-45deg) translateY(-1px);
  }

  /* Style gradients */
  .style-art { background: linear-gradient(135deg, #FF6B9D, #C850C0, #7C4DFF); }
  .style-anime { background: linear-gradient(135deg, #42A5F5, #AB47BC, #FF80AB); }
  .style-portrait { background: linear-gradient(135deg, #FFB74D, #FF8A65, #E57373); }
  .style-oil { background: linear-gradient(135deg, #4CAF50, #66BB6A, #26A69A); }
  .style-neon { background: linear-gradient(135deg, #E040FB, #536DFE, #00E5FF); }
  .style-vintage { background: linear-gradient(135deg, #8D6E63, #A1887F, #D7CCC8); }
  .style-watercolor { background: linear-gradient(135deg, #81D4FA, #B39DDB, #F48FB1); }
  .style-minimal { background: linear-gradient(135deg, #37474F, #546E7A, #78909C); }
  .style-pop { background: linear-gradient(135deg, #FF1744, #FFD600, #00E676); }

  /* Brush stroke texture overlay */
  .swatch::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
    pointer-events: none;
  }

  /* Dots */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #636366;
    transition: all 0.3s;
  }

  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
  }

  .text-content {
    margin-top: 32px;
    text-align: center;
    padding: 0 8px;
  }

  .text-content h2 {
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .text-content p {
    font-size: 16px;
    color: #8E8E93;
    line-height: 1.5;
  }

  .cta-area {
    padding: 20px 24px 48px;
    width: 100%;
    flex-shrink: 0;
  }

  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(200,80,192,0.3);
  }

  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(200,80,192,0.45);
  }

  .cta-btn:active { transform: translateY(0); }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>&#8226;</span>
        <span>&#128267;</span>
      </div>
    </div>

    <div class="top-nav">
      <button class="skip-btn">Skip</button>
    </div>

    <div class="content">
      <div class="media-area">
        <div class="swatch-row">
          <div class="swatch style-art active">
            <span class="swatch-label">Art</span>
            <div class="swatch-check"></div>
          </div>
          <div class="swatch style-anime">
            <span class="swatch-label">Anime</span>
            <div class="swatch-check"></div>
          </div>
          <div class="swatch style-portrait">
            <span class="swatch-label">Portrait</span>
            <div class="swatch-check"></div>
          </div>
        </div>
        <div class="swatch-row">
          <div class="swatch style-oil">
            <span class="swatch-label">Oil Paint</span>
            <div class="swatch-check"></div>
          </div>
          <div class="swatch style-neon">
            <span class="swatch-label">Neon</span>
            <div class="swatch-check"></div>
          </div>
          <div class="swatch style-vintage">
            <span class="swatch-label">Vintage</span>
            <div class="swatch-check"></div>
          </div>
        </div>
        <div class="swatch-row">
          <div class="swatch style-watercolor">
            <span class="swatch-label">Watercolor</span>
            <div class="swatch-check"></div>
          </div>
          <div class="swatch style-minimal">
            <span class="swatch-label">Minimal</span>
            <div class="swatch-check"></div>
          </div>
          <div class="swatch style-pop">
            <span class="swatch-label">Pop Art</span>
            <div class="swatch-check"></div>
          </div>
        </div>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="text-content">
        <h2>Apply amazing AI styles</h2>
        <p>Transform into art, anime, professional portraits & more.</p>
      </div>
    </div>

    <div class="cta-area">
      <button class="cta-btn">Next</button>
    </div>
  </div>
</body>
</html>
