<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - AI Chat Edit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .nav-bar { display: flex; align-items: center; padding: 16px 20px 12px; }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1a1a1e;
    border: 1px solid #2a2a2e; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-title { color: #fff; font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 36px; }
  .photo-preview-area { padding: 0 20px 16px; display: flex; justify-content: center; }
  .photo-thumb {
    width: 160px; height: 200px; border-radius: 16px;
    background: linear-gradient(180deg, #1a1a1e, #141416);
    border: 1px solid #2a2a2e;
    display: flex; align-items: center; justify-content: center;
  }
  .chat-area { flex: 1; padding: 0 20px; overflow-y: auto; }
  .suggestions-label {
    color: #8e8e93; font-size: 13px; font-weight: 500;
    margin-bottom: 12px; text-align: center;
  }
  .suggestions {
    display: flex; flex-direction: column; gap: 10px;
  }
  .suggestion {
    background: #141416; border: 1px solid #2a2a2e; border-radius: 14px;
    padding: 14px 18px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 12px;
  }
  .suggestion:hover { border-color: #FF6B9D; }
  .suggestion-icon {
    width: 32px; height: 32px; border-radius: 10px;
    background: rgba(255,107,157,0.1);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .suggestion-text { color: #fff; font-size: 14px; font-weight: 500; }
  .input-area {
    padding: 12px 16px 32px; display: flex; gap: 10px; align-items: center;
    background: #0a0a0c; border-top: 1px solid #1a1a1e;
  }
  .input-field {
    flex: 1; height: 46px; border-radius: 14px;
    background: #141416; border: 1px solid #2a2a2e;
    color: #fff; font-size: 14px; padding: 0 16px;
    outline: none;
  }
  .input-field::placeholder { color: #636366; }
  .send-btn {
    width: 46px; height: 46px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4l-5 5 5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="nav-title">AI Edit</div>
  </div>
  <div class="photo-preview-area">
    <div class="photo-thumb">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" opacity="0.3"><circle cx="24" cy="20" r="8" stroke="#636366" stroke-width="2"/><path d="M10 42c0-8 6-14 14-14s14 6 14 14" stroke="#636366" stroke-width="2"/></svg>
    </div>
  </div>
  <div class="chat-area">
    <div class="suggestions-label">Try these suggestions</div>
    <div class="suggestions">
      <div class="suggestion">
        <div class="suggestion-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12l3-2 3 2 3-4 3 2" stroke="#FF6B9D" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="4" r="2" stroke="#FF6B9D" stroke-width="1.2"/></svg>
        </div>
        <span class="suggestion-text">Change background to beach</span>
      </div>
      <div class="suggestion">
        <div class="suggestion-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2l2 4 4 .5-3 3 .5 4.5-3.5-2-3.5 2 .5-4.5-3-3L6 6z" stroke="#FF6B9D" stroke-width="1.2" stroke-linejoin="round"/></svg>
        </div>
        <span class="suggestion-text">Make it anime style</span>
      </div>
      <div class="suggestion">
        <div class="suggestion-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#FF6B9D" stroke-width="1.2"/><circle cx="6" cy="7" r="1" fill="#FF6B9D"/><circle cx="10" cy="7" r="1" fill="#FF6B9D"/><path d="M5.5 10.5c1 1 4 1 5 0" stroke="#FF6B9D" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
        <span class="suggestion-text">Turn into cartoon</span>
      </div>
      <div class="suggestion">
        <div class="suggestion-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="12" r="2" stroke="#FF6B9D" stroke-width="1.2"/><path d="M4 6c1-3 7-3 8 0" stroke="#FF6B9D" stroke-width="1.2" stroke-linecap="round"/><path d="M6 4l2-2 2 2" stroke="#FF6B9D" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="suggestion-text">Add sunset lighting</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <input type="text" class="input-field" placeholder="Describe how to edit your photo...">
    <button class="send-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 10l14-7-7 14v-7H3z" fill="#fff"/></svg>
    </button>
  </div>
</body>
</html>
