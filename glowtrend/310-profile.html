<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GlowTrend - Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 0; }
  .status-bar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .nav-bar {
    display: flex; align-items: center; padding: 16px 20px 12px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1a1a1e;
    border: 1px solid #2a2a2e; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-title { color: #fff; font-size: 18px; font-weight: 600; flex: 1; text-align: center; margin-right: 36px; }
  .avatar-section { display: flex; flex-direction: column; align-items: center; padding: 32px 0 24px; }
  .avatar-large {
    width: 120px; height: 120px; border-radius: 60px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; color: #fff; font-weight: 600; position: relative;
  }
  .camera-overlay {
    position: absolute; bottom: 0; right: 0; width: 36px; height: 36px;
    border-radius: 50%; background: #1a1a1e; border: 3px solid #0a0a0c;
    display: flex; align-items: center; justify-content: center;
  }
  .edit-photo-btn {
    margin-top: 16px; padding: 10px 24px; border-radius: 12px;
    background: #1a1a1e; border: 1px solid #2a2a2e;
    color: #FF6B9D; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .user-info { padding: 24px 20px; }
  .info-card {
    background: #141416; border: 1px solid #2a2a2e; border-radius: 16px; overflow: hidden;
  }
  .info-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid #1a1a1e;
  }
  .info-item:last-child { border-bottom: none; }
  .info-label { color: #8e8e93; font-size: 14px; }
  .info-value { color: #fff; font-size: 14px; font-weight: 500; }
  .info-edit { color: #FF6B9D; font-size: 14px; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <div class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4l-5 5 5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="nav-title">Profile</div>
  </div>
  <div class="avatar-section">
    <div class="avatar-large">
      D
      <div class="camera-overlay">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="5" width="12" height="9" rx="2" stroke="#8e8e93" stroke-width="1.2"/>
          <circle cx="8" cy="9.5" r="2.5" stroke="#8e8e93" stroke-width="1.2"/>
          <path d="M5.5 5V4a1 1 0 011-1h3a1 1 0 011 1v1" stroke="#8e8e93" stroke-width="1.2"/>
        </svg>
      </div>
    </div>
    <button class="edit-photo-btn">Edit profile photo</button>
  </div>
  <div class="user-info">
    <div class="info-card">
      <div class="info-item">
        <span class="info-label">Name</span>
        <span class="info-value">Duc Nguyen</span>
      </div>
      <div class="info-item">
        <span class="info-label">Email</span>
        <span class="info-value">duc@email.com</span>
      </div>
      <div class="info-item">
        <span class="info-label">Plan</span>
        <span class="info-value" style="color: #FFD700;">Pro</span>
      </div>
      <div class="info-item">
        <span class="info-label">Joined</span>
        <span class="info-value">Mar 2026</span>
      </div>
    </div>
  </div>
</body>
</html>
