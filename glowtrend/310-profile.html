<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Glowtrend — Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0D0D0F;
    position: relative;
    overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 0 0 3px #2A2A2E, 0 20px 60px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
    font-size: 14px;
    font-weight: 600;
  }
  .status-bar .time { font-weight: 700; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 12px; }

  /* Navigation Bar */
  .nav-bar {
    height: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 20px;
  }
  .back-btn {
    position: absolute;
    left: 20px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #1A1A1E;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 18px;
    color: #FFFFFF;
    text-decoration: none;
  }
  .back-btn:hover { background: #242428; }
  .nav-title {
    font-size: 17px;
    font-weight: 700;
  }

  /* Scrollable Content */
  .scroll-content {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .scroll-content::-webkit-scrollbar { display: none; }

  /* Avatar Section */
  .avatar-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 0;
  }
  .avatar-wrapper {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .avatar-wrapper:hover { transform: scale(1.04); }
  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #242428;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    color: #636366;
  }
  .camera-overlay {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    border: 3px solid #0D0D0F;
  }
  .edit-photo {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 600;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .edit-photo:hover { opacity: 0.8; }

  /* User Info */
  .user-info {
    text-align: center;
    padding: 20px 20px 0;
  }
  .user-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .plan-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: #636366;
    background: #1A1A1E;
    padding: 4px 14px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }

  /* Stats Row */
  .stats-row {
    display: flex;
    margin: 24px 20px 0;
    background: #1A1A1E;
    border-radius: 16px;
    padding: 18px 0;
  }
  .stat-item {
    flex: 1;
    text-align: center;
    position: relative;
  }
  .stat-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 30px;
    background: #242428;
  }
  .stat-number {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 12px;
    color: #8E8E93;
    margin-top: 4px;
    font-weight: 500;
  }

  /* Recent Creations */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 20px 14px;
  }
  .section-title {
    font-size: 17px;
    font-weight: 700;
  }
  .section-link {
    font-size: 13px;
    font-weight: 600;
    color: #8E8E93;
    cursor: pointer;
    transition: color 0.2s;
  }
  .section-link:hover { color: #FFFFFF; }
  .recent-scroll {
    display: flex;
    gap: 12px;
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .recent-scroll::-webkit-scrollbar { display: none; }
  .recent-item {
    flex-shrink: 0;
    width: 110px;
    height: 140px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s;
    position: relative;
  }
  .recent-item:hover { transform: scale(1.04); }
  .recent-item .thumb {
    width: 100%;
    height: 100%;
  }
  .recent-grad-1 { background: linear-gradient(135deg, #0ff, #f0f); }
  .recent-grad-2 { background: linear-gradient(135deg, #FF6B9D, #FFB347); }
  .recent-grad-3 { background: linear-gradient(135deg, #7B2FBE, #00D4FF); }
  .recent-item .recent-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px;
    font-size: 11px;
    font-weight: 600;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
  }

  /* Divider */
  .divider {
    height: 1px;
    background: #1A1A1E;
    margin: 24px 20px;
  }

  /* Upgrade Card */
  .upgrade-card {
    margin: 0 20px 24px;
    padding: 3px;
    border-radius: 18px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .upgrade-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(200, 80, 192, 0.3);
  }
  .upgrade-inner {
    background: #1A1A1E;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .upgrade-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .upgrade-pro {
    background: linear-gradient(135deg, #FFD700, #FFAA00);
    color: #1A1A1E;
    font-size: 12px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 8px;
    letter-spacing: 0.5px;
  }
  .upgrade-title {
    font-size: 18px;
    font-weight: 700;
  }
  .upgrade-desc {
    font-size: 13px;
    color: #8E8E93;
    text-align: center;
    line-height: 1.5;
  }
  .upgrade-cta {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF6B9D, #C850C0);
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .upgrade-cta:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 20px rgba(200, 80, 192, 0.4);
  }

  /* Bottom safe area */
  .bottom-safe {
    height: 34px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>&#9679;&#9679;&#9679;&#9679;&#9675;</span>
      <span>WiFi</span>
      <span>&#128267;</span>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <a class="back-btn">&#8249;</a>
    <span class="nav-title">Profile</span>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-content">

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-wrapper">
        <div class="avatar-inner">&#128100;</div>
        <div class="camera-overlay">&#128247;</div>
      </div>
      <div class="edit-photo">Edit profile photo</div>
    </div>

    <!-- User Info -->
    <div class="user-info">
      <div class="user-name">Guest User</div>
      <span class="plan-badge">Free Plan</span>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-number">12</div>
        <div class="stat-label">Created</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">5</div>
        <div class="stat-label">Saved</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">3</div>
        <div class="stat-label">Shared</div>
      </div>
    </div>

    <!-- Recent Creations -->
    <div class="section-header">
      <span class="section-title">Recent Creations</span>
      <span class="section-link">See All</span>
    </div>
    <div class="recent-scroll">
      <div class="recent-item">
        <div class="thumb recent-grad-1"></div>
        <div class="recent-label">Cyberpunk</div>
      </div>
      <div class="recent-item">
        <div class="thumb recent-grad-2"></div>
        <div class="recent-label">Anime</div>
      </div>
      <div class="recent-item">
        <div class="thumb recent-grad-3"></div>
        <div class="recent-label">3D Avatar</div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Upgrade Card -->
    <div class="upgrade-card">
      <div class="upgrade-inner">
        <div class="upgrade-top">
          <span class="upgrade-pro">PRO</span>
          <span class="upgrade-title">Upgrade to PRO</span>
        </div>
        <div class="upgrade-desc">Unlock unlimited generations, exclusive styles,<br>and remove all ads.</div>
        <button class="upgrade-cta">Unlock Unlimited</button>
      </div>
    </div>

  </div>

  <!-- Bottom Safe Area -->
  <div class="bottom-safe"></div>

</div>
</body>
</html>
