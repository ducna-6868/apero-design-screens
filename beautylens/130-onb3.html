<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeautyLens — Onboarding 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background: #1A1118;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #F5EDE8;
    letter-spacing: 0.5px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #F5EDE8;
    border-radius: 9999px;
  }

  /* Top bar with Skip */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px 0;
    flex-shrink: 0;
  }
  .skip-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 0;
  }

  /* Hero Card */
  .hero-card {
    width: 350px;
    height: 420px;
    border-radius: 16px;
    background: #2A1F26;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    flex-shrink: 0;
  }

  /* Face outline SVG container */
  .face-container {
    position: relative;
    width: 220px;
    height: 340px;
  }

  /* Feature labels */
  .feature-label {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: #D4A574;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }
  .feature-label .line {
    display: block;
    height: 1px;
    background: #D4A574;
    opacity: 0.5;
  }

  .label-hair { top: 10px; right: -50px; }
  .label-hair .line { width: 30px; }

  .label-eyebrows { top: 100px; left: -65px; flex-direction: row-reverse; }
  .label-eyebrows .line { width: 25px; }

  .label-eyes { top: 135px; right: -42px; }
  .label-eyes .line { width: 22px; }

  .label-nose { top: 195px; left: -45px; flex-direction: row-reverse; }
  .label-nose .line { width: 20px; }

  .label-lips { top: 250px; right: -36px; }
  .label-lips .line { width: 18px; }

  /* Feature dots */
  .feature-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #D4A574;
    flex-shrink: 0;
  }

  /* Text area */
  .text-area {
    text-align: center;
    padding: 24px 20px 0;
    flex-shrink: 0;
  }
  .headline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #F5EDE8;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    line-height: 1.5;
  }

  /* Bottom section */
  .bottom-section {
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: auto;
  }

  /* Page dots */
  .page-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #40343A;
  }
  .dot.active {
    background: #D4A574;
  }

  /* CTA Button */
  .btn-primary {
    width: 100%;
    height: 52px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #1A1118;
    box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#F5EDE8"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="#F5EDE8"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="#F5EDE8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#F5EDE8"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C10.2 3.6 12.2 4.5 13.6 6L15.1 4.5C13.3 2.7 10.8 1.6 8 1.6C5.2 1.6 2.7 2.7 0.9 4.5L2.4 6C3.8 4.5 5.8 3.6 8 3.6Z" fill="#F5EDE8"/>
        <path d="M8 7.2C9.3 7.2 10.5 7.7 11.4 8.5L12.9 7C11.6 5.8 9.9 5.1 8 5.1C6.1 5.1 4.4 5.8 3.1 7L4.6 8.5C5.5 7.7 6.7 7.2 8 7.2Z" fill="#F5EDE8"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#F5EDE8"/>
      </svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
        <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="#F5EDE8" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="19" height="8" rx="1" fill="#F5EDE8"/>
        <path d="M24 4V8C25.1 7.5 25.1 4.5 24 4Z" fill="#F5EDE8" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Skip -->
  <div class="top-bar">
    <button class="skip-btn">Skip</button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Hero Card: Face outline with labeled zones -->
    <div class="hero-card">
      <div class="face-container">
        <!-- Face outline SVG -->
        <svg width="220" height="340" viewBox="0 0 220 340" fill="none" style="position:absolute;top:0;left:0;">
          <!-- Hair area -->
          <ellipse cx="110" cy="60" rx="80" ry="50" stroke="#40343A" stroke-width="1.5" fill="none"/>
          <!-- Head outline -->
          <path d="M40 130 C40 60, 180 60, 180 130 L180 200 C180 280, 110 320, 110 320 C110 320, 40 280, 40 200 Z"
                stroke="#6A5E64" stroke-width="1.5" fill="none"/>
          <!-- Eyebrows -->
          <path d="M65 118 Q80 108, 95 115" stroke="#D4A574" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M125 115 Q140 108, 155 118" stroke="#D4A574" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Eyes -->
          <ellipse cx="82" cy="140" rx="16" ry="10" stroke="#D4A574" stroke-width="1.5" fill="none"/>
          <ellipse cx="138" cy="140" rx="16" ry="10" stroke="#D4A574" stroke-width="1.5" fill="none"/>
          <circle cx="82" cy="140" r="4" fill="#D4A574" opacity="0.3"/>
          <circle cx="138" cy="140" r="4" fill="#D4A574" opacity="0.3"/>
          <!-- Nose -->
          <path d="M110 150 L110 185 Q110 195, 100 195 Q95 195, 95 190" stroke="#D4A574" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M110 185 Q110 195, 120 195 Q125 195, 125 190" stroke="#D4A574" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- Lips -->
          <path d="M88 235 Q100 225, 110 230 Q120 225, 132 235" stroke="#D4A574" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M88 235 Q110 252, 132 235" stroke="#D4A574" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>

        <!-- Feature labels with lines -->
        <div class="feature-label label-hair">
          <span class="line"></span>
          <span>Hair</span>
        </div>
        <div class="feature-label label-eyebrows">
          <span class="line"></span>
          <span>Eyebrows</span>
        </div>
        <div class="feature-label label-eyes">
          <span class="line"></span>
          <span>Eyes</span>
        </div>
        <div class="feature-label label-nose">
          <span class="line"></span>
          <span>Nose</span>
        </div>
        <div class="feature-label label-lips">
          <span class="line"></span>
          <span>Lips</span>
        </div>
      </div>
    </div>

    <!-- Text -->
    <div class="text-area">
      <div class="headline">Edit Any Feature</div>
      <div class="subtitle">Change your hair, brows, eyes, nose, or lips — one at a time, your way.</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="btn-primary">Continue</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
