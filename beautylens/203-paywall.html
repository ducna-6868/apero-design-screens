<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>203 — Home Paywall</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; overflow: hidden; background: #1A1118; position: relative; display: flex; flex-direction: column; }

  .status-bar { height: 47px; padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 12px; fill: #F5EDE8; }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; opacity: 0.3; }

  .close-btn { position: absolute; top: 56px; right: 16px; width: 28px; height: 28px; border-radius: 50%; background: #352A30; opacity: 0.6; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; border: none; }
  .close-btn svg { width: 14px; height: 14px; }

  .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 24px 0; overflow-y: auto; }

  .hero-card { width: 280px; height: 220px; border-radius: 16px; background: #2A1F26; display: flex; overflow: hidden; flex-shrink: 0; margin-bottom: 20px; }
  .hero-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .hero-half:first-child { border-right: 1px solid #40343A; }
  .hero-label { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px; color: #9A8E94; text-transform: uppercase; letter-spacing: 1px; }
  .hero-placeholder { width: 64px; height: 64px; border-radius: 50%; }
  .hero-half:first-child .hero-placeholder { background: linear-gradient(135deg, #40343A 0%, #352A30 100%); }
  .hero-half:last-child .hero-placeholder { background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); }

  .headline { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 24px; color: #F5EDE8; text-align: center; margin-bottom: 20px; }

  .benefits { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
  .benefit-row { display: flex; align-items: center; gap: 12px; }
  .benefit-check { width: 20px; height: 20px; flex-shrink: 0; }
  .benefit-text { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 15px; color: #F5EDE8; }

  .plan-cards { width: 100%; display: flex; gap: 12px; margin-bottom: 24px; }
  .plan-card { flex: 1; border-radius: 12px; background: #2A1F26; border: 1.5px solid #40343A; padding: 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; cursor: pointer; overflow: hidden; }
  .plan-card.highlighted { border-color: #D4A574; }
  .plan-card.highlighted::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); border-radius: 2px 0 0 2px; }
  .plan-badge { position: absolute; top: 6px; right: 6px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); color: #1A1118; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 8px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .plan-name { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; color: #F5EDE8; }
  .plan-price { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 20px; color: #9A8E94; }
  .plan-card.highlighted .plan-price { color: #D4A574; }
  .plan-period { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 12px; color: #9A8E94; }

  .cta-btn { width: 100%; height: 52px; border-radius: 9999px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); border: none; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 17px; color: #1A1118; cursor: pointer; box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2); margin-bottom: 16px; flex-shrink: 0; }

  .footer { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13px; color: #6A5E64; text-align: center; padding-bottom: 32px; flex-shrink: 0; }
</style>
</head>
