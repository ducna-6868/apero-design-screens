<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceMagic — Onboarding 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background: #1A1118;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #F5EDE8;
    letter-spacing: 0.5px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #F5EDE8;
    border-radius: 9999px;
  }

  /* Top bar with Skip */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px 0;
    flex-shrink: 0;
  }
  .skip-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 0;
  }

  /* Hero Card */
  .hero-card {
    width: 350px;
    height: 420px;
    border-radius: 16px;
    background: #2A1F26;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    flex-shrink: 0;
  }

  /* Result image placeholder */
  .result-image {
    width: 160px;
    height: 200px;
    border-radius: 16px;
    background: linear-gradient(180deg, #352A30 0%, #40343A 100%);
    border: 2px solid rgba(212, 165, 116, 0.2);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-face {
    width: 70px;
    height: 90px;
    border-radius: 35px 35px 28px 28px;
    background: linear-gradient(180deg, rgba(212, 165, 116, 0.2) 0%, rgba(201, 130, 142, 0.15) 100%);
  }

  /* Share icon on result image */
  .share-icon {
    position: absolute;
    bottom: -10px;
    right: -10px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(212, 165, 116, 0.3);
  }

  /* Social platform circles */
  .social-circle {
    position: absolute;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    animation: float 3s ease-in-out infinite;
  }

  .social-ig {
    background: linear-gradient(135deg, #F56040, #C13584, #833AB4);
    top: 60px;
    right: 30px;
    animation-delay: 0s;
  }
  .social-tiktok {
    background: #010101;
    border: 1.5px solid #333;
    bottom: 80px;
    right: 40px;
    animation-delay: 1s;
  }
  .social-imessage {
    background: #34C759;
    top: 140px;
    left: 30px;
    animation-delay: 0.5s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Connection lines (dashed) */
  .connection-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Text area */
  .text-area {
    text-align: center;
    padding: 24px 20px 0;
    flex-shrink: 0;
  }
  .headline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #F5EDE8;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    line-height: 1.5;
  }

  /* Bottom section */
  .bottom-section {
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: auto;
  }

  /* Page dots */
  .page-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #40343A;
  }
  .dot.active {
    background: #D4A574;
  }

  /* CTA Button */
  .btn-primary {
    width: 100%;
    height: 52px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #1A1118;
    box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#F5EDE8"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="#F5EDE8"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="#F5EDE8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#F5EDE8"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C10.2 3.6 12.2 4.5 13.6 6L15.1 4.5C13.3 2.7 10.8 1.6 8 1.6C5.2 1.6 2.7 2.7 0.9 4.5L2.4 6C3.8 4.5 5.8 3.6 8 3.6Z" fill="#F5EDE8"/>
        <path d="M8 7.2C9.3 7.2 10.5 7.7 11.4 8.5L12.9 7C11.6 5.8 9.9 5.1 8 5.1C6.1 5.1 4.4 5.8 3.1 7L4.6 8.5C5.5 7.7 6.7 7.2 8 7.2Z" fill="#F5EDE8"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#F5EDE8"/>
      </svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
        <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="#F5EDE8" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="19" height="8" rx="1" fill="#F5EDE8"/>
        <path d="M24 4V8C25.1 7.5 25.1 4.5 24 4Z" fill="#F5EDE8" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Skip -->
  <div class="top-bar">
    <button class="skip-btn">Skip</button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Hero Card: Share flow illustration -->
    <div class="hero-card">
      <!-- Connection lines SVG -->
      <svg class="connection-lines" width="350" height="420" viewBox="0 0 350 420">
        <!-- Line to Instagram -->
        <line x1="210" y1="185" x2="275" y2="100" stroke="#D4A574" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
        <!-- Line to TikTok -->
        <line x1="210" y1="230" x2="270" y2="305" stroke="#D4A574" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
        <!-- Line to iMessage -->
        <line x1="140" y1="220" x2="78" y2="190" stroke="#D4A574" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
      </svg>

      <!-- Result image -->
      <div class="result-image">
        <div class="result-face"></div>
        <div class="share-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M14 6C15.1 6 16 5.1 16 4C16 2.9 15.1 2 14 2C12.9 2 12 2.9 12 4C12 4.18 12.02 4.35 12.07 4.51L6.97 7.56C6.55 7.22 6.02 7 5.44 7C4.09 7 3 8.09 3 9.44C3 10.79 4.09 11.88 5.44 11.88C6.02 11.88 6.55 11.66 6.97 11.32L12.07 14.37C12.02 14.53 12 14.7 12 14.88C12 16.23 13.09 17.32 14.44 17.32C15.79 17.32 16.88 16.23 16.88 14.88C16.88 13.53 15.79 12.44 14.44 12.44C13.86 12.44 13.33 12.66 12.91 13L7.81 9.95C7.86 9.79 7.88 9.62 7.88 9.44C7.88 9.26 7.86 9.09 7.81 8.93L12.91 5.88C13.33 6.22 13.86 6.44 14.44 6.44" fill="#1A1118"/>
          </svg>
        </div>
      </div>

      <!-- Social circles -->
      <div class="social-circle social-ig">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="2" y="2" width="18" height="18" rx="5" stroke="white" stroke-width="1.5" fill="none"/>
          <circle cx="11" cy="11" r="4.5" stroke="white" stroke-width="1.5" fill="none"/>
          <circle cx="16.5" cy="5.5" r="1.2" fill="white"/>
        </svg>
      </div>
      <div class="social-circle social-tiktok">
        <svg width="18" height="20" viewBox="0 0 18 20" fill="none">
          <path d="M9.5 1V13.5C9.5 15.16 8.16 16.5 6.5 16.5C4.84 16.5 3.5 15.16 3.5 13.5C3.5 11.84 4.84 10.5 6.5 10.5C6.84 10.5 7.16 10.56 7.46 10.66V8.14C7.14 8.06 6.82 8 6.5 8C3.46 8 1 10.46 1 13.5C1 16.54 3.46 19 6.5 19C9.54 19 12 16.54 12 13.5V7.2C13.14 8 14.52 8.5 16 8.5V6C14.06 6 12.38 4.74 12 3H9.5V1Z" fill="white"/>
        </svg>
      </div>
      <div class="social-circle social-imessage">
        <svg width="20" height="18" viewBox="0 0 20 18" fill="none">
          <path d="M10 1C5.03 1 1 4.36 1 8.5C1 10.82 2.28 12.88 4.3 14.2L3.5 17L6.8 15.2C7.82 15.5 8.88 15.65 10 15.65C14.97 15.65 19 12.29 19 8.15C19 4.01 14.97 1 10 1Z" fill="white"/>
        </svg>
      </div>
    </div>

    <!-- Text -->
    <div class="text-area">
      <div class="headline">Share Your Look</div>
      <div class="subtitle">One tap to Instagram, TikTok, or iMessage. Your friends will want to try it too.</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
    <button class="btn-primary">Continue</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
