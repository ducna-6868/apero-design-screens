<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>FaceMagic — 301 Home</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }

  .phone-frame {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    background: #1A1118; position: relative; display: flex; flex-direction: column;
  }

  /* ── Status Bar ── */
  .status-bar {
    height: 47px; width: 100%; padding: 14px 24px 0; display: flex;
    justify-content: space-between; align-items: center; flex-shrink: 0;
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  }
  .status-bar .time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { width: 16px; height: 16px; fill: #F5EDE8; }

  /* ── Hero Banner ── */
  .hero-banner {
    width: 100%; flex-shrink: 0;
    margin-top: 47px;
    padding: 0 20px;
    padding-top: 12px;
  }
  .hero-card {
    width: 350px; height: 320px; border-radius: 16px;
    background: linear-gradient(160deg, #2A1F26 0%, #352A30 40%, #2A1F26 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 24px;
  }
  .hero-card .hero-thumb {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .hero-card .hero-thumb svg { opacity: 0.15; }
  .hero-cta {
    position: relative; z-index: 2;
    height: 44px; padding: 0 32px; border-radius: 9999px;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px;
    color: #1A1118;
    box-shadow: 0 4px 24px rgba(212,165,116,0.25);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  /* ── Scrollable Content ── */
  .content {
    flex: 1; overflow-y: auto; padding: 20px 20px 8px;
    -webkit-overflow-scrolling: touch;
  }
  .content::-webkit-scrollbar { display: none; }

  /* ── Card Grid 2x2 ── */
  .card-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .card-grid + .card-grid { margin-top: 12px; }

  .template-card {
    position: relative; border-radius: 12px; overflow: hidden;
    aspect-ratio: 1 / 1; cursor: pointer;
  }
  .template-card .thumb {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .template-card .thumb svg { opacity: 0.25; }
  .template-card .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(transparent 40%, rgba(0,0,0,0.6));
  }
  .template-card .label {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; color: #fff;
  }
  .template-card .badge {
    position: absolute; top: 8px; right: 8px; padding: 3px 8px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-new { background: rgba(212,165,116,0.85); color: #1A1118; }
  .badge-hot { background: rgba(201,130,142,0.85); color: #fff; }

  .card-bg-1 { background: linear-gradient(145deg, #D4A574, #C9828E); }
  .card-bg-2 { background: linear-gradient(145deg, #4A3040, #C9828E); }
  .card-bg-3 { background: linear-gradient(145deg, #B8A0D2, #6A4060); }
  .card-bg-4 { background: linear-gradient(145deg, #8B6E5A, #D4A574); }

  /* ── Tab Bar ── */
  .tab-bar {
    height: 83px; flex-shrink: 0;
    background: rgba(42,31,38,0.95);
    backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-top: 0.5px solid rgba(212,165,116,0.12);
    display: flex; justify-content: center; gap: 40px;
    padding: 0 40px; padding-bottom: 34px;
    align-items: center;
  }
  .tab-icon {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid #6A5E64;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .tab-icon.active { border-color: #D4A574; }
  .tab-icon svg { width: 22px; height: 22px; }
  .tab-icon.active svg { stroke: #D4A574; }
  .tab-icon.inactive svg { stroke: #6A5E64; }

  /* ── Home Indicator ── */
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px; background: #F5EDE8; opacity: 0.3;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 17 12"><path d="M1 4.5C3.3 1.8 6.5 0 10 0s6.7 1.8 9 4.5M4 7.5c1.5-1.7 3.6-2.8 6-2.8s4.5 1.1 6 2.8M7.5 10.5c1-1 2.3-1.5 3.5-1.5s2.5.5 3.5 1.5" fill="none" stroke="#F5EDE8" stroke-width="1.2"/></svg>
      <svg viewBox="0 0 16 12"><rect x="0" y="1" width="3" height="11" rx="0.5" fill="#F5EDE8" opacity="0.4"/><rect x="4.5" y="4" width="3" height="8" rx="0.5" fill="#F5EDE8" opacity="0.6"/><rect x="9" y="2" width="3" height="10" rx="0.5" fill="#F5EDE8" opacity="0.8"/><rect x="13" y="0" width="3" height="12" rx="0.5" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#F5EDE8" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#F5EDE8" opacity="0.5"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#F5EDE8"/></svg>
    </div>
  </div>

  <!-- Hero Banner -->
  <div class="hero-banner">
    <div class="hero-card">
      <div class="hero-thumb">
        <svg width="120" height="150" viewBox="0 0 120 150" fill="none">
          <ellipse cx="60" cy="50" rx="28" ry="32" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
          <path d="M40 46c0-12 8-24 20-24s20 12 20 24" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
          <circle cx="50" cy="54" r="3" fill="rgba(255,255,255,0.2)"/>
          <circle cx="70" cy="54" r="3" fill="rgba(255,255,255,0.2)"/>
          <path d="M54 66c3 3 9 3 12 0" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M20 130c0-22 18-40 40-40s40 18 40 40" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        </svg>
      </div>
      <button class="hero-cta">Edit Now</button>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="content">

    <!-- Row 1 -->
    <div class="card-grid">
      <div class="template-card card-bg-1">
        <div class="thumb">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><ellipse cx="24" cy="18" rx="10" ry="12" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/><circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><circle cx="28" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><path d="M21 26c1.5 1.5 4.5 1.5 6 0" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/><path d="M10 44c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/></svg>
        </div>
        <div class="overlay"></div>
        <div class="badge badge-new">NEW</div>
        <div class="label">Glass Skin</div>
      </div>
      <div class="template-card card-bg-2">
        <div class="thumb">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><ellipse cx="24" cy="18" rx="10" ry="12" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/><circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><circle cx="28" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><path d="M21 26c1.5 1.5 4.5 1.5 6 0" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/><path d="M10 44c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/></svg>
        </div>
        <div class="overlay"></div>
        <div class="badge badge-hot">HOT</div>
        <div class="label">Smokey Eye</div>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="card-grid">
      <div class="template-card card-bg-3">
        <div class="thumb">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><ellipse cx="24" cy="18" rx="10" ry="12" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/><circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><circle cx="28" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><path d="M21 26c1.5 1.5 4.5 1.5 6 0" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/><path d="M10 44c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/></svg>
        </div>
        <div class="overlay"></div>
        <div class="label">Bold Lip</div>
      </div>
      <div class="template-card card-bg-4">
        <div class="thumb">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><ellipse cx="24" cy="18" rx="10" ry="12" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/><circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><circle cx="28" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/><path d="M21 26c1.5 1.5 4.5 1.5 6 0" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/><path d="M10 44c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/></svg>
        </div>
        <div class="overlay"></div>
        <div class="label">Natural</div>
      </div>
    </div>

  </div>

  <!-- Tab Bar — 3 circle icons -->
  <div class="tab-bar">
    <div class="tab-icon active">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
      </svg>
    </div>
    <div class="tab-icon inactive">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </div>
    <div class="tab-icon inactive">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
