<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>BeautyLens — 301 Home</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }

  .phone-frame {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    background: #1A1118; position: relative; display: flex; flex-direction: column;
  }

  /* ── Status Bar ── */
  .status-bar {
    height: 47px; width: 100%; padding: 14px 24px 0; display: flex;
    justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .status-bar .time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { width: 16px; height: 16px; fill: #F5EDE8; }

  /* ── Title Bar ── */
  .title-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 20px 0; flex-shrink: 0;
  }
  .title-bar h1 { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 28px; color: #F5EDE8; }
  .title-bar .actions { display: flex; gap: 16px; align-items: center; }

  /* ── Scrollable Content ── */
  .content {
    flex: 1; overflow-y: auto; padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .content::-webkit-scrollbar { display: none; }

  /* ── Chip Row ── */
  .chip-row {
    display: flex; gap: 8px; padding: 16px 20px 0; overflow-x: auto; flex-shrink: 0;
  }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    padding: 8px 16px; border-radius: 9999px; font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 13px; white-space: nowrap; flex-shrink: 0;
    background: #352A30; color: #9A8E94; border: 1px solid transparent; cursor: pointer;
  }
  .chip.active {
    background: rgba(212,165,116,0.15); color: #D4A574; border-color: #D4A574;
  }

  /* ── Section Heading ── */
  .section-heading {
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 20px;
    color: #F5EDE8; padding: 24px 20px 12px;
  }

  /* ── Template Card Grid ── */
  .card-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px;
  }
  .template-card {
    position: relative; border-radius: 12px; overflow: hidden;
    aspect-ratio: 3 / 4; cursor: pointer;
  }
  .template-card .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(transparent 50%, rgba(0,0,0,0.7));
  }
  .template-card .label {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; color: #fff;
  }
  .template-card .badge {
    position: absolute; top: 8px; right: 8px; padding: 3px 8px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-new { background: rgba(212,165,116,0.85); color: #1A1118; }
  .badge-hot { background: rgba(201,130,142,0.85); color: #fff; }

  /* Card gradient placeholders */
  .card-bg-1 { background: linear-gradient(145deg, #D4A574, #C9828E); }
  .card-bg-2 { background: linear-gradient(145deg, #4A3040, #C9828E); }
  .card-bg-3 { background: linear-gradient(145deg, #B8A0D2, #6A4060); }
  .card-bg-4 { background: linear-gradient(145deg, #8B6E5A, #D4A574); }

  /* ── Horizontal Scroll Row ── */
  .h-scroll-row {
    display: flex; gap: 12px; padding: 0 20px; overflow-x: auto;
  }
  .h-scroll-row::-webkit-scrollbar { display: none; }
  .h-card {
    flex-shrink: 0; width: 120px; height: 160px; border-radius: 12px;
    position: relative; overflow: hidden; cursor: pointer;
  }
  .h-card .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(transparent 40%, rgba(0,0,0,0.65));
  }
  .h-card .label {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 12px; color: #fff;
  }
  .h-bg-1 { background: linear-gradient(145deg, #C9828E, #B8A0D2); }
  .h-bg-2 { background: linear-gradient(145deg, #D4A574, #40343A); }
  .h-bg-3 { background: linear-gradient(145deg, #6A4060, #D4A574); }

  /* ── Facial Features ── */
  .features-row {
    display: flex; gap: 16px; padding: 0 20px; justify-content: flex-start;
  }
  .feature-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
  }
  .feature-circle {
    width: 60px; height: 60px; border-radius: 50%; background: #2A1F26;
    display: flex; align-items: center; justify-content: center;
  }
  .feature-circle svg { width: 28px; height: 28px; }
  .feature-label {
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px; color: #9A8E94;
  }

  /* ── Tab Bar ── */
  .tab-bar {
    height: 83px; flex-shrink: 0;
    background: rgba(42,31,38,0.95);
    backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-top: 0.5px solid rgba(212,165,116,0.12);
    display: flex; padding-bottom: 34px;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2px; cursor: pointer;
  }
  .tab svg { width: 24px; height: 24px; }
  .tab .tab-label {
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 10px;
  }
  .tab.active svg { fill: #D4A574; stroke: #D4A574; }
  .tab.active .tab-label { color: #D4A574; }
  .tab.inactive svg { fill: #6A5E64; stroke: #6A5E64; }
  .tab.inactive .tab-label { color: #6A5E64; }

  /* ── Home Indicator ── */
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px; background: #F5EDE8; opacity: 0.3;
  }
</style>
</head>
<body>
