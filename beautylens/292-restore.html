<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>292 — Restore Purchase</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; overflow: hidden; background: #1A1118; position: relative; display: flex; flex-direction: column; }

  .status-bar { height: 47px; padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 12px; fill: #F5EDE8; }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; opacity: 0.3; }

  /* Nav Bar */
  .nav-bar { height: 44px; display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; position: relative; }
  .nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: none; border: none; }
  .nav-back svg { width: 24px; height: 24px; }
  .nav-title { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 17px; color: #F5EDE8; position: absolute; left: 50%; transform: translateX(-50%); }

  /* Content */
  .content { flex: 1; display: flex; flex-direction: column; padding: 20px 20px 0; }

  .instruction { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 15px; color: #9A8E94; line-height: 1.6; margin-bottom: 32px; }

  /* Restore icon */
  .restore-icon { width: 64px; height: 64px; border-radius: 16px; background: #2A1F26; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  .restore-icon svg { width: 32px; height: 32px; }

  .spacer { flex: 1; }

  .cta-btn { width: 100%; height: 52px; border-radius: 9999px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); border: none; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 17px; color: #1A1118; cursor: pointer; box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2); margin-bottom: 40px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 18 12"><rect x="0" y="3" width="4" height="9" rx="1" opacity="0.4"/><rect x="5" y="2" width="4" height="10" rx="1" opacity="0.6"/><rect x="10" y="1" width="4" height="11" rx="1" opacity="0.8"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg viewBox="0 0 16 12" fill="none"><path d="M8 1.5C5.5 1.5 3.3 2.5 1.7 4.1L0 2.4C2 0.4 4.8-0.5 8-0.5s6 0.9 8 2.9L14.3 4.1C12.7 2.5 10.5 1.5 8 1.5z" fill="#F5EDE8" opacity="0.4"/><path d="M8 5C6.3 5 4.8 5.7 3.7 6.8L2 5.1C3.5 3.7 5.6 2.8 8 2.8s4.5 0.9 6 2.3L12.3 6.8C11.2 5.7 9.7 5 8 5z" fill="#F5EDE8" opacity="0.7"/><path d="M8 8.5c-1 0-1.9 0.4-2.6 1.1L8 12l2.6-2.4C9.9 8.9 9 8.5 8 8.5z" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="1" width="24" height="12" rx="3" stroke="#F5EDE8" stroke-opacity="0.35" stroke-width="1.2"/><rect x="1.5" y="2.5" width="18" height="9" rx="2" fill="#F5EDE8"/><rect x="25.5" y="4.5" width="2.5" height="5" rx="1" fill="#F5EDE8" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <button class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F5EDE8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">Restore Purchase</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Restore Icon -->
    <div class="restore-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M6 16C6 10.477 10.477 6 16 6c3.5 0 6.572 1.8 8.35 4.5" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M26 16c0 5.523-4.477 10-10 10-3.5 0-6.572-1.8-8.35-4.5" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M22 5l2.5 5.5L19 12" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 27l-2.5-5.5L13 20" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="instruction">If you've previously subscribed, tap Restore to reactivate your subscription.</p>

    <div class="spacer"></div>

    <button class="cta-btn">Restore</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>
</div>
</body>
</html>
