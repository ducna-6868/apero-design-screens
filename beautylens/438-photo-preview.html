<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>438 — Photo Preview (Face Detection)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; background: #1A1118; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  .status-bar { height: 47px; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 0; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 18px; }

  .nav-bar { height: 44px; display: flex; align-items: center; justify-content: center; padding: 0 20px; position: relative; flex-shrink: 0; }
  .nav-back { width: 20px; height: 20px; cursor: pointer; position: absolute; left: 20px; }
  .nav-title { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 17px; color: #F5EDE8; }

  /* Content */
  .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 24px 20px 0; }

  /* Photo Display */
  .photo-container { width: 350px; height: 440px; border-radius: 16px; background: linear-gradient(160deg, #2A1F26 0%, #352A30 50%, #2A1F26 100%); position: relative; flex-shrink: 0; }
  .face-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 180px; border: 2px dashed #D4A574; border-radius: 8px; }

  /* Status */
  .face-status { display: flex; align-items: center; gap: 8px; margin-top: 20px; }
  .face-status svg { width: 18px; height: 18px; }
  .face-status span { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 15px; color: #6BCB77; }

  /* Bottom CTA — Two Buttons */
  .bottom-cta { padding: 0 20px 34px; flex-shrink: 0; margin-top: auto; padding-top: 20px; display: flex; flex-direction: column; gap: 12px; }
  .btn-primary { height: 52px; width: 350px; border-radius: 9999px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); color: #1A1118; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; border: none; cursor: pointer; box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-secondary { height: 52px; width: 350px; border-radius: 9999px; background: transparent; color: #D4A574; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; border: 1.5px solid #D4A574; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="3" height="12" rx="1" fill="#F5EDE8"/><rect x="5.5" y="5" width="3" height="10" rx="1" fill="#F5EDE8"/><rect x="10" y="7" width="3" height="8" rx="1" fill="#F5EDE8"/><rect x="14.5" y="9" width="3" height="6" rx="1" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 3C5.5 3 2.5 5 1 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5z" stroke="#F5EDE8" stroke-width="1.5" fill="none"/><circle cx="9" cy="8" r="2.5" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="4" width="14" height="10" rx="2" stroke="#F5EDE8" stroke-width="1.5"/><rect x="16" y="7" width="2" height="4" rx="0.5" fill="#F5EDE8"/><rect x="2.5" y="5.5" width="8" height="7" rx="1" fill="#F5EDE8"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <svg class="nav-back" viewBox="0 0 20 20" fill="none">
      <path d="M12.5 15L7.5 10L12.5 5" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="nav-title">Preview</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="photo-container">
      <div class="face-box"></div>
    </div>
    <div class="face-status">
      <svg viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="8" stroke="#6BCB77" stroke-width="2"/>
        <path d="M5.5 9L8 11.5L12.5 6.5" stroke="#6BCB77" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Face detected!</span>
    </div>
  </div>

  <!-- Bottom CTA — Two Buttons -->
  <div class="bottom-cta">
    <button class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#1A1118" stroke-width="1.5"/><path d="M6 9.5c1-1.5 2-2 3-2s2 .5 3 2" stroke="#1A1118" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="7.5" r="1" fill="#1A1118"/><circle cx="11" cy="7.5" r="1" fill="#1A1118"/></svg>
      Makeup Looks
    </button>
    <button class="btn-secondary">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="7" r="3.5" stroke="#D4A574" stroke-width="1.5"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/></svg>
      Facial Features
    </button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
