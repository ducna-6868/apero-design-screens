<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>565 — Loading Fail: Facial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; background: #1A1118; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  /* Status Bar */
  .status-bar { height: 47px; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 0; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 18px; }

  /* Error Content */
  .error-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 0 40px; }

  /* Error Icon */
  .error-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(255, 123, 123, 0.15); display: flex; align-items: center; justify-content: center; }
  .error-icon svg { width: 28px; height: 28px; }

  /* Text */
  .error-headline { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 24px; color: #F5EDE8; text-align: center; margin-top: 8px; }
  .error-body { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 15px; color: #9A8E94; text-align: center; max-width: 280px; line-height: 1.5; }

  /* Buttons */
  .btn-primary { width: 100%; max-width: 280px; height: 52px; border-radius: 9999px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); border: none; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; color: #1A1118; cursor: pointer; box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2); margin-top: 16px; }
  .ghost-btn { background: none; border: none; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; color: #9A8E94; cursor: pointer; margin-top: 8px; }

  /* Home Indicator */
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="3" height="12" rx="1" fill="#F5EDE8"/><rect x="5.5" y="5" width="3" height="10" rx="1" fill="#F5EDE8"/><rect x="10" y="7" width="3" height="8" rx="1" fill="#F5EDE8"/><rect x="14.5" y="9" width="3" height="6" rx="1" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 3C5.5 3 2.5 5 1 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5z" stroke="#F5EDE8" stroke-width="1.5" fill="none"/><circle cx="9" cy="8" r="2.5" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="4" width="14" height="10" rx="2" stroke="#F5EDE8" stroke-width="1.5"/><rect x="16" y="7" width="2" height="4" rx="0.5" fill="#F5EDE8"/><rect x="2.5" y="5.5" width="8" height="7" rx="1" fill="#F5EDE8"/></svg>
    </div>
  </div>

  <!-- Error Content -->
  <div class="error-content">
    <div class="error-icon">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12" stroke="#FF7B7B" stroke-width="2"/>
        <line x1="14" y1="9" x2="14" y2="15" stroke="#FF7B7B" stroke-width="2" stroke-linecap="round"/>
        <circle cx="14" cy="19" r="1.5" fill="#FF7B7B"/>
      </svg>
    </div>
    <div class="error-headline">Something Went Wrong</div>
    <div class="error-body">We couldn't process your feature edit. Please try again.</div>
    <button class="btn-primary">Try Again</button>
    <button class="ghost-btn">Go Home</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
