<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>437 — Camera</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; background: #1A1118; position: relative; overflow: hidden; }

  .status-bar { height: 47px; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 18px; }

  .nav-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
  .nav-back { width: 20px; height: 20px; cursor: pointer; }
  .nav-right { width: 24px; height: 24px; cursor: pointer; }

  /* Camera Preview */
  .camera-preview { width: 100%; height: 545px; background: #2A1F26; position: relative; }
  .camera-preview::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(64, 52, 58, 0.8) 0%, transparent 70%); border-radius: 50%; }

  /* Capture Area */
  .capture-area { flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 40px; }
  .capture-btn { width: 72px; height: 72px; border-radius: 50%; background: transparent; border: 4px solid transparent; background-image: linear-gradient(#1A1118, #1A1118), linear-gradient(135deg, #D4A574 0%, #C9828E 100%); background-origin: border-box; background-clip: padding-box, border-box; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
  .capture-btn-inner { width: 60px; height: 60px; border-radius: 50%; background: #F5EDE8; }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="3" height="12" rx="1" fill="#F5EDE8"/><rect x="5.5" y="5" width="3" height="10" rx="1" fill="#F5EDE8"/><rect x="10" y="7" width="3" height="8" rx="1" fill="#F5EDE8"/><rect x="14.5" y="9" width="3" height="6" rx="1" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 3C5.5 3 2.5 5 1 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5z" stroke="#F5EDE8" stroke-width="1.5" fill="none"/><circle cx="9" cy="8" r="2.5" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="4" width="14" height="10" rx="2" stroke="#F5EDE8" stroke-width="1.5"/><rect x="16" y="7" width="2" height="4" rx="0.5" fill="#F5EDE8"/><rect x="2.5" y="5.5" width="8" height="7" rx="1" fill="#F5EDE8"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <svg class="nav-back" viewBox="0 0 20 20" fill="none">
      <path d="M12.5 15L7.5 10L12.5 5" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Flip Camera Icon -->
    <svg class="nav-right" viewBox="0 0 24 24" fill="none">
      <path d="M20 7L16 3v3H8a5 5 0 00-5 5v1" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 17l4 4v-3h8a5 5 0 005-5v-1" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Camera Preview -->
  <div class="camera-preview"></div>

  <!-- Capture Button -->
  <div class="capture-area">
    <div class="capture-btn">
      <div class="capture-btn-inner"></div>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
