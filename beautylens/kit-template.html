<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App — SCREEN_CODE SCREEN_NAME</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  /* ======== TOKENS (from beauty-warm-dark/tokens.css) ======== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* ---- Screen ---- */
    --screen-width: 390px;
    --screen-height: 844px;

    /* ---- Font ---- */
    --font-heading: 'DM Sans', -apple-system, 'Helvetica Neue', sans-serif;
    --font-body: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;

    /* ---- Colors: Background ---- */
    --color-bg: #1A1118;
    --color-bg-elevated: #231920;
    --color-surface: #2A1F26;
    --color-surface2: #352A30;
    --color-surface3: #40343A;

    /* ---- Colors: Brand ---- */
    --color-primary: #D4A574;
    --color-primary-light: rgba(212, 165, 116, 0.15);
    --color-primary-hover: #E0B88A;
    --color-accent: #C9828E;
    --color-accent2: #B8A0D2;

    /* ---- Colors: Gradient ---- */
    --gradient-cta: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    --gradient-warm: linear-gradient(135deg, #D4A574 0%, #E8C5A0 50%, #C9828E 100%);
    --gradient-premium: linear-gradient(135deg, #C9828E 0%, #B8A0D2 100%);
    --gradient-rose: linear-gradient(135deg, #F5E6E0 0%, #C9828E 100%);

    /* ---- Colors: Text ---- */
    --color-text: #F5EDE8;
    --color-text-secondary: #9A8E94;
    --color-text-tertiary: #6A5E64;
    --color-text-inverse: #1A1118;
    --color-text-on-primary: #1A1118;

    /* ---- Colors: System ---- */
    --color-error: #FF7B7B;
    --color-success: #6BCB77;
    --color-warning: #FFD56B;
    --color-info: #7BB8FF;

    /* ---- Colors: Borders & Separators ---- */
    --color-border: #3D3038;
    --color-separator: rgba(255, 255, 255, 0.06);
    --color-overlay: rgba(10, 5, 8, 0.75);

    /* ---- Beauty Material ---- */
    --glow-primary: 0 0 20px rgba(212, 165, 116, 0.25);
    --glow-accent: 0 0 20px rgba(201, 130, 142, 0.25);
    --glass-bg: rgba(42, 31, 38, 0.85);
    --glass-bg-thick: rgba(42, 31, 38, 0.95);
    --glass-border: rgba(212, 165, 116, 0.12);
    --glass-blur: blur(20px) saturate(1.4);

    /* ---- Spacing ---- */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 24px;
    --space-2xl: 32px;
    --space-3xl: 48px;
    --space-inset: 20px;
    --space-safe-top: 47px;
    --space-safe-bottom: 34px;

    /* ---- Radius ---- */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --radius-full: 9999px;

    /* ---- Shadows ---- */
    --shadow-sm: 0 2px 8px rgba(10, 5, 8, 0.3);
    --shadow-md: 0 4px 16px rgba(10, 5, 8, 0.4);
    --shadow-lg: 0 8px 32px rgba(10, 5, 8, 0.5);
    --shadow-glow: 0 4px 24px rgba(212, 165, 116, 0.2);
  }

  body {
    margin: 0;
    padding: 0;
    background: var(--color-bg);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    color: var(--color-text);
    width: var(--screen-width);
    height: var(--screen-height);
    overflow: hidden;
  }

  /* ======== CORE COMPONENTS ======== */
  .device {
    width: var(--screen-width);
    height: var(--screen-height);
    background: var(--color-bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px var(--space-inset) 0 var(--space-inset);
    height: var(--space-safe-top);
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }

  .status-time {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    color: var(--color-text);
  }

  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .status-icons svg {
    width: 16px;
    height: 16px;
  }

  .beauty-nav {
    display: flex;
    flex-direction: column;
    padding: var(--space-sm) var(--space-inset) var(--space-md) var(--space-inset);
    background: transparent;
    position: relative;
    z-index: 90;
    flex-shrink: 0;
  }

  .beauty-nav .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 44px;
  }

  .beauty-nav .nav-title {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 17px;
    color: var(--color-text);
  }

  .beauty-nav .nav-large-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 28px;
    line-height: 36px;
    color: var(--color-text);
    padding-top: var(--space-xs);
  }

  .beauty-nav .nav-back {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    color: var(--color-primary);
    font-family: var(--font-body);
    font-size: 17px;
    background: none;
    border: none;
    cursor: pointer;
  }

  .beauty-nav .nav-back i,
  .beauty-nav .nav-back svg {
    width: 20px;
    height: 20px;
    color: var(--color-primary);
  }

  .beauty-nav .nav-action {
    color: var(--color-primary);
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 15px;
    background: none;
    border: none;
    cursor: pointer;
  }

  .beauty-nav .nav-action i,
  .beauty-nav .nav-action svg {
    width: 22px;
    height: 22px;
    color: var(--color-primary);
  }

  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0 var(--space-inset);
    -webkit-overflow-scrolling: touch;
  }

  .beauty-tab-bar {
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding: var(--space-sm) 0 var(--space-safe-bottom) 0;
    height: 83px;
    background: var(--glass-bg-thick);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-top: 0.5px solid var(--glass-border);
    position: relative;
    z-index: 90;
    flex-shrink: 0;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 64px;
    cursor: pointer;
    background: none;
    border: none;
    padding: var(--space-xs) var(--space-sm);
  }

  .tab-item i,
  .tab-item svg {
    width: 24px;
    height: 24px;
    color: var(--color-text-tertiary);
  }

  .tab-item.active i,
  .tab-item.active svg {
    color: var(--color-primary);
  }

  .tab-label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    color: var(--color-text-tertiary);
  }

  .tab-item.active .tab-label {
    color: var(--color-primary);
    font-weight: 600;
  }

  .home-indicator {
    width: 134px;
    height: 5px;
    background: var(--color-text);
    border-radius: var(--radius-full);
    margin: 0 auto;
    opacity: 0.2;
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* ======== ADD SCREEN-SPECIFIC STYLES BELOW ======== */

</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="device" data-import-node>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="10" width="2.5" height="4" rx="0.5" fill="#F5EDE8"/>
        <rect x="4.5" y="7" width="2.5" height="7" rx="0.5" fill="#F5EDE8"/>
        <rect x="8" y="4" width="2.5" height="10" rx="0.5" fill="#F5EDE8"/>
        <rect x="11.5" y="1" width="2.5" height="13" rx="0.5" fill="#F5EDE8"/>
      </svg>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M1.5 10.5C3.3 8.7 5.5 7.7 8 7.7s4.7 1 6.5 2.8" stroke="#F5EDE8" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        <path d="M3.8 12.8C4.9 11.7 6.4 11 8 11s3.1.7 4.2 1.8" stroke="#F5EDE8" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        <circle cx="8" cy="14" r="1" fill="#F5EDE8"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="2" stroke="#F5EDE8" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="18" height="8" rx="1" fill="#34C759"/>
        <path d="M23 4.5V7.5C23.8 7.2 24.5 6.7 24.5 6S23.8 4.8 23 4.5Z" fill="#F5EDE8" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Beauty Nav Bar -->
  <div class="beauty-nav">
    <div class="nav-row">
      <button class="nav-back">
        <i data-lucide="chevron-left"></i>
      </button>
      <span class="nav-title">Screen Title</span>
      <button class="nav-action">
        <i data-lucide="settings"></i>
      </button>
    </div>
  </div>

  <!-- Content Area -->
  <div class="content">
    <!-- Screen content goes here -->
  </div>

  <!-- Beauty Tab Bar -->
  <div class="beauty-tab-bar">
    <button class="tab-item active">
      <i data-lucide="home"></i>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-item">
      <i data-lucide="sparkles"></i>
      <span class="tab-label">Explore</span>
    </button>
    <button class="tab-item">
      <i data-lucide="camera"></i>
      <span class="tab-label">Create</span>
    </button>
    <button class="tab-item">
      <i data-lucide="user"></i>
      <span class="tab-label">Profile</span>
    </button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
<script>lucide.createIcons();</script>
</body>
</html>
