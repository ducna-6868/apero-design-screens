<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeautyLens — Onboarding 6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background: #1A1118;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #F5EDE8;
    letter-spacing: 0.5px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #F5EDE8;
    border-radius: 9999px;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 0;
  }

  /* Hero Card: collage of before/after thumbnails */
  .hero-card {
    width: 350px;
    height: 320px;
    border-radius: 16px;
    background: #2A1F26;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 6px;
    padding: 8px;
    flex-shrink: 0;
  }

  .thumb {
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb:nth-child(1) { background: linear-gradient(135deg, #352A30, #D4A574); }
  .thumb:nth-child(2) { background: linear-gradient(135deg, #352A30, #C9828E); }
  .thumb:nth-child(3) { background: linear-gradient(135deg, #352A30, #B8A0D2); }
  .thumb:nth-child(4) { background: linear-gradient(135deg, #352A30, #6BCB77); }
  .thumb:nth-child(5) { background: linear-gradient(135deg, #352A30, #C9828E); }
  .thumb:nth-child(6) { background: linear-gradient(135deg, #352A30, #D4A574); }

  .thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 30%, rgba(26, 17, 24, 0.4) 100%);
  }

  .thumb-face {
    width: 40px;
    height: 52px;
    border-radius: 20px 20px 16px 16px;
    background: rgba(245, 237, 232, 0.15);
  }

  /* Vertical divider on each thumb to suggest before/after */
  .thumb-divider {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1.5px;
    height: 60%;
    background: rgba(212, 165, 116, 0.4);
    z-index: 1;
  }

  /* Text area */
  .text-area {
    text-align: center;
    padding: 24px 20px 0;
    flex-shrink: 0;
  }
  .headline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #F5EDE8;
    margin-bottom: 8px;
    line-height: 1.25;
  }

  /* Value props */
  .value-props {
    padding: 20px 28px 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    flex-shrink: 0;
  }

  .prop-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .prop-check {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .prop-text {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: #F5EDE8;
    line-height: 1.4;
  }

  /* Bottom section */
  .bottom-section {
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: auto;
  }

  /* Page dots */
  .page-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #40343A;
  }
  .dot.active {
    background: #D4A574;
  }

  /* CTA Button */
  .btn-primary {
    width: 100%;
    height: 52px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #1A1118;
    box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">

        <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="#F5EDE8"/>

        <path d="M8 7.2C9.3 7.2 10.5 7.7 11.4 8.5L12.9 7C11.6 5.8 9.9 5.1 8 5.1C6.1 5.1 4.4 5.8 3.1 7L4.6 8.5C5.5 7.7 6.7 7.2 8 7.2Z" fill="#F5EDE8"/>

      </svg>

  <!-- No Skip button on this screen -->

  <!-- Content -->
  <div class="content">
    <!-- Hero Card: 2x3 collage of before/after thumbnails -->
    <div class="hero-card">
      <div class="thumb">
        <div class="thumb-face"></div>
        <div class="thumb-divider"></div>
      </div>
      <div class="thumb">
        <div class="thumb-face"></div>
        <div class="thumb-divider"></div>
      </div>
      <div class="thumb">
        <div class="thumb-face"></div>
        <div class="thumb-divider"></div>
      </div>
      <div class="thumb">
        <div class="thumb-face"></div>
        <div class="thumb-divider"></div>
      </div>
      <div class="thumb">
        <div class="thumb-face"></div>
        <div class="thumb-divider"></div>
      </div>
      <div class="thumb">
        <div class="thumb-face"></div>
        <div class="thumb-divider"></div>
      </div>
    </div>

    <!-- Text -->
    <div class="text-area">
      <div class="headline">Your Style, Explored</div>
    </div>

    <!-- Value props -->
    <div class="value-props">
      <div class="prop-item">
        <svg class="prop-check" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="#D4A574" stroke-width="1.5" fill="none"/>
          <path d="M6.5 11.5L9.5 14.5L15.5 8" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="prop-text">Unlimited looks</span>
      </div>
      <div class="prop-item">
        <svg class="prop-check" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="#D4A574" stroke-width="1.5" fill="none"/>
          <path d="M6.5 11.5L9.5 14.5L15.5 8" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="prop-text">All facial features</span>
      </div>
      <div class="prop-item">
        <svg class="prop-check" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="#D4A574" stroke-width="1.5" fill="none"/>
          <path d="M6.5 11.5L9.5 14.5L15.5 8" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="prop-text">New templates weekly</span>
      </div>
      <div class="prop-item">
        <svg class="prop-check" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="#D4A574" stroke-width="1.5" fill="none"/>
          <path d="M6.5 11.5L9.5 14.5L15.5 8" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="prop-text">No ads. Ever.</span>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>
    <button class="btn-primary">Get Started</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
