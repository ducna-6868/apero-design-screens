<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeautyLens — Onboarding 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background: #1A1118;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #F5EDE8;
    letter-spacing: 0.5px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #F5EDE8;
    border-radius: 9999px;
  }

  /* Top bar with Skip */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px 0;
    flex-shrink: 0;
  }
  .skip-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 0;
  }

  /* Hero Card */
  .hero-card {
    width: 350px;
    height: 420px;
    border-radius: 16px;
    background: #2A1F26;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px;
    justify-content: center;
    flex-shrink: 0;
  }

  .trend-card {
    height: 120px;
    border-radius: 12px;
    background: #352A30;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 16px;
    gap: 14px;
  }

  .trend-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
  }
  .trend-card:nth-child(1)::before {
    background: linear-gradient(135deg, #D4A574 0%, transparent 60%);
    opacity: 0.1;
  }
  .trend-card:nth-child(2)::before {
    background: linear-gradient(135deg, #C9828E 0%, transparent 60%);
    opacity: 0.1;
  }
  .trend-card:nth-child(3)::before {
    background: linear-gradient(135deg, #B8A0D2 0%, transparent 60%);
    opacity: 0.1;
  }

  .trend-thumb {
    width: 88px;
    height: 88px;
    border-radius: 12px;
    flex-shrink: 0;
    position: relative;
  }
  .trend-card:nth-child(1) .trend-thumb {
    background: linear-gradient(135deg, #D4A574 0%, #40343A 100%);
  }
  .trend-card:nth-child(2) .trend-thumb {
    background: linear-gradient(135deg, #C9828E 0%, #40343A 100%);
  }
  .trend-card:nth-child(3) .trend-thumb {
    background: linear-gradient(135deg, #B8A0D2 0%, #40343A 100%);
  }

  .trend-thumb-face {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 52px;
    border-radius: 20px 20px 16px 16px;
    background: rgba(245, 237, 232, 0.15);
  }

  .trend-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    border-radius: 8px;
    background: rgba(212, 165, 116, 0.15);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: #D4A574;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    align-self: flex-start;
  }

  .trend-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #F5EDE8;
  }

  .trend-desc {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: #9A8E94;
    line-height: 1.4;
  }

  /* Text area */
  .text-area {
    text-align: center;
    padding: 24px 20px 0;
    flex-shrink: 0;
  }
  .headline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #F5EDE8;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    line-height: 1.5;
  }

  /* Bottom section */
  .bottom-section {
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: auto;
  }

  /* Page dots */
  .page-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #40343A;
  }
  .dot.active {
    background: #D4A574;
  }

  /* CTA Button */
  .btn-primary {
    width: 100%;
    height: 52px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #1A1118;
    box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#F5EDE8"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="#F5EDE8"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="#F5EDE8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#F5EDE8"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C10.2 3.6 12.2 4.5 13.6 6L15.1 4.5C13.3 2.7 10.8 1.6 8 1.6C5.2 1.6 2.7 2.7 0.9 4.5L2.4 6C3.8 4.5 5.8 3.6 8 3.6Z" fill="#F5EDE8"/>
        <path d="M8 7.2C9.3 7.2 10.5 7.7 11.4 8.5L12.9 7C11.6 5.8 9.9 5.1 8 5.1C6.1 5.1 4.4 5.8 3.1 7L4.6 8.5C5.5 7.7 6.7 7.2 8 7.2Z" fill="#F5EDE8"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#F5EDE8"/>
      </svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
        <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="#F5EDE8" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="19" height="8" rx="1" fill="#F5EDE8"/>
        <path d="M24 4V8C25.1 7.5 25.1 4.5 24 4Z" fill="#F5EDE8" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Skip -->
  <div class="top-bar">
    <button class="skip-btn">Skip</button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Hero Card: 3 trending cards with badges -->
    <div class="hero-card">
      <div class="trend-card">
        <div class="trend-thumb">
          <div class="trend-thumb-face"></div>
        </div>
        <div class="trend-info">
          <span class="badge">NEW</span>
          <span class="trend-name">Latte Makeup</span>
          <span class="trend-desc">Warm tones, soft contour</span>
        </div>
      </div>
      <div class="trend-card">
        <div class="trend-thumb">
          <div class="trend-thumb-face"></div>
        </div>
        <div class="trend-info">
          <span class="badge">HOT</span>
          <span class="trend-name">Clean Girl</span>
          <span class="trend-desc">Dewy skin, brushed brows</span>
        </div>
      </div>
      <div class="trend-card">
        <div class="trend-thumb">
          <div class="trend-thumb-face"></div>
        </div>
        <div class="trend-info">
          <span class="badge">TRENDING</span>
          <span class="trend-name">Mob Wife</span>
          <span class="trend-desc">Bold lips, dark liner</span>
        </div>
      </div>
    </div>

    <!-- Text -->
    <div class="text-area">
      <div class="headline">Fresh Looks Every Week</div>
      <div class="subtitle">Trending templates updated weekly to match the latest TikTok and Instagram looks.</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="btn-primary">Continue</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
