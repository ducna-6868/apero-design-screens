<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceMagic — Onboarding 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background: #1A1118;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #F5EDE8;
    letter-spacing: 0.5px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #F5EDE8;
    border-radius: 9999px;
  }

  /* Top bar with Skip */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 8px 24px 0;
    flex-shrink: 0;
  }
  .skip-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 0;
  }

  /* Hero Card */
  .hero-card {
    width: 350px;
    height: 420px;
    border-radius: 16px;
    background: #2A1F26;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-shrink: 0;
  }
  .hero-left, .hero-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .hero-left {
    background: linear-gradient(180deg, rgba(106, 94, 100, 0.15) 0%, rgba(42, 31, 38, 0.3) 100%);
  }
  .hero-right {
    background: linear-gradient(180deg, rgba(212, 165, 116, 0.08) 0%, rgba(201, 130, 142, 0.08) 100%);
  }
  .hero-divider {
    width: 2px;
    height: 100%;
    background: #D4A574;
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    z-index: 2;
  }
  .hero-label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: #9A8E94;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: absolute;
    top: 16px;
  }
  .hero-left .hero-label { left: 16px; }
  .hero-right .hero-label { right: 16px; }

  /* Placeholder face silhouettes */
  .placeholder-face {
    width: 100px;
    height: 130px;
    border-radius: 50px 50px 40px 40px;
    opacity: 0.3;
  }
  .hero-left .placeholder-face {
    background: linear-gradient(180deg, #6A5E64 0%, #40343A 100%);
  }
  .hero-right .placeholder-face {
    background: linear-gradient(180deg, #D4A574 0%, #C9828E 100%);
  }

  /* Text area */
  .text-area {
    text-align: center;
    padding: 24px 20px 0;
    flex-shrink: 0;
  }
  .headline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #F5EDE8;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
    line-height: 1.5;
  }

  /* Bottom section */
  .bottom-section {
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: auto;
  }

  /* Page dots */
  .page-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #40343A;
  }
  .dot.active {
    background: #D4A574;
  }

  /* CTA Button */
  .btn-primary {
    width: 100%;
    height: 52px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #1A1118;
    box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#F5EDE8"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="#F5EDE8"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="#F5EDE8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#F5EDE8"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C10.2 3.6 12.2 4.5 13.6 6L15.1 4.5C13.3 2.7 10.8 1.6 8 1.6C5.2 1.6 2.7 2.7 0.9 4.5L2.4 6C3.8 4.5 5.8 3.6 8 3.6Z" fill="#F5EDE8"/>
        <path d="M8 7.2C9.3 7.2 10.5 7.7 11.4 8.5L12.9 7C11.6 5.8 9.9 5.1 8 5.1C6.1 5.1 4.4 5.8 3.1 7L4.6 8.5C5.5 7.7 6.7 7.2 8 7.2Z" fill="#F5EDE8"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#F5EDE8"/>
      </svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
        <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="#F5EDE8" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="19" height="8" rx="1" fill="#F5EDE8"/>
        <path d="M24 4V8C25.1 7.5 25.1 4.5 24 4Z" fill="#F5EDE8" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Skip -->
  <div class="top-bar">
    <button class="skip-btn">Skip</button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Hero Card -->
    <div class="hero-card">
      <div class="hero-left">
        <span class="hero-label">Before</span>
        <div class="placeholder-face"></div>
      </div>
      <div class="hero-divider"></div>
      <div class="hero-right">
        <span class="hero-label">After</span>
        <div class="placeholder-face"></div>
      </div>
    </div>

    <!-- Text -->
    <div class="text-area">
      <div class="headline">See Any Trend on Your Face</div>
      <div class="subtitle">AI-powered makeup that keeps you looking like you</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="page-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="btn-primary">Continue</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
