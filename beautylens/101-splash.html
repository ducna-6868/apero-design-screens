<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeautyLens — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background: #1A1118;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #F5EDE8;
    letter-spacing: 0.5px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #F5EDE8;
    border-radius: 9999px;
  }

  /* Splash Content */
  .splash-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }

  .app-logo {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 8px;
  }

  .wordmark {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #F5EDE8;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: #9A8E94;
  }

  .loading-ring {
    width: 24px;
    height: 24px;
    border: 2.5px solid transparent;
    border-top-color: #D4A574;
    border-radius: 50%;
    margin-top: 24px;
    animation: pulse-spin 1.5s ease-in-out infinite;
  }

  @keyframes pulse-spin {
    0% {
      transform: rotate(0deg);
      opacity: 0.4;
    }
    50% {
      opacity: 1;
    }
    100% {
      transform: rotate(360deg);
      opacity: 0.4;
    }
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#F5EDE8"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="#F5EDE8"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="#F5EDE8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#F5EDE8"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C10.2 3.6 12.2 4.5 13.6 6L15.1 4.5C13.3 2.7 10.8 1.6 8 1.6C5.2 1.6 2.7 2.7 0.9 4.5L2.4 6C3.8 4.5 5.8 3.6 8 3.6Z" fill="#F5EDE8"/>
        <path d="M8 7.2C9.3 7.2 10.5 7.7 11.4 8.5L12.9 7C11.6 5.8 9.9 5.1 8 5.1C6.1 5.1 4.4 5.8 3.1 7L4.6 8.5C5.5 7.7 6.7 7.2 8 7.2Z" fill="#F5EDE8"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#F5EDE8"/>
      </svg>
      <!-- Battery -->
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
        <rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="#F5EDE8" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="19" height="8" rx="1" fill="#F5EDE8"/>
        <path d="M24 4V8C25.1 7.5 25.1 4.5 24 4Z" fill="#F5EDE8" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Splash Content -->
  <div class="splash-content">
    <div class="app-logo">
      <!-- Mirror / sparkle icon -->
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="17" r="10" stroke="white" stroke-width="2.5" fill="none"/>
        <line x1="20" y1="27" x2="20" y2="37" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="16" y1="35" x2="24" y2="35" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Sparkles -->
        <circle cx="32" cy="8" r="1.5" fill="white"/>
        <line x1="32" y1="4" x2="32" y2="12" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="28" y1="8" x2="36" y2="8" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="9" cy="6" r="1" fill="white" opacity="0.7"/>
        <line x1="9" y1="3.5" x2="9" y2="8.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <line x1="6.5" y1="6" x2="11.5" y2="6" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      </svg>
    </div>
    <div class="wordmark">BeautyLens</div>
    <div class="tagline">See any look on you</div>
    <div class="loading-ring"></div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
