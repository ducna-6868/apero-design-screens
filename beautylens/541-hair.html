<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>541 — Facial Features: Hair</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; background: #1A1118; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  .status-bar { height: 47px; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 0; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 18px; }

  .nav-bar { height: 44px; display: flex; align-items: center; justify-content: center; padding: 0 20px; position: relative; flex-shrink: 0; }
  .nav-back { width: 20px; height: 20px; cursor: pointer; position: absolute; left: 20px; }
  .nav-title { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 17px; color: #F5EDE8; }

  .content { flex: 1; overflow-y: auto; padding: 0 20px; }

  .user-photo { width: 350px; height: 240px; border-radius: 16px; background: linear-gradient(160deg, #2A1F26 0%, #352A30 50%, #2A1F26 100%); margin-bottom: 16px; }

  .segmented { display: flex; width: 350px; background: #2A1F26; border-radius: 9999px; padding: 4px; margin-bottom: 20px; }
  .seg-tab { flex: 1; height: 36px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; border: none; background: transparent; }
  .seg-tab.active { background: rgba(212, 165, 116, 0.15); color: #D4A574; font-family: 'DM Sans', sans-serif; font-weight: 600; }
  .seg-tab.inactive { color: #9A8E94; font-family: 'Inter', sans-serif; font-weight: 400; }

  /* Feature Tab Row */
  .feature-tabs { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; overflow-x: auto; padding: 0 4px; }
  .feature-tabs::-webkit-scrollbar { display: none; }
  .feature-tab { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 60px; flex-shrink: 0; cursor: pointer; }
  .feature-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .feature-icon.active { background: rgba(212, 165, 116, 0.15); }
  .feature-icon.inactive { background: transparent; }
  .feature-icon svg { width: 28px; height: 28px; }
  .feature-label { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; }
  .feature-label.active { color: #D4A574; }
  .feature-label.inactive { color: #6A5E64; }

  .carousel { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; }
  .carousel::-webkit-scrollbar { display: none; }
  .template-card { width: 120px; height: 160px; border-radius: 12px; flex-shrink: 0; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .template-card:nth-child(1) { background: linear-gradient(160deg, #352A30, #40343A); }
  .template-card:nth-child(2) { background: linear-gradient(200deg, #40343A, #352A30); }
  .template-card:nth-child(3) { background: linear-gradient(135deg, #2A1F26, #352A30); }
  .template-name { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; color: #F5EDE8; }

  .hint { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13px; color: #6A5E64; text-align: center; padding-bottom: 20px; }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="3" height="12" rx="1" fill="#F5EDE8"/><rect x="5.5" y="5" width="3" height="10" rx="1" fill="#F5EDE8"/><rect x="10" y="7" width="3" height="8" rx="1" fill="#F5EDE8"/><rect x="14.5" y="9" width="3" height="6" rx="1" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 3C5.5 3 2.5 5 1 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5z" stroke="#F5EDE8" stroke-width="1.5" fill="none"/><circle cx="9" cy="8" r="2.5" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="4" width="14" height="10" rx="2" stroke="#F5EDE8" stroke-width="1.5"/><rect x="16" y="7" width="2" height="4" rx="0.5" fill="#F5EDE8"/><rect x="2.5" y="5.5" width="8" height="7" rx="1" fill="#F5EDE8"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <svg class="nav-back" viewBox="0 0 20 20" fill="none">
      <path d="M12.5 15L7.5 10L12.5 5" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="nav-title">Facial Features</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="user-photo"></div>

    <!-- Segmented Control — Features active -->
    <div class="segmented">
      <div class="seg-tab inactive">Looks</div>
      <div class="seg-tab active">Features</div>
    </div>

    <!-- Feature Tab Row -->
    <div class="feature-tabs">
      <!-- Hair — Active -->
      <div class="feature-tab">
        <div class="feature-icon active">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M14 4c-5 0-8 3-8 8 0 3 1 5 2 7 1.5 2.5 2 4 2 6h8c0-2 .5-3.5 2-6 1-2 2-4 2-7 0-5-3-8-8-8z" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 25h8" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="feature-label active">Hair</span>
      </div>
      <!-- Eyebrows -->
      <div class="feature-tab">
        <div class="feature-icon inactive">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M4 14c3-4 7-5 10-3" stroke="#6A5E64" stroke-width="2" stroke-linecap="round"/>
            <path d="M24 14c-3-4-7-5-10-3" stroke="#6A5E64" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="feature-label inactive">Eyebrows</span>
      </div>
      <!-- Eyes -->
      <div class="feature-tab">
        <div class="feature-icon inactive">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M14 8C8.5 8 4.5 12 3 14c1.5 2 5.5 6 11 6s9.5-4 11-6c-1.5-2-5.5-6-11-6z" stroke="#6A5E64" stroke-width="2"/>
            <circle cx="14" cy="14" r="3" stroke="#6A5E64" stroke-width="2"/>
          </svg>
        </div>
        <span class="feature-label inactive">Eyes</span>
      </div>
      <!-- Nose -->
      <div class="feature-tab">
        <div class="feature-icon inactive">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M14 4v14M10 22c0-2-3-3-3-5s3-2 3-2M18 22c0-2 3-3 3-5s-3-2-3-2" stroke="#6A5E64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="feature-label inactive">Nose</span>
      </div>
      <!-- Lips -->
      <div class="feature-tab">
        <div class="feature-icon inactive">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M4 14c2-3 5-5 10-5s8 2 10 5c-2 3-5 5-10 5s-8-2-10-5z" stroke="#6A5E64" stroke-width="2" stroke-linejoin="round"/>
            <path d="M4 14h20" stroke="#6A5E64" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="feature-label inactive">Lips</span>
      </div>
    </div>

    <!-- Hair Templates -->
    <div class="carousel">
      <div class="template-card"><span class="template-name">Red Hair</span></div>
      <div class="template-card"><span class="template-name">Blonde</span></div>
      <div class="template-card"><span class="template-name">Brunette</span></div>
    </div>

    <div class="hint">Tap to change just your hair</div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
