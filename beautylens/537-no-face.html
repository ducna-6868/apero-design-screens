<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>537 — No Face Detected</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; background: #1A1118; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  .status-bar { height: 47px; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 0; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 18px; }

  .nav-bar { height: 44px; display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
  .nav-back { width: 20px; height: 20px; cursor: pointer; }

  /* Centered Content */
  .centered-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; margin-top: -40px; }

  .error-circle { width: 64px; height: 64px; border-radius: 50%; background: rgba(255, 123, 123, 0.15); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .error-circle svg { width: 28px; height: 28px; }

  .headline { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 24px; color: #F5EDE8; text-align: center; margin-bottom: 12px; }
  .body-text { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 15px; color: #9A8E94; text-align: center; line-height: 1.5; max-width: 280px; margin-bottom: 40px; }

  .btn-primary { height: 52px; width: 350px; border-radius: 9999px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); color: #1A1118; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; border: none; cursor: pointer; box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2); }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="3" height="12" rx="1" fill="#F5EDE8"/><rect x="5.5" y="5" width="3" height="10" rx="1" fill="#F5EDE8"/><rect x="10" y="7" width="3" height="8" rx="1" fill="#F5EDE8"/><rect x="14.5" y="9" width="3" height="6" rx="1" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 3C5.5 3 2.5 5 1 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5z" stroke="#F5EDE8" stroke-width="1.5" fill="none"/><circle cx="9" cy="8" r="2.5" fill="#F5EDE8"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="4" width="14" height="10" rx="2" stroke="#F5EDE8" stroke-width="1.5"/><rect x="16" y="7" width="2" height="4" rx="0.5" fill="#F5EDE8"/><rect x="2.5" y="5.5" width="8" height="7" rx="1" fill="#F5EDE8"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <svg class="nav-back" viewBox="0 0 20 20" fill="none">
      <path d="M12.5 15L7.5 10L12.5 5" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Centered Content -->
  <div class="centered-content">
    <div class="error-circle">
      <!-- Face-X icon -->
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="12" r="9" stroke="#FF7B7B" stroke-width="2"/>
        <circle cx="10.5" cy="10" r="1.5" fill="#FF7B7B"/>
        <circle cx="17.5" cy="10" r="1.5" fill="#FF7B7B"/>
        <path d="M10 16s1.5-2 4-2 4 2 4 2" stroke="#FF7B7B" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="20" x2="26" y2="26" stroke="#FF7B7B" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="26" y1="20" x2="20" y2="26" stroke="#FF7B7B" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="headline">No Face Detected</div>
    <div class="body-text">We couldn't find a face in this photo. Try a well-lit selfie with your face clearly visible.</div>
    <button class="btn-primary">Try Another Photo</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
