<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>223 — During Generate Paywall</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame { width: 390px; height: 844px; border-radius: 44px; overflow: hidden; background: #1A1118; position: relative; display: flex; flex-direction: column; }

  .status-bar { height: 47px; padding: 14px 24px 0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .status-time { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #F5EDE8; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 12px; fill: #F5EDE8; }

  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #F5EDE8; border-radius: 100px; opacity: 0.3; z-index: 20; }

  .overlay { position: absolute; inset: 0; background: rgba(10, 5, 8, 0.75); z-index: 10; display: flex; flex-direction: column; border-radius: 44px; }

  .overlay-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 32px; }

  .close-btn { position: absolute; top: 56px; right: 16px; width: 28px; height: 28px; border-radius: 50%; background: #352A30; opacity: 0.6; display: flex; align-items: center; justify-content: center; z-index: 20; cursor: pointer; border: none; }
  .close-btn svg { width: 14px; height: 14px; }

  .template-preview { width: 80px; height: 106px; border-radius: 12px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 50%, #B8A0D2 100%); margin-bottom: 24px; flex-shrink: 0; position: relative; overflow: hidden; }
  /* Shimmer effect to indicate generation in progress */
  .template-preview::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%); animation: shimmer 1.8s infinite; }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  .headline { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 24px; color: #F5EDE8; text-align: center; margin-bottom: 20px; line-height: 1.3; }

  .benefits { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .benefit-row { display: flex; align-items: center; gap: 10px; }
  .benefit-check { width: 18px; height: 18px; flex-shrink: 0; }
  .benefit-text { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 14px; color: #F5EDE8; }

  .plan-card { width: 100%; border-radius: 12px; background: #2A1F26; border: 1.5px solid #D4A574; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; margin-bottom: 24px; }
  .plan-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); border-radius: 2px 0 0 2px; }
  .plan-left { display: flex; flex-direction: column; gap: 2px; }
  .plan-name { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 15px; color: #F5EDE8; }
  .plan-period { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 12px; color: #9A8E94; }
  .plan-price { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 22px; color: #D4A574; }

  .plan-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #D4A574; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
  .plan-radio::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #D4A574; }

  .cta-btn { width: 100%; height: 52px; border-radius: 9999px; background: linear-gradient(135deg, #D4A574 0%, #C9828E 100%); border: none; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 17px; color: #1A1118; cursor: pointer; box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2); margin-bottom: 16px; flex-shrink: 0; }

  .footer { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13px; color: #6A5E64; text-align: center; flex-shrink: 0; }
</style>
</head>
