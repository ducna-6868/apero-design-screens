<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>SnapContent - Splash Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px;
  background: #F9FAFB;
  font-family: 'DM Sans', sans-serif;
  color: #374151; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}

.glow {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle, rgba(255,133,187,0.15) 0%, rgba(2,26,84,0.08) 40%, transparent 70%);
  pointer-events: none;
}

.logo-container {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  z-index: 1;
}

.logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 48px;
  font-weight: 800;
  line-height: 1;
}

.logo .snap { color: #021A54; }
.logo .content { color: #FF85BB; }

.subtitle {
  font-size: 15px;
  color: #6B7280;
  font-weight: 400;
}

.loading-dots {
  display: flex; gap: 8px;
  margin-top: 48px;
  z-index: 1;
}

.loading-dots .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #021A54;
  animation: dotPulse 1.4s ease-in-out infinite;
}

.loading-dots .dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dots .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

.footer {
  position: absolute;
  bottom: 48px;
  font-size: 13px;
  color: #9CA3AF;
  z-index: 1;
}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="logo-container">
    <div class="logo"><span class="snap">Snap</span><span class="content">Content</span></div>
    <div class="subtitle">AI-Powered Content Studio</div>
  </div>
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="footer">Made by Apero</div>
</body>
</html>
