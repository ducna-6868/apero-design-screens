<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Splash Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px 0;
    height: 54px;
    flex-shrink: 0;
  }
  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #FFFFFF;
    letter-spacing: 0.5px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-icons svg {
    fill: #FFFFFF;
  }
  .screen-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Radial glow behind logo */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    background: radial-gradient(circle, rgba(0,201,167,0.25) 0%, rgba(132,94,194,0.2) 40%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
    filter: blur(40px);
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -60%) scale(1.15); }
  }

  .logo-container {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .logo-text {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .logo-snap {
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-content {
    color: #FFFFFF;
  }
  .subtitle {
    margin-top: 12px;
    font-size: 15px;
    color: #8E8E93;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* Loading dots */
  .loading-dots {
    position: absolute;
    bottom: 100px;
    display: flex;
    gap: 8px;
    z-index: 2;
  }
  .loading-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 44px;
    font-size: 13px;
    color: #8E8E93;
    letter-spacing: 0.5px;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 3.6c1.8 0 3.4.7 4.6 1.9l1.1-1.1C12.1 2.8 10.1 2 8 2S3.9 2.8 2.3 4.4l1.1 1.1C4.6 4.3 6.2 3.6 8 3.6zm0 3.2c1 0 2 .4 2.7 1.1l1.1-1.1C10.6 5.6 9.4 5.2 8 5.2s-2.6.4-3.8 1.6l1.1 1.1C6 6.8 7 6.8 8 6.8zM9.4 9.4L8 11l-1.4-1.6c.4-.4.9-.6 1.4-.6s1 .2 1.4.6z"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#FFFFFF" stroke-width="1" fill="none"/><rect x="23" y="4" width="2" height="4" rx="0.5" fill="#FFFFFF" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#FFFFFF"/></svg>
    </div>
  </div>

  <!-- Screen Content -->
  <div class="screen-content">
    <div class="glow"></div>
    <div class="logo-container">
      <div class="logo-text">
        <span class="logo-snap">Snap</span><span class="logo-content">Content</span>
      </div>
      <div class="subtitle">AI-Powered Content Studio</div>
    </div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <div class="footer">Made by Apero</div>
  </div>
</div>
</body>
</html>
