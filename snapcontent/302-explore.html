<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Explore</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    padding: 16px 24px 12px; flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54;
  }

  .search-bar {
    margin: 0 24px 16px; display: flex; align-items: center; gap: 10px;
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; padding: 0 16px; height: 48px;
  }
  .search-bar svg { flex-shrink: 0; }
  .search-input {
    flex: 1; border: none; outline: none; font-size: 15px;
    font-family: 'DM Sans', sans-serif; color: #374151; background: transparent;
  }
  .search-input::placeholder { color: #9CA3AF; }

  .chips-scroll {
    display: flex; gap: 8px; padding: 0 24px 16px;
    overflow-x: auto; flex-shrink: 0;
  }
  .chips-scroll::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap; padding: 8px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08); color: #6B7280;
  }
  .chip.active {
    background: rgba(255,133,187,0.15); border: 0.5px solid #FF85BB;
    color: #021A54; font-weight: 600;
  }

  .template-grid {
    flex: 1; overflow-y: auto; padding: 0 24px 100px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    align-content: start;
  }
  .template-card { cursor: pointer; }
  .template-thumb {
    width: 100%; aspect-ratio: 3/4; border-radius: 12px;
    border: 0.5px solid rgba(0,0,0,0.08);
  }
  .template-card:nth-child(1) .template-thumb { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .template-card:nth-child(2) .template-thumb { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
  .template-card:nth-child(3) .template-thumb { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
  .template-card:nth-child(4) .template-thumb { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
  .template-card:nth-child(5) .template-thumb { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
  .template-card:nth-child(6) .template-thumb { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
  .template-name {
    margin-top: 8px; font-size: 14px; font-weight: 600; color: #021A54;
  }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; width: 390px; height: 84px;
    background: #FFFFFF; border-top: 0.5px solid rgba(0,0,0,0.08);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: none; border: none; }
  .tab-label { font-size: 11px; color: #6B7280; font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .tab-item.active .tab-label { color: #021A54; font-weight: 600; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">
    <h1>Explore</h1>
  </div>

  <div class="search-bar">
    <svg width="20" height="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" placeholder="Search templates...">
  </div>

  <div class="chips-scroll">
    <span class="chip active">All</span>
    <span class="chip">Product</span>
    <span class="chip">Lifestyle</span>
    <span class="chip">Food</span>
    <span class="chip">Fashion</span>
  </div>

  <div class="template-grid">
    <div class="template-card">
      <div class="template-thumb"></div>
      <div class="template-name">Studio Pro</div>
    </div>
    <div class="template-card">
      <div class="template-thumb"></div>
      <div class="template-name">Neon Glow</div>
    </div>
    <div class="template-card">
      <div class="template-thumb"></div>
      <div class="template-name">Ocean Breeze</div>
    </div>
    <div class="template-card">
      <div class="template-thumb"></div>
      <div class="template-name">Fresh Green</div>
    </div>
    <div class="template-card">
      <div class="template-thumb"></div>
      <div class="template-name">Sunset Warm</div>
    </div>
    <div class="template-card">
      <div class="template-thumb"></div>
      <div class="template-name">Soft Pastel</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-item active">
      <svg width="22" height="22" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span class="tab-label">Explore</span>
    </button>
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      <span class="tab-label">Library</span>
    </button>
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="tab-label">Account</span>
    </button>
  </div>
</body>
</html>
