<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px 12px; flex-shrink: 0;
  }
  .logo-area { display: flex; align-items: center; gap: 8px; }
  .logo-text {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 800;
    color: #021A54; letter-spacing: -0.5px;
  }
  .pro-badge {
    background: #021A54; color: #FFFFFF; font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 999px; font-family: 'DM Sans', sans-serif;
  }
  .settings-icon { cursor: pointer; display: flex; align-items: center; }

  .content {
    flex: 1; overflow-y: auto; padding: 8px 24px 100px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .module-card {
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; padding: 20px; cursor: pointer;
    display: flex; align-items: center; gap: 16px;
  }
  .module-card.navy { border-top: 3px solid #021A54; }
  .module-card.pink { border-top: 3px solid #FF85BB; }
  .module-card.blush { border-top: 3px solid #FFCEE3; }

  .module-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .module-card.navy .module-icon { background: rgba(2,26,84,0.08); }
  .module-card.pink .module-icon { background: rgba(255,133,187,0.15); }
  .module-card.blush .module-icon { background: #FFCEE3; }

  .module-info { flex: 1; }
  .module-title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px;
    font-weight: 700; color: #021A54; margin-bottom: 4px;
  }
  .module-desc { font-size: 14px; color: #6B7280; line-height: 1.4; }
  .module-arrow { flex-shrink: 0; }

  .section-title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px;
    font-weight: 700; color: #021A54; margin-top: 8px;
  }

  .quick-actions { display: flex; gap: 12px; }
  .quick-card {
    flex: 1; background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; padding: 16px; text-align: center; cursor: pointer;
  }
  .quick-emoji { font-size: 28px; margin-bottom: 8px; }
  .quick-label { font-size: 13px; color: #021A54; font-weight: 600; }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; width: 390px; height: 84px;
    background: #FFFFFF; border-top: 0.5px solid rgba(0,0,0,0.08);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: none; border: none; }
  .tab-label { font-size: 11px; color: #6B7280; font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .tab-item.active .tab-label { color: #021A54; font-weight: 600; }
</style>
</head>
