<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent — Category Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; background: #0A0A0C; border-radius: 40px;
    overflow: hidden; position: relative; border: 3px solid #2C2C2E;
    display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 8px; flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #FFF; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; fill: #FFF; }

  /* Nav Header */
  .nav-header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 20px 16px; flex-shrink: 0;
  }
  .back-arrow {
    width: 36px; height: 36px; background: #1C1C1E; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .back-arrow svg { width: 18px; height: 18px; fill: #FFF; }
  .nav-title { font-size: 20px; font-weight: 700; color: #FFF; }

  /* Filter Row */
  .filter-row {
    display: flex; gap: 8px; padding: 0 20px 16px; flex-shrink: 0;
    overflow-x: auto;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
    white-space: nowrap; cursor: pointer; border: 1px solid #2C2C2E;
    color: #8E8E93; background: transparent;
  }
  .filter-chip.active {
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    color: #FFF; border-color: transparent;
  }

  /* Grid */
  .grid-content {
    flex: 1; overflow-y: auto; padding: 0 20px 20px;
  }
  .grid-content::-webkit-scrollbar { display: none; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .grid-card { cursor: pointer; }
  .grid-thumb {
    width: 100%; height: 170px; border-radius: 16px; position: relative;
    overflow: hidden;
  }
  .grid-thumb .thumb-icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    opacity: 0.2;
  }
  .grid-thumb .thumb-icon svg { width: 44px; height: 44px; fill: #FFF; }
  .grid-thumb .premium-tag {
    position: absolute; top: 10px; right: 10px;
    background: linear-gradient(135deg, #FFD700, #FFAA00);
    color: #0A0A0C; font-size: 9px; font-weight: 800;
    padding: 3px 7px; border-radius: 6px; letter-spacing: 0.3px;
  }
  .grid-label {
    font-size: 13px; font-weight: 600; color: #FFF; margin-top: 8px;
  }
  .grid-sub {
    font-size: 11px; color: #8E8E93; margin-top: 2px;
  }

  /* Gradient classes */
  .g1 { background: linear-gradient(135deg, #00C9A7, #0077B6); }
  .g2 { background: linear-gradient(135deg, #845EC2, #D65DB1); }
  .g3 { background: linear-gradient(135deg, #FF6B35, #FFD700); }
  .g4 { background: linear-gradient(135deg, #0077B6, #845EC2); }
  .g5 { background: linear-gradient(135deg, #D65DB1, #FF6B35); }
  .g6 { background: linear-gradient(135deg, #00C9A7, #845EC2); }

  .home-indicator {
    width: 134px; height: 5px; background: #636366; border-radius: 3px;
    margin: 0 auto 8px;
  }
</style>
</head>
<body>

<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Nav Header -->
  <div class="nav-header">
    <div class="back-arrow">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>
    <span class="nav-title">Product Photography</span>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <div class="filter-chip active">All</div>
    <div class="filter-chip">Minimalist</div>
    <div class="filter-chip">Lifestyle</div>
    <div class="filter-chip">Studio</div>
    <div class="filter-chip">Flat Lay</div>
  </div>

  <!-- Grid -->
  <div class="grid-content">
    <div class="grid">
      <div class="grid-card">
        <div class="grid-thumb g1">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
          <span class="premium-tag">PRO</span>
        </div>
        <div class="grid-label">Minimalist Luxury</div>
        <div class="grid-sub">Clean backgrounds</div>
      </div>
      <div class="grid-card">
        <div class="grid-thumb g2">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
        </div>
        <div class="grid-label">Lifestyle Scene</div>
        <div class="grid-sub">Natural environment</div>
      </div>
      <div class="grid-card">
        <div class="grid-thumb g3">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
        </div>
        <div class="grid-label">Bold Contrast</div>
        <div class="grid-sub">High impact colors</div>
      </div>
      <div class="grid-card">
        <div class="grid-thumb g4">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
          <span class="premium-tag">PRO</span>
        </div>
        <div class="grid-label">Studio White</div>
        <div class="grid-sub">Professional setup</div>
      </div>
      <div class="grid-card">
        <div class="grid-thumb g5">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
        </div>
        <div class="grid-label">Flat Lay</div>
        <div class="grid-sub">Top-down angle</div>
      </div>
      <div class="grid-card">
        <div class="grid-thumb g6">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
          <span class="premium-tag">PRO</span>
        </div>
        <div class="grid-label">Neon Glow</div>
        <div class="grid-sub">Dramatic lighting</div>
      </div>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>

</body>
</html>
