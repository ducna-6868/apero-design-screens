<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Category Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px 12px; flex-shrink: 0;
  }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54;
  }

  .filter-chips {
    display: flex; gap: 8px; padding: 0 24px 16px; flex-shrink: 0;
  }
  .chip {
    padding: 8px 16px; border-radius: 999px; font-size: 14px; font-weight: 500;
    cursor: pointer; background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08); color: #6B7280;
  }
  .chip.active {
    background: rgba(255,133,187,0.15); border: 0.5px solid #FF85BB;
    color: #021A54; font-weight: 600;
  }

  .gallery-grid {
    flex: 1; overflow-y: auto; padding: 0 24px 120px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    align-content: start;
  }
  .gallery-item { cursor: pointer; }
  .gallery-thumb {
    width: 100%; aspect-ratio: 1; border-radius: 10px;
    border: 0.5px solid rgba(0,0,0,0.08);
  }
  .gallery-item:nth-child(1) .gallery-thumb { background: linear-gradient(135deg, #667eea, #764ba2); }
  .gallery-item:nth-child(2) .gallery-thumb { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .gallery-item:nth-child(3) .gallery-thumb { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .gallery-item:nth-child(4) .gallery-thumb { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .gallery-item:nth-child(5) .gallery-thumb { background: linear-gradient(135deg, #fa709a, #fee140); }
  .gallery-item:nth-child(6) .gallery-thumb { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  .gallery-item:nth-child(7) .gallery-thumb { background: linear-gradient(135deg, #fccb90, #d57eeb); }
  .gallery-item:nth-child(8) .gallery-thumb { background: linear-gradient(135deg, #e0c3fc, #8ec5fc); }
  .gallery-item:nth-child(9) .gallery-thumb { background: linear-gradient(135deg, #f5576c, #ff6f91); }
  .gallery-name {
    margin-top: 6px; font-size: 12px; font-weight: 500; color: #021A54; text-align: center;
  }

  .bottom-action {
    position: fixed; bottom: 0; left: 0; width: 390px;
    padding: 16px 24px 40px; background: #F9FAFB;
    border-top: 0.5px solid rgba(0,0,0,0.06);
  }
  .use-btn {
    width: 100%; height: 52px; border: none; border-radius: 8px;
    background: #021A54; color: #FFFFFF; font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">
    <button class="back-btn">
      <svg width="24" height="24" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1>Product Photos</h1>
  </div>

  <div class="filter-chips">
    <span class="chip active">All</span>
    <span class="chip">Studio</span>
    <span class="chip">Lifestyle</span>
    <span class="chip">Flat Lay</span>
  </div>

  <div class="gallery-grid">
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Clean White</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Gradient Pop</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Sky Blue</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Natural</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Warm Tone</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Dreamy</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Sunset</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Soft Cloud</div>
    </div>
    <div class="gallery-item">
      <div class="gallery-thumb"></div>
      <div class="gallery-name">Bold Red</div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="use-btn">Use Template</button>
  </div>
</body>
</html>
