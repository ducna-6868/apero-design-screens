<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Add Brand</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px 12px; flex-shrink: 0;
  }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54;
  }

  .form-area {
    flex: 1; overflow-y: auto; padding: 8px 24px 24px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .logo-upload {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .logo-circle {
    width: 96px; height: 96px; border-radius: 50%;
    border: 2px dashed #FF85BB; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    background: rgba(255,133,187,0.06);
  }
  .logo-hint { font-size: 13px; color: #6B7280; text-align: center; }
  .logo-formats { font-size: 11px; color: #9CA3AF; }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-label { font-size: 14px; font-weight: 600; color: #021A54; }
  .field-label .required { color: #EF4444; }
  .field-input {
    height: 48px; background: #FFFFFF;
    border: 0.5px solid rgba(0,0,0,0.08); border-radius: 12px;
    padding: 0 16px; font-size: 15px; color: #374151;
    outline: none; font-family: 'DM Sans', sans-serif;
  }
  .field-input::placeholder { color: #9CA3AF; }
  .field-input:focus { border-color: #FF85BB; }

  .color-row { display: flex; align-items: center; gap: 12px; }
  .color-preview {
    width: 48px; height: 48px; border-radius: 12px; background: #021A54;
    border: 0.5px solid rgba(0,0,0,0.08); flex-shrink: 0; cursor: pointer;
  }
  .hex-input {
    flex: 1; height: 48px; background: #FFFFFF;
    border: 0.5px solid rgba(0,0,0,0.08); border-radius: 12px;
    padding: 0 16px; font-size: 15px; color: #374151;
    outline: none; font-family: monospace;
  }
  .hex-input::placeholder { color: #9CA3AF; }
  .hex-input:focus { border-color: #FF85BB; }

  .field-textarea {
    height: 100px; background: #FFFFFF;
    border: 0.5px solid rgba(0,0,0,0.08); border-radius: 12px;
    padding: 14px 16px; font-size: 15px; color: #374151;
    outline: none; resize: none; font-family: 'DM Sans', sans-serif;
  }
  .field-textarea::placeholder { color: #9CA3AF; }
  .field-textarea:focus { border-color: #FF85BB; }
  .char-counter { text-align: right; font-size: 12px; color: #9CA3AF; margin-top: -4px; }

  .bottom-area { flex-shrink: 0; padding: 16px 24px 40px; }
  .save-btn {
    width: 100%; height: 52px; border: none; border-radius: 8px;
    background: #021A54; color: #FFFFFF; font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">
    <button class="back-btn">
      <svg width="24" height="24" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1>Add Brand</h1>
  </div>

  <div class="form-area">
    <div class="logo-upload">
      <div class="logo-circle">
        <svg width="28" height="28" fill="none" stroke="#FF85BB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <span class="logo-hint">Upload Logo</span>
      <span class="logo-formats">JPG, PNG, WEBP &middot; Max 5MB</span>
    </div>

    <div class="field">
      <label class="field-label">Brand Name <span class="required">*</span></label>
      <input type="text" class="field-input" placeholder="Enter brand name">
    </div>

    <div class="field">
      <label class="field-label">Brand Color</label>
      <div class="color-row">
        <div class="color-preview"></div>
        <input type="text" class="hex-input" placeholder="#021A54" value="#021A54">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Website URL</label>
      <input type="url" class="field-input" placeholder="https://example.com">
    </div>

    <div class="field">
      <label class="field-label">Description</label>
      <textarea class="field-textarea" placeholder="Describe your brand..."></textarea>
      <div class="char-counter">0/300</div>
    </div>
  </div>

  <div class="bottom-area">
    <button class="save-btn">Save Brand</button>
  </div>
</body>
</html>
