<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>317 — Add New Brand</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
  }
  .status-bar-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar-right svg { width: 16px; height: 16px; fill: #FFFFFF; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 8px 16px 16px;
    gap: 12px;
  }
  .back-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .back-btn svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: #FFFFFF;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 0 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* Logo Upload */
  .logo-upload {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 24px;
  }
  .logo-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px dashed #2A2A2E;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
    background: #161618;
  }
  .logo-circle:hover {
    border-color: #636366;
  }
  .logo-circle svg {
    width: 32px;
    height: 32px;
    fill: none;
    stroke: #636366;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .logo-upload-text {
    font-size: 14px;
    color: #FFFFFF;
    margin-top: 12px;
  }
  .logo-upload-hint {
    font-size: 12px;
    color: #636366;
    margin-top: 4px;
  }

  /* Form Fields */
  .form-group {
    margin-bottom: 20px;
  }
  .form-label {
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
    margin-bottom: 8px;
    display: block;
  }
  .form-label .required {
    color: #FF453A;
  }
  .form-input {
    width: 100%;
    height: 48px;
    background: #1C1C1E;
    border: 1px solid #2A2A2E;
    border-radius: 12px;
    padding: 0 16px;
    font-size: 16px;
    color: #FFFFFF;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input::placeholder {
    color: #636366;
  }
  .form-input:focus {
    border-color: #00C9A7;
  }

  /* Color Field */
  .color-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .color-preview {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #8E8E93;
    border: 2px solid #2A2A2E;
    flex-shrink: 0;
    cursor: pointer;
  }
  .color-input {
    flex: 1;
    height: 48px;
    background: #1C1C1E;
    border: 1px solid #2A2A2E;
    border-radius: 12px;
    padding: 0 16px;
    font-size: 16px;
    color: #FFFFFF;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .color-input:focus {
    border-color: #00C9A7;
  }

  /* Textarea */
  .form-textarea {
    width: 100%;
    height: 100px;
    background: #1C1C1E;
    border: 1px solid #2A2A2E;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    color: #FFFFFF;
    font-family: inherit;
    outline: none;
    resize: none;
    transition: border-color 0.2s;
  }
  .form-textarea::placeholder {
    color: #636366;
  }
  .form-textarea:focus {
    border-color: #00C9A7;
  }
  .textarea-wrapper {
    position: relative;
  }
  .char-counter {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 12px;
    color: #636366;
  }

  /* Spacer */
  .spacer {
    flex: 1;
  }

  /* Button */
  .btn-container {
    padding: 16px 0 40px;
  }
  .btn-continue {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: not-allowed;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-bar-right">
      <svg viewBox="0 0 16 16"><path d="M1 10c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v4c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1v-4zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v7c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1V7zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v10c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V4zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v13c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V1z"/></svg>
      <svg viewBox="0 0 16 16"><path d="M8 3c3 0 5.5 1.5 7 4-1.5 2.5-4 4-7 4s-5.5-1.5-7-4c1.5-2.5 4-4 7-4z" fill="none" stroke="#fff" stroke-width="1.2"/><circle cx="8" cy="7" r="2" fill="#fff"/></svg>
      <svg viewBox="0 0 24 12"><rect x="0" y="0" width="22" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1.2"/><rect x="2" y="2" width="14" height="8" rx="1" fill="#34C759"/><rect x="23" y="3.5" width="1.5" height="5" rx="0.5" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <span class="header-title">Add New Brand</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Logo Upload -->
    <div class="logo-upload">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <span class="logo-upload-text">Upload Logo</span>
      <span class="logo-upload-hint">JPG, PNG, WEBP · Max 5MB</span>
    </div>

    <!-- Brand Name -->
    <div class="form-group">
      <label class="form-label">Brand Name <span class="required">*</span></label>
      <input type="text" class="form-input" placeholder="Enter brand name">
    </div>

    <!-- Brand Color -->
    <div class="form-group">
      <label class="form-label">Brand Color</label>
      <div class="color-row">
        <div class="color-preview"></div>
        <input type="text" class="color-input" value="#FFFFFF">
      </div>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label class="form-label">Description</label>
      <div class="textarea-wrapper">
        <textarea class="form-textarea" placeholder="Describe your brand..."></textarea>
        <span class="char-counter">0/300</span>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Continue Button -->
    <div class="btn-container">
      <button class="btn-continue" disabled>Continue</button>
    </div>
  </div>
</div>
</body>
</html>
