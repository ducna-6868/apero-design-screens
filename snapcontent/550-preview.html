<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390,height=844,initial-scale=1">
<title>Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px; background: #F9FAFB;
  font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 8px; flex-shrink: 0;
}
.status-bar .time {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 15px; color: #021A54;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 24px 16px; flex-shrink: 0;
}
.back-btn {
  width: 36px; height: 36px; border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.header-title {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 20px; color: #021A54;
}
.content { flex: 1; overflow-y: auto; padding: 0 20px; }
.preview-image {
  width: 350px; height: 350px; border-radius: 12px; margin: 0 auto 24px;
  background: linear-gradient(135deg, #FF85BB 0%, #FFCEE3 40%, #F9FAFB 100%);
}
.section-title {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600;
  font-size: 15px; color: #021A54; margin-bottom: 14px;
}
.style-scroll {
  display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px;
  -webkit-overflow-scrolling: touch;
}
.style-scroll::-webkit-scrollbar { display: none; }
.style-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.style-circle {
  width: 60px; height: 60px; border-radius: 50%; position: relative;
}
.style-circle.selected {
  outline: 3px solid #021A54; outline-offset: 2px;
}
.style-name {
  font-size: 12px; font-weight: 500; color: #6B7280;
}
.style-name.selected { color: #021A54; }
.textarea-section { margin-top: 8px; margin-bottom: 20px; }
.detail-textarea {
  width: 100%; height: 80px; border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 12px; padding: 14px 16px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: #374151; background: #FFFFFF; resize: none;
  outline: none;
}
.detail-textarea::placeholder { color: #9CA3AF; }
.detail-textarea:focus { border-color: #FF85BB; }
.bottom-section {
  padding: 16px 20px; flex-shrink: 0;
}
.generate-btn {
  width: 100%; padding: 16px; background: #021A54; color: #FFFFFF;
  border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; font-size: 16px; cursor: pointer;
}
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
  </div>
</div>

<div class="header">
  <button class="back-btn">
    <svg width="24" height="24" fill="none"><path d="M15 19l-7-7 7-7" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <span class="header-title">Preview</span>
</div>

<div class="content">
  <div class="preview-image"></div>

  <div class="section-title">Choose Style</div>
  <div class="style-scroll">
    <div class="style-item">
      <div class="style-circle selected" style="background: linear-gradient(135deg, #C9A961, #F5E6C0);"></div>
      <span class="style-name selected">Luxury</span>
    </div>
    <div class="style-item">
      <div class="style-circle" style="background: linear-gradient(135deg, #8BC34A, #C5E1A5);"></div>
      <span class="style-name">Natural</span>
    </div>
    <div class="style-item">
      <div class="style-circle" style="background: linear-gradient(135deg, #E0E0E0, #F5F5F5);"></div>
      <span class="style-name">Minimal</span>
    </div>
    <div class="style-item">
      <div class="style-circle" style="background: linear-gradient(135deg, #E040FB, #7C4DFF);"></div>
      <span class="style-name">Neon</span>
    </div>
    <div class="style-item">
      <div class="style-circle" style="background: conic-gradient(#FF85BB, #60A5FA, #34D399, #FBBF24, #FF85BB);"></div>
      <span class="style-name">Custom</span>
    </div>
  </div>

  <div class="textarea-section">
    <div class="section-title">Add details (optional)</div>
    <textarea class="detail-textarea" placeholder="Describe what you'd like to see..."></textarea>
  </div>
</div>

<div class="bottom-section">
  <button class="generate-btn">Generate Images</button>
</div>

</body>
</html>
