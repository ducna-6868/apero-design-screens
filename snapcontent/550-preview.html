<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons span { font-size: 12px; color: #FFFFFF; }

  .header {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 16px;
    flex-shrink: 0;
  }
  .back-arrow {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .back-arrow svg { width: 20px; height: 20px; }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
  }

  .preview-image {
    width: 100%;
    height: 350px;
    background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .preview-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.3));
  }

  .style-section {
    margin-top: 24px;
  }
  .section-label {
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
    margin-bottom: 14px;
  }
  .style-scroll {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .style-scroll::-webkit-scrollbar { display: none; }
  .style-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .style-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    position: relative;
  }
  .style-circle.selected {
    padding: 3px;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
  }
  .style-circle.selected .style-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid #0A0A0C;
  }
  .style-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }
  .style-item:nth-child(1) .style-inner { background: linear-gradient(135deg, #C9A96E, #8B6914); }
  .style-item:nth-child(2) .style-inner { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .style-item:nth-child(3) .style-inner { background: linear-gradient(135deg, #e0e0e0, #9e9e9e); }
  .style-item:nth-child(4) .style-inner { background: linear-gradient(135deg, #f5576c, #ff00ff); }
  .style-item:nth-child(5) .style-inner { background: linear-gradient(135deg, #00C9A7, #845EC2); }
  .style-name {
    font-size: 12px;
    color: #8E8E93;
  }
  .style-item.selected .style-name {
    color: #FFFFFF;
  }

  .prompt-section {
    margin-top: 24px;
  }
  .prompt-label {
    font-size: 14px;
    color: #8E8E93;
    margin-bottom: 10px;
  }
  .prompt-input {
    width: 100%;
    background: #1C1C1E;
    border: 1px solid #2A2A2E;
    border-radius: 12px;
    padding: 14px 16px;
    color: #FFFFFF;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    resize: none;
  }
  .prompt-input::placeholder {
    color: #636366;
  }

  .bottom-area {
    padding: 16px 20px 36px;
    flex-shrink: 0;
  }
  .generate-btn {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    border: none;
    border-radius: 26px;
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity="0.3"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity="0.5"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity="0.7"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="#fff"><rect x="0" y="0" width="22" height="12" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="2" y="2" width="15" height="8" rx="1" fill="#34C759"/><rect x="23" y="4" width="2" height="4" rx="0.5"/></svg>
    </div>
  </div>

  <div class="header">
    <div class="back-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <span class="header-title">Preview</span>
  </div>

  <div class="content">
    <div class="preview-image"></div>

    <div class="style-section">
      <div class="section-label">Choose Style</div>
      <div class="style-scroll">
        <div class="style-item selected">
          <div class="style-circle selected">
            <div class="style-inner"></div>
          </div>
          <span class="style-name">Luxury</span>
        </div>
        <div class="style-item">
          <div class="style-circle">
            <div class="style-inner"></div>
          </div>
          <span class="style-name">Natural</span>
        </div>
        <div class="style-item">
          <div class="style-circle">
            <div class="style-inner"></div>
          </div>
          <span class="style-name">Minimal</span>
        </div>
        <div class="style-item">
          <div class="style-circle">
            <div class="style-inner"></div>
          </div>
          <span class="style-name">Neon</span>
        </div>
        <div class="style-item">
          <div class="style-circle">
            <div class="style-inner"></div>
          </div>
          <span class="style-name">Custom</span>
        </div>
      </div>
    </div>

    <div class="prompt-section">
      <div class="prompt-label">Add details (optional)</div>
      <textarea class="prompt-input" rows="3" placeholder="E.g., Place the product on a marble table with soft lighting..."></textarea>
    </div>
  </div>

  <div class="bottom-area">
    <button class="generate-btn">Generate Images</button>
  </div>
</div>
</body>
</html>
