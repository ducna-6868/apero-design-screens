<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390,height=844,initial-scale=1">
<title>Video Result</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px; background: #F9FAFB;
  font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 8px; flex-shrink: 0;
}
.status-bar .time {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 15px; color: #021A54;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 24px 16px; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.back-btn, .share-hdr-btn {
  width: 36px; height: 36px; border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.header-title {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 20px; color: #021A54;
}
.content { flex: 1; overflow-y: auto; padding: 0 5px; }
.video-player {
  width: 380px; height: 280px; border-radius: 12px; margin: 0 auto 16px;
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, #021A54 0%, #3B82F6 40%, #FF85BB 100%);
  display: flex; align-items: center; justify-content: center;
}
.play-btn {
  width: 64px; height: 64px; background: rgba(255,255,255,0.2);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.play-triangle {
  width: 0; height: 0; border-left: 22px solid #FFFFFF;
  border-top: 14px solid transparent; border-bottom: 14px solid transparent;
  margin-left: 4px;
}
.duration-badge {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.55); color: #FFFFFF; font-size: 12px;
  font-weight: 500; padding: 3px 8px; border-radius: 6px;
}
.timeline-section { padding: 0 20px; margin-bottom: 12px; }
.timeline-track {
  width: 100%; height: 6px; background: #F3F4F6; border-radius: 999px;
  position: relative; overflow: visible;
}
.timeline-fill {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  border-radius: 999px; overflow: hidden;
  display: flex;
}
.frame-seg {
  height: 100%; flex: 1;
}
.scrubber {
  position: absolute; left: 30%; top: 50%; transform: translate(-50%, -50%);
  width: 14px; height: 14px; background: #FFFFFF; border-radius: 50%;
  border: 2px solid #021A54;
}
.time-row {
  display: flex; justify-content: space-between; padding: 0 20px;
  margin-bottom: 20px;
}
.time-text { font-size: 12px; color: #6B7280; font-weight: 500; }
.button-row {
  display: flex; gap: 10px; padding: 0 20px; margin-bottom: 20px;
}
.download-btn {
  flex: 1; padding: 14px; background: #021A54; color: #FFFFFF;
  border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; font-size: 14px; cursor: pointer; text-align: center;
}
.share-circle-btn {
  width: 48px; height: 48px; background: #FFFFFF;
  border: 0.5px solid rgba(0,0,0,0.08); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
.save-card {
  margin: 0 20px; background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px;
}
.save-icon {
  width: 40px; height: 40px; background: #FFCEE3; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.save-text { font-size: 13px; color: #374151; font-weight: 500; }
.save-text span { color: #021A54; font-weight: 600; }
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <button class="back-btn">
      <svg width="24" height="24" fill="none"><path d="M15 19l-7-7 7-7" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="header-title">Video Result</span>
  </div>
  <button class="share-hdr-btn">
    <svg width="20" height="20" fill="none"><path d="M4 12v5a2 2 0 002 2h8a2 2 0 002-2v-5M13 5l-3-3-3 3M10 2v10" stroke="#021A54" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<div class="content">
  <div class="video-player">
    <div class="play-btn">
      <div class="play-triangle"></div>
    </div>
    <div class="duration-badge">0:12</div>
  </div>

  <div class="timeline-section">
    <div class="timeline-track">
      <div class="timeline-fill">
        <div class="frame-seg" style="background: linear-gradient(90deg, #021A54, #1E3A7A);"></div>
        <div class="frame-seg" style="background: linear-gradient(90deg, #1E3A7A, #3B82F6);"></div>
        <div class="frame-seg" style="background: linear-gradient(90deg, #3B82F6, #818CF8);"></div>
        <div class="frame-seg" style="background: linear-gradient(90deg, #818CF8, #C084FC);"></div>
        <div class="frame-seg" style="background: linear-gradient(90deg, #C084FC, #FF85BB);"></div>
      </div>
      <div class="scrubber"></div>
    </div>
  </div>

  <div class="time-row">
    <span class="time-text">0:04</span>
    <span class="time-text">0:12</span>
  </div>

  <div class="button-row">
    <button class="download-btn">Download HD</button>
    <button class="share-circle-btn">
      <svg width="20" height="20" fill="none"><path d="M4 12v5a2 2 0 002 2h8a2 2 0 002-2v-5M13 5l-3-3-3 3M10 2v10" stroke="#021A54" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="save-card">
    <div class="save-icon">
      <svg width="20" height="20" fill="none"><path d="M5 3h10a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="#021A54" stroke-width="1.5"/><path d="M7 3v5h6V3" stroke="#021A54" stroke-width="1.5" stroke-linecap="round"/><path d="M5 17v-5h10v5" stroke="#021A54" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <div class="save-text">Saved to: <span>Serum Photoshoot project</span></div>
  </div>
</div>

</body>
</html>
