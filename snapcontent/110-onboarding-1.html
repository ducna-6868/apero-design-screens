<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>CreatorAI - Onboarding 1</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px;
  background: #F9FAFB;
  font-family: 'DM Sans', sans-serif;
  color: #374151; overflow: hidden;
  display: flex; flex-direction: column;
}
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
.status-bar .time { font-size: 15px; font-weight: 700; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
.status-icons { display: flex; gap: 6px; align-items: center; }

/* Hero before/after */
.hero {
  width: 100%; height: 240px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.hero-before, .hero-after {
  position: absolute;
  top: 0; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.hero-before {
  left: 0; width: 50%;
  background: #F3F4F6;
}
.hero-before-label, .hero-after-label {
  font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 999px;
}
.hero-before-label {
  background: rgba(0,0,0,0.06); color: #6B7280;
}
.hero-after {
  right: 0; width: 50%;
  background: linear-gradient(135deg, #021A54, #FF85BB);
}
.hero-after-label {
  background: rgba(255,255,255,0.25); color: #FFFFFF;
}
.hero-divider {
  position: absolute;
  top: 0; left: 50%; width: 3px; height: 100%;
  background: #FFFFFF; z-index: 2;
  transform: translateX(-50%);
}
.hero-handle {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #FFFFFF;
  border: 2px solid rgba(0,0,0,0.08);
  z-index: 3;
  display: flex; align-items: center; justify-content: center;
}
.hero-handle svg { color: #021A54; }

/* Text */
.text-section { padding: 28px 24px 0; flex-shrink: 0; }
.text-section h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px; font-weight: 700;
  color: #021A54; line-height: 1.35;
  margin-bottom: 10px;
}
.text-section p {
  font-size: 15px; color: #6B7280;
  line-height: 1.5;
}

/* Auth */
.auth-section {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 0 24px 16px; gap: 12px;
}
.auth-btn {
  width: 100%; height: 50px;
  border-radius: 8px;
  font-size: 15px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center;
  gap: 10px; cursor: pointer; border: none;
}
.btn-apple {
  background: #FFFFFF; color: #021A54;
  border: 0.5px solid rgba(0,0,0,0.08);
}
.btn-apple .icon { font-size: 18px; }
.btn-google {
  background: #FFFFFF; color: #021A54;
  border: 1.5px solid #021A54;
}
.btn-google .g-icon {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
}
.btn-email {
  background: transparent; border: none;
  color: #FF85BB; font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; height: 40px;
  display: flex; align-items: center; justify-content: center;
}

/* Progress dots */
.progress-dots {
  display: flex; justify-content: center;
  gap: 8px; padding: 12px 0 40px; flex-shrink: 0;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #E8EBF5;
}
.dot.active {
  width: 24px; border-radius: 4px;
  background: #021A54;
}
</style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <!-- Hero before/after -->
  <div class="hero">
    <div class="hero-before">
      <span class="hero-before-label">Before</span>
    </div>
    <div class="hero-after">
      <span class="hero-after-label">After</span>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-handle">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4.5 3L1 7l3.5 4M9.5 3L13 7l-3.5 4" stroke="#021A54" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- Text -->
  <div class="text-section">
    <h1>Transform Product Photos into Studio-Quality Images</h1>
    <p>Powered by AI, designed for businesses</p>
  </div>

  <!-- Auth Buttons -->
  <div class="auth-section">
    <button class="auth-btn btn-apple">
      <span class="icon">&#63743;</span>
      Continue with Apple
    </button>
    <button class="auth-btn btn-google">
      <span class="g-icon">G</span>
      Continue with Google
    </button>
    <button class="btn-email">Create account with email</button>
  </div>

  <!-- Progress Dots -->
  <div class="progress-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
