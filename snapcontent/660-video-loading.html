<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390,height=844,initial-scale=1">
<title>Video Generating</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px; background: #F9FAFB;
  font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.spinner {
  width: 64px; height: 64px; border: 4px solid #F3F4F6;
  border-top-color: #FF85BB; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 32px;
}
.title {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 20px; color: #021A54; margin-bottom: 8px;
  animation: pulse 2s ease-in-out infinite;
}
.subtitle {
  font-size: 14px; color: #6B7280; margin-bottom: 36px;
}
.stepper {
  display: flex; align-items: center; gap: 0; margin-bottom: 32px;
  padding: 0 24px;
}
.step {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  position: relative; z-index: 1;
}
.step-circle {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.step-circle.done { background: #FF85BB; color: #FFFFFF; }
.step-circle.active { background: #021A54; color: #FFFFFF; }
.step-circle.pending { background: #F3F4F6; color: #9CA3AF; }
.step-label {
  font-size: 11px; font-weight: 500; white-space: nowrap;
}
.step-label.done { color: #FF85BB; }
.step-label.active { color: #021A54; }
.step-label.pending { color: #9CA3AF; }
.step-line {
  width: 40px; height: 2px; margin-bottom: 20px;
}
.step-line.done { background: #FF85BB; }
.step-line.active { background: #021A54; }
.step-line.pending { background: #F3F4F6; }
.progress-track {
  width: 260px; height: 4px; background: #F3F4F6; border-radius: 999px;
  overflow: hidden; margin-bottom: 40px;
}
.progress-fill {
  width: 75%; height: 100%; background: #021A54; border-radius: 999px;
}
.cancel-btn {
  background: transparent; border: none; font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: #9CA3AF; cursor: pointer; font-weight: 500;
}
</style>
</head>
<body>

<div class="spinner"></div>
<div class="title">Rendering your video...</div>
<div class="subtitle">This may take up to 30 seconds</div>

<div class="stepper">
  <div class="step">
    <div class="step-circle done">
      <svg width="14" height="14" fill="none"><path d="M3 7l3 3 5-5" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="step-label done">Upload</span>
  </div>
  <div class="step-line done"></div>
  <div class="step">
    <div class="step-circle done">
      <svg width="14" height="14" fill="none"><path d="M3 7l3 3 5-5" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="step-label done">Process</span>
  </div>
  <div class="step-line active"></div>
  <div class="step">
    <div class="step-circle active">3</div>
    <span class="step-label active">Generate</span>
  </div>
  <div class="step-line pending"></div>
  <div class="step">
    <div class="step-circle pending">4</div>
    <span class="step-label pending">Render</span>
  </div>
</div>

<div class="progress-track">
  <div class="progress-fill"></div>
</div>
<button class="cancel-btn">Cancel</button>

</body>
</html>
