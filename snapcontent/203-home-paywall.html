<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorAI — Home Paywall</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 390px;
    height: 844px;
    background: #F9FAFB;
    font-family: 'DM Sans', sans-serif;
    color: #374151;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 700;
    color: #021A54;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Close button */
  .close-btn {
    position: absolute;
    top: 50px;
    right: 20px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #F3F4F6;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .close-btn svg {
    width: 14px;
    height: 14px;
    stroke: #6B7280;
    stroke-width: 2.5;
    stroke-linecap: round;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 24px 34px;
    overflow-y: auto;
    position: relative;
  }
  .content::-webkit-scrollbar { display: none; }

  /* Header */
  .header {
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #021A54;
  }

  /* Feature Cards */
  .feature-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .feature-card {
    background: #FFFFFF;
    border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .feature-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }
  .feature-card.navy::before { background: #021A54; }
  .feature-card.pink::before { background: #FF85BB; }
  .feature-card.blush::before { background: #FFCEE3; }

  .feature-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .feature-card.navy .feature-icon { background: rgba(2,26,84,0.08); }
  .feature-card.pink .feature-icon { background: rgba(255,133,187,0.15); }
  .feature-card.blush .feature-icon { background: #FFCEE3; }

  .feature-icon svg {
    width: 22px;
    height: 22px;
  }

  .feature-text h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #021A54;
    margin-bottom: 2px;
  }
  .feature-text p {
    font-size: 13px;
    color: #6B7280;
  }

  .spacer { flex: 1; }

  /* Package Cards */
  .packages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .package-card {
    display: flex;
    align-items: center;
    padding: 16px 18px;
    border-radius: 12px;
    background: #FFFFFF;
    border: 0.5px solid rgba(0,0,0,0.08);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .package-card.selected {
    border: 2px solid #021A54;
    background: rgba(2,26,84,0.04);
  }
  .radio {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.15);
    margin-right: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .package-card.selected .radio {
    border-color: #021A54;
  }
  .radio-inner {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #021A54;
    transform: scale(0);
    transition: transform 0.2s;
  }
  .package-card.selected .radio-inner {
    transform: scale(1);
  }
  .package-info { flex: 1; }
  .package-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #021A54;
  }
  .package-price {
    font-size: 13px;
    color: #6B7280;
    margin-top: 2px;
  }
  .best-value-badge {
    padding: 4px 10px;
    border-radius: 8px;
    background: #021A54;
    font-size: 10px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* CTA Button */
  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 8px;
    background: #021A54;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 14px;
  }

  /* Restore link */
  .restore-link {
    text-align: center;
    font-size: 13px;
    color: #9CA3AF;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    display: block;
    margin: 0 auto;
  }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 10.5h2v4H1zM5 8h2v6.5H5zM9 5.5h2v9H9zM13 2.5h2v12h-2z" fill="#021A54"/></svg>
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 3C4.5 3 1.5 5 0 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5zm0 8.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z" fill="#021A54"/></svg>
    <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="4" width="12" height="8" rx="1.5" stroke="#021A54" stroke-width="1.2" fill="none"/><rect x="13.5" y="6.5" width="1.5" height="3" rx="0.5" fill="#021A54"/><rect x="2.5" y="5.5" width="7" height="5" rx="0.5" fill="#021A54"/></svg>
  </div>
</div>

<div class="content">
  <!-- Close Button -->
  <button class="close-btn">
    <svg viewBox="0 0 14 14" fill="none">
      <line x1="1" y1="1" x2="13" y2="13"/>
      <line x1="13" y1="1" x2="1" y2="13"/>
    </svg>
  </button>

  <!-- Header -->
  <div class="header">
    <h1>Unlock Pro Features</h1>
  </div>

  <!-- Feature Cards -->
  <div class="feature-cards">
    <div class="feature-card navy">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <div class="feature-text">
        <h3>AI Image Studio</h3>
        <p>Unlimited studio-quality images</p>
      </div>
    </div>
    <div class="feature-card pink">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FF85BB" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <div class="feature-text">
        <h3>Content Factory</h3>
        <p>AI marketing copy for all platforms</p>
      </div>
    </div>
    <div class="feature-card blush">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
      </div>
      <div class="feature-text">
        <h3>UGC Video Gen</h3>
        <p>Create engaging product videos</p>
      </div>
    </div>
  </div>

  <div class="spacer"></div>

  <!-- Packages -->
  <div class="packages">
    <div class="package-card" onclick="selectPackage(this)">
      <div class="radio"><div class="radio-inner"></div></div>
      <div class="package-info">
        <div class="package-label">Weekly</div>
        <div class="package-price">$9.99/week</div>
      </div>
    </div>
    <div class="package-card selected" onclick="selectPackage(this)">
      <div class="radio"><div class="radio-inner"></div></div>
      <div class="package-info">
        <div class="package-label">Yearly</div>
        <div class="package-price">$49.99/year</div>
      </div>
      <span class="best-value-badge">BEST VALUE</span>
    </div>
    <div class="package-card" onclick="selectPackage(this)">
      <div class="radio"><div class="radio-inner"></div></div>
      <div class="package-info">
        <div class="package-label">Lifetime</div>
        <div class="package-price">$99.99</div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <button class="cta-btn">Start Free Trial</button>

  <!-- Restore -->
  <button class="restore-link">Restore Purchase</button>
</div>

<script>
  function selectPackage(card) {
    document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
  }
</script>
</body>
</html>
