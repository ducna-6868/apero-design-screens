<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Generation Failed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }

  .center-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 40px;
    margin-top: -40px;
  }

  .error-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255, 69, 58, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .error-icon .exclamation {
    font-size: 32px;
    font-weight: 700;
    color: #FF453A;
    line-height: 1;
  }

  .error-title {
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 10px;
    text-align: center;
  }

  .error-subtitle {
    font-size: 14px;
    color: #8E8E93;
    margin-bottom: 36px;
    text-align: center;
    line-height: 1.5;
  }

  .try-again-btn {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    border: none;
    border-radius: 26px;
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 16px;
  }

  .back-link {
    background: none;
    border: none;
    color: #8E8E93;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
  }
  .back-link:hover {
    color: #FFFFFF;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity="0.3"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity="0.5"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity="0.7"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="#fff"><rect x="0" y="0" width="22" height="12" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="2" y="2" width="15" height="8" rx="1" fill="#34C759"/><rect x="23" y="4" width="2" height="4" rx="0.5"/></svg>
    </div>
  </div>

  <div class="center-content">
    <div class="error-icon">
      <span class="exclamation">!</span>
    </div>
    <div class="error-title">Generation Failed</div>
    <div class="error-subtitle">Something went wrong. Please try again.</div>
    <button class="try-again-btn">Try Again</button>
    <button class="back-link">Back to Home</button>
  </div>
</div>
</body>
</html>
