<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Account</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header { padding: 16px 24px 12px; flex-shrink: 0; }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54;
  }

  .content {
    flex: 1; overflow-y: auto; padding: 0 24px 100px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .profile-card {
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; padding: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .avatar {
    width: 56px; height: 56px; border-radius: 50%; background: #021A54;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .avatar-initial {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px;
    font-weight: 700; color: #FFFFFF;
  }
  .profile-info { flex: 1; }
  .profile-name {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px;
    font-weight: 700; color: #021A54; margin-bottom: 2px;
  }
  .profile-email { font-size: 14px; color: #6B7280; margin-bottom: 6px; }
  .edit-link { font-size: 14px; color: #FF85BB; font-weight: 600; cursor: pointer; text-decoration: none; }

  .stats-row { display: flex; gap: 12px; }
  .stat-card {
    flex: 1; background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .stat-value {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54; margin-bottom: 4px;
  }
  .stat-label { font-size: 12px; color: #6B7280; font-weight: 500; }

  .menu-section {
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; overflow: hidden;
  }
  .menu-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; cursor: pointer;
  }
  .menu-item:not(:last-child) { border-bottom: 0.5px solid rgba(0,0,0,0.06); }
  .menu-icon {
    width: 36px; height: 36px; border-radius: 10px; background: #F3F4F6;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .menu-label { flex: 1; font-size: 15px; font-weight: 500; color: #021A54; }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; width: 390px; height: 84px;
    background: #FFFFFF; border-top: 0.5px solid rgba(0,0,0,0.08);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: none; border: none; }
  .tab-label { font-size: 11px; color: #6B7280; font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .tab-item.active .tab-label { color: #021A54; font-weight: 600; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">
    <h1>Account</h1>
  </div>

  <div class="content">
    <div class="profile-card">
      <div class="avatar"><span class="avatar-initial">U</span></div>
      <div class="profile-info">
        <div class="profile-name">User Name</div>
        <div class="profile-email">user@email.com</div>
        <a class="edit-link">Edit Profile</a>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">42</div>
        <div class="stat-label">Generations</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">18</div>
        <div class="stat-label">Saved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">5</div>
        <div class="stat-label">Projects</div>
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-item">
        <div class="menu-icon">
          <svg width="18" height="18" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4h-4z"/></svg>
        </div>
        <span class="menu-label">Subscription</span>
        <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
      </div>
      <div class="menu-item">
        <div class="menu-icon">
          <svg width="18" height="18" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
        </div>
        <span class="menu-label">Brand Kit</span>
        <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
      </div>
      <div class="menu-item">
        <div class="menu-icon">
          <svg width="18" height="18" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="menu-label">Saved Items</span>
        <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
      </div>
      <div class="menu-item">
        <div class="menu-icon">
          <svg width="18" height="18" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        </div>
        <span class="menu-label">Help Center</span>
        <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
      </div>
      <div class="menu-item">
        <div class="menu-icon">
          <svg width="18" height="18" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </div>
        <span class="menu-label">About</span>
        <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span class="tab-label">Explore</span>
    </button>
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      <span class="tab-label">Library</span>
    </button>
    <button class="tab-item active">
      <svg width="22" height="22" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="tab-label">Account</span>
    </button>
  </div>
</body>
</html>
