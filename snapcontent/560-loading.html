<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Generating</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }

  .center-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 40px;
    margin-top: -40px;
  }

  .spinner {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 4px solid #1C1C1E;
    border-top-color: #00C9A7;
    border-right-color: #845EC2;
    animation: spin 1s linear infinite;
    margin-bottom: 32px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-title {
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 10px;
    text-align: center;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .loading-subtitle {
    font-size: 14px;
    color: #8E8E93;
    margin-bottom: 36px;
    text-align: center;
  }

  .progress-track {
    width: 100%;
    height: 6px;
    background: #1C1C1E;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 40px;
  }
  .progress-fill {
    width: 65%;
    height: 100%;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .cancel-btn {
    background: none;
    border: none;
    color: #8E8E93;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }
  .cancel-btn:hover {
    color: #FFFFFF;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity="0.3"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity="0.5"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity="0.7"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="#fff"><rect x="0" y="0" width="22" height="12" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="2" y="2" width="15" height="8" rx="1" fill="#34C759"/><rect x="23" y="4" width="2" height="4" rx="0.5"/></svg>
    </div>
  </div>

  <div class="center-content">
    <div class="spinner"></div>
    <div class="loading-title">Creating your masterpiece...</div>
    <div class="loading-subtitle">This usually takes 10-15 seconds</div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <button class="cancel-btn">Cancel</button>
  </div>
</div>
</body>
</html>
