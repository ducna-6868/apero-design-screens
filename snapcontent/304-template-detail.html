<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Template Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px 16px; flex-shrink: 0;
  }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px;
    font-weight: 700; color: #021A54;
  }

  .content {
    flex: 1; overflow-y: auto; padding: 0 24px 120px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .preview-image {
    width: 100%; height: 350px; border-radius: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    border: 0.5px solid rgba(0,0,0,0.08);
  }

  .template-title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px;
    font-weight: 700; color: #021A54;
  }

  .template-desc {
    font-size: 15px; color: #374151; line-height: 1.6;
  }

  .tags { display: flex; gap: 8px; }
  .tag-navy {
    background: #021A54; color: #FFFFFF; font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 999px;
  }
  .tag-pink {
    background: rgba(255,133,187,0.15); color: #FF6BAA; font-size: 11px;
    font-weight: 600; padding: 3px 8px; border-radius: 999px;
  }

  .details-section { display: flex; flex-direction: column; gap: 0; }
  .detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06);
  }
  .detail-label { font-size: 14px; color: #6B7280; }
  .detail-value { font-size: 14px; color: #021A54; font-weight: 600; }

  .bottom-action {
    position: fixed; bottom: 0; left: 0; width: 390px;
    padding: 16px 24px 40px; background: #F9FAFB;
    border-top: 0.5px solid rgba(0,0,0,0.06);
  }
  .use-btn {
    width: 100%; height: 52px; border: none; border-radius: 8px;
    background: #021A54; color: #FFFFFF; font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">
    <button class="back-btn">
      <svg width="24" height="24" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1>Template</h1>
  </div>

  <div class="content">
    <div class="preview-image"></div>

    <div class="template-title">Professional Studio</div>

    <div class="template-desc">
      A clean, professional studio template perfect for product photography. Features soft lighting with neutral backgrounds that make your products stand out.
    </div>

    <div class="tags">
      <span class="tag-navy">Studio</span>
      <span class="tag-pink">Product</span>
    </div>

    <div class="details-section">
      <div class="detail-row">
        <span class="detail-label">Resolution</span>
        <span class="detail-value">1024 x 1024</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Style</span>
        <span class="detail-value">Professional</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Category</span>
        <span class="detail-value">Product</span>
      </div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="use-btn">Use This Template</button>
  </div>
</body>
</html>
