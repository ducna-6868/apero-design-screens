<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Language</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px 12px; flex-shrink: 0;
  }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54;
  }

  .content {
    flex: 1; overflow-y: auto; padding: 0 24px 40px;
  }

  .lang-list {
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; overflow: hidden;
  }
  .lang-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; cursor: pointer;
  }
  .lang-item:not(:last-child) { border-bottom: 0.5px solid rgba(0,0,0,0.06); }
  .lang-item.selected { background: rgba(2,26,84,0.04); }

  .lang-left { display: flex; align-items: center; gap: 14px; }
  .lang-flag { font-size: 22px; }
  .lang-info { display: flex; flex-direction: column; }
  .lang-name { font-size: 15px; font-weight: 500; color: #021A54; }
  .lang-native { font-size: 13px; color: #6B7280; margin-top: 1px; }

  .check-icon { display: none; }
  .lang-item.selected .check-icon { display: block; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">
    <button class="back-btn">
      <svg width="24" height="24" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1>Language</h1>
  </div>

  <div class="content">
    <div class="lang-list">
      <div class="lang-item selected">
        <div class="lang-left">
          <span class="lang-flag">&#127468;&#127463;</span>
          <div class="lang-info">
            <span class="lang-name">English</span>
            <span class="lang-native">English</span>
          </div>
        </div>
        <svg class="check-icon" width="20" height="20" fill="none" stroke="#021A54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="lang-item">
        <div class="lang-left">
          <span class="lang-flag">&#127466;&#127480;</span>
          <div class="lang-info">
            <span class="lang-name">Spanish</span>
            <span class="lang-native">Espa&#241;ol</span>
          </div>
        </div>
        <svg class="check-icon" width="20" height="20" fill="none" stroke="#021A54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="lang-item">
        <div class="lang-left">
          <span class="lang-flag">&#127467;&#127479;</span>
          <div class="lang-info">
            <span class="lang-name">French</span>
            <span class="lang-native">Fran&#231;ais</span>
          </div>
        </div>
        <svg class="check-icon" width="20" height="20" fill="none" stroke="#021A54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="lang-item">
        <div class="lang-left">
          <span class="lang-flag">&#127465;&#127466;</span>
          <div class="lang-info">
            <span class="lang-name">German</span>
            <span class="lang-native">Deutsch</span>
          </div>
        </div>
        <svg class="check-icon" width="20" height="20" fill="none" stroke="#021A54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="lang-item">
        <div class="lang-left">
          <span class="lang-flag">&#127471;&#127477;</span>
          <div class="lang-info">
            <span class="lang-name">Japanese</span>
            <span class="lang-native">&#26085;&#26412;&#35486;</span>
          </div>
        </div>
        <svg class="check-icon" width="20" height="20" fill="none" stroke="#021A54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="lang-item">
        <div class="lang-left">
          <span class="lang-flag">&#127472;&#127479;</span>
          <div class="lang-info">
            <span class="lang-name">Korean</span>
            <span class="lang-native">&#54620;&#44397;&#50612;</span>
          </div>
        </div>
        <svg class="check-icon" width="20" height="20" fill="none" stroke="#021A54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="lang-item">
        <div class="lang-left">
          <span class="lang-flag">&#127483;&#127475;</span>
          <div class="lang-info">
            <span class="lang-name">Vietnamese</span>
            <span class="lang-native">Ti&#7871;ng Vi&#7879;t</span>
          </div>
        </div>
        <svg class="check-icon" width="20" height="20" fill="none" stroke="#021A54" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
