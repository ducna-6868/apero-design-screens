<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Setup Brand Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px 0;
    height: 54px;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #FFFFFF; letter-spacing: 0.5px; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { fill: #FFFFFF; }

  .header {
    padding: 12px 24px 0;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 15px;
    color: #8E8E93;
    line-height: 1.4;
  }

  .form-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Logo upload */
  .logo-upload {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .logo-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 2px dashed #2A2A2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
    background: #161618;
  }
  .logo-circle:hover { border-color: #00C9A7; }
  .logo-circle .cam-icon { font-size: 28px; opacity: 0.5; }
  .logo-hint {
    font-size: 13px;
    color: #636366;
    text-align: center;
  }
  .logo-formats {
    font-size: 11px;
    color: #4A4A4E;
  }

  /* Form fields */
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-label {
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
  }
  .field-label .required { color: #FF453A; }
  .field-input {
    height: 48px;
    background: #1C1C1E;
    border: 1.5px solid #2A2A2E;
    border-radius: 12px;
    padding: 0 16px;
    font-size: 16px;
    color: #FFFFFF;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .field-input::placeholder { color: #636366; }
  .field-input:focus { border-color: #00C9A7; }
  .field-input.error { border-color: #FF453A; }
  .field-error {
    font-size: 12px;
    color: #FF453A;
    display: none;
  }
  .field-input.error + .field-error { display: block; }

  /* Color field */
  .color-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .color-preview {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #8E8E93;
    border: 1.5px solid #2A2A2E;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .color-preview:hover { border-color: #00C9A7; }
  .hex-input {
    flex: 1;
    height: 48px;
    background: #1C1C1E;
    border: 1.5px solid #2A2A2E;
    border-radius: 12px;
    padding: 0 16px;
    font-size: 16px;
    color: #FFFFFF;
    outline: none;
    font-family: monospace;
    transition: border-color 0.2s;
  }
  .hex-input:focus { border-color: #00C9A7; }
  .hex-input::placeholder { color: #636366; }

  /* Textarea */
  .field-textarea {
    height: 100px;
    background: #1C1C1E;
    border: 1.5px solid #2A2A2E;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    color: #FFFFFF;
    outline: none;
    resize: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .field-textarea::placeholder { color: #636366; }
  .field-textarea:focus { border-color: #00C9A7; }
  .char-counter {
    text-align: right;
    font-size: 12px;
    color: #636366;
    margin-top: -4px;
  }

  /* Bottom */
  .bottom-area {
    flex-shrink: 0;
    padding: 16px 24px 40px;
  }
  .continue-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    color: #FFFFFF;
    font-size: 17px;
    font-weight: 600;
    cursor: not-allowed;
    letter-spacing: 0.3px;
    opacity: 0.4;
    transition: opacity 0.3s, transform 0.15s;
  }
  .continue-btn.enabled {
    opacity: 1;
    cursor: pointer;
  }
  .continue-btn.enabled:active { transform: scale(0.97); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.35"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 3.6c1.8 0 3.4.7 4.6 1.9l1.1-1.1C12.1 2.8 10.1 2 8 2S3.9 2.8 2.3 4.4l1.1 1.1C4.6 4.3 6.2 3.6 8 3.6zm0 3.2c1 0 2 .4 2.7 1.1l1.1-1.1C10.6 5.6 9.4 5.2 8 5.2s-2.6.4-3.8 1.6l1.1 1.1C6 6.8 7 6.8 8 6.8zM9.4 9.4L8 11l-1.4-1.6c.4-.4.9-.6 1.4-.6s1 .2 1.4.6z"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#FFFFFF" stroke-width="1" fill="none"/><rect x="23" y="4" width="2" height="4" rx="0.5" fill="#FFFFFF" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#FFFFFF"/></svg>
    </div>
  </div>

  <div class="header">
    <h1>Set Up Your Brand</h1>
    <p>Personalize your content with your brand identity</p>
  </div>

  <div class="form-area">
    <!-- Logo Upload -->
    <div class="logo-upload">
      <div class="logo-circle">
        <span class="cam-icon">&#128247;</span>
      </div>
      <span class="logo-hint">Upload Logo</span>
      <span class="logo-formats">JPG, PNG, WEBP &middot; Max 5MB</span>
    </div>

    <!-- Brand Name -->
    <div class="field">
      <label class="field-label">Brand Name <span class="required">*</span></label>
      <input type="text" class="field-input error" placeholder="Enter brand name" value="">
      <span class="field-error">Brand name is required</span>
    </div>

    <!-- Brand Color -->
    <div class="field">
      <label class="field-label">Brand Color</label>
      <div class="color-row">
        <div class="color-preview"></div>
        <input type="text" class="hex-input" placeholder="#000000" value="">
      </div>
    </div>

    <!-- Description -->
    <div class="field">
      <label class="field-label">Description</label>
      <textarea class="field-textarea" placeholder="Describe your brand..."></textarea>
      <div class="char-counter">0/300</div>
    </div>
  </div>

  <div class="bottom-area">
    <button class="continue-btn">Continue</button>
  </div>
</div>
</body>
</html>
