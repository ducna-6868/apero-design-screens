<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>CreatorAI - Setup Brand Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px;
  background: #F9FAFB;
  font-family: 'DM Sans', sans-serif;
  color: #374151; overflow: hidden;
  display: flex; flex-direction: column;
}
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
.status-bar .time { font-size: 15px; font-weight: 700; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
.status-icons { display: flex; gap: 6px; align-items: center; }

.header { padding: 12px 24px 0; flex-shrink: 0; }
.header h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 28px; font-weight: 700;
  color: #021A54; margin-bottom: 6px;
}
.header p {
  font-size: 15px; color: #6B7280; line-height: 1.4;
}

.form-area {
  flex: 1; overflow-y: auto;
  padding: 28px 24px 0;
  display: flex; flex-direction: column; gap: 24px;
}

/* Logo upload */
.logo-upload {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.logo-circle {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 1.5px dashed #FF85BB;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; background: #FFFFFF;
}
.logo-circle:hover { border-color: #021A54; }
.cam-icon { color: #FF85BB; }
.logo-hint {
  font-size: 13px; color: #6B7280; text-align: center;
}
.logo-formats {
  font-size: 11px; color: #9CA3AF;
}

/* Form fields */
.field { display: flex; flex-direction: column; gap: 8px; }
.field-label {
  font-size: 14px; font-weight: 600;
  color: #021A54;
}
.field-label .required { color: #FF85BB; }
.field-input {
  height: 48px;
  background: #FFFFFF;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  padding: 0 16px;
  font-size: 15px;
  color: #374151;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field-input::placeholder { color: #9CA3AF; }
.field-input:focus {
  border-color: #FF85BB;
  box-shadow: 0 0 0 3px rgba(255,133,187,0.25);
}

/* Color field */
.color-row {
  display: flex; align-items: center; gap: 12px;
}
.color-preview {
  width: 48px; height: 48px;
  border-radius: 8px;
  background: #6B7280;
  border: 0.5px solid rgba(0,0,0,0.08);
  flex-shrink: 0; cursor: pointer;
}
.hex-input {
  flex: 1; height: 48px;
  background: #FFFFFF;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  padding: 0 16px;
  font-size: 15px;
  color: #374151;
  outline: none;
  font-family: 'DM Sans', monospace;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.hex-input:focus {
  border-color: #FF85BB;
  box-shadow: 0 0 0 3px rgba(255,133,187,0.25);
}
.hex-input::placeholder { color: #9CA3AF; }

/* Textarea */
.field-textarea {
  height: 100px;
  background: #FFFFFF;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 15px;
  color: #374151;
  outline: none;
  resize: none;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field-textarea::placeholder { color: #9CA3AF; }
.field-textarea:focus {
  border-color: #FF85BB;
  box-shadow: 0 0 0 3px rgba(255,133,187,0.25);
}
.char-counter {
  text-align: right;
  font-size: 12px;
  color: #9CA3AF;
  margin-top: -4px;
}

/* Bottom */
.bottom-area {
  flex-shrink: 0;
  padding: 16px 24px 44px;
}
.continue-btn {
  width: 100%; height: 50px;
  border: none; border-radius: 8px;
  background: #021A54;
  color: #FFFFFF;
  font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: not-allowed;
  opacity: 0.4;
  transition: opacity 0.3s;
}
.continue-btn.enabled {
  opacity: 1; cursor: pointer;
}
</style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>Set Up Your Brand</h1>
    <p>Personalize your content with your brand identity</p>
  </div>

  <!-- Form -->
  <div class="form-area">
    <!-- Logo Upload -->
    <div class="logo-upload">
      <div class="logo-circle">
        <svg class="cam-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF85BB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <span class="logo-hint">Upload Logo</span>
      <span class="logo-formats">JPG, PNG, WEBP &middot; Max 5MB</span>
    </div>

    <!-- Brand Name -->
    <div class="field">
      <label class="field-label">Brand Name <span class="required">*</span></label>
      <input type="text" class="field-input" placeholder="Enter brand name">
    </div>

    <!-- Brand Color -->
    <div class="field">
      <label class="field-label">Brand Color</label>
      <div class="color-row">
        <div class="color-preview"></div>
        <input type="text" class="hex-input" placeholder="#000000">
      </div>
    </div>

    <!-- Description -->
    <div class="field">
      <label class="field-label">Description</label>
      <textarea class="field-textarea" placeholder="Describe your brand..."></textarea>
      <div class="char-counter">0/300</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-area">
    <button class="continue-btn">Continue</button>
  </div>
</body>
</html>
