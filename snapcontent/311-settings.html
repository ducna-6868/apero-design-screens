<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px 12px; flex-shrink: 0;
  }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54;
  }

  .content {
    flex: 1; overflow-y: auto; padding: 0 24px 40px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .section-label {
    font-size: 13px; font-weight: 600; color: #6B7280;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  }

  .settings-card {
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; overflow: hidden;
  }
  .setting-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; cursor: pointer;
  }
  .setting-item:not(:last-child) { border-bottom: 0.5px solid rgba(0,0,0,0.06); }
  .setting-label { font-size: 15px; font-weight: 500; color: #021A54; }
  .setting-right { display: flex; align-items: center; gap: 8px; }
  .setting-value { font-size: 14px; color: #6B7280; }

  .toggle {
    width: 44px; height: 26px; border-radius: 13px; background: #E5E7EB;
    position: relative; cursor: pointer;
  }
  .toggle.on { background: #021A54; }
  .toggle-knob {
    width: 22px; height: 22px; border-radius: 50%; background: #FFFFFF;
    position: absolute; top: 2px; left: 2px; transition: transform 0.2s;
  }
  .toggle.on .toggle-knob { transform: translateX(18px); }

  .setting-item.danger .setting-label { color: #EF4444; font-weight: 600; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">
    <button class="back-btn">
      <svg width="24" height="24" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1>Settings</h1>
  </div>

  <div class="content">
    <!-- General -->
    <div>
      <div class="section-label">General</div>
      <div class="settings-card">
        <div class="setting-item">
          <span class="setting-label">Language</span>
          <div class="setting-right">
            <span class="setting-value">English</span>
            <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
          </div>
        </div>
        <div class="setting-item">
          <span class="setting-label">Notifications</span>
          <div class="setting-right">
            <div class="toggle on"><div class="toggle-knob"></div></div>
          </div>
        </div>
        <div class="setting-item">
          <span class="setting-label">Dark Mode</span>
          <div class="setting-right">
            <div class="toggle"><div class="toggle-knob"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div>
      <div class="section-label">Content</div>
      <div class="settings-card">
        <div class="setting-item">
          <span class="setting-label">Default Style</span>
          <div class="setting-right">
            <span class="setting-value">Professional</span>
            <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
          </div>
        </div>
        <div class="setting-item">
          <span class="setting-label">Output Quality</span>
          <div class="setting-right">
            <span class="setting-value">High</span>
            <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Account -->
    <div>
      <div class="section-label">Account</div>
      <div class="settings-card">
        <div class="setting-item">
          <span class="setting-label">Subscription</span>
          <div class="setting-right">
            <span class="setting-value">Pro</span>
            <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
          </div>
        </div>
        <div class="setting-item">
          <span class="setting-label">Privacy</span>
          <div class="setting-right">
            <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
          </div>
        </div>
        <div class="setting-item">
          <span class="setting-label">Terms</span>
          <div class="setting-right">
            <svg width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Danger -->
    <div>
      <div class="section-label">Danger Zone</div>
      <div class="settings-card">
        <div class="setting-item danger">
          <span class="setting-label">Log Out</span>
          <div class="setting-right">
            <svg width="16" height="16" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 3 6 6-6 6"/></svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
