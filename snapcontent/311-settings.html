<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>311 — Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
  }
  .status-bar-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar-right svg { width: 16px; height: 16px; fill: #FFFFFF; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 8px 16px 16px;
    gap: 12px;
  }
  .back-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .back-btn svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: #FFFFFF;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 0 16px;
    overflow-y: auto;
  }

  /* Settings Group */
  .settings-group {
    background: #1C1C1E;
    border-radius: 16px;
    overflow: hidden;
  }
  .settings-item {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 56px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .settings-item:hover {
    background: rgba(255,255,255,0.04);
  }
  .settings-item + .settings-item {
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .settings-icon {
    font-size: 22px;
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .settings-label {
    flex: 1;
    font-size: 16px;
    color: #FFFFFF;
    margin-left: 4px;
  }
  .settings-value {
    font-size: 15px;
    color: #8E8E93;
    margin-right: 8px;
  }
  .settings-arrow {
    color: #636366;
    font-size: 18px;
    flex-shrink: 0;
  }
  .settings-arrow svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #636366;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Version */
  .version-text {
    text-align: center;
    color: #636366;
    font-size: 13px;
    padding: 32px 0;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-bar-right">
      <svg viewBox="0 0 16 16"><path d="M1 10c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v4c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1v-4zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v7c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1V7zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v10c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V4zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v13c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V1z"/></svg>
      <svg viewBox="0 0 16 16"><path d="M8 3c3 0 5.5 1.5 7 4-1.5 2.5-4 4-7 4s-5.5-1.5-7-4c1.5-2.5 4-4 7-4z" fill="none" stroke="#fff" stroke-width="1.2"/><circle cx="8" cy="7" r="2" fill="#fff"/></svg>
      <svg viewBox="0 0 24 12"><rect x="0" y="0" width="22" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1.2"/><rect x="2" y="2" width="14" height="8" rx="1" fill="#34C759"/><rect x="23" y="3.5" width="1.5" height="5" rx="0.5" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <span class="header-title">Settings</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="settings-group">
      <!-- Language -->
      <div class="settings-item">
        <div class="settings-icon">🌐</div>
        <span class="settings-label">Language</span>
        <span class="settings-value">English</span>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>
      <!-- Manage Subscription -->
      <div class="settings-item">
        <div class="settings-icon">💎</div>
        <span class="settings-label">Manage Subscription</span>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>
      <!-- Privacy Policy -->
      <div class="settings-item">
        <div class="settings-icon">🔒</div>
        <span class="settings-label">Privacy Policy</span>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>
      <!-- Terms of Service -->
      <div class="settings-item">
        <div class="settings-icon">📄</div>
        <span class="settings-label">Terms of Service</span>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>
    </div>

    <div class="version-text">Version 1.0.0</div>
  </div>
</div>
</body>
</html>
