<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>319 — Logout Confirmation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
  }
  .status-bar-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar-right svg { width: 16px; height: 16px; fill: #FFFFFF; }

  /* Underlying screen (blurred/dimmed Account screen hint) */
  .underlying-screen {
    flex: 1;
    padding: 20px 16px;
    filter: blur(2px);
    opacity: 0.3;
  }
  .underlying-item {
    height: 56px;
    background: #1C1C1E;
    border-radius: 12px;
    margin-bottom: 8px;
  }

  /* Dark Overlay */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 40px;
    z-index: 10;
  }

  /* Modal Card */
  .modal {
    background: #1C1C1E;
    border-radius: 24px;
    padding: 28px;
    max-width: 320px;
    width: calc(100% - 48px);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Warning Icon */
  .warning-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 179, 71, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .warning-icon span {
    color: #FFB347;
    font-size: 24px;
    font-weight: 800;
    line-height: 1;
  }

  /* Title */
  .modal-title {
    font-size: 22px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    margin-bottom: 10px;
  }

  /* Message */
  .modal-message {
    font-size: 14px;
    color: #8E8E93;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  /* Buttons */
  .modal-buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-logout {
    width: 100%;
    height: 48px;
    border-radius: 12px;
    border: none;
    background: #FF453A;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-logout:hover {
    opacity: 0.85;
  }
  .btn-cancel {
    width: 100%;
    height: 48px;
    border-radius: 12px;
    border: none;
    background: transparent;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cancel:hover {
    background: rgba(255,255,255,0.06);
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-bar-right">
      <svg viewBox="0 0 16 16"><path d="M1 10c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v4c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1v-4zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v7c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1V7zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v10c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V4zm4-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v13c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V1z"/></svg>
      <svg viewBox="0 0 16 16"><path d="M8 3c3 0 5.5 1.5 7 4-1.5 2.5-4 4-7 4s-5.5-1.5-7-4c1.5-2.5 4-4 7-4z" fill="none" stroke="#fff" stroke-width="1.2"/><circle cx="8" cy="7" r="2" fill="#fff"/></svg>
      <svg viewBox="0 0 24 12"><rect x="0" y="0" width="22" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1.2"/><rect x="2" y="2" width="14" height="8" rx="1" fill="#34C759"/><rect x="23" y="3.5" width="1.5" height="5" rx="0.5" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Underlying Screen (dimmed) -->
  <div class="underlying-screen">
    <div class="underlying-item"></div>
    <div class="underlying-item"></div>
    <div class="underlying-item"></div>
    <div class="underlying-item"></div>
    <div class="underlying-item"></div>
  </div>

  <!-- Dark Overlay + Modal -->
  <div class="overlay">
    <div class="modal">
      <div class="warning-icon">
        <span>!</span>
      </div>
      <div class="modal-title">Log Out?</div>
      <div class="modal-message">Are you sure you want to log out? You'll need to sign in again to continue.</div>
      <div class="modal-buttons">
        <button class="btn-logout">Log Out</button>
        <button class="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
