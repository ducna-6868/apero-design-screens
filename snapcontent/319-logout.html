<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Logout</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: rgba(0,0,0,0.4);
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-card {
    width: 320px; background: #FFFFFF; border-radius: 12px;
    padding: 32px 24px 24px; display: flex; flex-direction: column;
    align-items: center; gap: 16px;
  }

  .modal-icon {
    width: 64px; height: 64px; border-radius: 50%; background: #FFCEE3;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px;
    font-weight: 700; color: #021A54; text-align: center;
  }

  .modal-body {
    font-size: 15px; color: #374151; text-align: center; line-height: 1.5;
  }

  .modal-actions {
    display: flex; gap: 12px; width: 100%; margin-top: 8px;
  }

  .btn-cancel {
    flex: 1; height: 48px; border: none; border-radius: 8px;
    background: transparent; color: #6B7280; font-size: 15px;
    font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  .btn-logout {
    flex: 1; height: 48px; border: none; border-radius: 8px;
    background: #EF4444; color: #FFFFFF; font-size: 15px;
    font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>
  <div class="modal-card">
    <div class="modal-icon">
      <svg width="28" height="28" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </div>

    <div class="modal-title">Log Out?</div>

    <div class="modal-body">Are you sure you want to log out?</div>

    <div class="modal-actions">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-logout">Log Out</button>
    </div>
  </div>
</body>
</html>
