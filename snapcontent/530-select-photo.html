<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390,height=844,initial-scale=1">
<title>Select Photo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px; background: #F9FAFB;
  font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
  display: flex; flex-direction: column;
}
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 8px; flex-shrink: 0;
}
.status-bar .time {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 15px; color: #021A54;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 24px 16px; flex-shrink: 0;
}
.back-btn {
  width: 36px; height: 36px; border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.header-title {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 20px; color: #021A54;
}
.tab-switcher {
  display: flex; margin: 0 24px 16px; background: #F3F4F6;
  border-radius: 10px; padding: 3px; flex-shrink: 0;
}
.tab {
  flex: 1; text-align: center; padding: 10px 0; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
}
.tab.active { background: #021A54; color: #FFFFFF; }
.tab.inactive { background: transparent; color: #6B7280; }
.photo-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
  padding: 0 24px; flex: 1; overflow-y: auto; align-content: start;
}
.photo-thumb {
  aspect-ratio: 1; border-radius: 8px; position: relative; overflow: hidden;
}
.photo-thumb .gradient {
  width: 100%; height: 100%; border-radius: 8px;
}
.photo-thumb.selected {
  outline: 3px solid #FF85BB; outline-offset: -3px; border-radius: 8px;
}
.check-overlay {
  position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
  background: #FF85BB; border-radius: 50%; display: flex; align-items: center;
  justify-content: center;
}
.demo-section {
  padding: 16px 24px 12px; flex-shrink: 0;
}
.demo-label {
  font-size: 13px; color: #6B7280; margin-bottom: 10px; font-weight: 500;
}
.demo-row { display: flex; gap: 8px; }
.demo-thumb {
  width: 56px; height: 56px; border-radius: 8px;
}
.bottom-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; background: #FFFFFF; flex-shrink: 0;
  border-top: 0.5px solid rgba(0,0,0,0.08);
}
.selected-text { font-size: 14px; color: #6B7280; font-weight: 500; }
.next-btn {
  background: #021A54; color: #FFFFFF; border: none; border-radius: 8px;
  padding: 12px 32px; font-family: 'DM Sans', sans-serif; font-weight: 500;
  font-size: 14px; cursor: pointer;
}
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
  </div>
</div>

<div class="header">
  <button class="back-btn">
    <svg width="24" height="24" fill="none"><path d="M15 19l-7-7 7-7" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <span class="header-title">Select Photo</span>
</div>

<div class="tab-switcher">
  <div class="tab active">Gallery</div>
  <div class="tab inactive">Camera</div>
</div>

<div class="photo-grid">
  <div class="photo-thumb selected">
    <div class="gradient" style="background: linear-gradient(135deg, #FF85BB 0%, #FFD4E8 100%);"></div>
    <div class="check-overlay">
      <svg width="12" height="12" fill="none"><path d="M2 6l3 3 5-5" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #A78BFA 0%, #DDD6FE 100%);"></div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #60A5FA 0%, #BFDBFE 100%);"></div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #34D399 0%, #A7F3D0 100%);"></div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #FBBF24 0%, #FDE68A 100%);"></div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #F87171 0%, #FECACA 100%);"></div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #021A54 0%, #3B82F6 100%);"></div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #EC4899 0%, #F9A8D4 100%);"></div>
  </div>
  <div class="photo-thumb">
    <div class="gradient" style="background: linear-gradient(135deg, #14B8A6 0%, #99F6E4 100%);"></div>
  </div>
</div>

<div class="demo-section">
  <div class="demo-label">Try with demo</div>
  <div class="demo-row">
    <div class="demo-thumb" style="background: linear-gradient(135deg, #FFB86C 0%, #FFE0B2 100%);"></div>
    <div class="demo-thumb" style="background: linear-gradient(135deg, #BD93F9 0%, #E2D1F9 100%);"></div>
    <div class="demo-thumb" style="background: linear-gradient(135deg, #8BE9FD 0%, #D5F5F6 100%);"></div>
  </div>
</div>

<div class="bottom-bar">
  <span class="selected-text">1 selected</span>
  <button class="next-btn">Next</button>
</div>

</body>
</html>
