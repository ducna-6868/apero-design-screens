<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Select Photo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons span { font-size: 12px; color: #FFFFFF; }

  .header {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 16px;
    flex-shrink: 0;
  }
  .back-arrow {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .back-arrow svg { width: 20px; height: 20px; }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .tab-switcher {
    display: flex;
    margin: 8px 20px 16px;
    background: #161618;
    border-radius: 12px;
    padding: 4px;
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #8E8E93;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: #1C1C1E;
    color: #FFFFFF;
  }

  .photo-grid-container {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .photo-thumb:nth-child(1) { background: linear-gradient(135deg, #667eea, #764ba2); }
  .photo-thumb:nth-child(2) { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .photo-thumb:nth-child(3) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .photo-thumb:nth-child(4) { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .photo-thumb:nth-child(5) { background: linear-gradient(135deg, #fa709a, #fee140); }
  .photo-thumb:nth-child(6) { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  .photo-thumb:nth-child(7) { background: linear-gradient(135deg, #fccb90, #d57eeb); }
  .photo-thumb:nth-child(8) { background: linear-gradient(135deg, #e0c3fc, #8ec5fc); }
  .photo-thumb:nth-child(9) { background: linear-gradient(135deg, #f5576c, #ff6a00); }

  .check-overlay {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    background: #007AFF;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #FFFFFF;
  }
  .check-overlay svg { width: 14px; height: 14px; }

  .selected-ring {
    position: absolute;
    inset: 0;
    border: 3px solid #007AFF;
    border-radius: 8px;
    pointer-events: none;
  }

  .demo-section {
    padding: 20px 0 8px;
  }
  .demo-label {
    font-size: 14px;
    font-weight: 500;
    color: #8E8E93;
    margin-bottom: 12px;
  }
  .demo-row {
    display: flex;
    gap: 10px;
  }
  .demo-thumb {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .demo-thumb:nth-child(1) { background: linear-gradient(135deg, #00C9A7, #845EC2); }
  .demo-thumb:nth-child(2) { background: linear-gradient(135deg, #FFB347, #FF6B6B); }
  .demo-thumb:nth-child(3) { background: linear-gradient(135deg, #845EC2, #4facfe); }

  .bottom-bar {
    padding: 16px 20px;
    padding-bottom: 36px;
    background: #161618;
    border-top: 1px solid #2A2A2E;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .photo-count {
    font-size: 14px;
    color: #8E8E93;
  }
  .next-btn {
    padding: 12px 40px;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    border: none;
    border-radius: 26px;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#8226;</span>
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity="0.3"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity="0.5"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity="0.7"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="#fff"><rect x="0" y="0" width="22" height="12" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="2" y="2" width="15" height="8" rx="1" fill="#34C759"/><rect x="23" y="4" width="2" height="4" rx="0.5"/></svg>
    </div>
  </div>

  <div class="header">
    <div class="back-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <span class="header-title">Select Photo</span>
  </div>

  <div class="tab-switcher">
    <div class="tab active">Gallery</div>
    <div class="tab">Camera</div>
  </div>

  <div class="photo-grid-container">
    <div class="photo-grid">
      <div class="photo-thumb">
        <div class="selected-ring"></div>
        <div class="check-overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <div class="photo-thumb"></div>
      <div class="photo-thumb"></div>
      <div class="photo-thumb"></div>
      <div class="photo-thumb"></div>
      <div class="photo-thumb"></div>
      <div class="photo-thumb"></div>
      <div class="photo-thumb"></div>
      <div class="photo-thumb"></div>
    </div>

    <div class="demo-section">
      <div class="demo-label">Try with demo</div>
      <div class="demo-row">
        <div class="demo-thumb"></div>
        <div class="demo-thumb"></div>
        <div class="demo-thumb"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="photo-count">1 selected</span>
    <button class="next-btn">Next</button>
  </div>
</div>
</body>
</html>
