<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorAI — Generate Subscription</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 390px;
    height: 844px;
    background: #F9FAFB;
    font-family: 'DM Sans', sans-serif;
    color: #374151;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 700;
    color: #021A54;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Navigation Header */
  .nav-header {
    display: flex;
    align-items: center;
    padding: 8px 20px 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  .back-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .back-btn svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: #021A54;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .nav-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #021A54;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 24px 34px;
    overflow-y: auto;
  }
  .content::-webkit-scrollbar { display: none; }

  /* Section Header */
  .section-header {
    text-align: center;
    margin-bottom: 8px;
  }
  .section-header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #021A54;
  }
  .section-subtitle {
    text-align: center;
    font-size: 15px;
    color: #6B7280;
    margin-bottom: 24px;
  }

  /* Usage Indicator */
  .usage-card {
    background: #FFFFFF;
    border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .usage-label {
    font-size: 14px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 10px;
  }
  .progress-bar-track {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: #F3F4F6;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    background: #021A54;
  }
  .usage-text {
    font-size: 13px;
    color: #EF4444;
    font-weight: 500;
  }

  .spacer { flex: 1; }

  /* Package Cards */
  .packages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .package-card {
    display: flex;
    align-items: center;
    padding: 16px 18px;
    border-radius: 12px;
    background: #FFFFFF;
    border: 0.5px solid rgba(0,0,0,0.08);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .package-card.selected {
    border: 2px solid #021A54;
    background: rgba(2,26,84,0.04);
  }
  .radio {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.15);
    margin-right: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .package-card.selected .radio {
    border-color: #021A54;
  }
  .radio-inner {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #021A54;
    transform: scale(0);
    transition: transform 0.2s;
  }
  .package-card.selected .radio-inner {
    transform: scale(1);
  }
  .package-info { flex: 1; }
  .package-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #021A54;
  }
  .package-price {
    font-size: 13px;
    color: #6B7280;
    margin-top: 2px;
  }
  .best-value-badge {
    padding: 4px 10px;
    border-radius: 8px;
    background: #021A54;
    font-size: 10px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* CTA Button */
  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 8px;
    background: #021A54;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 14px;
  }

  /* Restore link */
  .restore-link {
    text-align: center;
    font-size: 13px;
    color: #9CA3AF;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    display: block;
    margin: 0 auto;
  }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 10.5h2v4H1zM5 8h2v6.5H5zM9 5.5h2v9H9zM13 2.5h2v12h-2z" fill="#021A54"/></svg>
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 3C4.5 3 1.5 5 0 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5zm0 8.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z" fill="#021A54"/></svg>
    <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="4" width="12" height="8" rx="1.5" stroke="#021A54" stroke-width="1.2" fill="none"/><rect x="13.5" y="6.5" width="1.5" height="3" rx="0.5" fill="#021A54"/><rect x="2.5" y="5.5" width="7" height="5" rx="0.5" fill="#021A54"/></svg>
  </div>
</div>

<!-- Navigation Header -->
<div class="nav-header">
  <button class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="nav-title">Subscribe</span>
</div>

<div class="content">
  <!-- Section Header -->
  <div class="section-header">
    <h1>Unlock AI Generation</h1>
  </div>
  <p class="section-subtitle">You've used all free generations</p>

  <!-- Usage Indicator -->
  <div class="usage-card">
    <div class="usage-label">Generation Usage</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill"></div>
    </div>
    <div class="usage-text">0 of 3 free generations remaining</div>
  </div>

  <div class="spacer"></div>

  <!-- Packages -->
  <div class="packages">
    <div class="package-card" onclick="selectPackage(this)">
      <div class="radio"><div class="radio-inner"></div></div>
      <div class="package-info">
        <div class="package-label">Weekly</div>
        <div class="package-price">$9.99/week</div>
      </div>
    </div>
    <div class="package-card selected" onclick="selectPackage(this)">
      <div class="radio"><div class="radio-inner"></div></div>
      <div class="package-info">
        <div class="package-label">Yearly</div>
        <div class="package-price">$49.99/year</div>
      </div>
      <span class="best-value-badge">BEST VALUE</span>
    </div>
  </div>

  <!-- CTA -->
  <button class="cta-btn">Subscribe Now</button>

  <!-- Restore -->
  <button class="restore-link">Restore Purchase</button>
</div>

<script>
  function selectPackage(card) {
    document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
  }
</script>
</body>
</html>
