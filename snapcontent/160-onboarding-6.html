<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>CreatorAI - Onboarding 6</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px; height: 844px;
  background: #F9FAFB;
  font-family: 'DM Sans', sans-serif;
  color: #374151; overflow: hidden;
  display: flex; flex-direction: column;
}
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
.status-bar .time { font-size: 15px; font-weight: 700; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
.status-icons { display: flex; gap: 6px; align-items: center; }

.hero {
  width: 100%; height: 240px; flex-shrink: 0;
  background: linear-gradient(160deg, #021A54 0%, #FF85BB 50%, #FFCEE3 100%);
  display: flex; align-items: center; justify-content: center;
}
.hero-icon {
  width: 100px; height: 100px; border-radius: 24px;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
}

.text-section { padding: 32px 24px 0; flex-shrink: 0; }
.text-section h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px; font-weight: 700;
  color: #021A54; line-height: 1.35;
  margin-bottom: 10px;
}
.text-section p {
  font-size: 15px; color: #6B7280; line-height: 1.5;
}

.bottom-section {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 0 24px 16px;
}
.get-started-btn {
  width: 100%; height: 50px; border: none;
  border-radius: 8px; background: #021A54;
  color: #FFFFFF; font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}

.progress-dots {
  display: flex; justify-content: center;
  gap: 8px; padding: 12px 0 40px; flex-shrink: 0;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #E8EBF5;
}
.dot.active {
  width: 24px; border-radius: 4px;
  background: #021A54;
}
</style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
  </div>

  <!-- Text -->
  <div class="text-section">
    <h1>Start Creating Today</h1>
    <p>Join thousands of creators using AI to grow their business</p>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <button class="get-started-btn">Get Started</button>
  </div>

  <!-- Progress Dots -->
  <div class="progress-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>
</body>
</html>
