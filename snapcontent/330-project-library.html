<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Project Library</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #F9FAFB;
    font-family: 'DM Sans', sans-serif; color: #374151; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; height: 54px; flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 600; color: #021A54; font-family: 'Plus Jakarta Sans', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px 12px; flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px;
    font-weight: 700; color: #021A54;
  }
  .new-btn {
    background: #FF85BB; color: #021A54; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-tabs {
    display: flex; gap: 8px; padding: 0 24px 16px; flex-shrink: 0;
  }
  .filter-tab {
    padding: 8px 16px; border-radius: 999px; font-size: 14px; font-weight: 500;
    cursor: pointer; background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08); color: #6B7280;
  }
  .filter-tab.active {
    background: rgba(255,133,187,0.15); border: 0.5px solid #FF85BB;
    color: #021A54; font-weight: 600;
  }

  .project-list {
    flex: 1; overflow-y: auto; padding: 0 24px 100px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .project-card {
    background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 12px; padding: 16px;
    display: flex; align-items: center; gap: 14px; cursor: pointer;
  }

  .project-thumb {
    width: 80px; height: 80px; border-radius: 8px; flex-shrink: 0;
    border: 0.5px solid rgba(0,0,0,0.08);
  }
  .project-card:nth-child(1) .project-thumb { background: linear-gradient(135deg, #667eea, #764ba2); }
  .project-card:nth-child(2) .project-thumb { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .project-card:nth-child(3) .project-thumb { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .project-card:nth-child(4) .project-thumb { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .project-card:nth-child(5) .project-thumb { background: linear-gradient(135deg, #fa709a, #fee140); }

  .project-info { flex: 1; min-width: 0; }
  .project-name {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px;
    font-weight: 600; color: #021A54; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .project-meta { font-size: 13px; color: #6B7280; }

  .more-btn { background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; width: 390px; height: 84px;
    background: #FFFFFF; border-top: 0.5px solid rgba(0,0,0,0.08);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: none; border: none; }
  .tab-label { font-size: 11px; color: #6B7280; font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .tab-item.active .tab-label { color: #021A54; font-weight: 600; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" fill="#021A54"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#021A54"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#021A54" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#021A54" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="#021A54" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#021A54"/></svg>
    </div>
  </div>

  <div class="header">

    <button class="new-btn">+ New</button>

  <div class="filter-tabs">
    <span class="filter-tab active">All</span>

  <div class="project-list">

    </div>

    <div class="project-card">
      <div class="project-thumb"></div>

      <button class="more-btn">
        <svg width="20" height="20" fill="#9CA3AF" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      </button>
    </div>

    <div class="project-card">
      <div class="project-thumb"></div>
      <div class="project-info">
        <div class="project-name">Holiday Promo</div>
        <div class="project-meta">15 items &middot; Updated 2w ago</div>
      </div>
      <button class="more-btn">
        <svg width="20" height="20" fill="#9CA3AF" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      </button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-item">
      <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

    </button>
    <button class="tab-item active">
      <svg width="22" height="22" fill="none" stroke="#021A54" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>

    <button class="tab-item">

  </div>
</body>
</html>
