<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent — Project Library</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; background: #0A0A0C; border-radius: 40px;
    overflow: hidden; position: relative; border: 3px solid #2C2C2E;
    display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 8px; flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #FFF; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; fill: #FFF; }

  /* Header */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px 4px; flex-shrink: 0;
  }
  .page-title { font-size: 28px; font-weight: 800; color: #FFF; }
  .sort-btn {
    width: 36px; height: 36px; background: #1C1C1E; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .sort-btn svg { width: 18px; height: 18px; fill: #8E8E93; }

  /* Filter Tabs */
  .filter-tabs {
    display: flex; gap: 0; padding: 16px 20px 16px; flex-shrink: 0;
  }
  .filter-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 13px;
    font-weight: 600; color: #636366; cursor: pointer;
    border-bottom: 2px solid #2C2C2E;
  }
  .filter-tab.active {
    color: #FFF;
    border-bottom: 2px solid;
    border-image: linear-gradient(135deg, #00C9A7, #845EC2) 1;
  }

  /* Grid */
  .grid-content {
    flex: 1; overflow-y: auto; padding: 0 20px 20px;
  }
  .grid-content::-webkit-scrollbar { display: none; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }

  /* Project Card */
  .project-card { cursor: pointer; }
  .project-thumb {
    width: 100%; height: 170px; border-radius: 16px; position: relative;
    overflow: hidden;
  }
  .project-thumb .thumb-icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    opacity: 0.2;
  }
  .project-thumb .thumb-icon svg { width: 44px; height: 44px; fill: #FFF; }
  .project-thumb .type-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    color: #FFF; font-size: 10px; font-weight: 700;
    padding: 4px 8px; border-radius: 6px;
  }
  .project-thumb .status-dot {
    position: absolute; top: 10px; right: 10px;
    width: 8px; height: 8px; border-radius: 50%;
  }
  .status-complete { background: #00C9A7; }
  .status-draft { background: #FFD700; }
  .project-label {
    font-size: 13px; font-weight: 600; color: #FFF; margin-top: 8px;
  }
  .project-date {
    font-size: 11px; color: #636366; margin-top: 2px;
  }

  /* Gradient classes */
  .pg1 { background: linear-gradient(135deg, #00C9A7, #0077B6); }
  .pg2 { background: linear-gradient(135deg, #845EC2, #D65DB1); }
  .pg3 { background: linear-gradient(135deg, #FF6B35, #D62828); }
  .pg4 { background: linear-gradient(135deg, #0077B6, #845EC2); }

  /* Empty state helper */
  .projects-count {
    font-size: 13px; color: #636366; padding: 0 0 14px;
  }

  /* Bottom Tab Bar */
  .tab-bar {
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0 30px; background: #161618; flex-shrink: 0;
    border-top: 1px solid #2C2C2E;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
  }
  .tab-item svg { width: 24px; height: 24px; }
  .tab-item .tab-icon-default { fill: #636366; }
  .tab-item.active .tab-icon-default { fill: url(#tabGrad); }
  .tab-label { font-size: 10px; color: #636366; font-weight: 500; }
  .tab-item.active .tab-label {
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; font-weight: 600;
  }

  .home-indicator {
    width: 134px; height: 5px; background: #636366; border-radius: 3px;
    margin: 0 auto 8px;
  }
</style>
</head>
<body>

<div class="phone">
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="tabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00C9A7"/>
        <stop offset="100%" stop-color="#845EC2"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="page-header">
    <span class="page-title">My Projects</span>
    <div class="sort-btn">
      <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <div class="filter-tab active">All</div>
    <div class="filter-tab">Images</div>
    <div class="filter-tab">Videos</div>
    <div class="filter-tab">Content</div>
  </div>

  <!-- Grid -->
  <div class="grid-content">
    <div class="projects-count">4 projects</div>
    <div class="grid">
      <div class="project-card">
        <div class="project-thumb pg1">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
          <span class="type-badge">IMAGE</span>
          <span class="status-dot status-complete"></span>
        </div>
        <div class="project-label">Summer Collection Shoot</div>
        <div class="project-date">Mar 25, 2026</div>
      </div>
      <div class="project-card">
        <div class="project-thumb pg2">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg></div>
          <span class="type-badge">CONTENT</span>
          <span class="status-dot status-complete"></span>
        </div>
        <div class="project-label">Instagram Captions Pack</div>
        <div class="project-date">Mar 22, 2026</div>
      </div>
      <div class="project-card">
        <div class="project-thumb pg3">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
          <span class="type-badge">VIDEO</span>
          <span class="status-dot status-draft"></span>
        </div>
        <div class="project-label">Product Launch Teaser</div>
        <div class="project-date">Mar 20, 2026</div>
      </div>
      <div class="project-card">
        <div class="project-thumb pg4">
          <div class="thumb-icon"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-4L5 16h14l-3.8-5z"/></svg></div>
          <span class="type-badge">IMAGE</span>
          <span class="status-dot status-complete"></span>
        </div>
        <div class="project-label">Flat Lay Accessories</div>
        <div class="project-date">Mar 18, 2026</div>
      </div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path class="tab-icon-default" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="tab-label">Home</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path class="tab-icon-default" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      <span class="tab-label">Explore</span>
    </div>
    <div class="tab-item active">
      <svg viewBox="0 0 24 24"><path class="tab-icon-default" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
      <span class="tab-label">Library</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24"><path class="tab-icon-default" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span class="tab-label">Account</span>
    </div>
  </div>
  <div class="home-indicator"></div>
</div>

</body>
</html>
