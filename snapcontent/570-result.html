<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapContent - Result</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0C;
    border-radius: 40px;
    box-shadow: 0 0 0 2px #2A2A2E, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #FFFFFF; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }

  .header {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 16px;
    flex-shrink: 0;
  }
  .back-arrow {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .back-arrow svg { width: 20px; height: 20px; }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    color: #FFFFFF;
    flex: 1;
  }
  .share-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
  }

  .comparison-view {
    width: 100%;
    height: 340px;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
  }
  .before-side {
    width: 50%;
    height: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    position: relative;
  }
  .after-side {
    width: 50%;
    height: 100%;
    background: linear-gradient(135deg, #00C9A7, #845EC2);
    position: relative;
  }
  .before-label, .after-label {
    position: absolute;
    bottom: 12px;
    font-size: 12px;
    font-weight: 600;
    color: #FFFFFF;
    background: rgba(0,0,0,0.5);
    padding: 4px 10px;
    border-radius: 8px;
  }
  .before-label { left: 12px; }
  .after-label { right: 12px; }
  .slider-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 3px;
    background: #FFFFFF;
    z-index: 2;
  }
  .slider-handle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #FFFFFF;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
  }
  .slider-handle svg { width: 18px; height: 18px; }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    background: #1C1C1E;
    border: 1px solid #2A2A2E;
    border-radius: 14px;
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .action-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .enhance-section {
    margin-top: 20px;
  }
  .enhance-label {
    font-size: 14px;
    font-weight: 600;
    color: #8E8E93;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .enhance-row {
    display: flex;
    gap: 10px;
  }
  .enhance-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: #161618;
    border: 1px solid #2A2A2E;
    border-radius: 24px;
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .enhance-chip svg { width: 16px; height: 16px; flex-shrink: 0; }

  .toast {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1C1C1E;
    border: 1px solid #34C759;
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #34C759;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .toast-icon svg { width: 12px; height: 12px; }
  .toast-text {
    font-size: 14px;
    color: #FFFFFF;
    font-weight: 500;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity="0.3"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity="0.5"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity="0.7"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="#fff"><rect x="0" y="0" width="22" height="12" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="2" y="2" width="15" height="8" rx="1" fill="#34C759"/><rect x="23" y="4" width="2" height="4" rx="0.5"/></svg>
    </div>
  </div>

  <div class="header">
    <div class="back-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <span class="header-title">Result</span>
    <div class="share-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </div>
  </div>

  <div class="content">
    <div class="comparison-view">
      <div class="before-side">
        <span class="before-label">Before</span>
      </div>
      <div class="after-side">
        <span class="after-label">After</span>
      </div>
      <div class="slider-line"></div>
      <div class="slider-handle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0A0A0C" stroke-width="2.5" stroke-linecap="round">
          <polyline points="9 6 5 12 9 18"/>
          <polyline points="15 6 19 12 15 18"/>
        </svg>
      </div>
    </div>

    <div class="action-row">
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
        Regenerate
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        Share
      </button>
    </div>

    <div class="enhance-section">
      <div class="enhance-label">Enhance</div>
      <div class="enhance-row">
        <button class="enhance-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="#00C9A7" stroke-width="2" stroke-linecap="round">
            <path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/>
          </svg>
          Upscale 2x
        </button>
        <button class="enhance-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="#845EC2" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/>
          </svg>
          Remove BG
        </button>
        <button class="enhance-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FFB347" stroke-width="2" stroke-linecap="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          Add Text
        </button>
      </div>
    </div>
  </div>

  <div class="toast">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <span class="toast-text">Download successful</span>
  </div>
</div>
</body>
</html>
