<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorAI — Last Chance Paywall</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 390px;
    height: 844px;
    background: #F9FAFB;
    font-family: 'DM Sans', sans-serif;
    color: #374151;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 700;
    color: #021A54;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Close button */
  .close-btn {
    position: absolute;
    top: 50px;
    right: 20px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #F3F4F6;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .close-btn svg {
    width: 14px;
    height: 14px;
    stroke: #6B7280;
    stroke-width: 2.5;
    stroke-linecap: round;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 24px 34px;
    overflow-y: auto;
    position: relative;
  }
  .content::-webkit-scrollbar { display: none; }

  /* Icon */
  .offer-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #FFCEE3;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 32px;
    margin-bottom: 24px;
    font-size: 36px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #021A54;
  }
  .subtitle {
    text-align: center;
    font-size: 16px;
    color: #6B7280;
    margin-bottom: 28px;
  }

  /* Timer */
  .timer {
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: #FF85BB;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }
  .timer svg {
    width: 16px;
    height: 16px;
    stroke: #FF85BB;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  .spacer { flex: 1; }

  /* Package Card */
  .package-card {
    width: 100%;
    padding: 20px;
    border-radius: 12px;
    background: rgba(2,26,84,0.04);
    border: 2px solid #021A54;
    cursor: pointer;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
  }
  .radio {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #021A54;
    margin-right: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .radio-inner {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #021A54;
  }
  .package-info { flex: 1; }
  .package-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #021A54;
  }
  .package-price {
    font-size: 14px;
    color: #021A54;
    font-weight: 600;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .price-original {
    font-size: 13px;
    color: #9CA3AF;
    text-decoration: line-through;
    font-weight: 400;
  }
  .discount-badge {
    padding: 3px 8px;
    border-radius: 6px;
    background: #FF85BB;
    font-size: 11px;
    font-weight: 700;
    color: #021A54;
  }

  /* CTA Button */
  .cta-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 8px;
    background: #FF85BB;
    color: #021A54;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
  }

  /* Ghost link */
  .ghost-link {
    text-align: center;
    font-size: 14px;
    color: #9CA3AF;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 10.5h2v4H1zM5 8h2v6.5H5zM9 5.5h2v9H9zM13 2.5h2v12h-2z" fill="#021A54"/></svg>
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 3C4.5 3 1.5 5 0 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5zm0 8.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z" fill="#021A54"/></svg>
    <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="4" width="12" height="8" rx="1.5" stroke="#021A54" stroke-width="1.2" fill="none"/><rect x="13.5" y="6.5" width="1.5" height="3" rx="0.5" fill="#021A54"/><rect x="2.5" y="5.5" width="7" height="5" rx="0.5" fill="#021A54"/></svg>
  </div>
</div>

<div class="content">
  <!-- Close Button -->
  <button class="close-btn">
    <svg viewBox="0 0 14 14" fill="none">
      <line x1="1" y1="1" x2="13" y2="13"/>
      <line x1="13" y1="1" x2="1" y2="13"/>
    </svg>
  </button>

  <!-- Gift Icon -->
  <div class="offer-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#021A54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 8V2M12 8H7.5a2.5 2.5 0 110-5C11 3 12 8 12 8zM12 8h4.5a2.5 2.5 0 100-5C13 3 12 8 12 8z"/>
      <rect x="3" y="8" width="18" height="4" rx="1"/>
      <path d="M12 12v10M5 12v8a2 2 0 002 2h10a2 2 0 002-2v-8"/>
    </svg>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>Wait! Special Offer</h1>
  </div>
  <p class="subtitle">Get 70% off your first year</p>

  <!-- Timer -->
  <div class="timer">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Offer expires in 14:59
  </div>

  <div class="spacer"></div>

  <!-- Highlighted Package -->
  <div class="package-card">
    <div class="radio"><div class="radio-inner"></div></div>
    <div class="package-info">
      <div class="package-label">Yearly</div>
      <div class="package-price">
        $49.99/year
        <span class="price-original">$199.99</span>
      </div>
    </div>
    <span class="discount-badge">-70%</span>
  </div>

  <!-- CTA -->
  <button class="cta-btn">Claim Offer</button>

  <!-- Ghost Link -->
  <button class="ghost-link">No thanks</button>
</div>

</body>
</html>
