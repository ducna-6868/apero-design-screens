<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>621 — Style Edit Popup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 0;
    height: 54px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Dim overlay */
  .dim-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  /* Popup — glass-thick */
  .popup {
    width: 358px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.20);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 12px 40px rgba(0,0,0,0.3);
    border-radius: 28px;
    padding: 24px 20px;
    color: #fff;
  }

  /* Header */
  .popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .popup-header h2 { font-size: 20px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .credit-badge {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    border-radius: 9999px;
    padding: 6px 12px;
    font-size: 13px; font-weight: 600;
  }
  .credit-badge .token-icon {
    width: 16px; height: 16px;
    background: linear-gradient(135deg, #00D4FF, #7B61FF);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .close-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .close-btn svg { width: 18px; height: 18px; color: rgba(255,255,255,0.65); }

  /* Section label row */
  .label-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .label-row .label { font-size: 15px; font-weight: 700; color: #fff; }
  .prompt-gallery-link {
    font-size: 13px; font-weight: 600; color: #00D4FF;
    background: none; border: none; cursor: pointer;
    font-family: inherit;
  }

  /* Text input — glass-regular */
  .text-input-wrap { position: relative; margin-bottom: 16px; }
  .text-input {
    width: 100%; min-height: 80px;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25);
    border-radius: 16px;
    padding: 12px 16px 24px;
    font-size: 15px; color: #fff;
    font-family: inherit; resize: none; outline: none;
  }
  .text-input::placeholder { color: rgba(255,255,255,0.4); }
  .char-count {
    position: absolute; bottom: 8px; right: 12px;
    font-size: 11px; color: rgba(255,255,255,0.4);
  }

  /* Input Image */
  .section-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 8px; }

  .upload-area {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px dashed rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    border-radius: 16px;
    height: 100px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; margin-bottom: 16px;
  }
  .upload-area svg { width: 32px; height: 32px; color: rgba(255,255,255,0.4); }
  .upload-area span { font-size: 13px; color: rgba(255,255,255,0.4); }

  /* Divider */
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 14px; }

  /* Visual Style row */
  .style-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; cursor: pointer;
  }
  .style-row-left { display: flex; align-items: center; gap: 8px; }
  .style-row-left svg { width: 20px; height: 20px; color: rgba(255,255,255,0.65); }
  .style-row-left span { font-size: 15px; font-weight: 600; }
  .style-row-right { display: flex; align-items: center; gap: 4px; }
  .style-row-right span { font-size: 14px; color: rgba(255,255,255,0.65); }
  .style-row-right svg { width: 16px; height: 16px; color: rgba(255,255,255,0.4); }

  /* Primary button */
  .primary-btn {
    width: 100%; height: 56px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    border-radius: 9999px;
    color: #fff; font-size: 17px; font-weight: 600;
    font-family: inherit; cursor: pointer;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: rgba(255,255,255,0.3); border-radius: 100px;
    z-index: 20;
  }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" fill="none"><rect x="0" y="1" width="3" height="10" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="9" y="5" width="3" height="6" rx="1" fill="#fff"/><rect x="13.5" y="7" width="3" height="4" rx="1" fill="#fff"/></svg>
        <svg width="16" height="12" fill="none"><path d="M8 2C5.2 2 2.7 3.1 1 5l1.4 1.4C3.8 4.8 5.8 4 8 4s4.2.8 5.6 2.4L15 5C13.3 3.1 10.8 2 8 2z" fill="#fff"/><path d="M8 6C6.3 6 4.8 6.7 3.8 7.8L5.2 9.2C5.9 8.5 6.9 8 8 8s2.1.5 2.8 1.2l1.4-1.4C11.2 6.7 9.7 6 8 6z" fill="#fff"/><circle cx="8" cy="11" r="1.5" fill="#fff"/></svg>
        <svg width="25" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2" stroke="rgba(255,255,255,0.35)" stroke-width="1"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="1.5" y="2.5" width="14" height="7" rx="1" fill="#fff"/></svg>
      </div>
    </div>

    <!-- Dim overlay + popup -->
    <div class="dim-overlay">
      <div class="popup">
        <!-- Header -->
        <div class="popup-header">
          <h2>Create</h2>
          <div class="header-right">
            <div class="credit-badge">
              <div class="token-icon"></div>
              <span>25</span>
            </div>
            <div class="close-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </div>
          </div>
        </div>

        <!-- Prompt -->
        <div class="label-row">
          <span class="label">Describe your video</span>
          <button class="prompt-gallery-link">Prompt Gallery</button>
        </div>
        <div class="text-input-wrap">
          <textarea class="text-input" placeholder="Describe your video..."></textarea>
          <span class="char-count">0/100</span>
        </div>

        <!-- Input Image -->
        <div class="section-title">Input Image</div>
        <div class="upload-area">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>Tap to upload</span>
        </div>

        <!-- Divider + Visual Style -->
        <div class="divider"></div>
        <div class="style-row">
          <div class="style-row-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <span>Visual Style</span>
          </div>
          <div class="style-row-right">
            <span>No Style</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>

        <!-- Generate -->
        <button class="primary-btn">Generate Video</button>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
