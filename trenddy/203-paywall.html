<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>203 — Paywall Variant</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }
  .status-bar-time { font-size: 15px; font-weight: 600; }
  .status-bar-icons { display: flex; gap: 6px; align-items: center; }
  .status-bar-icons svg { width: 18px; height: 12px; fill: #fff; }

  /* Close Button */
  .close-btn {
    position: absolute;
    top: 55px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .close-btn svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 2; }

  /* Scroll container */
  .scroll-content {
    height: calc(844px - 47px);
    overflow-y: auto;
    scrollbar-width: none;
  }
  .scroll-content::-webkit-scrollbar { display: none; }

  /* Hero */
  .hero {
    position: relative;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 40% 40%, rgba(123,97,255,0.28) 0%, transparent 55%),
      radial-gradient(ellipse 80% 60% at 60% 30%, rgba(0,212,255,0.22) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 50% 70%, rgba(255,107,157,0.12) 0%, transparent 50%);
  }
  .hero-fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(to top, #0A0E1A, transparent);
    pointer-events: none;
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    animation: sparkle-float 4s ease-in-out infinite;
  }
  .sparkle-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(0,212,255,0.7);
    box-shadow: 0 0 6px rgba(0,212,255,0.5);
  }
  .sparkle-dot.purple {
    background: rgba(123,97,255,0.7);
    box-shadow: 0 0 6px rgba(123,97,255,0.5);
  }
  .sparkle-star svg { width: 16px; height: 16px; }
  .sparkle-star.small svg { width: 10px; height: 10px; }

  @keyframes sparkle-float {
    0%, 100% { opacity: 0.3; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-8px) scale(1.2); }
  }
  @keyframes sparkle-rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .s1 { top: 45px; left: 55px; animation-delay: 0.2s; }
  .s2 { top: 75px; left: 150px; animation-delay: 1s; }
  .s3 { top: 55px; right: 70px; animation-delay: 1.6s; }
  .s4 { top: 125px; left: 90px; animation-delay: 0.5s; }
  .s5 { top: 110px; right: 60px; animation-delay: 2.2s; }
  .s6 { top: 160px; left: 180px; animation-delay: 0.8s; }
  .s7 { top: 60px; right: 140px; animation-delay: 1.3s; }
  .s8 { top: 180px; left: 70px; animation-delay: 1.9s; }

  /* Titles */
  .title {
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    padding: 0 24px;
  }
  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    padding: 8px 40px 0;
    line-height: 1.4;
  }

  /* Benefits */
  .benefits {
    padding: 24px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .benefit-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .benefit-icon {
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .benefit-icon svg {
    width: 18px;
    height: 18px;
    stroke: #00D4FF;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .benefit-text {
    font-size: 15px;
    color: #FFFFFF;
    font-weight: 500;
  }

  /* Plan Cards */
  .plans {
    padding: 24px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .plan-card {
    position: relative;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .plan-card.selected {
    border-color: rgba(0,212,255,0.8);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25), 0 0 20px rgba(0,212,255,0.15);
  }

  .plan-radio {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  .plan-card.selected .plan-radio {
    border-color: #00D4FF;
    background: #00D4FF;
  }
  .plan-radio-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #0A0E1A;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .plan-card.selected .plan-radio-dot { opacity: 1; }

  .plan-info { flex: 1; }
  .plan-duration {
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
  }
  .plan-price {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    margin-top: 2px;
  }

  .plan-badge {
    position: absolute;
    top: -10px;
    right: 16px;
    padding: 4px 12px;
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-value {
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.20);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 12px 40px rgba(0,0,0,0.3), 0 0 12px rgba(0,212,255,0.3);
    color: #00D4FF;
  }
  .badge-popular {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.8);
  }

  /* CTA */
  .cta-area {
    padding: 28px 24px 0;
  }
  .cta-btn {
    width: 100%;
    height: 56px;
    border-radius: 9999px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.2px;
  }

  .restore-link {
    display: block;
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    padding-bottom: 8px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .home-indicator-pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar-time">9:41</span>
    <div class="status-bar-icons">
      <svg viewBox="0 0 18 12"><rect x="0" y="3" width="4" height="9" rx="1" opacity="0.4"/><rect x="5" y="2" width="4" height="10" rx="1" opacity="0.6"/><rect x="10" y="1" width="4" height="11" rx="1" opacity="0.8"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg viewBox="0 0 16 12" fill="none" stroke="#fff" stroke-width="1.2"><path d="M1 8.5C3.5 5.5 6.5 4 8 4s4.5 1.5 7 4.5"/><circle cx="8" cy="11" r="1" fill="#fff" stroke="none"/></svg>
      <svg viewBox="0 0 28 14"><rect x="0.5" y="0.5" width="23" height="13" rx="3" stroke="#fff" stroke-width="1" fill="none" opacity="0.4"/><rect x="24.5" y="4" width="2" height="6" rx="1" fill="#fff" opacity="0.4"/><rect x="2" y="2" width="18" height="10" rx="2" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Close Button -->
  <div class="close-btn">
    <svg viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-content">
    <!-- Hero -->
    <div class="hero">
      <div class="hero-gradient"></div>
      <div class="sparkle sparkle-dot s1"></div>
      <div class="sparkle sparkle-dot purple s2"></div>
      <div class="sparkle sparkle-dot s3"></div>
      <div class="sparkle sparkle-dot purple s4"></div>
      <div class="sparkle sparkle-dot s5"></div>
      <div class="sparkle sparkle-star s6">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(0,212,255,0.6)"/></svg>
      </div>
      <div class="sparkle sparkle-star small s7">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(123,97,255,0.6)"/></svg>
      </div>
      <div class="sparkle sparkle-star s8">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(0,212,255,0.5)"/></svg>
      </div>
      <div class="hero-fade"></div>
    </div>

    <!-- Title -->
    <div class="title">Unlock Trenddy Premium</div>
    <div class="subtitle">Create unlimited AI videos with the best quality.</div>

    <!-- Benefits -->
    <div class="benefits">
      <div class="benefit-row">
        <div class="benefit-icon">
          <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <span class="benefit-text">Unlimited AI video generation</span>
      </div>
      <div class="benefit-row">
        <div class="benefit-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </div>
        <span class="benefit-text">Access all premium styles</span>
      </div>
      <div class="benefit-row">
        <div class="benefit-icon">
          <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </div>
        <span class="benefit-text">No watermarks, HD export</span>
      </div>
    </div>

    <!-- Plan Cards -->
    <div class="plans">
      <div class="plan-card" onclick="selectPlan(this)">
        <div class="plan-radio"><div class="plan-radio-dot"></div></div>
        <div class="plan-info">
          <div class="plan-duration">Weekly</div>
          <div class="plan-price">$4.99/week</div>
        </div>
      </div>
      <div class="plan-card" onclick="selectPlan(this)">
        <div class="plan-badge badge-popular">Most popular</div>
        <div class="plan-radio"><div class="plan-radio-dot"></div></div>
        <div class="plan-info">
          <div class="plan-duration">Monthly</div>
          <div class="plan-price">$12.99/month</div>
        </div>
      </div>
      <div class="plan-card selected" onclick="selectPlan(this)">
        <div class="plan-badge badge-value">Best value</div>
        <div class="plan-radio"><div class="plan-radio-dot"></div></div>
        <div class="plan-info">
          <div class="plan-duration">Yearly</div>
          <div class="plan-price">$49.99/year</div>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-area">
      <button class="cta-btn">Subscribe</button>
      <div class="restore-link">Restore purchase</div>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator-pill"></div>
  </div>
</div>

<script>
function selectPlan(card) {
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
}
</script>

</body>
</html>
