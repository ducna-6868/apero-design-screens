<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 205 Paywall (In-App)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 47px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 10;
  }
  .status-bar__time {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #fff;
  }

  /* Close */
  .btn-close {
    position: absolute;
    top: 55px;
    right: 16px;
    z-index: 20;
    width: 32px;
    height: 32px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .btn-close:hover { background: rgba(255,255,255,0.18); }
  .btn-close svg { width: 14px; height: 14px; color: #fff; }

  /* Hero — video/creation themed */
  .hero {
    width: 100%;
    height: 240px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero__bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 25% 45%, rgba(204,255,0,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 75% 35%, rgba(108,92,231,0.22) 0%, transparent 50%),
      radial-gradient(ellipse 50% 60% at 55% 75%, rgba(0,206,201,0.15) 0%, transparent 50%),
      linear-gradient(180deg, #1E1E30 0%, #0A0A0F 100%);
  }
  .hero__fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(to top, #0A0A0F 0%, transparent 100%);
  }

  /* Floating video frame shapes */
  .frame {
    position: absolute;
    border-radius: 8px;
    border: 1.5px solid rgba(204,255,0,0.2);
    background: rgba(204,255,0,0.03);
    opacity: 0;
    animation: frame-appear 5s ease-in-out infinite;
  }
  .frame--1 { width: 64px; height: 80px; top: 55px; left: 40px; animation-delay: 0s; border-color: rgba(204,255,0,0.2); }
  .frame--2 { width: 80px; height: 100px; top: 70px; left: 50%; transform: translateX(-50%); animation-delay: 0.8s; border-color: rgba(108,92,231,0.25); background: rgba(108,92,231,0.04); }
  .frame--3 { width: 56px; height: 70px; top: 60px; right: 45px; animation-delay: 1.6s; border-color: rgba(0,206,201,0.2); background: rgba(0,206,201,0.03); }

  /* Play icon inside center frame */
  .play-icon {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px;
    height: 32px;
    z-index: 3;
    opacity: 0;
    animation: frame-appear 5s ease-in-out infinite 0.8s;
  }

  @keyframes frame-appear {
    0%, 100% { opacity: 0; transform: translateY(6px) scale(0.95); }
    30%, 70% { opacity: 0.7; transform: translateY(0) scale(1); }
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 24px;
    overflow: hidden;
  }

  .title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 36px;
    color: #F0EDE8;
    text-align: center;
    margin-bottom: 8px;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #8A8A9A;
    text-align: center;
    margin-bottom: 20px;
  }

  /* Benefits list */
  .benefits {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
    padding: 0 4px;
  }
  .benefit {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .benefit__icon {
    width: 22px;
    height: 22px;
    border-radius: 9999px;
    background: rgba(204,255,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .benefit__icon svg {
    width: 12px;
    height: 12px;
    color: #CCFF00;
  }
  .benefit__text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    line-height: 20px;
    color: #F0EDE8;
  }

  /* Plan cards */
  .plans {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    margin-bottom: 20px;
  }
  .plan-card {
    width: 100%;
    background: #141420;
    border: 2px solid #2A2A44;
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: border-color 0.25s, box-shadow 0.25s;
    position: relative;
  }
  .plan-card--selected {
    border-color: #CCFF00;
    box-shadow: 0 0 20px rgba(204,255,0,0.08), inset 0 0 0 1px rgba(204,255,0,0.05);
  }
  .plan-card__info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .plan-card__name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 16px;
    line-height: 22px;
    color: #F0EDE8;
  }
  .plan-card__price {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13px;
    line-height: 18px;
    color: #8A8A9A;
  }
  .plan-card__meta {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 11px;
    line-height: 16px;
    color: #5A5A6A;
    margin-top: 2px;
  }
  .plan-card__radio {
    width: 22px;
    height: 22px;
    border-radius: 9999px;
    border: 2px solid #2A2A44;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.25s, background 0.25s;
    flex-shrink: 0;
  }
  .plan-card--selected .plan-card__radio {
    border-color: #CCFF00;
    background: #CCFF00;
  }
  .plan-card__radio-dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: #0A0A0F;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .plan-card--selected .plan-card__radio-dot { opacity: 1; }

  .plan-card__badge {
    position: absolute;
    top: -10px;
    right: 16px;
    background: #CCFF00;
    border-radius: 9999px;
    padding: 3px 10px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 10px;
    line-height: 16px;
    color: #0A0A0F;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .spacer { flex: 1; }

  /* CTA */
  .btn-primary {
    width: 100%;
    height: 56px;
    background: #CCFF00;
    border: none;
    border-radius: 9999px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #0A0A0F;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-primary:hover { background: #E0FF4D; }

  /* Text links */
  .links {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
    padding-top: 8px;
  }
  .link-account {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    line-height: 20px;
    color: #8A8A9A;
    padding: 10px 0;
    cursor: pointer;
    transition: color 0.2s;
  }
  .link-account:hover { color: #F0EDE8; }
  .restore-link {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13px;
    line-height: 18px;
    color: #5A5A6A;
    padding: 6px 0;
    cursor: pointer;
    transition: color 0.2s;
  }
  .restore-link:hover { color: #8A8A9A; }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
    flex-shrink: 0;
  }
  .home-indicator__pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
  </div>

  <!-- Close -->
  <button class="btn-close">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/>
    </svg>
  </button>

  <!-- Hero -->
  <div class="hero">
    <div class="hero__bg"></div>
    <div class="frame frame--1"></div>
    <div class="frame frame--2"></div>
    <div class="frame frame--3"></div>
    <!-- Play triangle in center frame -->
    <svg class="play-icon" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="15" stroke="rgba(204,255,0,0.3)" stroke-width="1.5"/>
      <path d="M13 11L22 16L13 21Z" fill="rgba(204,255,0,0.5)"/>
    </svg>
    <div class="hero__fade"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 class="title">Go unlimited</h1>
    <p class="subtitle">Unlock AI video generation with zero limits.</p>

    <!-- Benefits -->
    <div class="benefits">
      <div class="benefit">
        <div class="benefit__icon">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
        <span class="benefit__text">Unlimited video generation</span>
      </div>
      <div class="benefit">
        <div class="benefit__icon">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
        <span class="benefit__text">All visual styles unlocked</span>
      </div>
      <div class="benefit">
        <div class="benefit__icon">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
        <span class="benefit__text">Priority processing — 10s results</span>
      </div>
      <div class="benefit">
        <div class="benefit__icon">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
        <span class="benefit__text">No watermarks</span>
      </div>
    </div>

    <!-- Plans -->
    <div class="plans">
      <!-- Weekly -->
      <div class="plan-card" onclick="selectPlan(this)">
        <div class="plan-card__info">
          <span class="plan-card__name">Weekly</span>
          <span class="plan-card__price">$4.99/week</span>
        </div>
        <div class="plan-card__radio"><div class="plan-card__radio-dot"></div></div>
      </div>

      <!-- Yearly (pre-selected) -->
      <div class="plan-card plan-card--selected" onclick="selectPlan(this)">
        <span class="plan-card__badge">Best value</span>
        <div class="plan-card__info">
          <span class="plan-card__name">Yearly</span>
          <span class="plan-card__price">$49.99/year</span>
          <span class="plan-card__meta">That's just $0.96/week</span>
        </div>
        <div class="plan-card__radio"><div class="plan-card__radio-dot"></div></div>
      </div>
    </div>

    <div class="spacer"></div>

    <button class="btn-primary">Subscribe</button>

    <div class="links">
      <span class="link-account">Create an account</span>
      <span class="restore-link">Restore purchase</span>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>

<script>
function selectPlan(card) {
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('plan-card--selected'));
  card.classList.add('plan-card--selected');
}
</script>
</body>
</html>
