<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 130 ONB3 Quality Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  .status-bar {
    height: 47px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .status-bar .icons { display: flex; align-items: center; gap: 6px; }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 100px;
    background: rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* Top Bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px 24px 0;
  }
  .quality-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 9999px;
    background: rgba(0,212,255,0.12);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,212,255,0.25);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    font-size: 13px;
    font-weight: 600;
    color: #00D4FF;
    letter-spacing: 0.3px;
  }
  .quality-badge svg {
    width: 14px;
    height: 14px;
    fill: #00D4FF;
  }
  .skip-btn {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 500;
  }

  /* Comparison Card */
  .comparison-card {
    width: 342px;
    margin: 32px auto 0;
    border-radius: 28px;
    background: rgba(255,255,255,0.10);
    -webkit-backdrop-filter: blur(24px);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
    overflow: hidden;
  }
  .comparison-grid {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
  }
  .comparison-col {
    padding: 24px 20px;
  }
  .comparison-divider {
    background: rgba(255,255,255,0.10);
  }
  .col-header {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }
  .col-header.others { color: rgba(255,255,255,0.4); }
  .col-header.trenddy { color: #00D4FF; }

  .comp-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.3;
  }
  .comp-item:last-child { margin-bottom: 0; }

  .comp-item.negative {
    color: rgba(255,255,255,0.4);
  }
  .comp-item.positive {
    color: #fff;
  }
  .comp-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .comp-icon.x {
    background: rgba(255,107,157,0.15);
  }
  .comp-icon.x svg { width: 10px; height: 10px; stroke: rgba(255,107,157,0.6); stroke-width: 2.5; fill: none; }
  .comp-icon.check {
    background: rgba(0,212,255,0.15);
  }
  .comp-icon.check svg { width: 11px; height: 11px; stroke: #00D4FF; stroke-width: 2.5; fill: none; }

  /* Bottom Content */
  .bottom-content {
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title {
    text-align: center;
    margin-bottom: 12px;
  }
  .title .line1 { font-size: 28px; font-weight: 700; color: #fff; display: block; letter-spacing: -0.5px; }
  .title .line2 { font-size: 28px; font-weight: 700; color: #00D4FF; display: block; letter-spacing: -0.5px; }

  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 28px;
    max-width: 300px;
  }
  .subtitle strong { color: #fff; font-weight: 600; }

  .page-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .page-dots .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .page-dots .dot.active {
    background: #00D4FF;
    box-shadow: 0 0 8px rgba(0,212,255,0.4);
  }

  .btn-primary {
    width: 342px;
    height: 56px;
    border-radius: 9999px;
    border: 1px solid rgba(255,255,255,0.25);
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.2px;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="1" fill="white"/>
        <rect x="4.5" y="5" width="3" height="7" rx="1" fill="white"/>
        <rect x="9" y="2" width="3" height="10" rx="1" fill="white"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C9.8 3.6 11.4 4.3 12.6 5.4L14 4C12.4 2.5 10.3 1.6 8 1.6C5.7 1.6 3.6 2.5 2 4L3.4 5.4C4.6 4.3 6.2 3.6 8 3.6Z" fill="white"/>
        <path d="M8 7.2C9 7.2 9.9 7.6 10.6 8.2L12 6.8C10.9 5.8 9.5 5.2 8 5.2C6.5 5.2 5.1 5.8 4 6.8L5.4 8.2C6.1 7.6 7 7.2 8 7.2Z" fill="white"/>
        <circle cx="8" cy="10.5" r="1.5" fill="white"/>
      </svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(255,255,255,0.35)"/>
        <rect x="2" y="2" width="19" height="9" rx="2" fill="white"/>
        <path d="M24 4.5V8.5C24.8 8.2 25.5 7.4 25.5 6.5C25.5 5.6 24.8 4.8 24 4.5Z" fill="rgba(255,255,255,0.4)"/>
      </svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="quality-badge">
      <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#00D4FF"/></svg>
      Quality guarantee
    </div>
    <button class="skip-btn">Skip</button>
  </div>

  <!-- Comparison Card -->
  <div class="comparison-card">
    <div class="comparison-grid">
      <!-- OTHERS Column -->
      <div class="comparison-col">
        <div class="col-header others">OTHERS</div>
        <div class="comp-item negative">
          <div class="comp-icon x"><svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></div>
          Blurry
        </div>
        <div class="comp-item negative">
          <div class="comp-icon x"><svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></div>
          Slow
        </div>
        <div class="comp-item negative">
          <div class="comp-icon x"><svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></div>
          No free trial
        </div>
      </div>

      <!-- Divider -->
      <div class="comparison-divider"></div>

      <!-- TRENDDY Column -->
      <div class="comparison-col">
        <div class="col-header trenddy">TRENDDY</div>
        <div class="comp-item positive">
          <div class="comp-icon check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
          High quality sharp
        </div>
        <div class="comp-item positive">
          <div class="comp-icon check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
          10 seconds
        </div>
        <div class="comp-item positive">
          <div class="comp-icon check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
          Free image generated
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Content -->
  <div class="bottom-content">
    <div class="title">
      <span class="line1">Quality you can</span>
      <span class="line2">actually see.</span>
    </div>

    <div class="subtitle">Get results in just <strong>10 seconds</strong></div>

    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <button class="btn-primary">Continue</button>
  </div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
