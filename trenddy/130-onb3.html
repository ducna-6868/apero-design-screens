<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 130 Onboarding 3 Quality</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 47px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    flex-shrink: 0;
  }
  .status-bar__time {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #F0EDE8;
  }
  .status-bar__icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-bar__icons svg { width: 16px; height: 16px; color: #F0EDE8; }

  /* Top bar */
  .top-bar {
    height: 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    flex-shrink: 0;
  }
  .badge {
    background: #CCFF00;
    border-radius: 9999px;
    padding: 6px 14px;
    display: inline-flex;
    align-items: center;
  }
  .badge span {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: #0A0A0F;
    letter-spacing: 0.2px;
  }
  .skip-btn {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: #5A5A6A;
    cursor: pointer;
    padding: 8px 4px;
  }
  .skip-btn:hover { color: #8A8A9A; }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 24px 0;
    overflow-y: auto;
  }

  /* Comparison card */
  .comparison-card {
    width: 100%;
    background: #141420;
    border-radius: 24px;
    padding: 28px 20px;
    display: flex;
    flex-direction: row;
    gap: 0;
    margin-bottom: 28px;
    position: relative;
    border: 1px solid #2A2A44;
  }
  /* Subtle glow behind the card */
  .comparison-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 25px;
    background: linear-gradient(135deg, rgba(255,80,80,0.06) 0%, transparent 50%, rgba(204,255,0,0.08) 100%);
    z-index: -1;
  }

  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .col--others { align-items: flex-start; padding-right: 12px; }
  .col--trenddy { align-items: flex-start; padding-left: 12px; }

  .col__header {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    width: 100%;
    text-align: center;
  }
  .col--others .col__header { color: #5A5A6A; }
  .col--trenddy .col__header { color: #CCFF00; }

  .col__row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .col__icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .col--others .col__icon {
    background: rgba(255,107,107,0.12);
  }
  .col--others .col__icon svg {
    width: 12px;
    height: 12px;
    color: #FF6B6B;
  }
  .col--trenddy .col__icon {
    background: rgba(204,255,0,0.12);
  }
  .col--trenddy .col__icon svg {
    width: 12px;
    height: 12px;
    color: #CCFF00;
  }

  .col__text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    line-height: 20px;
  }
  .col--others .col__text { color: #5A5A6A; }
  .col--trenddy .col__text { color: #F0EDE8; }

  /* Divider */
  .divider {
    width: 1px;
    background: #2A2A44;
    align-self: stretch;
    flex-shrink: 0;
  }

  /* Tinted overlay for each column */
  .col--others { position: relative; }
  .col--trenddy { position: relative; }

  /* Page indicator */
  .page-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.2);
  }
  .dot--active {
    background: #CCFF00;
    box-shadow: 0 0 8px rgba(204,255,0,0.4);
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 12px;
  }
  .title__white {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #F0EDE8;
    display: block;
    letter-spacing: -0.5px;
  }
  .title__lime {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #CCFF00;
    display: block;
    letter-spacing: -0.5px;
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #8A8A9A;
    text-align: center;
    max-width: 320px;
    margin-bottom: 24px;
  }
  .subtitle strong {
    color: #F0EDE8;
    font-weight: 600;
  }

  .spacer { flex: 1; }

  /* Text button */
  .btn-text {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: #8A8A9A;
    cursor: pointer;
    padding: 12px 0;
    margin-bottom: 16px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .btn-text:hover { color: #F0EDE8; }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
    flex-shrink: 0;
  }
  .home-indicator__pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar__time">9:41</div>
    <div class="status-bar__icons">
      <svg width="16" height="16" viewBox="0 0 18 12" fill="none"><path d="M1 8.5C2.5 5 5.5 2.5 9 2.5s6.5 2.5 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 10C5 8 7 6.5 9 6.5s4 1.5 5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/></svg>
      <svg width="16" height="16" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="1" width="3" height="10" rx="1" fill="currentColor" opacity="0.3"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="currentColor" opacity="0.5"/><rect x="8.5" y="0.5" width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/><rect x="12.5" y="0" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><path d="M25 4.5v3a2 2 0 000-3z" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="badge"><span>Quality guarantee</span></div>
    <button class="skip-btn">Skip</button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Comparison card -->
    <div class="comparison-card">
      <div class="col col--others">
        <div class="col__header">OTHERS</div>
        <div class="col__row">
          <div class="col__icon">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </div>
          <span class="col__text">Blurry</span>
        </div>
        <div class="col__row">
          <div class="col__icon">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </div>
          <span class="col__text">Slow</span>
        </div>
        <div class="col__row">
          <div class="col__icon">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </div>
          <span class="col__text">No free trial</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="col col--trenddy">
        <div class="col__header">TRENDDY</div>
        <div class="col__row">
          <div class="col__icon">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 3L10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="col__text">High quality sharp</span>
        </div>
        <div class="col__row">
          <div class="col__icon">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 3L10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="col__text" style="font-weight:600;">10 seconds</span>
        </div>
        <div class="col__row">
          <div class="col__icon">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 3L10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="col__text">Free image generated</span>
        </div>
      </div>
    </div>

    <!-- Page indicator -->
    <div class="page-indicator">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot dot--active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- Title -->
    <div class="title">
      <span class="title__white">Quality you can</span>
      <span class="title__lime">actually see.</span>
    </div>

    <!-- Subtitle -->
    <div class="subtitle">Generate sharp, scroll-stopping clips in just <strong>10 seconds</strong>.</div>

    <div class="spacer"></div>

    <!-- Continue text button -->
    <button class="btn-text">Continue</button>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
