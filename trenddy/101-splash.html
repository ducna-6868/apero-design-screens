<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 101 Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: relative;
    z-index: 10;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .status-bar .icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 100px;
    background: rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* Splash Content */
  .splash-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100% - 47px - 34px);
    position: relative;
  }

  .ambient-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .app-icon {
    width: 96px;
    height: 96px;
    border-radius: 24px;
    background: linear-gradient(135deg, #00D4FF, #7B61FF);
    box-shadow: 0 0 40px rgba(0,212,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .app-icon svg {
    width: 40px;
    height: 40px;
    fill: #fff;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  .app-name {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    margin-top: 20px;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 2;
  }

  .tagline {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    margin-top: 8px;
    position: relative;
    z-index: 2;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2.5px solid rgba(255,255,255,0.1);
    border-top: 2.5px solid #00D4FF;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 40px;
    position: relative;
    z-index: 2;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .made-by {
    position: absolute;
    bottom: 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    z-index: 2;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="1" fill="white"/>
        <rect x="4.5" y="5" width="3" height="7" rx="1" fill="white"/>
        <rect x="9" y="2" width="3" height="10" rx="1" fill="white"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C9.8 3.6 11.4 4.3 12.6 5.4L14 4C12.4 2.5 10.3 1.6 8 1.6C5.7 1.6 3.6 2.5 2 4L3.4 5.4C4.6 4.3 6.2 3.6 8 3.6Z" fill="white"/>
        <path d="M8 7.2C9 7.2 9.9 7.6 10.6 8.2L12 6.8C10.9 5.8 9.5 5.2 8 5.2C6.5 5.2 5.1 5.8 4 6.8L5.4 8.2C6.1 7.6 7 7.2 8 7.2Z" fill="white"/>
        <circle cx="8" cy="10.5" r="1.5" fill="white"/>
      </svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(255,255,255,0.35)"/>
        <rect x="2" y="2" width="19" height="9" rx="2" fill="white"/>
        <path d="M24 4.5V8.5C24.8 8.2 25.5 7.4 25.5 6.5C25.5 5.6 24.8 4.8 24 4.5Z" fill="rgba(255,255,255,0.4)"/>
      </svg>
    </div>
  </div>

  <!-- Splash Content -->
  <div class="splash-content">
    <div class="ambient-glow"></div>
    <div class="app-icon">
      <svg viewBox="0 0 24 24"><polygon points="9.5,6 9.5,18 18,12"/></svg>
    </div>
    <div class="app-name">Trenddy</div>
    <div class="tagline">Your trend. Your style. Your video.</div>
    <div class="spinner"></div>
    <div class="made-by">Made by Apero</div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>
</div>
</body>
</html>
