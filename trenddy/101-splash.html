<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 101 Splash</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* Ambient glow behind icon */
  .phone::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(204,255,0,0.08) 0%, rgba(204,255,0,0.02) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Status bar */
  .status-bar {
    height: 47px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: relative;
    z-index: 2;
  }
  .status-bar__time {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #F0EDE8;
    letter-spacing: 0.2px;
  }
  .status-bar__icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-bar__icons svg {
    width: 16px;
    height: 16px;
    color: #F0EDE8;
  }

  /* Content */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100% - 47px - 34px);
    position: relative;
    z-index: 1;
  }

  /* App icon */
  .app-icon {
    width: 96px;
    height: 96px;
    background: #CCFF00;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: pulse 2.4s ease-in-out infinite;
    box-shadow:
      0 4px 24px rgba(204,255,0,0.25),
      0 0 60px rgba(204,255,0,0.08);
  }
  .app-icon svg {
    width: 40px;
    height: 40px;
    color: #0A0A0F;
    margin-left: 4px;
  }

  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 4px 24px rgba(204,255,0,0.25), 0 0 60px rgba(204,255,0,0.08);
    }
    50% {
      transform: scale(1.04);
      box-shadow: 0 8px 40px rgba(204,255,0,0.35), 0 0 80px rgba(204,255,0,0.12);
    }
  }

  .app-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #F0EDE8;
    margin-top: 20px;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #8A8A9A;
    margin-top: 8px;
    text-align: center;
  }

  /* Loading spinner */
  .spinner {
    width: 24px;
    height: 24px;
    margin-top: 40px;
    border: 2px solid rgba(204,255,0,0.15);
    border-top-color: #CCFF00;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Credit */
  .credit {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding-bottom: 20px;
    z-index: 2;
  }
  .credit span {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13px;
    line-height: 18px;
    color: rgba(255,255,255,0.3);
  }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
    position: relative;
    z-index: 2;
  }
  .home-indicator__pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar__time">9:41</div>
    <div class="status-bar__icons">
      <svg viewBox="0 0 18 12" fill="none"><path d="M1 8.5C2.5 5 5.5 2.5 9 2.5s6.5 2.5 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 10C5 8 7 6.5 9 6.5s4 1.5 5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/></svg>
      <svg viewBox="0 0 16 12" fill="none"><rect x="0.5" y="1" width="3" height="10" rx="1" fill="currentColor" opacity="0.3"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="currentColor" opacity="0.5"/><rect x="8.5" y="0.5" width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/><rect x="12.5" y="0" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
      <svg viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><path d="M25 4.5v3a2 2 0 000-3z" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="app-icon">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>
    </div>
    <div class="app-name">Trenddy</div>
    <div class="tagline">Your trend. Your style. Your video.</div>
    <div class="spinner"></div>
  </div>

  <!-- Credit -->
  <div class="credit"><span>Made by Apero</span></div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
