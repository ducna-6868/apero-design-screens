<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Trenddy — 310 Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; flex-shrink: 0; position: relative; z-index: 10;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #fff; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #fff; }

  /* Navigation bar */
  .nav-bar {
    height: 48px; width: 100%; display: flex; align-items: center;
    padding: 0 20px; flex-shrink: 0; position: relative;
  }
  .btn-back {
    width: 40px; height: 40px; border-radius: 9999px; border: none;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn-back:hover { background: rgba(255,255,255,0.06); }
  .btn-back svg { width: 24px; height: 24px; color: #F0EDE8; }
  .nav-title {
    font: 600 17px/24px 'DM Sans', sans-serif; color: #F0EDE8;
    position: absolute; left: 50%; transform: translateX(-50%);
  }

  /* Content */
  .content { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .content::-webkit-scrollbar { display: none; }

  /* Profile header */
  .profile-header {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 20px 32px;
  }
  .avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: #1E1E30; display: flex; align-items: center; justify-content: center;
    font: 700 28px/1 'DM Sans', sans-serif; color: #8A8A9A;
    margin-bottom: 12px;
  }
  .username {
    font: 600 20px/28px 'DM Sans', sans-serif; color: #F0EDE8;
  }

  /* Settings list */
  .settings-list {
    padding: 0 20px;
    display: flex; flex-direction: column;
  }
  .settings-row {
    height: 56px; display: flex; align-items: center;
    padding: 0 16px; background: #141420;
    border-bottom: 0.5px solid #1E1E30;
    cursor: pointer; transition: background 0.15s;
  }
  .settings-row:first-child { border-radius: 12px 12px 0 0; }
  .settings-row:last-child { border-radius: 0 0 12px 12px; border-bottom: none; }
  .settings-row:hover { background: #1a1a2c; }
  .settings-row__icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(204,255,0,0.06);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-right: 12px;
  }
  .settings-row__icon svg { width: 18px; height: 18px; color: #CCFF00; }
  .settings-row__label {
    flex: 1;
    font: 400 15px/22px 'Inter', sans-serif; color: #F0EDE8;
  }
  .settings-row__badge {
    padding: 3px 10px; border-radius: 9999px;
    font: 600 11px/16px 'Inter', sans-serif;
    margin-right: 8px;
  }
  .badge--free {
    background: rgba(138,138,154,0.12); color: #8A8A9A;
  }
  .badge--pro {
    background: rgba(204,255,0,0.12); color: #CCFF00;
  }
  .settings-row__chevron { flex-shrink: 0; }
  .settings-row__chevron svg { width: 18px; height: 18px; color: #5A5A6A; }

  /* App version */
  .app-version {
    text-align: center; padding: 32px 0 20px;
    font: 400 13px/18px 'Inter', sans-serif; color: #5A5A6A;
  }

  /* Home indicator */
  .home-indicator {
    height: 34px; width: 100%; display: flex; justify-content: center;
    align-items: flex-end; padding-bottom: 8px; flex-shrink: 0;
  }
  .home-indicator__pill {
    width: 134px; height: 5px; border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#fff" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <button class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="nav-title">Profile</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Profile Header -->
    <div class="profile-header">
      <div class="avatar">U</div>
      <span class="username">User</span>
    </div>

    <!-- Settings List -->
    <div class="settings-list">
      <!-- Language -->
      <div class="settings-row">
        <div class="settings-row__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <span class="settings-row__label">Language</span>
        <span class="settings-row__chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </span>
      </div>

      <!-- Subscription -->
      <div class="settings-row">
        <div class="settings-row__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </div>
        <span class="settings-row__label">Subscription</span>
        <span class="settings-row__badge badge--free">Free</span>
        <span class="settings-row__chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </span>
      </div>

      <!-- Rate Us -->
      <div class="settings-row">
        <div class="settings-row__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <span class="settings-row__label">Rate Us</span>
        <span class="settings-row__chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </span>
      </div>

      <!-- Terms of Service -->
      <div class="settings-row">
        <div class="settings-row__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <span class="settings-row__label">Terms of Service</span>
        <span class="settings-row__chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </span>
      </div>

      <!-- Privacy Policy -->
      <div class="settings-row">
        <div class="settings-row__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="settings-row__label">Privacy Policy</span>
        <span class="settings-row__chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- App Version -->
    <div class="app-version">v1.0.0</div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
