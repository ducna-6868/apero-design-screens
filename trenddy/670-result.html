<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>670 — Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.8), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; flex-shrink: 0;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #F0EDE8; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #F0EDE8; }

  /* Nav Bar */
  .nav-bar {
    height: 44px; display: flex; align-items: center; justify-content: center;
    padding: 0 20px; position: relative; flex-shrink: 0;
  }
  .nav-bar__title { font: 600 17px/22px 'DM Sans', sans-serif; color: #F0EDE8; }

  /* Content */
  .content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 12px 24px 0; overflow: hidden;
  }

  /* Result Preview */
  .result-preview {
    width: 342px; height: 400px; border-radius: 20px; overflow: hidden;
    position: relative; background: #141420;
  }
  .result-preview__gradient {
    position: absolute; inset: 0;
    background: linear-gradient(150deg, #6C5CE7 0%, #a855f7 25%, #06b6d4 50%, #CCFF00 75%, #1E1E30 100%);
    opacity: 0.6;
  }
  .result-preview__overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(10,10,15,0.6) 100%);
  }

  /* Play Button */
  .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 64px; height: 64px; border-radius: 50%;
    background: #CCFF00; display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none;
    box-shadow: 0 4px 24px rgba(204,255,0,0.3);
  }
  .play-btn svg { width: 28px; height: 28px; fill: #0A0A0F; margin-left: 3px; }

  /* Action Buttons Row */
  .action-row {
    display: flex; justify-content: center; gap: 16px;
    padding: 20px 0;
  }
  .action-btn {
    width: 80px; height: 72px; background: #141420; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; border: 1px solid rgba(42,42,68,0.5);
    transition: background 0.15s;
  }
  .action-btn:hover { background: #1E1E30; }
  .action-btn svg { width: 24px; height: 24px; stroke: #F0EDE8; fill: none; stroke-width: 1.5; }
  .action-btn__label { font: 400 11px/14px 'Inter', sans-serif; color: #8A8A9A; }

  /* Report link */
  .report-link {
    font: 400 12px/16px 'Inter', sans-serif; color: #5A5A6A;
    text-decoration: none; cursor: pointer; padding: 4px 0;
  }
  .report-link:hover { color: #8A8A9A; }

  /* Spacer */
  .spacer { flex: 1; }

  /* Create Another Button */
  .btn-create-another {
    width: 342px; height: 56px; border-radius: 9999px; border: 1.5px solid #2A2A44;
    background: transparent; cursor: pointer;
    font: 600 16px/20px 'DM Sans', sans-serif; color: #F0EDE8;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-create-another:hover { background: rgba(42,42,68,0.3); border-color: #5A5A6A; }

  /* Home Indicator */
  .home-indicator {
    height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .home-indicator__bar {
    width: 134px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 9999px;
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#F0EDE8" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#F0EDE8" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <span class="nav-bar__title">Result</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Result Preview -->
    <div class="result-preview">
      <div class="result-preview__gradient"></div>
      <div class="result-preview__overlay"></div>
      <button class="play-btn">
        <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
    </div>

    <!-- Action Buttons -->
    <div class="action-row">
      <!-- Download -->
      <button class="action-btn">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="action-btn__label">Download</span>
      </button>

      <!-- Share -->
      <button class="action-btn">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        <span class="action-btn__label">Share</span>
      </button>

      <!-- Retry -->
      <button class="action-btn">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span class="action-btn__label">Retry</span>
      </button>
    </div>

    <!-- Report Issue -->
    <a class="report-link">Report issue</a>

    <div class="spacer"></div>

    <!-- Create Another -->
    <button class="btn-create-another">Create Another</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__bar"></div>
  </div>
</div>
</body>
</html>
