<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>670 — Result</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    position: relative; display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status Bar */
  .status-bar {
    height: 54px; width: 100%; display: flex; justify-content: space-between;
    align-items: center; padding: 14px 28px 0; flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { width: 18px; height: 12px; fill: #fff; }

  /* Top Bar */
  .top-bar {
    height: 48px; display: flex; align-items: center; justify-content: center;
    padding: 0 20px; position: relative; flex-shrink: 0;
  }
  .top-bar__title { font-size: 17px; font-weight: 700; color: #fff; }
  .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .nav-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn--left { left: 20px; }
  .nav-btn--right { right: 20px; }

  /* Content */
  .content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 8px 20px 0; overflow: hidden;
  }

  /* Video Result Frame */
  .video-frame {
    width: 350px; height: 500px; border-radius: 22px; position: relative;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    overflow: hidden;
  }
  .video-placeholder {
    width: 100%; height: 100%;
    background:
      linear-gradient(150deg, rgba(0,212,255,0.15) 0%, rgba(123,97,255,0.22) 30%, rgba(255,107,157,0.15) 60%, rgba(0,212,255,0.10) 100%),
      radial-gradient(circle at 25% 30%, rgba(123,97,255,0.12) 0%, transparent 50%),
      radial-gradient(circle at 75% 70%, rgba(0,212,255,0.10) 0%, transparent 50%);
  }

  /* Play Button Overlay */
  .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.20);
    box-shadow: 0 0 24px rgba(0,212,255,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .play-btn svg { width: 28px; height: 28px; fill: #fff; margin-left: 3px; filter: drop-shadow(0 0 6px rgba(0,212,255,0.4)); }

  /* Bottom Action Bar */
  .action-bar {
    width: 100%; flex-shrink: 0;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.20);
    border-bottom: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 -12px 40px rgba(0,0,0,0.3);
    border-radius: 28px 28px 0 0;
    padding: 20px 24px;
    margin-top: auto;
  }

  /* Action Buttons Row */
  .action-row {
    display: flex; justify-content: center; gap: 12px; margin-bottom: 16px;
  }
  .action-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .action-circle {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    border: none; font-family: inherit;
  }
  .action-circle--regular {
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25);
  }
  .action-circle--regular:hover {
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25), 0 0 12px rgba(0,212,255,0.15);
  }
  .action-circle--thin {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
  }
  .action-circle svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .action-circle--thin svg { stroke: rgba(255,255,255,0.4); }
  .action-label { font-size: 11px; color: #fff; }
  .action-label--muted { color: rgba(255,255,255,0.4); }

  /* Create Another Button */
  .btn-create {
    width: 100%; height: 56px; border-radius: 9999px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; letter-spacing: -0.2px;
  }

  /* Home Indicator */
  .home-indicator {
    height: 34px; width: 100%; display: flex; justify-content: center;
    align-items: flex-end; padding-bottom: 8px; flex-shrink: 0;
    background: rgba(255,255,255,0.14);
  }
  .home-indicator__pill {
    width: 134px; height: 5px; border-radius: 9999px;
    background: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 18 12"><rect x="0" y="3" width="3" height="9" rx="0.5" fill="#fff" opacity="0.4"/><rect x="4.5" y="2" width="3" height="10" rx="0.5" fill="#fff" opacity="0.6"/><rect x="9" y="1" width="3" height="11" rx="0.5" fill="#fff" opacity="0.8"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#fff"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 2.4C5.4 2.4 3 3.5 1.4 5.3l1 1C3.8 4.7 5.8 3.8 8 3.8s4.2.9 5.6 2.5l1-1C13 3.5 10.6 2.4 8 2.4zM8 6c-1.5 0-2.8.6-3.8 1.6l1 1c.8-.8 1.8-1.2 2.8-1.2s2 .4 2.8 1.2l1-1C10.8 6.6 9.5 6 8 6zm0 3.6c-.6 0-1.2.3-1.6.8L8 12l1.6-1.6c-.4-.5-1-.8-1.6-.8z" fill="#fff"/></svg>
      <svg viewBox="0 0 27 13"><rect x="0" y="0.5" width="22" height="11.5" rx="3.5" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="rgba(255,255,255,0.4)"/><rect x="1.5" y="2" width="16" height="8" rx="2" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="nav-btn nav-btn--left">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <span class="top-bar__title">Result</span>
    <div class="nav-btn nav-btn--right">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="video-frame">
      <div class="video-placeholder"></div>
      <div class="play-btn">
        <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </div>
    </div>
  </div>

  <!-- Bottom Action Bar -->
  <div class="action-bar">
    <div class="action-row">
      <!-- Save -->
      <div class="action-item">
        <button class="action-circle action-circle--regular">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <span class="action-label">Save</span>
      </div>
      <!-- Share -->
      <div class="action-item">
        <button class="action-circle action-circle--regular">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <span class="action-label">Share</span>
      </div>
      <!-- Redo -->
      <div class="action-item">
        <button class="action-circle action-circle--regular">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <span class="action-label">Redo</span>
      </div>
      <!-- Report -->
      <div class="action-item">
        <button class="action-circle action-circle--thin">
          <svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        </button>
        <span class="action-label action-label--muted">Report</span>
      </div>
    </div>
    <button class="btn-create">Create another</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"><div class="home-indicator__pill"></div></div>
</div>
</body>
</html>
