<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>671 — Download</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.8), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; flex-shrink: 0;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #F0EDE8; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #F0EDE8; }

  /* Nav Bar */
  .nav-bar {
    height: 44px; display: flex; align-items: center; justify-content: center;
    padding: 0 20px; position: relative; flex-shrink: 0;
  }
  .nav-bar__back {
    position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px; border-radius: 9999px; background: rgba(42,42,64,0.6);
    display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
  }
  .nav-bar__back svg { width: 18px; height: 18px; stroke: #F0EDE8; fill: none; stroke-width: 2; }
  .nav-bar__title { font: 600 17px/22px 'DM Sans', sans-serif; color: #F0EDE8; }

  /* Content */
  .content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 16px 24px 0; overflow: hidden;
  }

  /* Preview (smaller) */
  .result-preview {
    width: 200px; height: 260px; border-radius: 16px; overflow: hidden;
    position: relative; background: #141420; margin-bottom: 24px;
  }
  .result-preview__gradient {
    position: absolute; inset: 0;
    background: linear-gradient(150deg, #6C5CE7 0%, #a855f7 25%, #06b6d4 50%, #CCFF00 75%, #1E1E30 100%);
    opacity: 0.6;
  }
  .result-preview__overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(10,10,15,0.6) 100%);
  }
  .result-preview__play {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .result-preview__play svg { width: 20px; height: 20px; fill: #F0EDE8; margin-left: 2px; }

  /* File Info */
  .file-info {
    width: 100%; margin-bottom: 20px;
  }
  .file-info__name {
    font: 500 15px/22px 'Inter', sans-serif; color: #F0EDE8;
    margin-bottom: 4px;
  }
  .file-info__meta {
    font: 400 13px/18px 'Inter', sans-serif; color: #8A8A9A;
    margin-bottom: 16px;
  }

  /* Quality Selector */
  .quality-selector {
    display: flex; gap: 8px; margin-bottom: 4px;
  }
  .quality-chip {
    padding: 8px 20px; border-radius: 9999px;
    background: #141420; border: 1.5px solid #2A2A44;
    font: 500 14px/20px 'Inter', sans-serif; color: #8A8A9A;
    cursor: pointer; transition: all 0.15s;
  }
  .quality-chip:hover { border-color: #5A5A6A; color: #F0EDE8; }
  .quality-chip--active {
    border-color: #CCFF00; color: #F0EDE8;
    background: rgba(204,255,0,0.06);
  }

  /* Progress Bar Section */
  .progress-section {
    width: 100%; margin: 24px 0;
  }
  .progress-bar {
    width: 100%; height: 6px; background: #2A2A40; border-radius: 9999px;
    overflow: hidden; margin-bottom: 8px;
  }
  .progress-bar__fill {
    width: 67%; height: 100%; background: #CCFF00; border-radius: 9999px;
    transition: width 0.3s ease;
  }
  .progress-bar__label {
    font: 400 12px/16px 'Inter', sans-serif; color: #F0EDE8;
  }

  /* Spacer */
  .spacer { flex: 1; }

  /* Download Button */
  .btn-download {
    width: 342px; height: 56px; border-radius: 9999px; border: none; cursor: pointer;
    background: #CCFF00; display: flex; align-items: center; justify-content: center; gap: 8px;
    font: 600 16px/20px 'DM Sans', sans-serif; color: #0A0A0F;
    box-shadow: 0 4px 24px rgba(204,255,0,0.2);
  }
  .btn-download svg { width: 20px; height: 20px; fill: none; stroke: #0A0A0F; stroke-width: 2; }

  /* Save to Photos */
  .btn-save {
    background: none; border: none; cursor: pointer;
    font: 400 15px/22px 'Inter', sans-serif; color: #8A8A9A;
    padding: 12px 0;
  }
  .btn-save:hover { color: #F0EDE8; }

  /* Home Indicator */
  .home-indicator {
    height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .home-indicator__bar {
    width: 134px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 9999px;
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#F0EDE8" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#F0EDE8" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <button class="nav-bar__back">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="nav-bar__title">Download</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Preview -->
    <div class="result-preview">
      <div class="result-preview__gradient"></div>
      <div class="result-preview__overlay"></div>
      <div class="result-preview__play">
        <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </div>
    </div>

    <!-- File Info -->
    <div class="file-info">
      <p class="file-info__name">video_cyberpunk_001.mp4</p>
      <p class="file-info__meta">1080x1920 &middot; 5.2 MB</p>

      <!-- Quality Selector -->
      <div class="quality-selector">
        <button class="quality-chip">4K</button>
        <button class="quality-chip quality-chip--active">1080p</button>
        <button class="quality-chip">720p</button>
      </div>
    </div>

    <!-- Download Progress -->
    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-bar__fill"></div>
      </div>
      <span class="progress-bar__label">Downloading... 67%</span>
    </div>

    <div class="spacer"></div>

    <!-- Download Button -->
    <button class="btn-download">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Downloading...
    </button>

    <!-- Save to Photos -->
    <button class="btn-save">Save to Photos</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__bar"></div>
  </div>
</div>
</body>
</html>
