<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>671 — Download</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    position: relative; display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status Bar */
  .status-bar {
    height: 54px; width: 100%; display: flex; justify-content: space-between;
    align-items: center; padding: 14px 28px 0; flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { width: 18px; height: 12px; fill: #fff; }

  /* Centered Content */
  .content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 0 24px; overflow: hidden;
  }

  /* Video Thumbnail */
  .thumbnail {
    width: 180px; height: 240px; border-radius: 16px; overflow: hidden;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    margin-bottom: 20px; position: relative;
  }
  .thumbnail__gradient {
    width: 100%; height: 100%;
    background:
      linear-gradient(150deg, rgba(0,212,255,0.15) 0%, rgba(123,97,255,0.20) 35%, rgba(255,107,157,0.12) 70%, rgba(0,212,255,0.08) 100%),
      radial-gradient(circle at 30% 35%, rgba(123,97,255,0.10) 0%, transparent 50%);
  }

  /* Download Progress (hidden in success state, shown for reference) */
  .download-progress {
    width: 280px; margin-bottom: 24px;
    display: none; /* hidden - showing success state */
    flex-direction: column; align-items: center;
  }
  .progress-track {
    width: 100%; height: 6px; border-radius: 9999px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    overflow: hidden; margin-bottom: 16px;
  }
  .progress-fill {
    width: 68%; height: 100%; border-radius: 9999px;
    background: linear-gradient(90deg, #00D4FF, #7B61FF);
    animation: progress-grow 2s ease-in-out infinite;
  }
  @keyframes progress-grow {
    0% { width: 30%; }
    50% { width: 80%; }
    100% { width: 30%; }
  }
  .download-title { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .download-meta { font-size: 13px; color: rgba(255,255,255,0.65); }

  /* Success State */
  .success-state {
    display: flex; flex-direction: column; align-items: center;
  }
  .success-circle {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(52,211,153,0.15);
    border: 1px solid rgba(52,211,153,0.3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    animation: success-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes success-pop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-circle svg { width: 40px; height: 40px; stroke: #34D399; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .success-title {
    font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 8px; text-align: center;
  }
  .success-subtitle {
    font-size: 15px; color: rgba(255,255,255,0.65); text-align: center;
  }

  /* Bottom Area */
  .bottom-area {
    padding: 0 24px; flex-shrink: 0; margin-top: auto;
    padding-bottom: 0;
  }
  .btn-share {
    width: 100%; height: 56px; border-radius: 9999px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; letter-spacing: -0.2px;
  }
  .btn-home {
    width: 100%; height: 44px; background: none; border: none;
    color: rgba(255,255,255,0.65); font-size: 13px; font-family: inherit;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* Home Indicator */
  .home-indicator {
    height: 34px; width: 100%; display: flex; justify-content: center;
    align-items: flex-end; padding-bottom: 8px; flex-shrink: 0;
  }
  .home-indicator__pill {
    width: 134px; height: 5px; border-radius: 9999px;
    background: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 18 12"><rect x="0" y="3" width="3" height="9" rx="0.5" fill="#fff" opacity="0.4"/><rect x="4.5" y="2" width="3" height="10" rx="0.5" fill="#fff" opacity="0.6"/><rect x="9" y="1" width="3" height="11" rx="0.5" fill="#fff" opacity="0.8"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#fff"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 2.4C5.4 2.4 3 3.5 1.4 5.3l1 1C3.8 4.7 5.8 3.8 8 3.8s4.2.9 5.6 2.5l1-1C13 3.5 10.6 2.4 8 2.4zM8 6c-1.5 0-2.8.6-3.8 1.6l1 1c.8-.8 1.8-1.2 2.8-1.2s2 .4 2.8 1.2l1-1C10.8 6.6 9.5 6 8 6zm0 3.6c-.6 0-1.2.3-1.6.8L8 12l1.6-1.6c-.4-.5-1-.8-1.6-.8z" fill="#fff"/></svg>
      <svg viewBox="0 0 27 13"><rect x="0" y="0.5" width="22" height="11.5" rx="3.5" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" fill="rgba(255,255,255,0.4)"/><rect x="1.5" y="2" width="16" height="8" rx="2" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Video Thumbnail -->
    <div class="thumbnail">
      <div class="thumbnail__gradient"></div>
    </div>

    <!-- Download Progress (hidden, showing success instead) -->
    <div class="download-progress">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="download-title">Saving to Photos...</div>
      <div class="download-meta">HD 1080p &bull; 0:15</div>
    </div>

    <!-- Success State (shown by default) -->
    <div class="success-state">
      <div class="success-circle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="success-title">Saved to Photos!</div>
      <div class="success-subtitle">Your video is ready to share</div>
    </div>
  </div>

  <!-- Bottom Area -->
  <div class="bottom-area">
    <button class="btn-share">Share Now</button>
    <button class="btn-home">Back to Home</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"><div class="home-indicator__pill"></div></div>
</div>
</body>
</html>
