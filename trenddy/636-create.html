<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>636 — Create Confirm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0; height: 54px;
    color: #fff; font-size: 15px; font-weight: 600;
    position: relative; z-index: 5;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Back button */
  .back-btn {
    position: absolute; top: 60px; left: 16px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5;
  }
  .back-btn svg { width: 20px; height: 20px; color: #fff; }

  /* Center content */
  .center-content {
    position: absolute; top: 130px; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 24px;
  }

  /* Summary card — glass-regular */
  .summary-card {
    width: 100%;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25);
    border-radius: 22px;
    padding: 24px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Preview thumbnail */
  .preview-thumb {
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .preview-thumb-inner {
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(255,107,157,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(0,212,255,0.4) 0%, transparent 50%),
      linear-gradient(135deg, #1a1a2e, #16213e);
  }

  .prompt-text {
    font-size: 15px; color: #fff; text-align: center;
    line-height: 1.45; margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .badges-row {
    display: flex; gap: 8px; margin-bottom: 12px;
    flex-wrap: wrap; justify-content: center;
  }
  .badge-pill {
    display: inline-flex; align-items: center;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    border-radius: 9999px;
    padding: 5px 14px;
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65);
  }

  .estimated-time {
    font-size: 13px; color: rgba(255,255,255,0.65);
  }

  /* Cost indicator — glass-thin */
  .cost-indicator {
    width: 100%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    border-radius: 16px;
    padding: 14px 18px;
    margin-top: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .token-icon {
    width: 20px; height: 20px;
    background: linear-gradient(135deg, #00D4FF, #7B61FF);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cost-text {
    font-size: 14px; color: rgba(255,255,255,0.65);
  }

  /* Bottom area */
  .bottom-area {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 20px 40px;
    display: flex; flex-direction: column; gap: 12px;
    align-items: center;
  }

  .primary-btn {
    width: 100%; height: 56px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    border-radius: 9999px;
    color: #fff; font-size: 17px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2); }
    50% { box-shadow: 0 0 32px rgba(0,212,255,0.4), 0 0 60px rgba(0,212,255,0.15), inset 0 1px 0 rgba(255,255,255,0.2); }
  }

  .text-btn {
    background: none; border: none;
    font-size: 15px; color: rgba(255,255,255,0.65);
    font-family: inherit; cursor: pointer;
    padding: 6px 0;
  }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: rgba(255,255,255,0.3); border-radius: 100px; z-index: 10;
  }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" fill="none"><rect x="0" y="1" width="3" height="10" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="9" y="5" width="3" height="6" rx="1" fill="#fff"/><rect x="13.5" y="7" width="3" height="4" rx="1" fill="#fff"/></svg>
        <svg width="16" height="12" fill="none"><path d="M8 2C5.2 2 2.7 3.1 1 5l1.4 1.4C3.8 4.8 5.8 4 8 4s4.2.8 5.6 2.4L15 5C13.3 3.1 10.8 2 8 2z" fill="#fff"/><path d="M8 6C6.3 6 4.8 6.7 3.8 7.8L5.2 9.2C5.9 8.5 6.9 8 8 8s2.1.5 2.8 1.2l1.4-1.4C11.2 6.7 9.7 6 8 6z" fill="#fff"/><circle cx="8" cy="11" r="1.5" fill="#fff"/></svg>
        <svg width="25" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2" stroke="rgba(255,255,255,0.35)" stroke-width="1"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="1.5" y="2.5" width="14" height="7" rx="1" fill="#fff"/></svg>
      </div>
    </div>

    <div class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>

    <div class="center-content">
      <!-- Summary card -->
      <div class="summary-card">
        <div class="preview-thumb">
          <div class="preview-thumb-inner"></div>
        </div>
        <div class="prompt-text">A dramatic NBA slam dunk in slow motion with arena lights and roaring crowd energy...</div>
        <div class="badges-row">
          <span class="badge-pill">Cyberpunk</span>
          <span class="badge-pill">HD 1080p</span>
        </div>
        <div class="estimated-time">~30 seconds</div>
      </div>

      <!-- Cost indicator -->
      <div class="cost-indicator">
        <div class="token-icon"></div>
        <span class="cost-text">1 credit will be used</span>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-area">
      <button class="primary-btn">Generate Now</button>
      <button class="text-btn">Back to editing</button>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
