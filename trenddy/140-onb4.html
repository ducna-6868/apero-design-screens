<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 140 ONB4 Social Proof</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  .status-bar {
    height: 47px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .status-bar .icons { display: flex; align-items: center; gap: 6px; }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 100px;
    background: rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* Main Content */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 0;
    height: 100%;
  }

  /* App Icon */
  .app-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, #00D4FF, #7B61FF);
    box-shadow: 0 0 30px rgba(0,212,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .app-icon svg {
    width: 30px;
    height: 30px;
    fill: #fff;
  }

  .app-name {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .app-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    margin-bottom: 40px;
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 32px;
  }
  .title .line1 { font-size: 28px; font-weight: 700; color: #fff; display: block; letter-spacing: -0.5px; }
  .title .line2 { font-size: 28px; font-weight: 700; color: #00D4FF; display: block; letter-spacing: -0.5px; }

  /* Testimonial Card */
  .testimonial-card {
    width: 342px;
    border-radius: 22px;
    background: rgba(255,255,255,0.10);
    -webkit-backdrop-filter: blur(24px);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
    padding: 24px;
    margin-bottom: auto;
  }

  .testimonial-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,212,255,0.4), rgba(123,97,255,0.4));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .reviewer-info {
    flex: 1;
  }
  .reviewer-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
  }
  .stars {
    display: flex;
    gap: 2px;
  }
  .stars svg {
    width: 14px;
    height: 14px;
  }

  .review-text {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
    font-style: italic;
  }

  /* Bottom */
  .bottom-area {
    position: absolute;
    bottom: 48px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .page-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .page-dots .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .page-dots .dot.active {
    background: #00D4FF;
    box-shadow: 0 0 8px rgba(0,212,255,0.4);
  }

  .btn-primary {
    width: 342px;
    height: 56px;
    border-radius: 9999px;
    border: 1px solid rgba(255,255,255,0.25);
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.2px;
  }
</style>
</head>
<body>

</div>
