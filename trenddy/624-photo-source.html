<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>624 — Photo Source</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.8), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; display: flex; flex-direction: column;
  }

  /* Background — blurred representation of Style Edit screen */
  .bg-scene {
    position: absolute; inset: 0;
    background: linear-gradient(170deg, #0a2a2e 0%, #0d3d3a 25%, #0c2530 50%, #0A0A0F 100%);
  }
  .bg-scene__shape1 {
    position: absolute; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,206,201,0.08) 0%, transparent 70%);
    top: 100px; left: -30px;
  }
  .bg-scene__shape2 {
    position: absolute; width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(108,92,231,0.06) 0%, transparent 70%);
    top: 250px; right: -20px;
  }
  /* Faux popup behind overlay to suggest 621 Style Edit */
  .bg-popup {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 358px; height: 420px; background: #141420; border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .bg-popup__header {
    padding: 24px 20px 0; display: flex; justify-content: space-between; align-items: center;
  }
  .bg-popup__title { font: 700 24px/32px 'DM Sans', sans-serif; color: rgba(240,237,232,0.25); }
  .bg-popup__close {
    width: 32px; height: 32px; border-radius: 9999px; background: rgba(42,42,64,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .bg-popup__block {
    margin: 20px; height: 80px; background: rgba(30,30,48,0.5); border-radius: 12px;
  }
  .bg-popup__block2 {
    margin: 0 20px; height: 100px; background: rgba(30,30,48,0.5); border-radius: 12px;
    border: 1.5px dashed rgba(42,42,68,0.5);
  }
  .bg-popup__row {
    margin: 16px 20px; height: 44px; border-top: 0.5px solid rgba(42,42,64,0.4);
  }
  .bg-popup__btn {
    margin: 16px 20px 0; height: 56px; background: rgba(204,255,0,0.15); border-radius: 9999px;
  }

  /* Dim Overlay */
  .dim-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 5;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #F0EDE8; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #F0EDE8; }

  /* Bottom Sheet */
  .bottom-sheet {
    position: absolute; bottom: 34px; left: 0; right: 0; width: 390px;
    background: #141420; border-radius: 24px 24px 0 0;
    z-index: 20; display: flex; flex-direction: column;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.05);
  }

  /* Drag Handle */
  .drag-handle {
    width: 36px; height: 4px; background: rgba(255,255,255,0.3);
    border-radius: 9999px; align-self: center; margin: 12px auto 16px;
  }

  /* Action List */
  .action-list {
    display: flex; flex-direction: column; gap: 0; padding: 0 20px;
  }
  .action-row {
    display: flex; flex-direction: row; align-items: center; gap: 16px;
    padding: 16px 0; min-height: 52px; cursor: pointer;
    transition: background 0.15s;
  }
  .action-row:first-child {
    border-bottom: 0.5px solid #2A2A40;
  }
  .action-row:hover {
    opacity: 0.8;
  }
  .action-row__icon {
    width: 24px; height: 24px; flex-shrink: 0;
  }
  .action-row__icon svg {
    width: 24px; height: 24px; stroke: #F0EDE8; fill: none; stroke-width: 1.5;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .action-row__label {
    font: 400 17px/24px 'Inter', sans-serif; color: #F0EDE8;
  }

  /* Spacer */
  .sheet-spacer {
    height: 12px;
  }

  /* Cancel Button */
  .cancel-btn {
    width: 100%; height: 52px; display: flex; align-items: center; justify-content: center;
    padding: 0 20px; cursor: pointer; background: none; border: none;
    font: 400 17px/24px 'Inter', sans-serif; color: #8A8A9A;
    transition: opacity 0.15s;
  }
  .cancel-btn:hover {
    opacity: 0.7;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute; bottom: 0; left: 0; right: 0; height: 34px;
    display: flex; align-items: center; justify-content: center; z-index: 25;
  }
  .home-indicator__bar {
    width: 134px; height: 5px; background: rgba(255,255,255,0.3);
    border-radius: 9999px;
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Background Scene (Style Edit screen behind) -->
  <div class="bg-scene">
    <div class="bg-scene__shape1"></div>
    <div class="bg-scene__shape2"></div>
  </div>

  <!-- Faux Style Edit Popup (behind overlay) -->
  <div class="bg-popup">
    <div class="bg-popup__header">
      <span class="bg-popup__title">Create</span>
      <div class="bg-popup__close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(240,237,232,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div class="bg-popup__block"></div>
    <div class="bg-popup__block2"></div>
    <div class="bg-popup__row"></div>
    <div class="bg-popup__btn"></div>
  </div>

  <!-- Dim Overlay -->
  <div class="dim-overlay"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <!-- Signal -->
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <!-- Wi-Fi -->
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <!-- Battery -->
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#F0EDE8" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#F0EDE8" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet">
    <!-- Drag Handle -->
    <div class="drag-handle"></div>

    <!-- Action List -->
    <div class="action-list">
      <!-- Take Photo -->
      <div class="action-row">
        <div class="action-row__icon">
          <svg viewBox="0 0 24 24">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <span class="action-row__label">Take Photo</span>
      </div>

      <!-- Choose from Library -->
      <div class="action-row">
        <div class="action-row__icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <span class="action-row__label">Choose from Library</span>
      </div>
    </div>

    <!-- Spacer -->
    <div class="sheet-spacer"></div>

    <!-- Cancel Button -->
    <button class="cancel-btn">Cancel</button>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__bar"></div>
  </div>
</div>
</body>
</html>
