<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>624 — Photo Source</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0; height: 54px;
    color: #fff; font-size: 15px; font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .dim-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 10;
  }

  /* Compact bottom sheet */
  .bottom-sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.20);
    border-bottom: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 -12px 40px rgba(0,0,0,0.3);
    border-radius: 28px 28px 0 0;
    z-index: 20;
    padding-bottom: 34px;
  }

  .drag-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 100px;
    margin: 10px auto 16px;
  }

  .action-row {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px;
    cursor: pointer;
  }
  .action-row:active { background: rgba(255,255,255,0.06); }
  .action-row svg {
    width: 24px; height: 24px; color: rgba(255,255,255,0.65);
    flex-shrink: 0;
  }
  .action-row span { font-size: 15px; color: #fff; font-weight: 500; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 0 24px;
  }

  .cancel-btn {
    display: block;
    width: 100%;
    padding: 16px;
    text-align: center;
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    background: none; border: none;
    cursor: pointer;
    font-family: inherit;
  }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: rgba(255,255,255,0.3); border-radius: 100px; z-index: 30;
  }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" fill="none"><rect x="0" y="1" width="3" height="10" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="9" y="5" width="3" height="6" rx="1" fill="#fff"/><rect x="13.5" y="7" width="3" height="4" rx="1" fill="#fff"/></svg>
        <svg width="16" height="12" fill="none"><path d="M8 2C5.2 2 2.7 3.1 1 5l1.4 1.4C3.8 4.8 5.8 4 8 4s4.2.8 5.6 2.4L15 5C13.3 3.1 10.8 2 8 2z" fill="#fff"/><path d="M8 6C6.3 6 4.8 6.7 3.8 7.8L5.2 9.2C5.9 8.5 6.9 8 8 8s2.1.5 2.8 1.2l1.4-1.4C11.2 6.7 9.7 6 8 6z" fill="#fff"/><circle cx="8" cy="11" r="1.5" fill="#fff"/></svg>
        <svg width="25" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2" stroke="rgba(255,255,255,0.35)" stroke-width="1"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="1.5" y="2.5" width="14" height="7" rx="1" fill="#fff"/></svg>
      </div>
    </div>

    <div class="dim-overlay"></div>

    <div class="bottom-sheet">
      <div class="drag-handle"></div>

      <div class="action-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Take Photo</span>
      </div>

      <div class="divider"></div>

      <div class="action-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>Choose from Library</span>
      </div>

      <button class="cancel-btn">Cancel</button>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
