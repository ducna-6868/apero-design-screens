<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Trenddy — 630 Style Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; flex-shrink: 0; position: relative; z-index: 10;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #fff; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #fff; }

  /* Navigation bar */
  .nav-bar {
    height: 48px; width: 100%; display: flex; align-items: center;
    padding: 0 20px; flex-shrink: 0; position: relative;
  }
  .btn-back {
    width: 40px; height: 40px; border-radius: 9999px; border: none;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn-back:hover { background: rgba(255,255,255,0.06); }
  .btn-back svg { width: 24px; height: 24px; color: #F0EDE8; }
  .nav-title {
    font: 600 17px/24px 'DM Sans', sans-serif; color: #F0EDE8;
    position: absolute; left: 50%; transform: translateX(-50%);
  }

  /* Content */
  .content { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }
  .content::-webkit-scrollbar { display: none; }

  /* Preview area */
  .preview-area {
    width: 100%; height: 0; padding-bottom: 60%;
    position: relative; overflow: hidden;
    flex-shrink: 0;
  }
  .preview-area__bg {
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg, #1a0a3e 0%, #2d1b69 25%, #0d2a4a 50%, #0a3535 75%, #1E1E30 100%);
  }
  .preview-area__shapes {
    position: absolute; inset: 0; overflow: hidden;
  }
  .preview-area__shapes::before {
    content: ''; position: absolute; width: 240px; height: 240px; border-radius: 50%;
    background: radial-gradient(circle, rgba(108,92,231,0.2) 0%, transparent 70%);
    top: -40px; right: -30px;
  }
  .preview-area__shapes::after {
    content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(204,255,0,0.08) 0%, transparent 70%);
    bottom: -60px; left: -20px;
  }
  .preview-area__grid {
    position: absolute; inset: 0; opacity: 0.04;
    background: repeating-linear-gradient(0deg, #fff 0, #fff 1px, transparent 1px, transparent 30px),
                repeating-linear-gradient(90deg, #fff 0, #fff 1px, transparent 1px, transparent 30px);
  }
  .preview-area__neon {
    position: absolute; bottom: 50%; left: 50%; transform: translate(-50%, 50%);
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,206,201,0.15) 0%, rgba(108,92,231,0.08) 50%, transparent 80%);
    filter: blur(20px);
  }
  .preview-area__overlay {
    position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
    background: linear-gradient(transparent, rgba(10,10,15,0.9));
  }

  /* Style info */
  .style-info {
    padding: 20px 24px 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  .style-name {
    font: 700 24px/32px 'DM Sans', sans-serif; color: #F0EDE8;
  }
  .style-desc {
    font: 400 15px/22px 'Inter', sans-serif; color: #8A8A9A;
    max-width: 340px;
  }

  /* Tags row */
  .tags-row {
    display: flex; gap: 8px; padding: 16px 24px 0;
  }
  .tag-chip {
    padding: 6px 14px; border-radius: 9999px;
    font: 600 12px/16px 'Inter', sans-serif; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-chip--hot {
    background: #CCFF00; color: #0A0A0F;
  }
  .tag-chip--video {
    background: #1E1E30; color: #8A8A9A;
    border: 1px solid #2A2A44;
  }

  .spacer { flex: 1; }

  /* CTA bottom */
  .cta-area {
    padding: 20px 24px 0;
    flex-shrink: 0;
  }
  .btn-primary {
    width: 100%; height: 56px; border-radius: 9999px; border: none; cursor: pointer;
    background: #CCFF00; display: flex; align-items: center; justify-content: center; gap: 8px;
    font: 700 16px/22px 'DM Sans', sans-serif; color: #0A0A0F;
    box-shadow: 0 4px 24px rgba(204,255,0,0.2);
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #E0FF4D; }
  .btn-primary svg { width: 20px; height: 20px; }

  /* Home indicator */
  .home-indicator {
    height: 34px; width: 100%; display: flex; justify-content: center;
    align-items: flex-end; padding-bottom: 8px; flex-shrink: 0;
  }
  .home-indicator__pill {
    width: 134px; height: 5px; border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#fff" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <button class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="nav-title">Style Preview</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Preview Area -->
    <div class="preview-area">
      <div class="preview-area__bg"></div>
      <div class="preview-area__shapes"></div>
      <div class="preview-area__grid"></div>
      <div class="preview-area__neon"></div>
      <div class="preview-area__overlay"></div>
    </div>

    <!-- Style Info -->
    <div class="style-info">
      <h1 class="style-name">Cyberpunk Neon</h1>
      <p class="style-desc">Transform your photos into stunning cyberpunk-style videos with neon lighting effects</p>
    </div>

    <!-- Tags -->
    <div class="tags-row">
      <span class="tag-chip tag-chip--hot">HOT</span>
      <span class="tag-chip tag-chip--video">VIDEO</span>
    </div>

    <div class="spacer"></div>

    <!-- CTA -->
    <div class="cta-area">
      <button class="btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Create with this style
      </button>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
