<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>630 — Style Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status bar */
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 0; height: 54px;
    color: #fff; font-size: 15px; font-weight: 600;
    z-index: 10;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Back button */
  .back-btn {
    position: absolute; top: 60px; left: 16px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10;
  }
  .back-btn svg { width: 20px; height: 20px; color: #fff; }

  /* Full-screen style preview gradient placeholder */
  .style-preview-img {
    position: absolute; top: 0; left: 0; right: 0;
    height: 580px;
    background:
      linear-gradient(135deg, #ff00cc 0%, #7B61FF 30%, #00D4FF 60%, #00ff88 100%);
    opacity: 0.7;
  }

  /* Bottom gradient fade */
  .bottom-fade {
    position: absolute; top: 400px; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, transparent 0%, rgba(10,14,26,0.8) 40%, #0A0E1A 70%);
    z-index: 2;
  }

  /* Bottom panel — glass-thick */
  .bottom-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.20);
    border-bottom: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 -12px 40px rgba(0,0,0,0.3);
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 40px;
    z-index: 5;
  }

  .style-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .style-desc { font-size: 15px; color: rgba(255,255,255,0.65); margin-bottom: 16px; line-height: 1.4; }

  .stats-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .stat-text { font-size: 13px; color: rgba(255,255,255,0.65); }
  .trending-badge {
    font-size: 11px; font-weight: 600; color: #00D4FF;
    background: rgba(0,212,255,0.12);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 9999px;
    padding: 4px 12px;
  }

  .primary-btn {
    width: 100%; height: 56px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    border-radius: 9999px;
    color: #fff; font-size: 17px; font-weight: 600;
    font-family: inherit; cursor: pointer;
  }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px;
    background: rgba(255,255,255,0.3); border-radius: 100px; z-index: 10;
  }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" fill="none"><rect x="0" y="1" width="3" height="10" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="9" y="5" width="3" height="6" rx="1" fill="#fff"/><rect x="13.5" y="7" width="3" height="4" rx="1" fill="#fff"/></svg>
        <svg width="16" height="12" fill="none"><path d="M8 2C5.2 2 2.7 3.1 1 5l1.4 1.4C3.8 4.8 5.8 4 8 4s4.2.8 5.6 2.4L15 5C13.3 3.1 10.8 2 8 2z" fill="#fff"/><path d="M8 6C6.3 6 4.8 6.7 3.8 7.8L5.2 9.2C5.9 8.5 6.9 8 8 8s2.1.5 2.8 1.2l1.4-1.4C11.2 6.7 9.7 6 8 6z" fill="#fff"/><circle cx="8" cy="11" r="1.5" fill="#fff"/></svg>
        <svg width="25" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2" stroke="rgba(255,255,255,0.35)" stroke-width="1"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="1.5" y="2.5" width="14" height="7" rx="1" fill="#fff"/></svg>
      </div>
    </div>

    <div class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>

    <!-- Full-screen style preview -->
    <div class="style-preview-img"></div>
    <div class="bottom-fade"></div>

    <!-- Bottom content panel -->
    <div class="bottom-panel">
      <div class="style-name">Cyberpunk Neon</div>
      <div class="style-desc">Dark futuristic aesthetic with neon glow effects</div>
      <div class="stats-row">
        <span class="stat-text">1.2K uses</span>
        <span class="trending-badge">Trending</span>
      </div>
      <button class="primary-btn">Create with this style</button>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
