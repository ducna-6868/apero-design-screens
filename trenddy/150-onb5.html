<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 150 Onboarding 5 Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 47px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    flex-shrink: 0;
  }
  .status-bar__time {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #F0EDE8;
  }
  .status-bar__icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-bar__icons svg { width: 16px; height: 16px; color: #F0EDE8; }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 24px 0;
    overflow-y: auto;
  }

  /* Pricing illustration */
  .illustration {
    width: 280px;
    height: 160px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
    flex-shrink: 0;
  }
  .illustration__bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 30% 40%, rgba(204,255,0,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 70% 60%, rgba(108,92,231,0.15) 0%, transparent 55%),
      linear-gradient(135deg, #1E1E30 0%, #141420 100%);
  }
  /* Abstract shapes */
  .illustration__shape1 {
    position: absolute;
    width: 100px;
    height: 100px;
    top: 15px;
    left: 30px;
    background: linear-gradient(135deg, rgba(204,255,0,0.2) 0%, rgba(204,255,0,0.05) 100%);
    border-radius: 24px;
    transform: rotate(12deg);
    border: 1px solid rgba(204,255,0,0.1);
  }
  .illustration__shape2 {
    position: absolute;
    width: 70px;
    height: 70px;
    top: 35px;
    right: 40px;
    background: linear-gradient(135deg, rgba(108,92,231,0.25) 0%, rgba(108,92,231,0.05) 100%);
    border-radius: 50%;
    border: 1px solid rgba(108,92,231,0.1);
  }
  .illustration__shape3 {
    position: absolute;
    width: 50px;
    height: 50px;
    bottom: 15px;
    left: 55%;
    background: linear-gradient(135deg, rgba(0,206,201,0.2) 0%, transparent 100%);
    border-radius: 16px;
    transform: rotate(-8deg);
  }
  /* Dollar symbol */
  .illustration__dollar {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 48px;
    color: rgba(204,255,0,0.15);
    text-shadow: 0 0 40px rgba(204,255,0,0.1);
  }

  /* Overline */
  .overline {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    line-height: 16px;
    color: #CCFF00;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }

  /* Price display */
  .price-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 24px;
  }
  .price-display__amount {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 48px;
    line-height: 56px;
    color: #CCFF00;
    letter-spacing: -1px;
    text-shadow: 0 0 40px rgba(204,255,0,0.15);
  }
  .price-display__period {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #8A8A9A;
  }

  /* Page indicator */
  .page-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.2);
  }
  .dot--active {
    background: #CCFF00;
    box-shadow: 0 0 8px rgba(204,255,0,0.4);
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 24px;
  }
  .title__white {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #F0EDE8;
    display: block;
    letter-spacing: -0.5px;
  }
  .title__lime {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #CCFF00;
    display: block;
    letter-spacing: -0.5px;
  }

  /* Feature chips */
  .features {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    width: 100%;
    padding: 0 8px;
    margin-bottom: 32px;
  }
  .feature-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .feature-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .feature-icon--check {
    background: rgba(204,255,0,0.12);
  }
  .feature-icon--check svg {
    width: 13px;
    height: 13px;
    color: #CCFF00;
  }
  .feature-icon--x {
    background: rgba(255,107,107,0.12);
  }
  .feature-icon--x svg {
    width: 11px;
    height: 11px;
    color: #FF6B6B;
  }
  .feature-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #F0EDE8;
  }
  .feature-text--strike {
    color: #5A5A6A;
    text-decoration: line-through;
  }

  .spacer { flex: 1; min-height: 8px; }

  /* Primary button */
  .btn-primary {
    width: 100%;
    height: 56px;
    background: #CCFF00;
    border: none;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 12px;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-primary:hover { background: #E0FF4D; }
  .btn-primary span {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 17px;
    color: #0A0A0F;
  }

  /* Text button */
  .btn-text {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: #5A5A6A;
    cursor: pointer;
    padding: 12px 0;
    margin-bottom: 8px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    flex-shrink: 0;
  }
  .btn-text:hover { color: #8A8A9A; }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
    flex-shrink: 0;
  }
  .home-indicator__pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar__time">9:41</div>
    <div class="status-bar__icons">
      <svg width="16" height="16" viewBox="0 0 18 12" fill="none"><path d="M1 8.5C2.5 5 5.5 2.5 9 2.5s6.5 2.5 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 10C5 8 7 6.5 9 6.5s4 1.5 5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/></svg>
      <svg width="16" height="16" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="1" width="3" height="10" rx="1" fill="currentColor" opacity="0.3"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="currentColor" opacity="0.5"/><rect x="8.5" y="0.5" width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/><rect x="12.5" y="0" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><path d="M25 4.5v3a2 2 0 000-3z" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Pricing illustration -->
    <div class="illustration">
      <div class="illustration__bg"></div>
      <div class="illustration__shape1"></div>
      <div class="illustration__shape2"></div>
      <div class="illustration__shape3"></div>
      <div class="illustration__dollar">$</div>
    </div>

    <!-- Overline -->
    <div class="overline">ONE PLAN. EVERYTHING INCLUDED.</div>

    <!-- Price display -->
    <div class="price-display">
      <div class="price-display__amount">$4.99</div>
      <div class="price-display__period">per week</div>
    </div>

    <!-- Page indicator -->
    <div class="page-indicator">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot dot--active"></div>
      <div class="dot"></div>
    </div>

    <!-- Title -->
    <div class="title">
      <span class="title__white">One price.</span>
      <span class="title__lime">No surprises.</span>
    </div>

    <!-- Feature chips -->
    <div class="features">
      <div class="feature-row">
        <div class="feature-icon feature-icon--check">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 3L10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="feature-text">Flat price</span>
      </div>
      <div class="feature-row">
        <div class="feature-icon feature-icon--check">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 3L10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="feature-text">No hidden limits</span>
      </div>
      <div class="feature-row">
        <div class="feature-icon feature-icon--check">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 3L10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="feature-text">5-10 videos/wk</span>
      </div>
      <div class="feature-row">
        <div class="feature-icon feature-icon--x">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <span class="feature-text feature-text--strike">Pay to retry</span>
      </div>
      <div class="feature-row">
        <div class="feature-icon feature-icon--check">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 3L10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="feature-text">Free first image</span>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Primary button -->
    <button class="btn-primary"><span>Start free trial &rarr;</span></button>

    <!-- Secondary text button -->
    <button class="btn-text">Continue</button>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
