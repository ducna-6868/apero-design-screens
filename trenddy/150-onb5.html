<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 150 ONB5 Pricing Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  .status-bar {
    height: 47px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .status-bar .icons { display: flex; align-items: center; gap: 6px; }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 100px;
    background: rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* Scrollable Content */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 24px 0;
    height: 100%;
    overflow-y: auto;
  }

  /* Subscription Illustration */
  .sub-illustration {
    width: 280px;
    height: 180px;
    border-radius: 22px;
    background: rgba(255,255,255,0.06);
    -webkit-backdrop-filter: blur(40px);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .sub-illustration::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(0,212,255,0.1) 0%, transparent 50%),
      linear-gradient(225deg, rgba(123,97,255,0.1) 0%, transparent 50%);
  }
  .sub-illustration .price-display {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .sub-illustration .price-big {
    font-size: 48px;
    font-weight: 800;
    color: #00D4FF;
    letter-spacing: -2px;
    line-height: 1;
  }
  .sub-illustration .price-period {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    margin-top: 4px;
  }

  /* Overline */
  .overline {
    font-size: 11px;
    font-weight: 700;
    color: #00D4FF;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Price */
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 6px;
  }
  .price-amount {
    font-size: 36px;
    font-weight: 700;
    color: #00D4FF;
    letter-spacing: -1px;
  }
  .price-per {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 20px;
  }
  .title .line1 { font-size: 28px; font-weight: 700; color: #fff; display: block; letter-spacing: -0.5px; }
  .title .line2 { font-size: 28px; font-weight: 700; color: #00D4FF; display: block; letter-spacing: -0.5px; }

  /* Feature Checklist */
  .checklist {
    width: 342px;
    margin-bottom: 24px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
  }
  .check-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check-icon.positive {
    background: rgba(0,212,255,0.15);
  }
  .check-icon.positive svg { width: 12px; height: 12px; stroke: #00D4FF; stroke-width: 2.5; fill: none; }
  .check-icon.negative {
    background: rgba(255,255,255,0.06);
  }
  .check-icon.negative svg { width: 10px; height: 10px; stroke: rgba(255,255,255,0.3); stroke-width: 2.5; fill: none; }

  .check-label {
    font-size: 15px;
    color: #fff;
    font-weight: 500;
  }
  .check-label.muted {
    color: rgba(255,255,255,0.4);
    text-decoration: line-through;
  }

  /* Page Dots */
  .page-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .page-dots .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .page-dots .dot.active {
    background: #00D4FF;
    box-shadow: 0 0 8px rgba(0,212,255,0.4);
  }

  /* Buttons */
  .btn-primary {
    width: 342px;
    height: 56px;
    border-radius: 9999px;
    border: 1px solid rgba(255,255,255,0.25);
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    letter-spacing: -0.2px;
  }

  .btn-text {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    background: none;
    border: none;
    cursor: pointer;
    padding: 12px 24px;
    margin-bottom: 40px;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="1" fill="white"/>
        <rect x="4.5" y="5" width="3" height="7" rx="1" fill="white"/>
        <rect x="9" y="2" width="3" height="10" rx="1" fill="white"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C9.8 3.6 11.4 4.3 12.6 5.4L14 4C12.4 2.5 10.3 1.6 8 1.6C5.7 1.6 3.6 2.5 2 4L3.4 5.4C4.6 4.3 6.2 3.6 8 3.6Z" fill="white"/>
        <path d="M8 7.2C9 7.2 9.9 7.6 10.6 8.2L12 6.8C10.9 5.8 9.5 5.2 8 5.2C6.5 5.2 5.1 5.8 4 6.8L5.4 8.2C6.1 7.6 7 7.2 8 7.2Z" fill="white"/>
        <circle cx="8" cy="10.5" r="1.5" fill="white"/>
      </svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(255,255,255,0.35)"/>
        <rect x="2" y="2" width="19" height="9" rx="2" fill="white"/>
        <path d="M24 4.5V8.5C24.8 8.2 25.5 7.4 25.5 6.5C25.5 5.6 24.8 4.8 24 4.5Z" fill="rgba(255,255,255,0.4)"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Subscription Illustration -->
    <div class="sub-illustration">
      <div class="price-display">
        <div class="price-big">$4.99</div>
        <div class="price-period">per week</div>
      </div>
    </div>

    <div class="overline">ONE PLAN. EVERYTHING INCLUDED.</div>

    <div class="price-row">
      <span class="price-amount">$4.99</span>
      <span class="price-per">per week</span>
    </div>

    <div class="title">
      <span class="line1">One price.</span>
      <span class="line2">No surprises.</span>
    </div>

    <!-- Feature Checklist -->
    <div class="checklist">
      <div class="check-item">
        <div class="check-icon positive"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
        <span class="check-label">Flat price</span>
      </div>
      <div class="check-item">
        <div class="check-icon positive"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
        <span class="check-label">No hidden limits</span>
      </div>
      <div class="check-item">
        <div class="check-icon positive"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
        <span class="check-label">5-10 videos/wk</span>
      </div>
      <div class="check-item">
        <div class="check-icon negative"><svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></div>
        <span class="check-label muted">Pay to retry</span>
      </div>
      <div class="check-item">
        <div class="check-icon positive"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
        <span class="check-label">Free first image</span>
      </div>
    </div>

    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>

    <button class="btn-primary">Start free trial &rarr;</button>
    <button class="btn-text">Continue</button>
  </div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
