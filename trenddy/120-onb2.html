<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 120 Onboarding 2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 47px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 10;
  }
  .status-bar__time {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #F0EDE8;
  }
  .status-bar__icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-bar__icons svg { width: 16px; height: 16px; color: #F0EDE8; }

  /* Media area */
  .media-area {
    width: 390px;
    height: 422px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 60px 20px 30px;
  }
  .media-area__ambient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 25% 30%, rgba(108,92,231,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 75% 60%, rgba(204,255,0,0.08) 0%, transparent 55%);
    pointer-events: none;
  }
  .media-area__fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(0deg, #0A0A0F 0%, transparent 100%);
    z-index: 2;
  }

  /* Video thumbnail cards */
  .thumb-card {
    width: 112px;
    height: 200px;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    z-index: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .thumb-card:nth-child(2) {
    transform: translateY(-16px) scale(1.05);
    z-index: 3;
    width: 120px;
    height: 216px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 20px rgba(204,255,0,0.06);
    border-color: rgba(204,255,0,0.12);
  }
  .thumb-card__bg {
    position: absolute;
    inset: 0;
  }
  .thumb-card:nth-child(1) .thumb-card__bg {
    background: linear-gradient(160deg, #2A1A4A 0%, #1A0A2E 40%, #141420 100%);
  }
  .thumb-card:nth-child(2) .thumb-card__bg {
    background: linear-gradient(160deg, #1A2A1A 0%, #0A1A0A 40%, #141420 100%);
  }
  .thumb-card:nth-child(3) .thumb-card__bg {
    background: linear-gradient(160deg, #1A1A2A 0%, #0A0A1E 40%, #141420 100%);
  }
  /* Card inner visual elements */
  .thumb-card__visual {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .thumb-card:nth-child(1) .thumb-card__visual::before {
    content: '';
    position: absolute;
    width: 60px; height: 60px;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,43,0.5) 0%, transparent 70%);
  }
  .thumb-card:nth-child(1) .thumb-card__visual::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid rgba(255,107,43,0.4);
  }
  .thumb-card:nth-child(2) .thumb-card__visual::before {
    content: '';
    position: absolute;
    width: 80px; height: 50px;
    top: 25%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-5deg);
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(204,255,0,0.2) 0%, rgba(204,255,0,0.05) 100%);
    border: 1px solid rgba(204,255,0,0.15);
  }
  .thumb-card:nth-child(3) .thumb-card__visual::before {
    content: '';
    position: absolute;
    width: 50px; height: 50px;
    top: 28%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: conic-gradient(from 0deg, rgba(108,92,231,0.4), rgba(0,206,201,0.3), rgba(204,255,0,0.2), rgba(108,92,231,0.4));
    border-radius: 12px;
  }

  /* Label overlay */
  .thumb-card__label {
    position: absolute;
    bottom: 12px;
    left: 10px;
    right: 10px;
    padding: 5px 10px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 8px;
    z-index: 2;
  }
  .thumb-card__label span {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: #F0EDE8;
    letter-spacing: 0.3px;
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 24px 0;
  }

  /* Overline */
  .overline {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    line-height: 16px;
    color: #CCFF00;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  /* Page indicator */
  .page-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.2);
  }
  .dot--active {
    background: #CCFF00;
    box-shadow: 0 0 8px rgba(204,255,0,0.4);
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 12px;
  }
  .title__white {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #F0EDE8;
    display: block;
    letter-spacing: -0.5px;
  }
  .title__lime {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #CCFF00;
    display: block;
    letter-spacing: -0.5px;
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #8A8A9A;
    text-align: center;
    max-width: 320px;
    margin-bottom: 24px;
  }
  .subtitle strong {
    color: #F0EDE8;
    font-weight: 600;
  }

  .spacer { flex: 1; }

  /* Primary button */
  .btn-primary {
    width: 100%;
    height: 56px;
    background: #CCFF00;
    border: none;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 16px;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #E0FF4D; }
  .btn-primary span {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 17px;
    color: #0A0A0F;
  }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
  }
  .home-indicator__pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar__time">9:41</div>
    <div class="status-bar__icons">
      <svg width="16" height="16" viewBox="0 0 18 12" fill="none"><path d="M1 8.5C2.5 5 5.5 2.5 9 2.5s6.5 2.5 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 10C5 8 7 6.5 9 6.5s4 1.5 5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/></svg>
      <svg width="16" height="16" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="1" width="3" height="10" rx="1" fill="currentColor" opacity="0.3"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="currentColor" opacity="0.5"/><rect x="8.5" y="0.5" width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/><rect x="12.5" y="0" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><path d="M25 4.5v3a2 2 0 000-3z" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Media area with 3 cards -->
  <div class="media-area">
    <div class="media-area__ambient"></div>

    <div class="thumb-card">
      <div class="thumb-card__bg"></div>
      <div class="thumb-card__visual"></div>
      <div class="thumb-card__label"><span>NBA - Clutch</span></div>
    </div>

    <div class="thumb-card">
      <div class="thumb-card__bg"></div>
      <div class="thumb-card__visual"></div>
      <div class="thumb-card__label"><span>NFL - Blitz</span></div>
    </div>

    <div class="thumb-card">
      <div class="thumb-card__bg"></div>
      <div class="thumb-card__visual"></div>
      <div class="thumb-card__label"><span>AI-generated</span></div>
    </div>

    <div class="media-area__fade"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="overline">HOOK</div>

    <div class="page-indicator">
      <div class="dot"></div>
      <div class="dot dot--active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="title">
      <span class="title__white">Sports clips.</span>
      <span class="title__lime">Made viral.</span>
    </div>

    <div class="subtitle">AI video for every trend — ready to share in <strong>60 seconds</strong>.</div>

    <div class="spacer"></div>

    <button class="btn-primary"><span>Continue</span></button>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
