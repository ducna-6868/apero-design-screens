<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Trenddy — 650 Select Photo Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; flex-shrink: 0; position: relative; z-index: 10;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #fff; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #fff; }

  /* Navigation bar */
  .nav-bar {
    height: 48px; width: 100%; display: flex; align-items: center;
    padding: 0 20px; flex-shrink: 0; position: relative;
  }
  .btn-back {
    width: 40px; height: 40px; border-radius: 9999px; border: none;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn-back:hover { background: rgba(255,255,255,0.06); }
  .btn-back svg { width: 24px; height: 24px; color: #F0EDE8; }
  .nav-title {
    font: 600 17px/24px 'DM Sans', sans-serif; color: #F0EDE8;
    position: absolute; left: 50%; transform: translateX(-50%);
  }

  /* Content */
  .content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 16px 24px 0;
    overflow: hidden;
  }

  /* Photo preview */
  .photo-preview {
    width: 342px; height: 456px; border-radius: 20px; overflow: hidden;
    position: relative; flex-shrink: 0;
  }
  .photo-preview__bg {
    position: absolute; inset: 0;
    background:
      linear-gradient(150deg, #1E1E30 0%, #2A2A40 30%, #1a2a3a 60%, #1E1E30 100%);
  }
  .photo-preview__shapes {
    position: absolute; inset: 0; overflow: hidden;
  }
  .photo-preview__shapes::before {
    content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(108,92,231,0.12) 0%, transparent 70%);
    top: 40px; right: -40px;
  }
  .photo-preview__shapes::after {
    content: ''; position: absolute; width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,206,201,0.08) 0%, transparent 70%);
    bottom: 60px; left: -30px;
  }
  /* Placeholder icon */
  .photo-preview__icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0.3;
  }
  .photo-preview__icon svg { width: 48px; height: 48px; color: #8A8A9A; }
  .photo-preview__icon span {
    font: 400 13px/18px 'Inter', sans-serif; color: #8A8A9A;
  }

  /* Toolbar row */
  .toolbar {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 0 0;
    flex-shrink: 0;
  }
  .tool-btn {
    width: 44px; height: 44px; border-radius: 9999px;
    background: #1E1E30; border: 1px solid #2A2A44;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
  }
  .tool-btn:hover { background: #2A2A40; }
  .tool-btn svg { width: 20px; height: 20px; color: #F0EDE8; }

  .spacer { flex: 1; }

  /* Bottom buttons */
  .btn-row {
    display: flex; gap: 12px; width: 100%;
    padding: 0 0 0;
    flex-shrink: 0;
  }
  .btn-secondary {
    flex: 1; height: 56px; border-radius: 9999px;
    background: transparent; border: 1.5px solid #2A2A44;
    font: 600 16px/22px 'DM Sans', sans-serif; color: #F0EDE8;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.04); border-color: #3a3a54; }
  .btn-primary {
    flex: 1; height: 56px; border-radius: 9999px; border: none;
    background: #CCFF00; cursor: pointer;
    font: 700 16px/22px 'DM Sans', sans-serif; color: #0A0A0F;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    box-shadow: 0 4px 24px rgba(204,255,0,0.2);
  }
  .btn-primary:hover { background: #E0FF4D; }

  /* Home indicator */
  .home-indicator {
    height: 34px; width: 100%; display: flex; justify-content: center;
    align-items: flex-end; padding-bottom: 8px; flex-shrink: 0;
  }
  .home-indicator__pill {
    width: 134px; height: 5px; border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#fff" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <button class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="nav-title">Select Photo</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Photo Preview -->
    <div class="photo-preview">
      <div class="photo-preview__bg"></div>
      <div class="photo-preview__shapes"></div>
      <div class="photo-preview__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        <span>Photo Preview</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <!-- Rotate -->
      <button class="tool-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <!-- Crop -->
      <button class="tool-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/>
          <path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/>
        </svg>
      </button>
    </div>

    <div class="spacer"></div>

    <!-- Bottom Buttons -->
    <div class="btn-row">
      <button class="btn-secondary">Retake</button>
      <button class="btn-primary">Continue</button>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
