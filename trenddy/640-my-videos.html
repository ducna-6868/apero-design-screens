<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — My Videos</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .status-bar .icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar .icons svg { width: 16px; height: 16px; fill: #fff; }

  /* Top Bar */
  .top-bar {
    padding: 8px 20px 16px;
    text-align: center;
  }
  .page-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }

  /* Scrollable content */
  .content {
    height: calc(844px - 47px - 48px - 83px);
    overflow-y: auto;
    padding: 0 20px 20px;
  }
  .content::-webkit-scrollbar { display: none; }

  /* Video Grid */
  .video-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .video-card {
    height: 240px;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
  }
  .video-card .card-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .card-bg.bg1 { background: linear-gradient(160deg, #1a0e3e 0%, #0d2050 50%, #0a1a30 100%); }
  .card-bg.bg2 { background: linear-gradient(160deg, #0a3a3a 0%, #0d2a40 50%, #0a1520 100%); }
  .card-bg.bg3 { background: linear-gradient(160deg, #3a1a2a 0%, #2a1030 50%, #1a0a20 100%); }
  .card-bg.bg4 { background: linear-gradient(160deg, #2a2a0a 0%, #1a2010 50%, #0a1a0a 100%); }
  .card-bg.bg5 { background: linear-gradient(160deg, #0e1a3e 0%, #0d1040 50%, #0a0a2a 100%); }
  .card-bg.bg6 { background: linear-gradient(160deg, #3a0e1a 0%, #2a1020 50%, #1a0a15 100%); }

  .video-card .card-bottom-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.7) 100%);
    z-index: 2;
  }
  .video-card .new-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 3;
    padding: 3px 8px;
    border-radius: 9999px;
    background: rgba(0,212,255,0.2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(0,212,255,0.3);
    color: #00D4FF;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .duration-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  .video-title {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }

  /* Play icon overlay */
  .play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.8;
  }
  .play-overlay svg {
    width: 18px;
    height: 18px;
    fill: #fff;
    margin-left: 2px;
  }

  /* Tab Bar */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 83px;
    background: rgba(0,0,0,0.30);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding-top: 8px;
    z-index: 20;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    text-decoration: none;
  }
  .tab-item svg {
    width: 24px;
    height: 24px;
    stroke-width: 1.8;
    fill: none;
  }
  .tab-item.active svg { stroke: #00D4FF; }
  .tab-item:not(.active) svg { stroke: rgba(255,255,255,0.5); }
  .tab-label {
    font-size: 10px;
    font-weight: 500;
  }
  .tab-item.active .tab-label { color: #00D4FF; }
  .tab-item:not(.active) .tab-label { color: rgba(255,255,255,0.5); }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.3);
    z-index: 30;
  }
</style>
</head>
