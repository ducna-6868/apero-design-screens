<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>635 — AI Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.8), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; flex-shrink: 0;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #F0EDE8; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #F0EDE8; }

  /* Nav Bar */
  .nav-bar {
    height: 44px; display: flex; align-items: center; justify-content: center;
    padding: 0 20px; position: relative; flex-shrink: 0;
  }
  .nav-bar__back {
    position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px; border-radius: 9999px; background: rgba(42,42,64,0.6);
    display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
  }
  .nav-bar__back svg { width: 18px; height: 18px; stroke: #F0EDE8; fill: none; stroke-width: 2; }
  .nav-bar__title { font: 600 17px/22px 'DM Sans', sans-serif; color: #F0EDE8; }

  /* Content */
  .content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 16px 24px 0; overflow: hidden;
  }

  /* Preview Area */
  .preview-area {
    width: 342px; height: 400px; border-radius: 20px; overflow: hidden;
    background: #141420; position: relative;
  }
  .preview-area__gradient {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #6C5CE7 0%, #00CEC9 40%, #CCFF00 70%, #141420 100%);
    opacity: 0.35;
  }
  .preview-area__photo-placeholder {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,20,32,0.3) 0%, rgba(20,20,32,0.6) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .preview-area__photo-placeholder svg { width: 48px; height: 48px; stroke: rgba(240,237,232,0.3); fill: none; stroke-width: 1.5; }
  .preview-area__label { font: 600 16px/22px 'DM Sans', sans-serif; color: rgba(240,237,232,0.5); }

  /* Shimmer overlay */
  .shimmer-overlay {
    position: absolute; inset: 0; overflow: hidden;
  }
  .shimmer-overlay::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { left: -50%; }
    100% { left: 150%; }
  }

  /* Change buttons row */
  .change-row {
    width: 342px; display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0;
  }
  .change-btn {
    font: 400 13px/18px 'Inter', sans-serif; color: #8A8A9A;
    background: none; border: none; cursor: pointer; padding: 4px 0;
  }
  .change-btn:hover { color: #F0EDE8; }

  /* Spacer */
  .spacer { flex: 1; }

  /* Generate Button */
  .btn-generate {
    width: 342px; height: 56px; border-radius: 9999px; border: none; cursor: pointer;
    background: #CCFF00; display: flex; align-items: center; justify-content: center; gap: 8px;
    font: 600 16px/20px 'DM Sans', sans-serif; color: #0A0A0F;
    box-shadow: 0 4px 24px rgba(204,255,0,0.2);
  }
  .btn-generate svg { width: 20px; height: 20px; fill: none; stroke: #0A0A0F; stroke-width: 2; }

  /* Credit caption */
  .credit-caption {
    font: 400 12px/16px 'Inter', sans-serif; color: #5A5A6A;
    text-align: center; padding: 10px 0 0;
  }

  /* Home Indicator */
  .home-indicator {
    height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .home-indicator__bar {
    width: 134px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 9999px;
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#F0EDE8" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#F0EDE8" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <button class="nav-bar__back">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="nav-bar__title">Preview</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Preview Area -->
    <div class="preview-area">
      <div class="preview-area__gradient"></div>
      <div class="preview-area__photo-placeholder">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="preview-area__label">AI Preview</span>
      </div>
      <div class="shimmer-overlay"></div>
    </div>

    <!-- Change buttons -->
    <div class="change-row">
      <button class="change-btn">Change Style</button>
      <button class="change-btn">Change Photo</button>
    </div>

    <div class="spacer"></div>

    <!-- Generate Button -->
    <button class="btn-generate">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l2.4 5.4L20 9.6l-4 4.2L17 20l-5-3-5 3 1-6.2-4-4.2 5.6-2.2L12 2z"/>
      </svg>
      Generate Image
    </button>

    <!-- Credit caption -->
    <p class="credit-caption">1 credit will be used</p>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__bar"></div>
  </div>
</div>
</body>
</html>
