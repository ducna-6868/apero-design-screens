<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>620 — Explore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame {
    width: 390px; height: 844px; background: #0A0A0F; border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 2px #1a1a2e, 0 20px 80px rgba(0,0,0,0.8), 0 0 120px rgba(108,92,231,0.08);
    position: relative; display: flex; flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    height: 47px; width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0; flex-shrink: 0; position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  }
  .status-bar__time { font: 600 15px/18px 'Inter', sans-serif; color: #fff; }
  .status-bar__icons { display: flex; gap: 5px; align-items: center; }
  .status-bar__icons svg { width: 16px; height: 16px; fill: #fff; }

  /* Top Bar */
  .top-bar {
    position: absolute; top: 47px; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 20px; height: 48px;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #6C5CE7, #00CEC9);
    display: flex; align-items: center; justify-content: center;
    font: 600 14px/1 'DM Sans', sans-serif; color: #fff;
    border: 2px solid rgba(255,255,255,0.3); cursor: pointer;
  }
  .top-title {
    font: 600 13px/18px 'Inter', sans-serif; color: #fff; opacity: 0.9;
    position: absolute; left: 50%; transform: translateX(-50%);
  }

  /* Full-Screen Trend Content */
  .trend-content {
    flex: 1; position: relative; overflow: hidden;
  }
  .trend-media {
    position: absolute; inset: 0;
    background: linear-gradient(170deg, #0a2a2e 0%, #0d3d3a 20%, #0a3035 40%, #0c2530 60%, #0a1a20 80%, #0A0A0F 100%);
  }
  .trend-media__shapes {
    position: absolute; inset: 0; overflow: hidden;
  }
  .trend-media__shapes::before {
    content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,206,201,0.12) 0%, transparent 70%);
    top: 80px; left: -60px;
  }
  .trend-media__shapes::after {
    content: ''; position: absolute; width: 250px; height: 250px; border-radius: 50%;
    background: radial-gradient(circle, rgba(108,92,231,0.08) 0%, transparent 70%);
    top: 200px; right: -40px;
  }
  .trend-shape-3 {
    position: absolute; width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(204,255,0,0.04) 0%, transparent 70%);
    border-radius: 50%; top: 350px; left: 100px;
  }
  .trend-shape-4 {
    position: absolute; width: 120px; height: 160px;
    background: linear-gradient(135deg, rgba(0,206,201,0.06) 0%, transparent 100%);
    border-radius: 20px; top: 150px; right: 40px; transform: rotate(-15deg);
  }
  .trend-shape-5 {
    position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
    width: 260px; height: 340px; border-radius: 24px; overflow: hidden;
    background: linear-gradient(180deg, rgba(0,206,201,0.08) 0%, rgba(108,92,231,0.05) 50%, rgba(0,0,0,0.1) 100%);
    border: 1px solid rgba(0,206,201,0.06);
  }
  .trend-lines {
    position: absolute; inset: 0; opacity: 0.03;
    background: repeating-linear-gradient(0deg, #fff 0, #fff 1px, transparent 1px, transparent 40px);
  }
  .trend-gradient-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
    background: linear-gradient(transparent, rgba(10,10,15,0.95));
  }

  /* Swipe Hint */
  .swipe-hint {
    position: absolute; bottom: 215px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    opacity: 0.35; animation: swipeHint 2s ease-in-out infinite;
  }
  .swipe-hint svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; }
  @keyframes swipeHint { 0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.35; } 50% { transform: translateX(-50%) translateY(-6px); opacity: 0.6; } }

  /* Right Action Column */
  .action-column {
    position: absolute; right: 16px; bottom: 220px; z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .like-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
  }
  .like-btn__icon {
    width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  }
  .like-btn__icon svg { width: 28px; height: 28px; fill: none; stroke: #fff; stroke-width: 1.8; }
  .like-btn__count { font: 500 11px/14px 'Inter', sans-serif; color: rgba(255,255,255,0.85); }

  /* Bottom Content */
  .bottom-content {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
    padding: 0 20px 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .trend-title { font: 700 28px/36px 'DM Sans', sans-serif; color: #fff; }
  .trend-desc {
    font: 400 15px/22px 'Inter', sans-serif; color: #8A8A9A;
    max-width: 300px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .btn-primary {
    width: 100%; height: 56px; border-radius: 9999px; border: none; cursor: pointer;
    background: #CCFF00; display: flex; align-items: center; justify-content: center; gap: 8px;
    font: 600 16px/20px 'DM Sans', sans-serif; color: #0A0A0F; margin-top: 4px;
    box-shadow: 0 4px 24px rgba(204,255,0,0.2);
  }

  /* Tab Bar */
  .tab-bar {
    height: 83px; width: 100%; background: #141420; flex-shrink: 0;
    display: flex; justify-content: space-around; align-items: flex-start;
    padding-top: 10px; border-top: 0.5px solid #2A2A40; position: relative; z-index: 10;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; min-width: 64px;
  }
  .tab-item svg { width: 24px; height: 24px; }
  .tab-item__label { font: 400 10px/14px 'Inter', sans-serif; }
  .tab-item--active svg { stroke: #CCFF00; }
  .tab-item--active .tab-item__label { color: #CCFF00; }
  .tab-item--inactive svg { stroke: rgba(255,255,255,0.5); }
  .tab-item--inactive .tab-item__label { color: rgba(255,255,255,0.5); }

  /* Home Indicator */
  .home-indicator {
    height: 34px; width: 100%; display: flex; justify-content: center;
    align-items: flex-end; padding-bottom: 8px; flex-shrink: 0; background: #141420;
  }
  .home-indicator__pill { width: 134px; height: 5px; border-radius: 9999px; background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 17 12"><path d="M1 8.5h1.5v3H1zM4 6h1.5v5.5H4zM7 3.5h1.5V12H7zM10 1h1.5v10.5H10z" rx=".5"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 3.3C5.5 3.3 3.3 4.3 1.8 6l1.2 1.2C4.2 5.8 6 5 8 5s3.8.8 5 2.2L14.2 6C12.7 4.3 10.5 3.3 8 3.3zM8 7c-1.4 0-2.6.6-3.5 1.5L5.7 9.7c.6-.6 1.4-1 2.3-1s1.7.4 2.3 1l1.2-1.2C10.6 7.6 9.4 7 8 7zm0 4.3L9.7 9.7c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8L8 11.3z"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#fff" opacity="0.4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#CCFF00"/></svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="avatar">D</div>
    <span class="top-title">Explore</span>
    <div style="width: 36px;"></div>
  </div>

  <!-- Full-Screen Trend Content -->
  <div class="trend-content">
    <div class="trend-media">
      <div class="trend-media__shapes"></div>
      <div class="trend-shape-3"></div>
      <div class="trend-shape-4"></div>
      <div class="trend-shape-5"></div>
      <div class="trend-lines"></div>
    </div>
    <div class="trend-gradient-overlay"></div>

    <!-- Swipe Hint -->
    <div class="swipe-hint">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>

    <!-- Right Action Column -->
    <div class="action-column">
      <div class="like-btn">
        <div class="like-btn__icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <span class="like-btn__count">12.4K</span>
      </div>
    </div>

    <!-- Bottom Content -->
    <div class="bottom-content">
      <span class="trend-title">ASMR</span>
      <span class="trend-desc">Soothing visual effects with soft transitions and dreamy atmosphere</span>
      <button class="btn-primary">Try it Now</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item tab-item--inactive">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="tab-item__label">Home</span>
    </div>
    <div class="tab-item tab-item--active">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span class="tab-item__label">Explore</span>
    </div>
    <div class="tab-item tab-item--inactive">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>
      </svg>
      <span class="tab-item__label">My Videos</span>
    </div>
    <div class="tab-item tab-item--inactive">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="tab-item__label">Profile</span>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
