<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — Explore</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Full-screen trend content background */
  .trend-fullscreen {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #1a0e3e 0%, #0d2040 40%, #0a1a2a 70%, #0e1520 100%);
    z-index: 0;
  }

  /* Bottom gradient overlay */
  .trend-gradient-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 100%);
    z-index: 1;
  }

  /* Status Bar (floating) */
  .status-bar {
    height: 47px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .status-bar .icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar .icons svg { width: 16px; height: 16px; fill: #fff; }

  /* Top Bar (floating over content) */
  .top-bar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    padding: 8px 20px 0;
  }
  .top-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .top-avatar svg {
    width: 18px;
    height: 18px;
    stroke: rgba(255,255,255,0.7);
    fill: none;
    stroke-width: 1.8;
  }
  .top-title {
    flex: 1;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-right: 36px; /* balance the avatar on left */
  }

  /* Right Action Column */
  .action-column {
    position: absolute;
    right: 16px;
    bottom: 240px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .action-btn .icon-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .action-btn .icon-circle svg {
    width: 28px;
    height: 28px;
    stroke: #fff;
    fill: none;
    stroke-width: 1.8;
  }
  .action-btn .action-label {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    font-weight: 500;
  }

  /* Bottom Content */
  .bottom-content {
    position: absolute;
    bottom: 83px;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 0 20px 20px;
  }
  .trend-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .trend-desc {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
    margin-bottom: 20px;
  }
  .primary-btn {
    display: block;
    width: 100%;
    height: 56px;
    border-radius: 9999px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    line-height: 56px;
    text-decoration: none;
    letter-spacing: 0.3px;
  }

  /* Tab Bar */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 83px;
    background: rgba(0,0,0,0.30);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding-top: 8px;
    z-index: 20;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    text-decoration: none;
  }
  .tab-item svg {
    width: 24px;
    height: 24px;
    stroke-width: 1.8;
    fill: none;
  }
  .tab-item.active svg { stroke: #00D4FF; }
  .tab-item:not(.active) svg { stroke: rgba(255,255,255,0.5); }
  .tab-label {
    font-size: 10px;
    font-weight: 500;
  }
  .tab-item.active .tab-label { color: #00D4FF; }
  .tab-item:not(.active) .tab-label { color: rgba(255,255,255,0.5); }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.3);
    z-index: 30;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Full-screen trend background -->
  <div class="trend-fullscreen"></div>
  <div class="trend-gradient-overlay"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 16 16"><path d="M1 10.5l3-3 3 3 5-5 3 3" stroke="#fff" stroke-width="1.5" fill="none"/></svg>
      <svg viewBox="0 0 16 16"><rect x="1" y="4" width="10" height="8" rx="1" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="12" y="6" width="2" height="4" rx="0.5" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-avatar">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <span class="top-title">Explore</span>
  </div>

  <!-- Right Action Column -->
  <div class="action-column">
    <div class="action-btn">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <span class="action-label">Like</span>
    </div>
  </div>

  <!-- Bottom Content -->
  <div class="bottom-content">
    <div class="trend-title">March Madness Highlights</div>
    <div class="trend-desc">Create viral basketball clips with AI-powered editing.</div>
    <a href="#" class="primary-btn">Try it Now</a>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a class="tab-item" href="401-home.html">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 14 15 14 15 21"/>
      </svg>
      <span class="tab-label">Home</span>
    </a>
    <a class="tab-item active" href="620-explore.html">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
      </svg>
      <span class="tab-label">Explore</span>
    </a>
    <a class="tab-item" href="640-my-videos.html">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
      </svg>
      <span class="tab-label">My Videos</span>
    </a>
    <a class="tab-item" href="310-profile.html">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="tab-label">Profile</span>
    </a>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>
</div>
</body>
</html>
