<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 160 Onboarding 6 CTA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 47px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 10;
  }
  .status-bar__time {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #F0EDE8;
  }
  .status-bar__icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-bar__icons svg { width: 16px; height: 16px; color: #F0EDE8; }

  /* Media area — top 50% */
  .media-area {
    width: 390px;
    height: 422px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .media-area__bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 70% at 50% 40%, rgba(108,92,231,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 30% 70%, rgba(0,206,201,0.1) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 70% 30%, rgba(204,255,0,0.08) 0%, transparent 50%),
      linear-gradient(180deg, #1E1E30 0%, #141420 40%, #0A0A0F 100%);
  }
  /* Stylized video preview frame */
  .media-area__frame {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 320px;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .media-area__frame-bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(108,92,231,0.2) 0%, rgba(20,20,32,0.9) 40%, rgba(204,255,0,0.08) 100%);
  }
  /* Film grain overlay */
  .media-area__frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.01) 2px,
      rgba(255,255,255,0.01) 4px
    );
    pointer-events: none;
  }

  /* Play button */
  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #CCFF00;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 4px 24px rgba(204,255,0,0.35),
      0 0 40px rgba(204,255,0,0.1);
    z-index: 3;
    cursor: pointer;
    border: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .play-btn:hover {
    transform: translate(-50%, -50%) scale(1.06);
    box-shadow:
      0 8px 32px rgba(204,255,0,0.45),
      0 0 60px rgba(204,255,0,0.15);
  }
  .play-btn svg {
    width: 26px;
    height: 26px;
    color: #0A0A0F;
    margin-left: 3px;
  }
  /* Pulse ring behind play button */
  .play-btn::before {
    content: '';
    position: absolute;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(204,255,0,0.3);
    animation: ring-pulse 2s ease-out infinite;
  }
  @keyframes ring-pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* Fade */
  .media-area__fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(0deg, #0A0A0F 0%, transparent 100%);
    z-index: 2;
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 24px 0;
  }

  /* Overline */
  .overline {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 11px;
    line-height: 16px;
    color: #CCFF00;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  /* Page indicator */
  .page-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.2);
  }
  .dot--active {
    background: #CCFF00;
    box-shadow: 0 0 8px rgba(204,255,0,0.4);
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 12px;
  }
  .title__white {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #F0EDE8;
    display: block;
    letter-spacing: -0.5px;
  }
  .title__lime {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #CCFF00;
    display: block;
    letter-spacing: -0.5px;
  }

  /* Caption */
  .caption {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #8A8A9A;
    text-align: center;
    margin-bottom: 32px;
  }

  .spacer { flex: 1; }

  /* Primary button */
  .btn-primary {
    width: 100%;
    height: 56px;
    background: #CCFF00;
    border: none;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 16px;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #E0FF4D; }
  .btn-primary span {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 17px;
    color: #0A0A0F;
  }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
  }
  .home-indicator__pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar__time">9:41</div>
    <div class="status-bar__icons">
      <svg width="16" height="16" viewBox="0 0 18 12" fill="none"><path d="M1 8.5C2.5 5 5.5 2.5 9 2.5s6.5 2.5 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 10C5 8 7 6.5 9 6.5s4 1.5 5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/></svg>
      <svg width="16" height="16" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="1" width="3" height="10" rx="1" fill="currentColor" opacity="0.3"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="currentColor" opacity="0.5"/><rect x="8.5" y="0.5" width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/><rect x="12.5" y="0" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><path d="M25 4.5v3a2 2 0 000-3z" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Media area -->
  <div class="media-area">
    <div class="media-area__bg"></div>
    <div class="media-area__frame">
      <div class="media-area__frame-bg"></div>
    </div>
    <button class="play-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>
    </button>
    <div class="media-area__fade"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="overline">CALL TO ACTION</div>

    <div class="page-indicator">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot dot--active"></div>
    </div>

    <div class="title">
      <span class="title__white">Your first clip is</span>
      <span class="title__lime">10s away.</span>
    </div>

    <div class="caption">Cancel anytime.</div>

    <div class="spacer"></div>

    <button class="btn-primary"><span>Create my first video &rarr;</span></button>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
