<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 160 ONB6 CTA Final</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  .status-bar {
    height: 47px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .status-bar .icons { display: flex; align-items: center; gap: 6px; }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 100px;
    background: rgba(255,255,255,0.3);
    z-index: 10;
  }

  /* Top Half — Media Placeholder */
  .media-area {
    width: 100%;
    height: 422px;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(160deg, rgba(0,212,255,0.12) 0%, rgba(123,97,255,0.12) 50%, rgba(255,107,157,0.08) 100%),
      linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
  }
  .media-area::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.15);
  }

  /* Centered Play Button */
  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.20);
    box-shadow: 0 0 30px rgba(0,212,255,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    cursor: pointer;
  }
  .play-btn svg {
    width: 28px;
    height: 28px;
    fill: #fff;
    margin-left: 3px;
    filter: drop-shadow(0 0 8px rgba(0,212,255,0.4));
  }
  /* Cyan glow ring */
  .play-btn::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
    animation: pulse-glow 2s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* Bottom Half */
  .bottom-panel {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 422px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 24px 0;
  }

  .overline {
    font-size: 12px;
    font-weight: 700;
    color: #00D4FF;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .page-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .page-dots .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .page-dots .dot.active {
    background: #00D4FF;
    box-shadow: 0 0 8px rgba(0,212,255,0.4);
  }

  .title {
    text-align: center;
    margin-bottom: 12px;
  }
  .title .line1 { font-size: 28px; font-weight: 700; color: #fff; display: block; letter-spacing: -0.5px; }
  .title .line2 { font-size: 28px; font-weight: 700; color: #00D4FF; display: block; letter-spacing: -0.5px; }

  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.5;
    margin-bottom: auto;
  }

  /* Primary Button — Full Width at Bottom */
  .btn-area {
    position: absolute;
    bottom: 48px;
    left: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .btn-primary {
    width: 342px;
    height: 56px;
    border-radius: 9999px;
    border: 1px solid rgba(255,255,255,0.25);
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.2px;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="1" fill="white"/>
        <rect x="4.5" y="5" width="3" height="7" rx="1" fill="white"/>
        <rect x="9" y="2" width="3" height="10" rx="1" fill="white"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3.6C9.8 3.6 11.4 4.3 12.6 5.4L14 4C12.4 2.5 10.3 1.6 8 1.6C5.7 1.6 3.6 2.5 2 4L3.4 5.4C4.6 4.3 6.2 3.6 8 3.6Z" fill="white"/>
        <path d="M8 7.2C9 7.2 9.9 7.6 10.6 8.2L12 6.8C10.9 5.8 9.5 5.2 8 5.2C6.5 5.2 5.1 5.8 4 6.8L5.4 8.2C6.1 7.6 7 7.2 8 7.2Z" fill="white"/>
        <circle cx="8" cy="10.5" r="1.5" fill="white"/>
      </svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="rgba(255,255,255,0.35)"/>
        <rect x="2" y="2" width="19" height="9" rx="2" fill="white"/>
        <path d="M24 4.5V8.5C24.8 8.2 25.5 7.4 25.5 6.5C25.5 5.6 24.8 4.8 24 4.5Z" fill="rgba(255,255,255,0.4)"/>
      </svg>
    </div>
  </div>

  <!-- Media Area — Top Half -->
  <div class="media-area">
    <div class="play-btn">
      <svg viewBox="0 0 24 24"><polygon points="9,5 9,19 19,12"/></svg>
    </div>
  </div>

  <!-- Bottom Panel -->
  <div class="bottom-panel">
    <div class="overline">YOUR MOVE</div>

    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>

    <div class="title">
      <span class="line1">Your first clip is</span>
      <span class="line2">10s away.</span>
    </div>

    <div class="subtitle">Cancel anytime.</div>
  </div>

  <!-- CTA Button -->
  <div class="btn-area">
    <button class="btn-primary">Create my first video &rarr;</button>
  </div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
