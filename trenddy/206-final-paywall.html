<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>206 — Final Paywall (Post-205)</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 120% 80% at 20% 10%, rgba(0,122,255,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 100% 100% at 80% 20%, rgba(123,97,255,0.25) 0%, transparent 45%),
      radial-gradient(ellipse 80% 120% at 50% 90%, rgba(0,212,255,0.20) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(255,107,157,0.15) 0%, transparent 45%),
      linear-gradient(180deg, #0A0E1A 0%, #0D1220 50%, #0A0F1C 100%);
  }

  /* Status Bar */
  .status-bar {
    height: 47px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }
  .status-bar-time { font-size: 15px; font-weight: 600; }
  .status-bar-icons { display: flex; gap: 6px; align-items: center; }
  .status-bar-icons svg { width: 18px; height: 12px; fill: #fff; }

  /* Close Button */
  .close-btn {
    position: absolute;
    top: 55px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  .close-btn svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 2; }

  /* Centered layout */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(844px - 47px - 34px);
    padding: 0 32px;
  }

  /* Hero illustration placeholder */
  .hero-illustration {
    width: 240px;
    height: 200px;
    border-radius: 22px;
    background:
      linear-gradient(135deg, rgba(123,97,255,0.25) 0%, rgba(0,212,255,0.15) 100%),
      rgba(255,255,255,0.06);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .hero-illustration::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 30% 40%, rgba(123,97,255,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 70% 60%, rgba(0,212,255,0.2) 0%, transparent 50%);
  }
  .hero-illustration-icon {
    position: relative;
    z-index: 1;
  }
  .hero-illustration-icon svg {
    width: 64px;
    height: 64px;
    stroke: rgba(255,255,255,0.3);
    fill: none;
    stroke-width: 1.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    animation: sparkle-float 4s ease-in-out infinite;
  }
  @keyframes sparkle-float {
    0%, 100% { opacity: 0.3; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-6px) scale(1.15); }
  }
  .sparkle svg { width: 14px; height: 14px; }
  .sp1 { top: 18px; left: 28px; animation-delay: 0.2s; }
  .sp2 { top: 35px; right: 22px; animation-delay: 1.1s; }
  .sp3 { bottom: 28px; left: 45px; animation-delay: 0.6s; }
  .sp4 { bottom: 45px; right: 35px; animation-delay: 1.6s; }
  .sp5 { top: 80px; left: 120px; animation-delay: 2s; }

  .title {
    font-size: 24px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    margin-bottom: 10px;
  }
  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 32px;
    padding: 0 8px;
  }

  /* Price display */
  .price-display {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }
  .price-old {
    font-size: 20px;
    color: rgba(255,255,255,0.4);
    text-decoration: line-through;
    font-weight: 500;
  }
  .price-new {
    font-size: 36px;
    font-weight: 700;
    color: #00D4FF;
    text-shadow: 0 0 20px rgba(0,212,255,0.3);
  }
  .price-caption {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin-bottom: 16px;
  }

  /* Timer glass pill */
  .timer-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.10);
    margin-bottom: 32px;
  }
  .timer-pill svg {
    width: 14px;
    height: 14px;
    stroke: #FF6B9D;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .timer-pill span {
    font-size: 13px;
    color: #FF6B9D;
    font-weight: 500;
  }

  /* CTA Button */
  .cta-btn {
    width: 100%;
    height: 56px;
    border-radius: 9999px;
    background: linear-gradient(135deg, rgba(0,212,255,0.5), rgba(123,97,255,0.4));
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,212,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    color: #fff;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.2px;
    margin-bottom: 16px;
  }

  .no-thanks {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    text-align: center;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .home-indicator-pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar-time">9:41</span>
    <div class="status-bar-icons">
      <svg viewBox="0 0 18 12"><rect x="0" y="3" width="4" height="9" rx="1" opacity="0.4"/><rect x="5" y="2" width="4" height="10" rx="1" opacity="0.6"/><rect x="10" y="1" width="4" height="11" rx="1" opacity="0.8"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg viewBox="0 0 16 12" fill="none" stroke="#fff" stroke-width="1.2"><path d="M1 8.5C3.5 5.5 6.5 4 8 4s4.5 1.5 7 4.5"/><circle cx="8" cy="11" r="1" fill="#fff" stroke="none"/></svg>
      <svg viewBox="0 0 28 14"><rect x="0.5" y="0.5" width="23" height="13" rx="3" stroke="#fff" stroke-width="1" fill="none" opacity="0.4"/><rect x="24.5" y="4" width="2" height="6" rx="1" fill="#fff" opacity="0.4"/><rect x="2" y="2" width="18" height="10" rx="2" fill="#fff"/></svg>
    </div>
  </div>

  <!-- Close Button -->
  <div class="close-btn">
    <svg viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Hero Illustration -->
    <div class="hero-illustration">
      <div class="sparkle sp1">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(0,212,255,0.6)"/></svg>
      </div>
      <div class="sparkle sp2">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(123,97,255,0.5)"/></svg>
      </div>
      <div class="sparkle sp3">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(0,212,255,0.4)"/></svg>
      </div>
      <div class="sparkle sp4">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(123,97,255,0.4)"/></svg>
      </div>
      <div class="sparkle sp5">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z" fill="rgba(255,107,157,0.4)"/></svg>
      </div>
      <div class="hero-illustration-icon">
        <svg viewBox="0 0 64 64"><polygon points="26,14 50,32 26,50" stroke-width="1.5"/><circle cx="32" cy="32" r="24"/></svg>
      </div>
    </div>

    <!-- Text -->
    <div class="title">Wait! Special Offer</div>
    <div class="subtitle">Get your first week for just $0.99 — that's 80% off!</div>

    <!-- Price -->
    <div class="price-display">
      <span class="price-old">$4.99</span>
      <span class="price-new">$0.99</span>
    </div>
    <div class="price-caption">first week only</div>

    <!-- Urgency with timer pill -->
    <div class="timer-pill">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      <span>Offer expires in 24 hours</span>
    </div>

    <!-- CTA -->
    <button class="cta-btn">Try Now</button>
    <div class="no-thanks">No thanks</div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator-pill"></div>
  </div>
</div>

</body>
</html>
