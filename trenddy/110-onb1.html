<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenddy — 110 Onboarding 1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 24px 80px rgba(0,0,0,0.8),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 47px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 10;
  }
  .status-bar__time {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #F0EDE8;
  }
  .status-bar__icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-bar__icons svg {
    width: 16px;
    height: 16px;
    color: #F0EDE8;
  }

  /* Media area — top 50% */
  .media-area {
    width: 390px;
    height: 422px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .media-area__bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(108,92,231,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 70% 70%, rgba(204,255,0,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 90% 80% at 50% 50%, rgba(0,206,201,0.08) 0%, transparent 60%),
      linear-gradient(180deg, #141420 0%, #0A0A0F 100%);
  }
  /* Stylized abstract video pattern */
  .media-area__pattern {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .media-area__pattern::before {
    content: '';
    position: absolute;
    width: 220px;
    height: 320px;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 20px;
    background:
      linear-gradient(135deg, rgba(108,92,231,0.3) 0%, rgba(204,255,0,0.15) 50%, rgba(0,206,201,0.2) 100%);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .media-area__pattern::after {
    content: '';
    position: absolute;
    width: 60px;
    height: 60px;
    top: 185px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50%;
    background: rgba(204,255,0,0.15);
    border: 2px solid rgba(204,255,0,0.3);
    box-shadow: 0 0 30px rgba(204,255,0,0.1);
  }
  /* Floating shapes */
  .shape {
    position: absolute;
    border-radius: 12px;
    opacity: 0.15;
  }
  .shape--1 {
    width: 80px; height: 80px;
    top: 50px; left: 30px;
    background: #6C5CE7;
    transform: rotate(15deg);
    border-radius: 20px;
  }
  .shape--2 {
    width: 50px; height: 50px;
    top: 100px; right: 40px;
    background: #00CEC9;
    border-radius: 50%;
  }
  .shape--3 {
    width: 100px; height: 60px;
    bottom: 60px; left: 50px;
    background: #CCFF00;
    transform: rotate(-8deg);
    border-radius: 16px;
    opacity: 0.08;
  }
  /* Fade at bottom of media */
  .media-area__fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(0deg, #0A0A0F 0%, transparent 100%);
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 24px 0;
  }

  /* Page indicator */
  .page-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.2);
  }
  .dot--active {
    background: #CCFF00;
    box-shadow: 0 0 8px rgba(204,255,0,0.4);
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 12px;
  }
  .title__white {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #F0EDE8;
    display: block;
    letter-spacing: -0.5px;
  }
  .title__lime {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 40px;
    color: #CCFF00;
    display: block;
    letter-spacing: -0.5px;
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 22px;
    color: #8A8A9A;
    text-align: center;
    max-width: 320px;
    margin-bottom: 32px;
  }

  .spacer { flex: 1; }

  /* Primary button */
  .btn-primary {
    width: 100%;
    height: 56px;
    background: #CCFF00;
    border: none;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 16px;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #E0FF4D; }
  .btn-primary span {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 17px;
    color: #0A0A0F;
    letter-spacing: -0.2px;
  }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
  }
  .home-indicator__pill {
    width: 134px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar__time">9:41</div>
    <div class="status-bar__icons">
      <svg width="16" height="16" viewBox="0 0 18 12" fill="none"><path d="M1 8.5C2.5 5 5.5 2.5 9 2.5s6.5 2.5 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 10C5 8 7 6.5 9 6.5s4 1.5 5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/></svg>
      <svg width="16" height="16" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="1" width="3" height="10" rx="1" fill="currentColor" opacity="0.3"/><rect x="4.5" y="3" width="3" height="8" rx="1" fill="currentColor" opacity="0.5"/><rect x="8.5" y="0.5" width="3" height="11" rx="1" fill="currentColor" opacity="0.7"/><rect x="12.5" y="0" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><path d="M25 4.5v3a2 2 0 000-3z" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Media area -->
  <div class="media-area">
    <div class="media-area__bg"></div>
    <div class="media-area__pattern">
      <div class="shape shape--1"></div>
      <div class="shape shape--2"></div>
      <div class="shape shape--3"></div>
    </div>
    <div class="media-area__fade"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="page-indicator">
      <div class="dot dot--active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="title">
      <span class="title__white">Turn any trend into</span>
      <span class="title__lime">your video.</span>
    </div>

    <div class="subtitle">One tap. One photo. Viral-ready clip.</div>

    <div class="spacer"></div>

    <button class="btn-primary"><span>Let's go</span></button>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-indicator__pill"></div>
  </div>
</div>
</body>
</html>
