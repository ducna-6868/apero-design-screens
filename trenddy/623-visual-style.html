<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>623 — Visual Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .phone-frame {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 2px #1a1a2e, 0 20px 80px rgba(0,0,0,0.8), 0 0 120px rgba(108,92,231,0.08);
    position: relative;
  }

  /* Background hint */
  .bg-scene {
    position: absolute; inset: 0;
    background: linear-gradient(170deg, #0a2a2e 0%, #0d3d3a 25%, #0c2530 50%, #0A0A0F 100%);
  }
  .bg-scene::before {
    content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,206,201,0.06) 0%, transparent 70%);
    top: 80px; left: -30px;
  }

  /* Dim Overlay */
  .dim-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }

  /* Bottom Sheet */
  .bottom-sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 465px; background: #141420;
    border-radius: 24px 24px 0 0; z-index: 20;
    display: flex; flex-direction: column;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  /* Drag Handle */
  .drag-handle {
    display: flex; justify-content: center; padding: 12px 0 16px; flex-shrink: 0;
  }
  .drag-handle__pill {
    width: 36px; height: 4px; border-radius: 9999px;
    background: rgba(255,255,255,0.3);
  }

  /* Header */
  .sheet-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 20px 20px; flex-shrink: 0;
  }
  .sheet-header__spacer { width: 32px; }
  .sheet-header__title {
    font: 700 20px/28px 'DM Sans', sans-serif; color: #F0EDE8;
    text-align: center; flex: 1;
  }
  .btn-close {
    width: 32px; height: 32px; border-radius: 9999px; background: rgba(42,42,64,0.6);
    display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
  }
  .btn-close svg { width: 16px; height: 16px; stroke: #F0EDE8; fill: none; stroke-width: 2; }

  /* Style Grid */
  .style-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    padding: 0 20px 24px; flex: 1; overflow-y: auto; align-content: start;
  }
  .style-grid::-webkit-scrollbar { display: none; }

  .style-option {
    width: 100%; height: 140px; border-radius: 16px; overflow: hidden;
    position: relative; cursor: pointer; border: 2px solid transparent;
    transition: all 0.2s;
  }
  .style-option--selected {
    border-color: #CCFF00;
    box-shadow: 0 0 16px rgba(204,255,0,0.15), inset 0 0 0 0 transparent;
  }

  .style-option__thumb { position: absolute; inset: 0; }

  /* Individual style gradients */
  .thumb-none {
    background: #1E1E30;
    border: 1.5px dashed #2A2A44;
    border-radius: 14px;
  }
  .thumb-realistic {
    background: linear-gradient(150deg, #c9884c 0%, #a0623a 30%, #6b3a22 60%, #3d2010 100%);
  }
  .thumb-cinematic {
    background: linear-gradient(150deg, #d4a439 0%, #b8860b 30%, #7a5a0a 60%, #3d2d05 100%);
  }
  .thumb-cyberpunk {
    background: linear-gradient(150deg, #6C5CE7 0%, #a855f7 30%, #06b6d4 60%, #1E1E30 100%);
  }
  .thumb-studio {
    background: linear-gradient(150deg, #9ca3af 0%, #6b7280 30%, #4b5563 60%, #1f2937 100%);
  }
  .thumb-anime {
    background: linear-gradient(150deg, #ec4899 0%, #8b5cf6 30%, #3b82f6 60%, #1E1E30 100%);
  }

  /* Ambient shapes inside thumbnails */
  .style-option__thumb::before {
    content: ''; position: absolute; width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,0.06); top: -15px; right: -10px;
  }
  .style-option__thumb::after {
    content: ''; position: absolute; width: 50px; height: 50px;
    background: rgba(255,255,255,0.04); border-radius: 10px;
    bottom: 30px; left: 8px; transform: rotate(20deg);
  }

  .style-option__label-wrap {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 8px; text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
  }
  .style-option__label {
    font: 600 12px/16px 'DM Sans', sans-serif; color: #fff;
  }

  /* None style special */
  .style-none-icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -65%);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .style-none-icon svg { width: 24px; height: 24px; stroke: #5A5A6A; fill: none; stroke-width: 1.5; }

  /* Home Indicator */
  .home-indicator {
    height: 34px; width: 100%; display: flex; justify-content: center;
    align-items: flex-end; padding-bottom: 8px; flex-shrink: 0;
    background: #141420;
  }
  .home-indicator__pill { width: 134px; height: 5px; border-radius: 9999px; background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Background -->
  <div class="bg-scene"></div>
  <div class="dim-overlay"></div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet">
    <div class="drag-handle"><div class="drag-handle__pill"></div></div>

    <!-- Header -->
    <div class="sheet-header">
      <div class="sheet-header__spacer"></div>
      <span class="sheet-header__title">Choose Visual Style</span>
      <button class="btn-close">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Style Grid -->
    <div class="style-grid">
      <!-- No Style -->
      <div class="style-option">
        <div class="style-option__thumb thumb-none">
          <div class="style-none-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>
          </div>
        </div>
        <div class="style-option__label-wrap">
          <span class="style-option__label">No Style</span>
        </div>
      </div>

      <!-- Realistic (Selected) -->
      <div class="style-option style-option--selected">
        <div class="style-option__thumb thumb-realistic"></div>
        <div class="style-option__label-wrap">
          <span class="style-option__label">Realistic</span>
        </div>
      </div>

      <!-- Cinematic -->
      <div class="style-option">
        <div class="style-option__thumb thumb-cinematic"></div>
        <div class="style-option__label-wrap">
          <span class="style-option__label">Cinematic</span>
        </div>
      </div>

      <!-- Cyberpunk -->
      <div class="style-option">
        <div class="style-option__thumb thumb-cyberpunk"></div>
        <div class="style-option__label-wrap">
          <span class="style-option__label">Cyberpunk</span>
        </div>
      </div>

      <!-- Studio -->
      <div class="style-option">
        <div class="style-option__thumb thumb-studio"></div>
        <div class="style-option__label-wrap">
          <span class="style-option__label">Studio</span>
        </div>
      </div>

      <!-- Anime -->
      <div class="style-option">
        <div class="style-option__thumb thumb-anime"></div>
        <div class="style-option__label-wrap">
          <span class="style-option__label">Anime</span>
        </div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator">
      <div class="home-indicator__pill"></div>
    </div>
  </div>
</div>
</body>
</html>
