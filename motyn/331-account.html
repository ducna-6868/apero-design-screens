<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>MoTyn — Account</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #fff;
    width: 390px;
    min-height: 844px;
    margin: 0 auto;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 12px;
    height: 54px;
  }

  .status-bar-time {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .status-bar-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 8px 20px 20px;
    gap: 14px;
  }

  .back-button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #1c1c2e;
    border: 1px solid #2d2d44;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .back-button span {
    color: #fff;
    font-size: 18px;
    line-height: 1;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  /* Profile Section */
  .profile-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 32px;
    gap: 12px;
  }

  .profile-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
  }

  .profile-name {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .profile-email {
    font-size: 14px;
    color: #9ca3af;
  }

  /* Cards */
  .card {
    background: #1c1c2e;
    border: 1px solid #2d2d44;
    border-radius: 16px;
    padding: 20px;
    margin: 0 20px 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
  }

  .row-label {
    font-size: 14px;
    color: #9ca3af;
  }

  .row-value {
    font-size: 14px;
    color: #f1f1f6;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .row-value .chevron {
    color: #6b7280;
    font-size: 14px;
  }

  .divider {
    height: 1px;
    background: #2d2d44;
  }

  /* Login Method */
  .login-row-left {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #f1f1f6;
  }

  .connected-text {
    font-size: 14px;
    color: #34d399;
    font-weight: 500;
  }

  /* Danger Zone */
  .danger-zone {
    padding: 0 20px;
    margin-top: 16px;
    margin-bottom: 40px;
  }

  .delete-button {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #ef4444;
    font-size: 16px;
    font-weight: 600;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }

  .delete-button:active {
    background: rgba(239, 68, 68, 0.2);
  }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span class="status-bar-time">9:41</span>
  <div class="status-bar-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="back-button">
    <span>&#8249;</span>
  </div>
  <span class="header-title">Account</span>
</div>

<!-- Profile Section -->
<div class="profile-section">
  <div class="profile-avatar">U</div>
  <div class="profile-name">User</div>
  <div class="profile-email">user@email.com</div>
</div>

<!-- Account Info Card -->
<div class="card">
  <div class="section-title">Personal Information</div>
  <div class="row">
    <span class="row-label">Name</span>
    <span class="row-value">User <span class="chevron">&#8250;</span></span>
  </div>
  <div class="divider"></div>
  <div class="row">
    <span class="row-label">Email</span>
    <span class="row-value">user@email.com</span>
  </div>
  <div class="divider"></div>
  <div class="row">
    <span class="row-label">Phone</span>
    <span class="row-value">Not set</span>
  </div>
</div>

<!-- Login Method Card -->
<div class="card">
  <div class="section-title">Login Method</div>
  <div class="row">
    <div class="login-row-left">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="#fff">
        <path d="M15.24 13.38c-.35.81-.52 1.17-.97 1.89-.63.99-1.52 2.23-2.62 2.24-1.0.01-1.25-.65-2.6-.64-1.35.01-1.63.65-2.63.64-1.1-.01-1.94-1.12-2.57-2.11C2.14 12.76 1.93 9.73 3.13 8.1c.85-1.16 2.19-1.84 3.43-1.84 1.28 0 2.08.65 3.14.65 1.02 0 1.65-.65 3.12-.65 1.1 0 2.29.6 3.14 1.63-2.76 1.51-2.31 5.45.28 6.49zM11.53 4.96c.5-.64.88-1.54.74-2.46-.82.06-1.77.57-2.33 1.25-.5.61-.92 1.52-.76 2.4.89.03 1.81-.5 2.35-1.19z"/>
      </svg>
      Sign in with Apple
    </div>
    <span class="connected-text">Connected</span>
  </div>
</div>

<!-- Danger Zone -->
<div class="danger-zone">
  <button class="delete-button">Delete Account</button>
</div>

</body>
</html>
