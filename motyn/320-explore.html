<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Explore</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .header {
    display: flex; align-items: center; gap: 16px; padding: 12px 24px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1c1c2e;
    border: 1px solid #2d2d44; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #f1f1f6; font-size: 18px;
  }
  .header-title { font-size: 20px; font-weight: 700; }

  .grid-content {
    flex: 1; overflow-y: auto; padding: 8px 24px 100px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    align-content: start;
  }
  .grid-card {
    border-radius: 16px; overflow: hidden;
    background: #1c1c2e; cursor: pointer;
  }
  .card-thumb {
    width: 100%; height: 200px; position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
  }
  .play-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .play-overlay::after {
    content: ''; width: 0; height: 0;
    border-left: 14px solid #fff; border-top: 8px solid transparent;
    border-bottom: 8px solid transparent; margin-left: 3px;
  }
  .card-info { padding: 12px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .card-usage { font-size: 12px; color: #6b7280; }

  .g1 { background: linear-gradient(135deg, #7c3aed, #a855f7); }
  .g2 { background: linear-gradient(135deg, #ec4899, #f43f5e); }
  .g3 { background: linear-gradient(135deg, #f59e0b, #f97316); }
  .g4 { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
  .g5 { background: linear-gradient(135deg, #10b981, #059669); }
  .g6 { background: linear-gradient(135deg, #8b5cf6, #6366f1); }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; width: 390px; height: 84px;
    background: #0f0f1a; border-top: 1px solid #1c1c2e;
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; background: none; border: none; min-width: 60px;
  }
  .tab-label { font-size: 11px; color: #6b7280; font-weight: 500; }
  .tab-item.active .tab-label { color: #7c3aed; }
  .create-fab {
    width: 56px; height: 56px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff; cursor: pointer;
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    margin-top: -16px;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="header">
  <div class="back-btn">&#8249;</div>
  <div class="header-title">Explore</div>
</div>

<div class="grid-content">
  <div class="grid-card">
    <div class="card-thumb g1">&#128131;<div class="play-overlay"></div></div>
    <div class="card-info">
      <div class="card-title">Groovy Dance</div>
      <div class="card-usage">12.5k uses</div>
    </div>
  </div>
  <div class="grid-card">
    <div class="card-thumb g2">&#127939;<div class="play-overlay"></div></div>
    <div class="card-info">
      <div class="card-title">Action Hero</div>
      <div class="card-usage">8.3k uses</div>
    </div>
  </div>
  <div class="grid-card">
    <div class="card-thumb g3">&#128522;<div class="play-overlay"></div></div>
    <div class="card-info">
      <div class="card-title">Smile Wave</div>
      <div class="card-usage">15.1k uses</div>
    </div>
  </div>
  <div class="grid-card">
    <div class="card-thumb g4">&#127754;<div class="play-overlay"></div></div>
    <div class="card-info">
      <div class="card-title">Nature Flow</div>
      <div class="card-usage">6.7k uses</div>
    </div>
  </div>
  <div class="grid-card">
    <div class="card-thumb g5">&#127925;<div class="play-overlay"></div></div>
    <div class="card-info">
      <div class="card-title">Beat Drop</div>
      <div class="card-usage">9.9k uses</div>
    </div>
  </div>
  <div class="grid-card">
    <div class="card-thumb g6">&#129302;<div class="play-overlay"></div></div>
    <div class="card-info">
      <div class="card-title">Robot Move</div>
      <div class="card-usage">4.2k uses</div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="#6b7280" stroke-width="2"/>
    </svg>
    <span class="tab-label">Home</span>
  </div>
  <div class="tab-item active">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="11" cy="11" r="7" stroke="#7c3aed" stroke-width="2" fill="rgba(124,58,237,0.15)"/><path d="M16 16l4.5 4.5" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="tab-label" style="color:#7c3aed">Explore</span>
  </div>
  <button class="create-fab">+</button>
  <div class="tab-item">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="8" r="4" stroke="#6b7280" stroke-width="2"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="#6b7280" stroke-width="2"/>
    </svg>
    <span class="tab-label">Profile</span>
  </div>
</div>
</body>
</html>
