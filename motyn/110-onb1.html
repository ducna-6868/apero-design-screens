<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Onboarding 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .onb-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 40px 32px 0;
  }
  .illustration {
    width: 260px; height: 260px; border-radius: 32px;
    background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(236,72,153,0.2));
    border: 1px solid #2d2d44;
    display: flex; align-items: center; justify-content: center;
    font-size: 100px; position: relative; overflow: hidden;
  }
  .illustration::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(124,58,237,0.2), transparent 70%);
  }
  .text-area {
    text-align: center; margin-top: 48px;
  }
  .text-area h1 {
    font-size: 28px; font-weight: 800; margin-bottom: 12px;
  }
  .text-area p {
    font-size: 16px; color: #9ca3af; line-height: 1.6;
  }
  .dots {
    display: flex; gap: 8px; margin-top: 40px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 4px; background: #2d2d44;
  }
  .dot.active {
    width: 24px; background: linear-gradient(135deg, #7c3aed, #ec4899);
  }
  .bottom-area {
    padding: 0 32px 48px; display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .btn-continue {
    width: 100%; height: 56px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; box-shadow: 0 8px 30px rgba(124,58,237,0.35);
  }
  .skip {
    font-size: 15px; color: #6b7280; background: none; border: none; cursor: pointer;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="onb-content">
  <div class="illustration">⚡</div>
  <div class="text-area">
    <h1>AI-Powered Motion</h1>
    <p>Transform any photo into a stunning motion video with our advanced AI technology.</p>
  </div>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="bottom-area">
  <button class="btn-continue">Continue</button>
  <button class="skip">Skip</button>
</div>
</body>
</html>
