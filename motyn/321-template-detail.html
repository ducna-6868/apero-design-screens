<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Template Detail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .preview {
    width: 100%; height: 420px; position: relative;
    background: linear-gradient(135deg, #4c1d95, #7c3aed, #a855f7);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .preview-emoji { font-size: 80px; }
  .play-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .play-btn::after {
    content: ''; width: 0; height: 0;
    border-left: 20px solid #fff; border-top: 12px solid transparent;
    border-bottom: 12px solid transparent; margin-left: 4px;
  }
  .back-overlay {
    position: absolute; top: 16px; left: 24px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 20px;
  }

  .detail-content {
    flex: 1; padding: 24px 24px 0;
  }
  .detail-title {
    font-size: 26px; font-weight: 800; margin-bottom: 8px;
  }
  .detail-meta {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .meta-item {
    font-size: 13px; color: #9ca3af;
    display: flex; align-items: center; gap: 4px;
  }
  .detail-desc {
    font-size: 15px; color: #9ca3af; line-height: 1.6;
  }

  .bottom-area {
    padding: 20px 24px 48px;
  }
  .btn-try {
    width: 100%; height: 56px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; box-shadow: 0 8px 30px rgba(124,58,237,0.35);
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="preview">
  <div class="back-overlay">&#8249;</div>
  <div class="preview-emoji">&#128131;</div>
  <div class="play-btn"></div>
</div>

<div class="detail-content">
  <div class="detail-title">Groovy Dance</div>
  <div class="detail-meta">
    <div class="meta-item">&#9733; 4.8</div>
    <div class="meta-item">&#8226;</div>
    <div class="meta-item">12.5k uses</div>
    <div class="meta-item">&#8226;</div>
    <div class="meta-item">5s duration</div>
  </div>
  <div class="detail-desc">Add a fun groovy dance motion to your photos. Perfect for social media content and fun videos with friends. This template uses AI to create smooth, natural-looking dance movements.</div>
</div>

<div class="bottom-area">
  <button class="btn-try">Try This Template</button>
</div>
</body>
</html>
