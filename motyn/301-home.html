<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px;
  }
  .logo-text {
    font-size: 24px; font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff; cursor: pointer;
  }

  .main-content {
    flex: 1; overflow-y: auto; padding: 0 24px 100px;
  }

  .pro-banner {
    width: 100%; padding: 20px; border-radius: 20px; margin-bottom: 28px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    position: relative; overflow: hidden;
  }
  .pro-banner::after {
    content: ''; position: absolute; top: -30px; right: -20px;
    width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }
  .pro-tag {
    display: inline-block; padding: 4px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.2); font-size: 12px; font-weight: 800;
    margin-bottom: 8px; letter-spacing: 1px;
  }
  .pro-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .pro-desc { font-size: 14px; opacity: 0.85; }

  .section-title {
    font-size: 20px; font-weight: 700; margin-bottom: 16px;
  }

  .feature-card {
    width: 100%; padding: 20px; border-radius: 20px;
    background: #1c1c2e; border: 1px solid #2d2d44;
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 28px; cursor: pointer;
  }
  .feature-icon {
    width: 52px; height: 52px; border-radius: 16px; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .feature-info { display: flex; flex-direction: column; gap: 4px; }
  .feature-title { font-size: 17px; font-weight: 700; }
  .feature-desc { font-size: 13px; color: #9ca3af; line-height: 1.4; }
  .feature-arrow {
    margin-left: auto; font-size: 18px; color: #6b7280;
  }

  .templates-scroll {
    display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .templates-scroll::-webkit-scrollbar { display: none; }
  .template-card {
    min-width: 120px; height: 160px; border-radius: 16px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px; cursor: pointer;
    position: relative; overflow: hidden;
  }
  .template-card .emoji { font-size: 40px; z-index: 1; }
  .template-card .label {
    font-size: 13px; font-weight: 600; z-index: 1; color: #fff;
  }
  .t1 { background: linear-gradient(135deg, #7c3aed, #a855f7); }
  .t2 { background: linear-gradient(135deg, #ec4899, #f43f5e); }
  .t3 { background: linear-gradient(135deg, #f59e0b, #f97316); }
  .t4 { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
  .t5 { background: linear-gradient(135deg, #10b981, #059669); }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; width: 390px; height: 84px;
    background: #0f0f1a; border-top: 1px solid #1c1c2e;
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; background: none; border: none; min-width: 60px;
  }
  .tab-icon { font-size: 22px; }
  .tab-label { font-size: 11px; color: #6b7280; font-weight: 500; }
  .tab-item.active .tab-label { color: #7c3aed; }
  .tab-item.active .tab-icon { filter: none; }

  .create-fab {
    width: 56px; height: 56px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff; cursor: pointer;
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    margin-top: -16px;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="top-bar">
  <div class="logo-text">MoTyn</div>
  <div class="avatar">U</div>
</div>

<div class="main-content">
  <div class="pro-banner">
    <div class="pro-tag">PRO</div>

  <div class="section-title">Create</div>

    <div class="feature-info">
      <div class="feature-title">AI Motion</div>
      <div class="feature-desc">Transform your photos into stunning motion videos</div>
    </div>
    <div class="feature-arrow">&#8250;</div>
  </div>

  <div class="section-title">Explore Templates</div>
  <div class="templates-scroll">
    <div class="template-card t1"><span class="emoji">&#128131;</span><span class="label">Dance</span></div>
    <div class="template-card t2"><span class="emoji">&#127939;</span><span class="label">Action</span></div>
    <div class="template-card t3"><span class="emoji">&#128522;</span><span class="label">Expression</span></div>
    <div class="template-card t4"><span class="emoji">&#127754;</span><span class="label">Nature</span></div>
    <div class="template-card t5"><span class="emoji">&#127925;</span><span class="label">Music</span></div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active">
    <svg class="tab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="#7c3aed" stroke-width="2" fill="rgba(124,58,237,0.15)"/>
    </svg>
    <span class="tab-label" style="color:#7c3aed">Home</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="11" cy="11" r="7" stroke="#6b7280" stroke-width="2"/><path d="M16 16l4.5 4.5" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="tab-label">Explore</span>
  </div>
  <button class="create-fab">+</button>
  <div class="tab-item">
    <svg class="tab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="8" r="4" stroke="#6b7280" stroke-width="2"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="#6b7280" stroke-width="2"/>
    </svg>
    <span class="tab-label">Profile</span>
  </div>
</div>
</body>
</html>
