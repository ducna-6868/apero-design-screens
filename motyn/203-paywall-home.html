<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Paywall Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .header { display: flex; justify-content: flex-end; padding: 8px 24px; }
  .close-btn {
    width: 32px; height: 32px; border-radius: 50%; background: #1c1c2e;
    border: 1px solid #2d2d44; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #9ca3af; font-size: 16px; font-weight: 600;
  }

  .paywall-content {
    flex: 1; overflow-y: auto; padding: 0 24px;
    display: flex; flex-direction: column; align-items: center;
  }
  .pro-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px; border-radius: 20px;
    background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(236,72,153,0.3));
    border: 1px solid rgba(124,58,237,0.4);
    font-size: 14px; font-weight: 700; color: #f1f1f6;
  }
  .page-title {
    font-size: 30px; font-weight: 800; margin-top: 16px; text-align: center;
  }

  .benefits {
    width: 100%; margin-top: 28px; display: flex; flex-direction: column; gap: 14px;
  }
  .benefit-item {
    display: flex; align-items: center; gap: 12px; font-size: 15px;
  }
  .benefit-check {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff;
  }

  .packages {
    width: 100%; margin-top: 28px; display: flex; flex-direction: column; gap: 10px;
  }
  .package {
    width: 100%; padding: 16px 18px; border-radius: 16px;
    background: #1c1c2e; border: 2px solid #2d2d44;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; position: relative;
  }
  .package.selected {
    border-color: #7c3aed;
    background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(236,72,153,0.05));
  }
  .package-row { display: flex; align-items: center; }
  .package-left { display: flex; flex-direction: column; gap: 2px; }
  .package-label { font-size: 16px; font-weight: 700; }
  .package-desc { font-size: 12px; color: #6b7280; }
  .package-right { text-align: right; }
  .package-price { font-size: 18px; font-weight: 800; }
  .package-original { font-size: 13px; color: #6b7280; text-decoration: line-through; }
  .radio {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid #2d2d44;
    display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0;
  }
  .package.selected .radio { border-color: #7c3aed; }
  .radio-inner {
    width: 12px; height: 12px; border-radius: 50%; display: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
  }
  .package.selected .radio-inner { display: block; }

  .bottom-area {
    padding: 20px 24px 40px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .btn-continue {
    width: 100%; height: 56px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; box-shadow: 0 8px 30px rgba(124,58,237,0.35);
  }
  .restore {
    font-size: 13px; color: #9ca3af; background: none; border: none;
    text-decoration: underline; cursor: pointer;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="header">
  <div class="close-btn">&#x2715;</div>
</div>

<div class="paywall-content">
  <div class="pro-badge">&#11088; Pro</div>
  <div class="page-title">Upgrade to Pro</div>

  <div class="benefits">
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>Unlimited AI video generation</span>
    </div>
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>HD quality export</span>
    </div>
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>Access all motion templates</span>
    </div>
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>No watermark</span>
    </div>
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>Priority processing</span>
    </div>
  </div>

  <div class="packages">
    <div class="package">
      <div class="package-row">
        <div class="radio"><div class="radio-inner"></div></div>
        <div class="package-left">
          <div class="package-label">Weekly</div>
          <div class="package-desc">Billed every week</div>
        </div>
      </div>
      <div class="package-right">
        <div class="package-original">$9.99</div>
        <div class="package-price">$4.99<span style="font-size:13px;font-weight:400;color:#9ca3af">/week</span></div>
      </div>
    </div>

    <div class="package selected">
      <div class="package-row">
        <div class="radio"><div class="radio-inner"></div></div>
        <div class="package-left">
          <div class="package-label">Yearly</div>
          <div class="package-desc">Billed annually</div>
        </div>
      </div>
      <div class="package-right">
        <div class="package-original">$199.99</div>
        <div class="package-price">$49.99<span style="font-size:13px;font-weight:400;color:#9ca3af">/year</span></div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-area">
  <button class="btn-continue">Continue</button>
  <button class="restore">Restore Purchase</button>
</div>
</body>
</html>
