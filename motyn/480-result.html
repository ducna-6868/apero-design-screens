<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Result</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .preview-area {
    width: 100%; height: 460px; position: relative;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
  }
  .preview-emoji { font-size: 72px; }
  .play-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .play-btn::after {
    content: ''; width: 0; height: 0;
    border-left: 20px solid #fff; border-top: 12px solid transparent;
    border-bottom: 12px solid transparent; margin-left: 4px;
  }
  .back-overlay {
    position: absolute; top: 12px; left: 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 18px; border: none;
  }
  .back-label { font-size: 17px; font-weight: 600; color: #fff; }

  .result-content {
    flex: 1; padding: 20px 24px;
  }
  .action-buttons {
    display: flex; gap: 12px; margin-bottom: 24px;
  }
  .btn-save, .btn-share {
    flex: 1; height: 48px; border-radius: 14px; border: none;
    font-size: 15px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-save {
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff; box-shadow: 0 6px 20px rgba(124,58,237,0.3);
  }
  .btn-share {
    background: transparent; color: #f1f1f6;
    border: 2px solid #2d2d44;
  }
  .result-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .result-desc { font-size: 14px; color: #9ca3af; margin-bottom: 24px; }

  .bottom-area {
    padding: 0 24px 48px;
  }
  .btn-regenerate {
    width: 100%; height: 52px; border-radius: 14px;
    background: #1c1c2e; border: 1px solid #2d2d44;
    color: #f1f1f6; font-size: 15px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="preview-area">
  <div class="back-overlay">
    <button class="back-btn">&#8249;</button>
    <span class="back-label">Result</span>
  </div>
  <div class="preview-emoji">&#127916;</div>
  <div class="play-btn"></div>
</div>

<div class="result-content">
  <div class="action-buttons">
    <button class="btn-save">&#128190; Save</button>
    <button class="btn-share">&#128279; Share</button>
  </div>
  <div class="result-title">AI Motion Video</div>
  <div class="result-desc">Generated just now using AI motion technology</div>
</div>

<div class="bottom-area">
  <button class="btn-regenerate">&#8635; Generate Again</button>
</div>
</body>
</html>
