<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - AI Motion (Uploaded)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .header {
    display: flex; align-items: center; gap: 16px; padding: 12px 24px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1c1c2e;
    border: 1px solid #2d2d44; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #f1f1f6; font-size: 18px;
  }
  .header-title { font-size: 20px; font-weight: 700; }

  .form-content {
    flex: 1; padding: 16px 24px; overflow-y: auto;
  }
  .field-label {
    font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #f1f1f6;
  }
  .upload-box {
    width: 100%; height: 160px; border-radius: 16px;
    border: 2px solid #7c3aed;
    background: rgba(124,58,237,0.08);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; margin-bottom: 24px; position: relative;
  }
  .upload-emoji { font-size: 56px; }
  .remove-btn {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(239,68,68,0.9); border: none;
    color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .prompt-area {
    width: 100%; height: 100px; border-radius: 14px; border: 1px solid #2d2d44;
    background: #1c1c2e; color: #f1f1f6; font-size: 14px;
    padding: 14px; resize: none; font-family: inherit;
    margin-bottom: 24px;
  }
  .prompt-area::placeholder { color: #6b7280; }
  .prompt-area:focus { outline: none; border-color: #7c3aed; }

  .bottom-area {
    padding: 16px 24px 48px;
  }
  .btn-generate {
    width: 100%; height: 56px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px;
    box-shadow: 0 8px 30px rgba(124,58,237,0.35);
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="header">
  <div class="back-btn">&#8249;</div>
  <div class="header-title">AI Motion</div>
</div>

<div class="form-content">
  <div class="field-label">Reference Image</div>
  <div class="upload-box">
    <div class="upload-emoji">&#128247;</div>
    <button class="remove-btn">&#x2715;</button>
  </div>

  <div class="field-label">Motion Video</div>
  <div class="upload-box">
    <div class="upload-emoji">&#127909;</div>
    <button class="remove-btn">&#x2715;</button>
  </div>

  <div class="field-label">Prompt (Optional)</div>
  <textarea class="prompt-area" placeholder="Describe the motion you want..."></textarea>
</div>

<div class="bottom-area">
  <button class="btn-generate">&#9889; Generate</button>
</div>
</body>
</html>
