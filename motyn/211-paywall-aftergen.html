<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Paywall After Gen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .header { display: flex; justify-content: flex-end; padding: 8px 24px; }
  .close-btn {
    width: 32px; height: 32px; border-radius: 50%; background: #1c1c2e;
    border: 1px solid #2d2d44; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #9ca3af; font-size: 16px; font-weight: 600;
  }

  .content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 32px 24px 0; text-align: center;
  }
  .emoji-large { font-size: 72px; margin-bottom: 20px; }
  .title { font-size: 30px; font-weight: 800; margin-bottom: 12px; }
  .desc { font-size: 16px; color: #9ca3af; line-height: 1.6; max-width: 320px; }

  .package {
    width: 100%; padding: 20px; border-radius: 16px; margin-top: 36px;
    background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.08));
    border: 2px solid #7c3aed;
    display: flex; justify-content: space-between; align-items: center;
    position: relative; cursor: pointer;
  }
  .popular-badge {
    position: absolute; top: -10px; right: 16px;
    padding: 3px 12px; border-radius: 8px; font-size: 10px; font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .package-left { display: flex; align-items: center; gap: 12px; }
  .radio {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid #7c3aed;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .radio-inner {
    width: 12px; height: 12px; border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
  }
  .package-info { display: flex; flex-direction: column; gap: 2px; text-align: left; }
  .package-label { font-size: 16px; font-weight: 700; }
  .package-desc-small { font-size: 12px; color: #6b7280; }
  .package-right { text-align: right; }
  .package-original { font-size: 13px; color: #6b7280; text-decoration: line-through; }
  .package-price { font-size: 20px; font-weight: 800; }
  .package-period { font-size: 13px; color: #9ca3af; font-weight: 400; }

  .benefits-small {
    width: 100%; margin-top: 24px; display: flex; flex-direction: column; gap: 10px;
  }
  .benefit-item {
    display: flex; align-items: center; gap: 10px; font-size: 14px;
  }
  .benefit-check {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #fff;
  }

  .bottom-area {
    padding: 20px 24px 40px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .btn-subscribe {
    width: 100%; height: 56px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; box-shadow: 0 8px 30px rgba(124,58,237,0.35);
  }
  .restore {
    font-size: 13px; color: #9ca3af; background: none; border: none;
    text-decoration: underline; cursor: pointer;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="header">
  <div class="close-btn">&#x2715;</div>
</div>

<div class="content">
  <div class="emoji-large">&#127916;</div>
  <div class="title">Out of Credits</div>
  <div class="desc">Upgrade to Pro to continue generating amazing AI motion videos.</div>

  <div class="package">
    <div class="popular-badge">MOST POPULAR</div>
    <div class="package-left">
      <div class="radio"><div class="radio-inner"></div></div>
      <div class="package-info">
        <div class="package-label">Yearly</div>
        <div class="package-desc-small">Billed annually</div>
      </div>
    </div>
    <div class="package-right">
      <div class="package-original">$199.99</div>
      <div class="package-price">$49.99<span class="package-period">/year</span></div>
    </div>
  </div>

  <div class="benefits-small">
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>Unlimited AI video generation</span>
    </div>
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>HD quality export</span>
    </div>
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>No watermark</span>
    </div>
    <div class="benefit-item">
      <div class="benefit-check">&#10003;</div>
      <span>Priority processing</span>
    </div>
  </div>
</div>

<div class="bottom-area">
  <button class="btn-subscribe">Subscribe Now</button>
  <button class="restore">Restore Purchase</button>
</div>
</body>
</html>
