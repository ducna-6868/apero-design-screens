<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Upload Video</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .header {
    display: flex; align-items: center; gap: 16px; padding: 12px 24px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1c1c2e;
    border: 1px solid #2d2d44; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #f1f1f6; font-size: 18px;
  }
  .header-title { font-size: 20px; font-weight: 700; }

  .options-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 24px; gap: 20px;
  }
  .option-card {
    width: 100%; padding: 36px 24px; border-radius: 24px;
    background: #1c1c2e; border: 1px solid #2d2d44;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; cursor: pointer; transition: border-color 0.2s;
  }
  .option-card:hover { border-color: #7c3aed; }
  .option-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(236,72,153,0.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .option-title { font-size: 20px; font-weight: 700; }
  .option-desc { font-size: 14px; color: #9ca3af; text-align: center; }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="header">
  <div class="back-btn">&#8249;</div>
  <div class="header-title">Upload Video</div>
</div>

<div class="options-content">
  <div class="option-card">
    <div class="option-icon">&#127909;</div>
    <div class="option-title">Camera</div>
    <div class="option-desc">Record a video with your camera</div>
  </div>
  <div class="option-card">
    <div class="option-icon">&#128193;</div>
    <div class="option-title">Library</div>
    <div class="option-desc">Choose from your video library</div>
  </div>
</div>
</body>
</html>
