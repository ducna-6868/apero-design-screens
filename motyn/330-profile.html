<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .header {
    display: flex; align-items: center; gap: 16px; padding: 12px 24px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; background: #1c1c2e;
    border: 1px solid #2d2d44; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #f1f1f6; font-size: 18px;
  }
  .header-title { font-size: 20px; font-weight: 700; }

  .profile-section {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 24px 0; gap: 12px;
  }
  .avatar-large {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 800; color: #fff;
  }
  .user-name { font-size: 22px; font-weight: 700; }
  .user-email { font-size: 14px; color: #9ca3af; }

  .main-content {
    flex: 1; padding: 24px;
  }
  .upgrade-card {
    width: 100%; padding: 18px 20px; border-radius: 16px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; margin-bottom: 28px;
    position: relative; overflow: hidden;
  }
  .upgrade-card::after {
    content: ''; position: absolute; top: -20px; right: -10px;
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }
  .upgrade-icon { font-size: 24px; z-index: 1; }
  .upgrade-info { z-index: 1; }
  .upgrade-title { font-size: 16px; font-weight: 700; }
  .upgrade-desc { font-size: 13px; opacity: 0.85; }
  .upgrade-arrow { margin-left: auto; font-size: 18px; z-index: 1; }

  .menu-list {
    display: flex; flex-direction: column; gap: 4px;
  }
  .menu-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 0; border-bottom: 1px solid #1c1c2e;
    cursor: pointer;
  }
  .menu-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: #1c1c2e; display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .menu-label { font-size: 16px; font-weight: 500; flex: 1; }
  .menu-arrow { font-size: 16px; color: #6b7280; }

  .logout-btn {
    width: 100%; height: 52px; border-radius: 14px; border: none;
    background: rgba(239, 68, 68, 0.1); color: #ef4444;
    font-size: 16px; font-weight: 600; cursor: pointer;
    margin-top: 32px;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="header">
  <div class="back-btn">&#8249;</div>
  <div class="header-title">Profile</div>
</div>

<div class="profile-section">
  <div class="avatar-large">U</div>
  <div class="user-name">User</div>
  <div class="user-email">user@email.com</div>
</div>

<div class="main-content">
  <div class="upgrade-card">
    <div class="upgrade-icon">&#11088;</div>
    <div class="upgrade-info">
      <div class="upgrade-title">Upgrade to Pro</div>
      <div class="upgrade-desc">Unlock all premium features</div>
    </div>
    <div class="upgrade-arrow">&#8250;</div>
  </div>

  <div class="menu-list">
    <div class="menu-item">
      <div class="menu-icon">&#128100;</div>
      <div class="menu-label">Account</div>
      <div class="menu-arrow">&#8250;</div>
    </div>
    <div class="menu-item">
      <div class="menu-icon">&#128179;</div>
      <div class="menu-label">Manage Subscriptions</div>
      <div class="menu-arrow">&#8250;</div>
    </div>
    <div class="menu-item">
      <div class="menu-icon">&#128274;</div>
      <div class="menu-label">Privacy Policy</div>
      <div class="menu-arrow">&#8250;</div>
    </div>
    <div class="menu-item">
      <div class="menu-icon">&#128196;</div>
      <div class="menu-label">Terms of Service</div>
      <div class="menu-arrow">&#8250;</div>
    </div>
  </div>

  <button class="logout-btn">Log Out</button>
</div>
</body>
</html>
