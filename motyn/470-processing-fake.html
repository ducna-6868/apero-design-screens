<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>470 - Fake Processing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0f;
    color: #fff;
    width: 390px;
    min-height: 844px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 0;
    height: 54px;
  }

  .status-bar-time {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .status-bar-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Main Content */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(844px - 54px);
    padding: 0 40px;
  }

  /* Spinner */
  .spinner-container {
    width: 100px;
    height: 100px;
    position: relative;
    margin-bottom: 32px;
  }

  .spinner-ring {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #1c1c2e;
    border-top: 4px solid transparent;
    position: absolute;
    inset: 0;
    animation: spin 1.2s linear infinite;
  }

  .spinner-ring::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 4px solid transparent;
    border-top-color: #7c3aed;
    border-right-color: #ec4899;
    animation: spin 1.2s linear infinite;
  }

  .spinner-percent {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Title */
  .title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
    text-align: center;
  }

  /* Description */
  .description {
    font-size: 15px;
    color: #9ca3af;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 36px;
  }

  /* Progress Bar */
  .progress-bar-track {
    width: 100%;
    height: 6px;
    background: #1c1c2e;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-bar-fill {
    width: 95%;
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #ec4899);
    border-radius: 3px;
    animation: pulse-width 2s ease-in-out infinite;
  }

  /* Estimated Time */
  .estimated-time {
    font-size: 13px;
    color: #6b7280;
    text-align: center;
    margin-bottom: 16px;
  }

  /* Tip */
  .tip-text {
    font-size: 13px;
    color: #6b7280;
    font-style: italic;
    text-align: center;
  }

  /* Animations */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse-width {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-bar-time">9:41</div>
    <div class="status-bar-icons">
      <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="spinner-container">
      <div class="spinner-ring"></div>
      <div class="spinner-percent">95%</div>
    </div>

    <div class="title">Converting...</div>
    <div class="description">Almost there! Your AI motion video is being finalized.</div>

    <div class="progress-bar-track">
      <div class="progress-bar-fill"></div>
    </div>

    <div class="estimated-time">Estimated time: &lt; 1 min</div>
    <div class="tip-text">Tip: Pro users get 3x faster processing</div>
  </div>

</body>
</html>
