<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844, initial-scale=1.0">
<title>MoTyn - Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; background: #0a0a0f;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f1f1f6; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 8px; }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  .splash-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .logo-box {
    width: 120px; height: 120px; border-radius: 30px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 20px 60px rgba(124, 58, 237, 0.4);
  }
  .logo-box span {
    font-size: 64px; font-weight: 800; color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  .app-name {
    font-size: 40px; font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-top: 8px;
  }
  .subtitle {
    font-size: 16px; color: #9ca3af; font-weight: 400;
  }
  .spinner-area {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #2d2d44;
    border-top-color: #7c3aed; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="0.5" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="0.5" opacity=".6"/><rect x="8" y="1" width="3" height="11" rx="0.5" opacity=".8"/><rect x="12" y="0" width="3" height="12" rx="0.5"/></svg>
    <svg width="16" height="12" fill="#fff"><path d="M1 4.5c2.5-3 5-3.5 7-3.5s4.5.5 7 3.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".4"/><path d="M3.5 7c1.5-2 3-2.5 4.5-2.5s3 .5 4.5 2.5" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/><circle cx="8" cy="10" r="1.5"/></svg>
    <svg width="27" height="12" fill="#fff"><rect x="0" y="1" width="22" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="23" y="3.5" width="2.5" height="5" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="#32d74b"/></svg>
  </div>
</div>

<div class="splash-content">
  <div class="logo-box"><span>M</span></div>
  <div class="app-name">MoTyn</div>
  <div class="subtitle">AI Photo & Video</div>
</div>

<div class="spinner-area">
  <div class="spinner"></div>
</div>
</body>
</html>
