<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Subscriptions - MoTyn</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #fff;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0 24px;
    height: 54px;
  }

  .status-bar-time {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .status-bar-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 12px 20px 16px 20px;
    gap: 14px;
  }

  .back-button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #1c1c2e;
    border: 1px solid #2d2d44;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .back-button span {
    color: #fff;
    font-size: 18px;
    line-height: 1;
    margin-top: -1px;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: #f1f1f6;
  }

  /* Content */
  .content {
    padding: 0 20px 40px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Current Plan Card */
  .current-plan-card {
    background: #1c1c2e;
    border: 1px solid #7c3aed;
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .current-plan-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, #7c3aed, #ec4899);
  }

  .current-plan-label {
    font-size: 12px;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .plan-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .plan-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }

  .active-badge {
    background: rgba(52, 211, 153, 0.15);
    color: #34d399;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
  }

  .plan-price {
    font-size: 16px;
    font-weight: 600;
    color: #d1d5db;
    margin-bottom: 4px;
  }

  .plan-renewal {
    font-size: 13px;
    color: #6b7280;
  }

  /* Features Card */
  .features-card {
    background: #1c1c2e;
    border: 1px solid #2d2d44;
    border-radius: 16px;
    padding: 20px;
  }

  .features-header {
    font-size: 16px;
    font-weight: 700;
    color: #f1f1f6;
    margin-bottom: 16px;
  }

  .features-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .feature-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .feature-check svg {
    width: 12px;
    height: 12px;
  }

  .feature-text {
    font-size: 14px;
    color: #d1d5db;
    font-weight: 500;
  }

  /* Action Buttons */
  .actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: 4px;
  }

  .change-plan-btn {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    border: 2px solid #2d2d44;
    background: transparent;
    color: #f1f1f6;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: system-ui, -apple-system, sans-serif;
    transition: border-color 0.2s ease;
  }

  .change-plan-btn:hover {
    border-color: #7c3aed;
  }

  .cancel-btn {
    background: none;
    border: none;
    color: #ef4444;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 16px;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Footer */
  .footer-text {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

</div>

</body>
</html>
